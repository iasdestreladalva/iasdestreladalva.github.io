<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - Sistema Completo</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        @media print {
            .no-print, button, select, #userWelcomeBar, .admin-box, .card, canvas { display: none !important; }
            body { background: white; color: black; }
            table#tabela-main { width: 100% !important; border: 1px solid black !important; }
            #tabela-main th, #tabela-main td { border: 1px solid black !important; color: black !important; font-size: 10pt; }
            #tabela-main input { color: black !important; border: none !important; background: transparent !important; }
        }

        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 2fr 1.2fr; gap: 15px; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; padding: 8px; border-radius: 4px; box-sizing: border-box; font-size: 0.8rem; }
        
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 5px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }
        
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: var(--blue); padding: 10px; border: 1px solid #cbd5e1; color: white; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 50px; }
        
        .card { background: #16213e; border: 1px solid #2e3a59; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
    </style>
</head>
<body>
<div class="container">
    <div id="userWelcomeBar" class="no-print" style="display:none; text-align:center; padding:10px; color:var(--gold); border: 1px solid var(--neon); margin-bottom: 10px; border-radius: 8px;"></div>
    
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon); cursor:pointer;">🔓 ACESSAR</button>
            <button class="input-dark" id="btnSair" onclick="sair()" style="display:none; width:auto; padding:0 15px; border-color:red; color:red; cursor:pointer;">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>1. MINISTÉRIO DO DIA</h4>
                <div id="listaMinisterios"></div>
            </div>
            <div class="admin-section">
                <h4>2. ANCIÃO DO MÊS</h4>
                <div id="gridMeses" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"></div>
            </div>
            <div class="admin-section">
                <h4>3. LOGINS & SENHAS</h4>
                <div id="corpoCreds" style="max-height:200px; overflow-y:auto; border:1px solid #333; padding:5px;"></div>
            </div>
            <div class="admin-section">
                <h4>4. APOIO ANCIÃO</h4>
                <div id="gridApoioAnciao"></div>
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" id="headerTitulo" style="font-size:1.5rem;">ESCALA</th></tr>
            <tr><th colspan="9" id="headerAnciao" style="color:var(--gold);">Ancião: </th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div class="no-print" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px;">
        <div class="card">
            <h3 style="color:var(--neon);">📊 ALVO MISSIONÁRIO</h3>
            <canvas id="missionaryChart" style="max-height: 250px;"></canvas>
            <div id="adminGrafico" style="display:none; margin-top:10px;">
                <input type="number" id="inputAlvo" placeholder="Meta" class="input-dark" style="width:48%;">
                <input type="number" id="inputAtual" placeholder="Atual" class="input-dark" style="width:48%;">
                <button onclick="salvarGrafico()" class="btn-min" style="margin-top:10px; border-color:var(--green); color:var(--green);">ATUALIZAR ALVO</button>
            </div>
        </div>
        <div class="card">
            <h3 style="color:var(--gold);">🔗 LINKS E ARQUIVOS</h3>
            <div id="listaLinks"></div>
            <div id="adminLinks" style="display:none; margin-top:10px; border-top:1px solid #444; padding-top:10px;">
                <input type="text" id="linkNome" placeholder="Nome" class="input-dark">
                <input type="text" id="linkUrl" placeholder="URL" class="input-dark" style="margin-top:5px;">
                <button onclick="addLink()" class="btn-min" style="margin-top:5px;">+ ADICIONAR LINK</button>
            </div>
        </div>
    </div>

    <div id="secTesouraria" class="card no-print" style="display:none; border-color:var(--green);">
        <h3 style="color:var(--green);">💰 TESOURARIA - COMPROVANTES</h3>
        <div id="adminTesouraria" style="display:none; margin-bottom:15px;">
            <input type="file" id="fileInput" class="input-dark">
            <button onclick="uploadArquivo()" class="btn-min" style="margin-top:5px; border-color:var(--green); color:var(--green);">ENVIAR PARA O SISTEMA</button>
        </div>
        <div id="gridArquivosPublicos" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap:10px;"></div>
    </div>
</div>

<div id="popViewImg" class="overlay" onclick="this.style.display='none'"><div style="width:95vw; height:90vh; display:flex; flex-direction:column;" onclick="event.stopPropagation()"><div id="fileContent" style="flex:1; background:white; border-radius:8px; overflow:hidden;"></div><button style="background:red; color:white; padding:15px; border:none; margin-top:10px; border-radius:8px; cursor:pointer; font-weight:bold;" onclick="document.getElementById('popViewImg').style.display='none'">FECHAR</button></div></div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:10px; width:280px;" onclick="event.stopPropagation()"><h3 style="color:black; margin-top:0; text-align:center;">ACESSO RESTRITO</h3><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="color:black!important; background:#eee!important;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="color:black!important; background:#eee!important; margin-top:10px;"><button onclick="login()" style="width:100%; margin-top:15px; padding:12px; background:var(--blue); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">ENTRAR</button></div></div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes", aventureiros: "Aventureiros", desbravadores: "Desbravadores", jovem: "M. Jovem" };
    
    let db = {};
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let myChart;

    dbCloud.collection('dados').doc('estrela_v115').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); renderGrafico(); }
    });

    function save() { dbCloud.collection('dados').doc('estrela_v115').set(db); }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerAnciao').innerText = `Responsável: ${db.anciaos?.[mIdx] || ''}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        if (curUser !== 'visitante') {
            document.getElementById('userWelcomeBar').style.display = 'block';
            document.getElementById('userWelcomeBar').innerHTML = `Logado como: <b>${MINS[curUser] || curUser}</b>`;
            document.getElementById('btnSair').style.display = 'block';
            document.getElementById('btnAcesso').style.display = 'none';
            document.getElementById('secTesouraria').style.display = 'block';
            if(['admin','ger'].includes(curUser)) {
                document.getElementById('adminPanel').style.display='block';
                document.getElementById('adminGrafico').style.display='block';
                document.getElementById('adminLinks').style.display='block';
                document.getElementById('adminTesouraria').style.display='block';
                renderAdminPanel();
            }
        }

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let tr = `<tr><td>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => { 
                    tr += `<td><input ${curUser==='visitante'?'disabled':''} value="${db.escalas?.[dStr]?.[col] || ''}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`; 
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        renderLinks(); renderArquivos();
    }

    function renderAdminPanel() {
        // 1. Ministérios
        const lm = document.getElementById('listaMinisterios'); lm.innerHTML = "";
        Object.keys(MINS).forEach(key => {
            lm.innerHTML += `<button class="btn-min ${db.minDia === key ? 'active' : ''}" onclick="db.minDia='${key}';save()">${MINS[key].toUpperCase()}</button>`;
        });
        // 2. Anciãos
        const gm = document.getElementById('gridMeses'); gm.innerHTML = "";
        MESES.forEach((m, i) => {
            gm.innerHTML += `<input class="input-dark" placeholder="${m}" value="${db.anciaos?.[i] || ''}" onchange="if(!db.anciaos)db.anciaos={};db.anciaos[${i}]=this.value.toUpperCase();save()">`;
        });
        // 3. Credenciais
        const cc = document.getElementById('corpoCreds'); cc.innerHTML = "";
        Object.keys(db.senhas || {}).forEach(u => {
            cc.innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px;"><input class="input-dark" value="${u}" disabled><input class="input-dark" value="${db.senhas[u]}" onchange="db.senhas['${u}']=this.value;save()"></div>`;
        });
    }

    function renderGrafico() {
        const ctx = document.getElementById('missionaryChart').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['ALVO'], datasets: [{ label: 'ATUAL', data: [db.alvoAtual||0], backgroundColor: '#00d2ff' }] },
            options: { indexAxis: 'y', scales: { x: { max: db.alvoMeta || 100, ticks: { color: '#fff' } } } }
        });
    }

    function renderLinks() {
        const list = document.getElementById('listaLinks'); list.innerHTML = "";
        (db.links || []).forEach((l, i) => {
            list.innerHTML += `<div style="margin-bottom:8px; display:flex; justify-content:space-between;"><a href="${l.url}" target="_blank" style="color:var(--neon); text-decoration:none;">➜ ${l.nome}</a> ${curUser!=='visitante'?`<span onclick="db.links.splice(${i},1);save()" style="color:red; cursor:pointer;">✖</span>`:''}</div>`;
        });
    }

    function addLink() {
        const n = document.getElementById('linkNome').value, u = document.getElementById('linkUrl').value;
        if(n && u) { if(!db.links) db.links=[]; db.links.push({nome:n, url:u}); save(); }
    }

    function uploadArquivo() {
        const file = document.getElementById('fileInput').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const m = document.getElementById('selMes').value;
            if(!db.docs) db.docs = {}; if(!db.docs[m]) db.docs[m] = [];
            db.docs[m].push({ nome: file.name, data: e.target.result });
            save(); alert("Enviado com sucesso!");
        };
        reader.readAsDataURL(file);
    }

    function renderArquivos() {
        const grid = document.getElementById('gridArquivosPublicos'); grid.innerHTML = "";
        const m = document.getElementById('selMes').value;
        (db.docs?.[m] || []).forEach((doc, i) => {
            grid.innerHTML += `<div style="background:#1e293b; padding:10px; text-align:center; border-radius:8px;">
                <p style="font-size:0.6rem; color:#fff; overflow:hidden;">${doc.nome}</p>
                <button onclick="verArquivo('${doc.data}')" style="background:var(--neon); border:none; padding:5px; cursor:pointer; width:100%; font-weight:bold;">VER</button>
                ${curUser!=='visitante'?`<button onclick="db.docs[${m}].splice(${i},1);save()" style="background:red; color:white; border:none; width:100%; margin-top:5px; cursor:pointer;">APAGAR</button>`:''}
            </div>`;
        });
    }

    function verArquivo(src) { 
        const content = document.getElementById('fileContent');
        if (src.includes("pdf") || src.startsWith("data:application/pdf")) {
            content.innerHTML = `<embed src="${src}" type="application/pdf" width="100%" height="100%">`;
        } else {
            content.innerHTML = `<img src="${src}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
        }
        document.getElementById('popViewImg').style.display = 'flex';
    }

    function atuCel(d, c, v) { if(!db.escalas) db.escalas={}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function salvarGrafico() { db.alvoMeta = parseInt(document.getElementById('inputAlvo').value); db.alvoAtual = parseInt(document.getElementById('inputAtual').value); save(); }
    function login() { const u = document.getElementById('userLogin').value.toLowerCase().trim(), p = document.getElementById('passLogin').value; if(db.senhas[u] === p) { localStorage.setItem('iasd_curUser', u); location.reload(); } else alert("Erro!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
