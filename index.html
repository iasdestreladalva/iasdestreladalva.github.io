<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v280</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --neon-blue: #38bdf8; --accent-orange: #f97316; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        /* NAVEGAÇÃO */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btns { display: flex; gap: 8px; }
        .btn-nav { background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .btn-nav.orange { border-color: var(--accent-orange); color: var(--accent-orange); }
        .btn-nav.active { background: #fff; color: #000; }

        /* SEÇÕES */
        .section { display: none; }
        .section.active { display: block; }

        /* ESCALA SEM LINHAS (v280) */
        .table-container { background: white; border-radius: 8px; overflow: auto; margin-top: 10px; padding: 10px; }
        table.escala { width: 100%; border-collapse: collapse; color: black; min-width: 1000px; }
        
        /* Cabeçalho mantém a cor azul das fotos */
        table.escala th { background: var(--iasd-blue); color: white; padding: 12px; font-size: 0.75rem; border: none; text-transform: uppercase; }
        
        /* REMOÇÃO DAS LINHAS DAS CÉLULAS */
        table.escala td { border: none; height: 45px; text-align: center; padding: 2px; }
        
        /* Inputs transparentes para efeito de "sem bordas" */
        .input-cell { 
            width: 100%; height: 35px; border: none; text-align: center; 
            font-weight: bold; text-transform: uppercase; background: rgba(0,0,0,0.03); 
            border-radius: 4px; font-size: 0.85rem;
        }
        .input-cell:focus { background: rgba(0,0,0,0.08); outline: none; }

        /* CORES DE FUNDO DAS LINHAS (FIEIS AOS MINISTÉRIOS) */
        tr.pessoal td { background-color: #e0f2fe !important; }
        tr.mordomia td { background-color: #fef3c7 !important; }
        tr.saude td { background-color: #f1f5f9 !important; }
        tr.homens td { background-color: #dcfce7 !important; }
        tr.familia td { background-color: #fee2e2 !important; }
        tr.adolescentes td { background-color: #f0fdf4 !important; }
        tr.mulher td { background-color: #fce7f3 !important; }
        tr.musica td { background-color: #ede9fe !important; }

        /* PAINEL DE GESTÃO E PLANEJAMENTO (ESTILO IMAGENS) */
        .admin-grid { display: grid; grid-template-columns: 260px 320px 1fr; gap: 20px; background: var(--card-bg); border: 1px solid var(--neon-blue); border-radius: 12px; padding: 20px; }
        .grid-anual { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .mes-card { background: rgba(0,0,0,0.3); border: 1px solid #334155; border-radius: 10px; padding: 12px; }
        .mes-textarea { width: 100%; height: 100px; background: #000; color: #fff; border: none; border-radius: 4px; padding: 8px; resize: none; }
    </style>
</head>
<body>

<div class="top-bar">
    <h2 style="color: var(--neon-blue); margin:0;">IASD ESTRELA DALVA</h2>
    <div style="display: flex; gap: 10px;">
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid var(--neon-blue); padding:5px; border-radius:4px;"></select>
        <div class="nav-btns">
            <button class="btn-nav active" id="btnGoEscala" onclick="showSec('secEscala')">ESCALA</button>
            <button class="btn-nav" id="btnGoAnual" onclick="showSec('secAnual')">🗓️ ANUAL</button>
            <button class="btn-nav orange" onclick="abrirGestao()" id="btnGestao">🔓 GESTÃO</button>
            <button class="btn-nav orange" onclick="sair()" id="btnSair" style="display:none;">SAIR</button>
        </div>
    </div>
</div>

<div id="secEscala" class="section active">
    <div class="table-container">
        <table class="escala">
            <thead>
                <tr>
                    <th style="width: 130px;">DIA</th><th style="width: 70px;">DATA</th>
                    <th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th>
                </tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>
</div>

<div id="secAnual" class="section">
    <div style="background: var(--card-bg); border: 1px solid var(--accent-orange); border-radius: 12px; padding: 20px;">
        <h3 style="color: var(--accent-orange); text-align:center; margin-top:0;">PLANEJAMENTO ANUAL 2026</h3>
        <div id="gridAnual" class="grid-anual"></div>
    </div>
</div>

<div id="secGestao" class="section">
    <div class="admin-grid">
        <div class="column">
            <h4 style="color:var(--neon-blue)">1. MINISTÉRIO DO DIA</h4>
            <button class="btn-nav" style="width:100%; margin-bottom:5px; text-align:left;" onclick="selPincel('pessoal','Min. Pessoal')">M. Pessoal</button>
            <button class="btn-nav" style="width:100%; margin-bottom:5px; text-align:left;" onclick="selPincel('mordomia','Mordomia')">Mordomia</button>
            <button class="btn-nav" style="width:100%; margin-bottom:5px; text-align:left;" onclick="selPincel('saude','Saúde')">Saúde</button>
            <button class="btn-nav" style="width:100%; margin-bottom:5px; text-align:left;" onclick="selPincel('homens','Min. Homens')">M. Homens</button>
            <button class="btn-nav" style="width:100%; margin-bottom:5px; text-align:left;" onclick="selPincel('familia','Min. Família')">M. Família</button>
            <button class="btn-nav" style="width:100%; margin-bottom:5px; text-align:left;" onclick="selPincel('adolescentes','Adolescentes')">Adolescentes</button>
            <button class="btn-nav" style="width:100%; margin-bottom:5px; text-align:left;" onclick="selPincel('mulher','Min. Mulher')">M. Mulher</button>
            <button class="btn-nav" style="width:100%; margin-bottom:5px; text-align:left;" onclick="selPincel('musica','Música')">Música</button>
            <button class="btn-nav orange" style="width:100%; margin-top:10px" onclick="selPincel('','')">LIMPAR</button>
        </div>
        <div class="column">
            <h4 style="color:var(--neon-blue)">2. RESPONSÁVEL MENSAL</h4>
            <div id="gridResponsaveis" style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;"></div>
        </div>
        <div class="column">
            <h4 style="color:var(--neon-blue)">3. LOGINS</h4>
            <div id="listaLogins" style="font-size: 0.8rem;"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v280');

    let db = { escalas:{}, cores:{}, anciaos:{}, anual:{} };
    let user = localStorage.getItem('iasd_user') || 'v';
    let pID = null; let pNome = "";
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    function showSec(id) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.btn-nav').forEach(b => b.classList.remove('active'));
        if(id==='secEscala') document.getElementById('btnGoEscala').classList.add('active');
        if(id==='secAnual') document.getElementById('btnGoAnual').classList.add('active');
    }

    function abrirGestao() {
        if(user === 'admin') showSec('secGestao');
        else { const p = prompt("Senha:"); if(p==='iasd118'){ localStorage.setItem('iasd_user','admin'); location.reload(); }}
    }

    function sair() { localStorage.removeItem('iasd_user'); location.reload(); }

    dbRef.on('value', snap => { db = snap.val() || { escalas:{}, cores:{}, anciaos:{}, anual:{} }; renderTodo(); });

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('btnSair').style.display = (user === 'admin') ? 'block' : 'none';

        // Anual
        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `
            <div class="mes-card"><div style="color:var(--neon-blue); font-size:0.7rem; font-weight:bold; margin-bottom:5px;">${n}</div>
            <textarea class="mes-textarea" onchange="atuAnual(${i}, this.value)">${db.anual?.[i]||''}</textarea></div>
        `).join('');

        // Responsáveis
        document.getElementById('gridResponsaveis').innerHTML = meses.map((n, i) => `
            <div><label style="font-size:10px; color:#aaa">${n}</label><input style="width:100%; background:#000; color:#fff; border:1px solid #444;" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)"></div>
        `).join('');

        // Escala (Sem linhas)
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasMes; d++) {
            let dt = new Date(2026, m, d);
            if([0,3,6].includes(dt.getDay())) {
                let dStr = `${d}_${m+1}_2026`;
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr');
                if(c.id) tr.className = c.id;
                tr.innerHTML = `<td onclick="pintar('${dStr}')" style="cursor:pointer"><div>${["DOMINGO","","","QUARTA","","","SÁBADO"][dt.getDay()]}</div><div style="font-size:10px; color:#666">${c.nome||''}</div></td>
                <td onclick="pintar('${dStr}')" style="cursor:pointer">${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="input-cell" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)"></td>`).join('');
                corpo.appendChild(tr);
            }
        }
    }

    function selPincel(id, nome) { pID = id; pNome = nome; }
    function pintar(dStr) { if(user==='admin' && pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}
    function atu(d,c,v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }
    function atuAnc(i,v) { if(!db.anciaos) db.anciaos={}; db.anciaos[i]=v.toUpperCase(); dbRef.child('anciaos').set(db.anciaos); }
    function atuAnual(i,v) { if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    showSec('secEscala');
</script>
</body> </html>
