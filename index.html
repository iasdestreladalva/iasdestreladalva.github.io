<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - v102.48</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1450px; margin: auto; }
        
        /* ADMIN BOX */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 220px 1fr 1.5fr; gap: 20px; }
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .admin-section h4 { color: var(--neon); font-size: 0.75rem; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; text-transform: uppercase; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 10px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }

        /* CORES ESCALA */
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; } .row-homens { background-color: #ecfeff !important; }
        .row-familia { background-color: #faf5ff !important; } .row-adolescentes { background-color: #f8fafc !important; }
        .row-mulher { background-color: #fdf2f8 !important; } .row-musica { background-color: #fff1f2 !important; }
        .row-especial { background-color: #fff4e6 !important; border-left: 5px solid var(--red) !important; }

        /* TABELA */
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 55px; }

        /* MURAL TESOURARIA (ABAIXO DA ESCALA) */
        .tesouraria-display { margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--green); }
        .grid-arquivos { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .thumb-doc { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #334155; transition: 0.3s; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .thumb-doc:hover { border-color: var(--neon); transform: scale(1.05); }
        .pdf-placeholder { color: var(--red); font-weight: bold; text-align: center; font-size: 0.7rem; }

        /* OVERLAYS / POPUPS */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 85vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }
        
        #imgExpandida { max-width: 95%; max-height: 95%; border: 2px solid white; }
        #pdfExpandido { width: 90%; height: 90%; background: white; }

        .chart-container { margin-top: 20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--orange); }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px; flex-wrap: wrap;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:var(--gold); color:var(--gold); cursor:pointer; font-weight:bold;" onclick="abrirCalendarioAnual()">📅 ANUAL</button>
            <button id="btnEventos" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--red); color:var(--red); display:none; cursor:pointer; font-weight:bold;" onclick="abrirPopEventos()">🔥 EVENTOS</button>
            <button id="btnTesourariaAdmin" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--green); color:var(--green); cursor:pointer; font-weight:bold; display:none;" onclick="abrirTesourariaAdmin()">⚙️ TESOURARIA</button>
            <button id="btnDados" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--orange); color:var(--orange); display:none; cursor:pointer; font-weight:bold;" onclick="abrirPopMissionario()">📊 MISSIONÁRIO</button>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon); cursor:pointer;" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:red; color:red; display:none; cursor:pointer;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>1. MINISTÉRIO DO DIA</h4>
                <div id="listaMinisterios"></div>
                <button class="btn-min" style="border-color:red; color:red;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR</button>
            </div>
            <div class="admin-section">
                <h4>2. RESPONSÁVEL (ANCIÃO)</h4>
                <div id="gridAnciaosMeses" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; max-height: 300px; overflow-y: auto;"></div>
            </div>
            <div class="admin-section">
                <h4>3. LOGINS E SENHAS</h4>
                <table style="width:100%; border-collapse:collapse; font-size:0.75rem;">
                    <tbody id="corpoCreds"></tbody>
                </table>
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;" id="headerTitulo">ESCALA</th></tr>
            <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1rem; padding:0 12px 12px 12px; text-align:left;" id="headerAnciao">Responsável: </th></tr>
            <tr><th style="width:150px">DIA</th><th style="width:60px">DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div class="chart-container">
        <h3 style="margin:0 0 15px 0; color:var(--orange); border-bottom: 1px solid #334155; padding-bottom: 10px;">📊 DESEMPENHO MISSIONÁRIO</h3>
        <div style="height: 300px; position: relative;"><canvas id="missionaryChart"></canvas></div>
    </div>

    <div class="tesouraria-display">
        <h3 style="margin:0; color:var(--green); border-bottom: 1px solid #334155; padding-bottom: 10px;">💰 COMPROVANTES - <span id="mesTesouraria"></span></h3>
        <div id="gridArquivosPublicos" class="grid-arquivos"></div>
    </div>
</div>

<div id="popMissionario" class="overlay" onclick="this.style.display='none'">
    <div class="pop-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--orange); text-align:center;">DADOS MISSIONÁRIOS</h3>
        <div id="camposMissionarios" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        <button onclick="document.getElementById('popMissionario').style.display='none'" class="btn-fechar">SALVAR E FECHAR</button>
    </div>
</div>

<div id="popTesouraria" class="overlay" onclick="this.style.display='none'">
    <div class="pop-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--green); text-align:center;">GERENCIAR COMPROVANTES</h3>
        <input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none" onchange="uploadArquivo()">
        <button onclick="document.getElementById('fileInput').click()" class="btn-min" style="border-color:var(--green); color:var(--green)">+ NOVO UPLOAD</button>
        <div id="listaAdminArquivos" style="margin-top:15px;"></div>
        <button onclick="document.getElementById('popTesouraria').style.display='none'" class="btn-fechar">CONCLUÍDO</button>
    </div>
</div>

<div id="popCalendario" class="overlay" onclick="this.style.display='none'">
    <div class="pop-content" style="max-width:800px" onclick="event.stopPropagation()">
        <h3 style="color:var(--gold); text-align:center;">📅 CALENDÁRIO ANUAL 2026</h3>
        <div id="listaEventosAnuais" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div>
        <button onclick="document.getElementById('popCalendario').style.display='none'" class="btn-fechar">FECHAR</button>
    </div>
</div>

<div id="zoomOverlay" class="overlay" onclick="this.style.display='none'">
    <img id="imgExpandida" src="" style="display:none;">
    <iframe id="pdfExpandido" src="" style="display:none;"></iframe>
</div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'">
    <div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()">
        <input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;">
        <input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;">
        <button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px; cursor:pointer" onclick="login()">ENTRAR</button>
    </div>
</div>

<script>
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes" };
    const CAMPOS_MIS = { batismos: "Batismos", estudos: "Estudos", visitas: "Visitas", duplas: "Duplas", folhetos: "Folhetos" };

    let missionChart;
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    window.minSelecionado = null;

    let db = JSON.parse(localStorage.getItem('iasd_v105')) || {
        senhas: { admin: "iasd118", ger: "ger123", diaconato: "diac123", musica: "mus123", sonoplastia: "sono123", mulher: "mulher123", sabatina: "sab123", pessoal: "mp123", mordomia: "mord123", saude: "saude123", homens: "homem123", familia: "fam123", adolescentes: "adol123" },
        anciaos: {0:"Jesuino", 1:"Wesley", 2:"Ester", 3:"Marcilio", 4:"Albert", 5:"Albert", 6:"Jesuino", 7:"Jesuino", 8:"Ester", 9:"Marcilio", 10:"Wesley", 11:"Albert"},
        escalas: {}, regras_manuais: {}, mis: {}, docs: {}, eventos_anuais: {}, eventos_especiais: {}
    };

    function save() { localStorage.setItem('iasd_v105', JSON.stringify(db)); }

    function renderTodo() {
        const m = document.getElementById('selMes').value;
        const u = curUser;

        // Botões de Acesso
        document.getElementById('btnSair').style.display = u !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = u === 'visitante' ? 'block' : 'none';
        document.getElementById('btnEventos').style.display = u === 'admin' ? 'block' : 'none';
        document.getElementById('btnTesourariaAdmin').style.display = (u === 'admin' || u === 'ger') ? 'block' : 'none';
        document.getElementById('btnDados').style.display = (u === 'admin' || u === 'pessoal') ? 'block' : 'none';
        document.getElementById('adminPanel').style.display = u === 'admin' ? 'block' : 'none';

        // Cabeçalhos
        document.getElementById('headerAnciao').innerText = "Responsável: Ancião " + (db.anciaos[m] || "Não definido");
        document.getElementById('headerTitulo').innerText = "ESCALA - " + MESES[m] + " 2026";
        document.getElementById('mesTesouraria').innerText = MESES[m];

        renderEscala();
        renderAdmin();
        renderArquivosPublicos();
        renderGrafico();
    }

    function renderEscala() {
        const mIdx = parseInt(document.getElementById('selMes').value);
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const totalDias = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=totalDias; d++) {
            let dt = new Date(2026, mIdx, d); let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}/${mIdx+1}/2026`;
                let corClasse = db.regras_manuais[dStr] ? "row-" + db.regras_manuais[dStr] : getCorAuto(d, sem);
                
                let tr = `<tr class="${corClasse}" onclick="cliqueDia('${dStr}')">
                    <td style="font-size:0.75rem">${["DOMINGO","","","QUARTA","","","SÁBADO"][sem]}</td>
                    <td>${d}/${mIdx+1}</td>`;
                
                ["sa","pr","mu","lo","so","re","di"].forEach(c => {
                    let val = db.escalas[dStr]?.[c] || "";
                    let podeEditar = (curUser === 'admin' || curUser === c);
                    tr += `<td><input class="input-escala" style="width:100%; height:45px; border:none; text-align:center; font-weight:bold; background:transparent;" ${!podeEditar?'readonly':''} value="${val}" onchange="atuCel('${dStr}','${c}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function getCorAuto(d, sem) {
        if(sem === 6) { let sab = Math.ceil(d/7); if(sab===1) return "row-pessoal"; if(sab===2) return "row-mordomia"; }
        if(sem === 0) { let dom = Math.ceil(d/7); if(dom===1) return "row-saude"; if(dom===3) return "row-familia"; }
        if(sem === 3) { let qua = Math.ceil(d/7); if(qua===2) return "row-homens"; if(qua===3) return "row-adolescentes"; }
        return "";
    }

    function renderAdmin() {
        const minsDiv = document.getElementById('listaMinisterios'); minsDiv.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            if(!["admin","ger"].includes(k)) {
                minsDiv.innerHTML += `<button class="btn-min ${window.minSelecionado===k?'active':''}" onclick="window.minSelecionado='${k}'; renderAdmin();">${MINS[k]}</button>`;
            }
        });

        const anciaosDiv = document.getElementById('gridAnciaosMeses'); anciaosDiv.innerHTML = "";
        MESES.forEach((mes, i) => {
            anciaosDiv.innerHTML += `<div><small>${mes}</small><input class="input-dark" value="${db.anciaos[i]||''}" onchange="db.anciaos[${i}]=this.value; save(); renderTodo();"></div>`;
        });

        const credsBody = document.getElementById('corpoCreds'); credsBody.innerHTML = "";
        Object.keys(db.senhas).forEach(k => {
            credsBody.innerHTML += `<tr style="border-bottom:1px solid #222"><td>${MINS[k]}</td><td>${k}</td><td>${db.senhas[k]}</td></tr>`;
        });
    }

    function renderArquivosPublicos() {
        const m = document.getElementById('selMes').value;
        const grid = document.getElementById('gridArquivosPublicos'); grid.innerHTML = "";
        const docs = db.docs[m] || [];
        
        if(docs.length === 0) grid.innerHTML = "<p style='color:#666'>Nenhum comprovante este mês.</p>";
        
        docs.forEach(doc => {
            const isPDF = doc.type && doc.type.includes('pdf');
            grid.innerHTML += `
                <div class="thumb-doc" onclick="abrirZoom('${doc.data}', '${doc.type}')">
                    ${isPDF ? `<div class="pdf-placeholder">📄 PDF<br><small>${doc.nome}</small></div>` : `<img src="${doc.data}" style="width:100%">`}
                </div>`;
        });
    }

    function abrirZoom(data, type) {
        const ov = document.getElementById('zoomOverlay');
        const img = document.getElementById('imgExpandida');
        const pdf = document.getElementById('pdfExpandido');
        ov.style.display = 'flex';
        if(type && type.includes('pdf')) {
            img.style.display = 'none'; pdf.style.display = 'block'; pdf.src = data;
        } else {
            pdf.style.display = 'none'; img.style.display = 'block'; img.src = data;
        }
    }

    function uploadArquivo() {
        const file = document.getElementById('fileInput').files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const m = document.getElementById('selMes').value;
            if(!db.docs[m]) db.docs[m] = [];
            db.docs[m].push({ nome: file.name, data: e.target.result, type: file.type });
            save(); renderTodo(); renderAdminDocs();
        }; reader.readAsDataURL(file);
    }

    function renderAdminDocs() {
        const m = document.getElementById('selMes').value;
        const lista = document.getElementById('listaAdminArquivos'); lista.innerHTML = "";
        (db.docs[m] || []).forEach((doc, i) => {
            lista.innerHTML += `<div style="display:flex; justify-content:space-between; margin:5px 0; background:#1e293b; padding:8px; border-radius:4px;"><small style="color:white;">${doc.nome}</small><button onclick="removerDoc(${i})" style="background:red; color:white; border:none; padding:2px 8px; cursor:pointer;">X</button></div>`;
        });
    }
    function removerDoc(i) { const m = document.getElementById('selMes').value; db.docs[m].splice(i,1); save(); renderTodo(); renderAdminDocs(); }

    function abrirPopMissionario() {
        const m = document.getElementById('selMes').value;
        const container = document.getElementById('camposMissionarios'); container.innerHTML = "";
        Object.keys(CAMPOS_MIS).forEach(k => {
            let val = db.mis[m]?.[k] || 0;
            container.innerHTML += `<div><label style="font-size:0.7rem; color:var(--orange)">${CAMPOS_MIS[k]}</label><input type="number" class="input-dark" value="${val}" onchange="atuMiss('${k}', this.value)"></div>`;
        });
        document.getElementById('popMissionario').style.display = 'flex';
    }

    function atuMiss(k, v) {
        const m = document.getElementById('selMes').value;
        if(!db.mis[m]) db.mis[m] = {};
        db.mis[m][k] = parseInt(v); save(); renderGrafico();
    }

    function renderGrafico() {
        const m = document.getElementById('selMes').value;
        const ctx = document.getElementById('missionaryChart').getContext('2d');
        const vals = Object.keys(CAMPOS_MIS).map(k => db.mis[m]?.[k] || 0);
        if(missionChart) missionChart.destroy();
        missionChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.values(CAMPOS_MIS), datasets: [{
