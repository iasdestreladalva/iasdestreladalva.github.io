<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - MASTER v540</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; --exit-red: #ef4444; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-top: 85px; }
        
        /* BARRA SUPERIOR */
        .toolbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; background: #111827; display: flex; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 3px solid var(--neon-blue); gap: 10px; justify-content: space-between; }
        .btn-tool { background: #1e293b; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; display: flex; align-items: center; gap: 5px; }
        .btn-eventos { border-color: var(--accent-orange); color: var(--accent-orange); }

        /* MODAL CONFORME FOTO */
        .modal-eventos { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        .card-eventos { background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid var(--accent-orange); width: 500px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .card-eventos h2 { color: #f87171; text-align: center; font-size: 1.2rem; margin-top: 0; text-transform: uppercase; }
        .ev-label { color: var(--neon-blue); font-size: 0.7rem; font-weight: bold; display: block; margin: 10px 0 5px; }
        .ev-input { width: 100%; background: #000; border: 1px solid #334155; color: #fff; padding: 12px; border-radius: 6px; box-sizing: border-box; }
        .btn-criar-periodo { width: 100%; background: #f87171; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-concluido { width: 100%; background: #ff3b00; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }

        /* ESCALA */
        #secaoEscala { background: white; border-radius: 8px; padding: 15px; overflow-x: auto; margin-bottom: 30px; border: 2px solid #000; }
        table.escala { width: 100%; border-collapse: collapse; color: black; min-width: 1000px; }
        table.escala th { background: var(--iasd-blue); color: white; padding: 10px; border: 1px solid #000; font-size: 0.75rem; }
        table.escala td { border: 1px solid #000; text-align: center; font-weight: bold; height: 50px; position: relative; }
        .tag-evento { background: var(--exit-red); color: white; font-size: 0.6rem; padding: 4px; border-radius: 3px; display: block; margin-bottom: 3px; line-height: 1.1; }
        .linha-evento-extra { background-color: #fff1f2 !important; }
        
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; font-size: 0.8rem; }

        @media print { .toolbar, #painelAdmin, .modal-eventos { display: none !important; } body { padding-top: 0; } }
    </style>
</head>
<body id="mainBody">

<div class="toolbar">
    <div style="display: flex; gap: 8px; align-items: center;">
        <span style="font-weight: 900; color: var(--neon-blue); font-size: 0.8rem;">ESTRELA DALVA</span>
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid #444; padding:6px; border-radius:6px; font-weight:bold;"></select>
        <button class="btn-tool" onclick="window.print()">🖨️ ESCALA</button>
        <button class="btn-tool" onclick="window.print()">🗓️ ANUAL</button>
        <button class="btn-tool btn-eventos" onclick="abrirEventos()">🔥 EVENTOS</button>
    </div>
    <button id="btnEntrar" class="btn-login" onclick="abrirLogin()">ENTRAR</button>
    <button id="btnSair" class="btn-logout" style="display:none; background:red; color:white; border:none; padding:10px; border-radius:5px;" onclick="fazerLogout()">SAIR</button>
</div>

<div id="modalEventos" class="modal-eventos">
    <div class="card-eventos">
        <h2>CRIAR SEMANA DE ORAÇÃO / EVENTO</h2>
        
        <label class="ev-label">NOME DO EVENTO (EX: SEMANA DE ORAÇÃO)</label>
        <input type="text" id="evNome" class="ev-input" placeholder="Opcional">
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div>
                <label class="ev-label">DATA INÍCIO</label>
                <input type="date" id="evIni" class="ev-input">
            </div>
            <div>
                <label class="ev-label">DATA FIM</label>
                <input type="date" id="evFim" class="ev-input">
            </div>
        </div>

        <label class="ev-label">HORÁRIO (OPCIONAL)</label>
        <input type="time" id="evHora" class="ev-input">

        <button class="btn-criar-periodo" onclick="salvarEvento()">CRIAR EVENTO NO PERÍODO</button>
        
        <div id="listaEventos" style="margin-top:15px; max-height:100px; overflow-y:auto; background:#000; padding:5px; border-radius:5px; font-size:0.7rem"></div>

        <button class="btn-concluido" onclick="fecharEventos()">CONCLUÍDO</button>
    </div>
</div>

<div id="painelAdmin" style="display:none; padding:20px; border:1px solid var(--accent-orange); margin-bottom:20px;">
    <div id="contPinceis"></div>
</div>

<div id="secaoEscala">
    <div style="text-align:center; color:#000; margin-bottom:15px">
        <div id="txtAnciao" style="font-size:1.1rem; font-weight:900; color:var(--iasd-blue)">---</div>
        <div style="font-weight:bold;">ESCALA DE <span id="txtMes">---</span></div>
    </div>
    <table class="escala">
        <thead><tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr></thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="secaoAnual">
    <div id="gridAnual" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v540');

    let db = { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{}, eventos:{} };
    let logado = false;
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    dbRef.on('value', snap => { db = snap.val() || db; renderTodo(); });

    function abrirEventos() { document.getElementById('modalEventos').style.display = 'flex'; renderListaEv(); }
    function fecharEventos() { document.getElementById('modalEventos').style.display = 'none'; }

    function salvarEvento() {
        const nome = document.getElementById('evNome').value.toUpperCase();
        const ini = document.getElementById('evIni').value;
        const fim = document.getElementById('evFim').value;
        const hora = document.getElementById('evHora').value;
        if(ini && fim) {
            dbRef.child('eventos').child(Date.now()).set({nome: nome || "EVENTO", ini, fim, hora});
            renderListaEv();
        }
    }

    function renderListaEv() {
        const d = document.getElementById('listaEventos'); d.innerHTML = "";
        for(let id in db.eventos) {
            const e = db.eventos[id];
            d.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; color:white">${e.nome} (${e.ini}) <button onclick="deletarEv('${id}')" style="color:red; background:none; border:none; cursor:pointer">X</button></div>`;
        }
    }
    function deletarEv(id) { dbRef.child('eventos').child(id).remove(); }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('txtMes').innerText = meses[m];
        
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, m+1, 0).getDate();

        for(let d=1; d<=diasNoMes; d++) {
            const dt = new Date(2026, m, d);
            const diaSemana = dt.getDay();
            const dataISO = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dStr = `${d}_${m+1}_2026`;

            let eventoDia = null;
            for(let id in db.eventos) {
                const ev = db.eventos[id];
                if(dataISO >= ev.ini && dataISO <= ev.fim) { eventoDia = ev; break; }
            }

            // REGRA: Mostra se for Quarta(3), Sábado(6), Domingo(0) OU se tiver evento
            if([0,3,6].includes(diaSemana) || eventoDia) {
                const tr = document.createElement('tr');
                if(eventoDia && ![0,3,6].includes(diaSemana)) tr.className = "linha-evento-extra";
                
                let c = db.cores?.[dStr] || {id:'', nome:''};
                if(c.id) tr.classList.add(c.id);

                tr.innerHTML = `
                    <td onclick="${logado?`pintar('${dStr}')`:''}" style="cursor:pointer">
                        ${eventoDia ? `<span class="tag-evento">${eventoDia.nome}<br>${eventoDia.hora || ''}</span>` : ''}
                        <div>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][diaSemana]}</div>
                        <div style="font-size:7px; color:blue">${c.nome||''}</div>
                    </td>
                    <td>${d}/${m+1}</td>
                    ${["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)" ${!logado?'disabled':''}></td>`).join('')}
                `;
                corpo.appendChild(tr);
            }
        }
    }

    // Funções auxiliares (Login/Pincel) mantidas do banco
    function atu(d,c,v) { if(logado){ if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }}
    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    
    function abrirLogin() { let u=prompt("User:"), s=prompt("Pass:"); if(u=="admin" && s=="iasd118"){ logado=true; document.getElementById('btnEntrar').style.display='none'; document.getElementById('btnSair').style.display='block'; renderTodo(); }}
    function fazerLogout() { logado=false; location.reload(); }
</script>
</body> </html>
