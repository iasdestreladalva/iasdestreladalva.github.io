<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@2.1.0"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        @media print {
            body { background: white; color: black; }
            .admin-box, #userWelcomeBar, .input-dark, button, #missionaryChart, #secPlan, #secLinks, #secTesouraria, select, .no-print { display: none !important; }
            table#tabela-main { width: 100% !important; border: 1px solid black !important; background: white !important; }
            #tabela-main th, #tabela-main td { border: 1px solid black !important; color: black !important; }
            #tabela-main input { color: black !important; background: transparent !important; }
        }

        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 180px 1.2fr 2fr 1.2fr; gap: 15px; } 
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; padding: 8px; border-radius: 4px; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }
        
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 55px; }
        
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        #fileViewer { width: 95vw; height: 90vh; display: flex; flex-direction: column; }
        #fileContent { flex: 1; background: #fff; border-radius: 8px; overflow: hidden; }
        #fileContent embed, #fileContent img { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
<div class="container">
    <div id="userWelcomeBar" style="display:none; text-align:center; padding:10px; color:var(--gold); border: 1px solid var(--neon); margin-bottom: 10px; border-radius: 8px;"></div>
    
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon); cursor:pointer;" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:red; color:red; display:none; cursor:pointer;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid" id="adminGrid">
            </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" id="headerTitulo" style="background:var(--blue); color:white; font-size:1.5rem;">ESCALA</th></tr>
            <tr><th colspan="9" id="headerAnciao" style="background:var(--blue); color:var(--gold);">Ancião: </th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div id="secTesouraria" class="no-print" style="display:none; margin-top:30px; border:1px solid var(--green); padding:15px; border-radius:12px;">
        <h3 style="color:var(--green);">💰 COMPROVANTES</h3>
        <div id="gridArquivosPublicos" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap:15px;"></div>
    </div>
</div>

<div id="popViewImg" class="overlay" onclick="this.style.display='none'"><div id="fileViewer" onclick="event.stopPropagation()"><div id="fileContent"></div><button class="btn-min" style="background:red; color:white; margin-top:10px;" onclick="document.getElementById('popViewImg').style.display='none'">FECHAR</button></div></div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'">
    <div style="background:white; padding:30px; border-radius:10px; width:280px;" onclick="event.stopPropagation()">
        <h3 style="color:black; margin-top:0; text-align:center;">LOGIN</h3>
        <input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="color:#000!important; background:#f0f0f0!important; margin-bottom:10px;">
        <input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="color:#000!important; background:#f0f0f0!important;">
        <button onclick="login()" style="width:100%; margin-top:15px; padding:12px; background:var(--blue); color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer;">ENTRAR</button>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes", aventureiros: "Aventureiros", desbravadores: "Desbravadores", jovem: "M. Jovem" };
    
    let db = {};
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    dbCloud.collection('dados').doc('estrela_v115').onSnapshot(doc => {
        if(doc.exists) { 
            db = doc.data();
            // AUTORREPARO SILENCIOSO: Se as senhas sumiram, ele repõe as padrão sem apagar o resto.
            if (!db.senhas || Object.keys(db.senhas).length === 0) {
                db.senhas = { admin: "iasd118", ger: "ger123" }; 
                db.anciaos = db.anciaos || {};
                db.escalas = db.escalas || {};
                db.docs = db.docs || {};
                save(); 
            }
            renderTodo(); 
        } else {
            // Se o documento sumiu totalmente, cria um inicial para você não ficar trancado fora
            db = { senhas: { admin: "iasd118" }, anciaos: {}, escalas: {}, docs: {} };
            save();
        }
    });

    function save() { dbCloud.collection('dados').doc('estrela_v115').set(db); }

    function login() { 
        const u = document.getElementById('userLogin').value.toLowerCase().trim();
        const p = document.getElementById('passLogin').value;
        if(db.senhas && db.senhas[u] === p) { 
            localStorage.setItem('iasd_curUser', u); 
            location.reload(); 
        } else {
            alert("Usuário ou Senha incorretos. Tente 'admin' com sua senha padrão."); 
        }
    }

    function verArquivo(src) { 
        const content = document.getElementById('fileContent');
        content.innerHTML = "";
        if (src.includes("pdf") || src.startsWith("data:application/pdf")) {
            content.innerHTML = `<embed src="${src}" type="application/pdf">`;
        } else {
            content.innerHTML = `<img src="${src}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
        }
        document.getElementById('popViewImg').style.display = 'flex';
    }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerAnciao').innerText = `Ancião Responsável: ${db.anciaos?.[mIdx] || 'Não definido'}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        if (curUser !== 'visitante') {
            document.getElementById('userWelcomeBar').style.display = 'block';
            document.getElementById('userWelcomeBar').innerHTML = `Logado: <b>${MINS[curUser] || curUser}</b>`;
            document.getElementById('btnSair').style.display = 'block';
            document.getElementById('btnAcesso').style.display = 'none';
            document.getElementById('secTesouraria').style.display = 'block';
            if(['admin','ger'].includes(curUser)) document.getElementById('adminPanel').style.display='block';
        }

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let tr = `<tr><td><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => { 
                    let val = db.escalas?.[dStr]?.[col] || '';
                    tr += `<td><input ${curUser==='visitante'?'disabled':''} value="${val}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`; 
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        renderArquivosPublicos();
    }

    function renderArquivosPublicos() {
        const m = document.getElementById('selMes').value;
        const grid = document.getElementById('gridArquivosPublicos'); grid.innerHTML = "";
        (db.docs?.[m] || []).forEach(doc => { 
            grid.innerHTML += `<div style="background:#1e293b; padding:10px; text-align:center; border-radius:8px;">
                <button onclick="verArquivo('${doc.data}')" style="background:var(--neon); border:none; padding:8px; cursor:pointer; width:100%; font-weight:bold;">VER DOC</button>
            </div>`; 
        });
    }

    function atuCel(d, c, v) { if(!db.escalas) db.escalas = {}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
