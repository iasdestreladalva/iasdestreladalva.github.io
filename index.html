<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v580</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; --exit-red: #ef4444; --success-green: #22c55e; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-top: 85px; }
        
        .toolbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; background: #111827; display: flex; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 3px solid var(--neon-blue); gap: 10px; justify-content: space-between; }
        .btn-tool { background: #1e293b; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .btn-tesouraria { border-color: var(--success-green); color: var(--success-green); }

        /* MODAIS */
        .modal-master { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 4000; align-items: center; justify-content: center; }
        .card-modal { background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid var(--accent-orange); width: 500px; }
        
        /* PAINEL ADMIN */
        #painelAdmin { display: none; background: #0f172a; border: 2px solid var(--accent-orange); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1.2fr 2fr; gap: 20px; }
        .btn-min { width: 100%; padding: 8px; margin-bottom: 4px; background: transparent; border: 1px solid var(--neon-blue); color: white; border-radius: 6px; cursor: pointer; font-size: 0.7rem; }

        /* ESCALA E TABELAS */
        #secaoEscala { background: white; border-radius: 8px; padding: 15px; overflow-x: auto; margin-bottom: 30px; border: 2px solid #000; color: #000; }
        table.escala { width: 100%; border-collapse: collapse; min-width: 1000px; }
        table.escala th { background: var(--iasd-blue); color: white; padding: 10px; border: 1px solid #000; font-size: 0.75rem; }
        table.escala td { border: 1px solid #000; text-align: center; font-weight: bold; height: 45px; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; font-size: 0.8rem; }
        
        .tag-evento { background: var(--exit-red); color: white; font-size: 0.65rem; padding: 3px; border-radius: 3px; display: block; margin-bottom: 2px; }
        .linha-extra { background-color: #fff1f2 !important; }

        /* CORES MINISTÉRIOS */
        tr.pessoal td { background-color: #e0f2fe !important; } tr.mordomia td { background-color: #fef3c7 !important; }
        tr.saude td { background-color: #f1f5f9 !important; } tr.homens td { background-color: #dcfce7 !important; }

        @media print { .toolbar, #painelAdmin, .modal-master { display: none !important; } body { padding-top: 0; } }
    </style>
</head>
<body id="mainBody">

<div class="toolbar">
    <div style="display: flex; gap: 8px; align-items: center;">
        <span style="font-weight: 900; color: var(--neon-blue); font-size: 0.8rem;">ESTRELA DALVA</span>
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid #444; padding:5px; border-radius:6px;"></select>
        <button class="btn-tool" onclick="window.print()">🖨️ IMPRIMIR</button>
        <button class="btn-tool btn-tesouraria" onclick="abrirTesouraria()">💰 TESOURARIA</button>
        <button class="btn-tool" style="border-color:var(--accent-orange)" onclick="abrirEventos()">🔥 EVENTOS</button>
    </div>
    <button id="btnEntrar" class="btn-tool" style="background:var(--neon-blue); color:#000" onclick="abrirLogin()">ENTRAR</button>
    <button id="btnSair" style="display:none; background:red; color:white; padding:10px; border-radius:5px; border:none; cursor:pointer" onclick="fazerLogout()">SAIR</button>
</div>

<div id="modalTesouraria" class="modal-master">
    <div class="card-modal">
        <h2 style="color:var(--success-green); text-align:center">ARQUIVOS DA TESOURARIA</h2>
        <div id="listaArquivosTes" style="margin-bottom:15px"></div>
        <input type="file" id="fileInput" accept=".jpg,.jpeg,.pdf" style="display:none" onchange="processarFile(this)">
        <button class="btn-tool" style="width:100%; color:var(--neon-blue); border-color:var(--neon-blue); margin-bottom:10px" onclick="document.getElementById('fileInput').click()">FAZER UPLOAD (MÁX 3)</button>
        <button class="btn-tool" style="width:100%; background:var(--exit-red); border:none" onclick="fecharTesouraria()">FECHAR</button>
    </div>
</div>

<div id="modalEventos" class="modal-master">
    <div class="card-modal">
        <h2 style="color:var(--accent-orange); text-align:center">CRIAR EVENTO</h2>
        <input type="text" id="evNome" placeholder="NOME DO EVENTO" style="width:100%; padding:10px; margin-bottom:10px; background:#000; color:#fff; border:1px solid #444">
        <div style="display:flex; gap:10px; margin-bottom:10px">
            <input type="date" id="evIni" style="width:50%; padding:10px">
            <input type="date" id="evFim" style="width:50%; padding:10px">
        </div>
        <button class="btn-tool" style="width:100%; background:var(--accent-orange); border:none; margin-bottom:10px" onclick="salvarEvento()">SALVAR NO PERÍODO</button>
        <div id="listaEv" style="max-height:100px; overflow-y:auto; font-size:0.7rem; margin-bottom:10px"></div>
        <button class="btn-tool" style="width:100%; background:#444; border:none" onclick="fecharEventos()">FECHAR</button>
    </div>
</div>

<div id="painelAdmin">
    <div class="admin-grid">
        <div class="column">
            <div id="contPinceis"></div>
        </div>
        <div class="column">
            <div id="gridAnciaos" style="display:grid; grid-template-columns:1fr 1fr; gap:5px"></div>
        </div>
        <div class="column">
            <table style="width:100%; font-size:0.7rem; border-collapse:collapse">
                <thead><tr style="color:var(--accent-orange)"><th>CARGO</th><th>USER</th><th>SENHA</th></tr></thead>
                <tbody id="corpoLogins"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="secaoEscala">
    <div style="text-align:center; margin-bottom:15px">
        <div id="txtAnciao" style="font-size:1.1rem; font-weight:900; color:var(--iasd-blue)">---</div>
        <div style="font-weight:bold;">ESCALA DE <span id="txtMes">---</span></div>
    </div>
    <table class="escala">
        <thead><tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr></thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="secaoAnual">
    <h3 style="color:var(--accent-orange); font-size:0.8rem">🗓️ PLANEJAMENTO ANUAL 2026</h3>
    <div id="gridAnual" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v580');

    let db = { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{}, eventos:{}, tesouraria:{} };
    let logado = false;
    let userLogado = null;
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    window.onload = () => { 
        const save = localStorage.getItem('iasd_user');
        if(save) { userLogado = JSON.parse(save); logado = true; statusAdmin(); }
    };

    dbRef.on('value', snap => { 
        db = snap.val() || db; 
        if(!db.logins || db.logins.length < 5) {
            db.logins = [
                {c:"Administrador", u:"admin", s:"123"},
                {c:"Gerência", u:"gerente", s:"123"},
                {c:"Diaconato", u:"diac", s:"123"}
            ];
        }
        renderTodo(); 
    });

    function abrirLogin() {
        let u = prompt("Usuário:"), s = prompt("Senha:");
        const f = db.logins.find(l => l.u === u && l.s === s);
        if(f) {
            logado = true; userLogado = f;
            localStorage.setItem('iasd_user', JSON.stringify(f));
            statusAdmin();
            renderTodo();
        } else { alert("Acesso negado."); }
    }

    function statusAdmin() {
        document.getElementById('painelAdmin').style.display = 'block';
        document.getElementById('btnEntrar').style.display = 'none';
        document.getElementById('btnSair').style.display = 'block';
    }

    function fazerLogout() { localStorage.removeItem('iasd_user'); location.reload(); }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('txtMes').innerText = meses[m];
        document.getElementById('txtAnciao').innerText = `ANCIÃO RESPONSÁVEL: ${db.anciaos?.[m] || "---"}`;

        // 1. PINCEIS
        const mins = [['pessoal','M. Pessoal'],['mordomia','Mordomia'],['saude','Saúde'],['homens','M. Homens'],['familia','M. Família'],['musica','Música']];
        document.getElementById('contPinceis').innerHTML = mins.map(min => `<button class="btn-min" onclick="selPincel('${min[0]}','${min[1]}')">${min[1]}</button>`).join('') + `<button class="btn-min" style="color:red" onclick="selPincel('','')">LIMPAR</button>`;

        // 2. ANCIAOS E 3. LOGINS
        document.getElementById('gridAnciaos').innerHTML = meses.map((n, i) => `<div><label style="font-size:7px">${n}</label><input style="width:100%; background:#000; color:#fff; border:1px solid #334155" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)" ${!logado?'disabled':''}></div>`).join('');
        document.getElementById('corpoLogins').innerHTML = db.logins.map((l, idx) => `<tr><td>${l.c}</td><td>${l.u}</td><td><input style="width:50px; background:none; border:none; color:white" value="${l.s}" onchange="atuLog(${idx},'s',this.value)" ${!logado?'disabled':''}></td></tr>`).join('');

        // 4. ESCALA (Lógica de Intervalo Completo)
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            const dt = new Date(2026, m, d);
            const dataISO = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dStr = `${d}_${m+1}_2026`;
            let ev = null; for(let id in db.eventos) { if(dataISO >= db.eventos[id].ini && dataISO <= db.eventos[id].fim) ev = db.eventos[id]; }
            
            if([0,3,6].includes(dt.getDay()) || ev) {
                const tr = document.createElement('tr');
                if(ev && ![0,3,6].includes(dt.getDay())) tr.className = "linha-extra";
                let c = db.cores?.[dStr] || {id:''}; if(c.id) tr.classList.add(c.id);
                tr.innerHTML = `<td onclick="${logado?`pintar('${dStr}')`:''}" style="cursor:pointer">${ev?`<span class="tag-evento">${ev.nome}</span>`:''} ${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][dt.getDay()]}</td><td>${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)" ${!logado?'disabled':''}></td>`).join('');
                corpo.appendChild(tr);
            }
        }

        // 5. ANUAL
        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `<div style="background:#1e293b; padding:5px; border-radius:5px"><h6>${n}</h6><textarea style="width:100%; height:40px; background:transparent; color:#fff; border:none; font-size:0.7rem" onchange="atuAnu(${i},this.value)" ${!logado?'disabled':''}>${db.anual?.[i]||''}</textarea></div>`).join('');
    }

    // FUNÇÕES DE DADOS
    function atuAnc(i,v) { if(logado) dbRef.child('anciaos').child(i).set(v.toUpperCase()); }
    function atuLog(idx, c, v) { if(logado) { db.logins[idx][c]=v; dbRef.child('logins').set(db.logins); }}
    function atu(d,c,v) { if(logado) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }}
    function atuAnu(i,v) { if(logado) { if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }}

    // TESOURARIA
    function abrirTesouraria() {
        if(!logado || (userLogado.c !== "Administrador" && userLogado.c !== "Gerência")) { alert("Somente Admin ou Gerente."); return; }
        document.getElementById('modalTesouraria').style.display = 'flex';
        renderTes();
    }
    function fecharTesouraria() { document.getElementById('modalTesouraria').style.display = 'none'; }
    function renderTes() {
        const tri = Math.floor(parseInt(document.getElementById('selMes').value)/3)+1;
        const lista = document.getElementById('listaArquivosTes'); lista.innerHTML = "";
        const arqs = db.tesouraria?.[tri] || [];
        arqs.forEach((a, idx) => { lista.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px"><span>📄 ${a.nome}</span><button onclick="delArq(${tri},${idx})" style="color:red; background:none; border:none">X</button></div>`; });
    }
    function processarFile(input) {
        const file = input.files[0]; if(!file) return;
        const tri = Math.floor(parseInt(document.getElementById('selMes').value)/3)+1;
        const arqs = db.tesouraria?.[tri] || [];
        if(arqs.length >= 3) { alert("Limite de 3 atingido."); return; }
        const reader = new FileReader();
        reader.onload = (e) => { arqs.push({nome: file.name, url: e.target.result}); dbRef.child('tesouraria').child(tri).set(arqs); };
        reader.readAsDataURL(file);
    }
    function delArq(tri, idx) { let arqs = db.tesouraria[tri]; arqs.splice(idx, 1); dbRef.child('tesouraria').child(tri).set(arqs); }

    // EVENTOS
    function abrirEventos() { document.getElementById('modalEventos').style.display = 'flex'; renderListaEv(); }
    function fecharEventos() { document.getElementById('modalEventos').style.display = 'none'; }
    function salvarEvento() {
        const n = document.getElementById('evNome').value.toUpperCase(), i = document.getElementById('evIni').value, f = document.getElementById('evFim').value;
        if(i && f) { dbRef.child('eventos').child(Date.now()).set({nome: n || "EVENTO", ini: i, fim: f}); renderListaEv(); }
    }
    function renderListaEv() {
        const d = document.getElementById('listaEv'); d.innerHTML = "";
        for(let id in db.eventos) { d.innerHTML += `<div style="display:flex; justify-content:space-between">${db.eventos[id].nome} <button onclick="dbRef.child('eventos').child('${id}').remove()" style="color:red; background:none; border:none">X</button></div>`; }
    }

    let pID = null, pNome = "";
    function selPincel(id, nome) { pID = id; pNome = nome; }
    function pintar(dStr) { if(logado && pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}
    
    const sM = document.getElementById('selMes'); if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
