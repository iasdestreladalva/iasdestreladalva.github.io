<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        #userWelcomeBar { display: none; background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon); padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95rem; color: #fff; text-align: center; }
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; align-items: start; } 
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; min-height: 300px; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; }
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 0.85rem; display: block; padding: 5px 0; outline: none; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 90vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }
        #status-save { font-size: 0.8rem; color: var(--green); opacity: 0; transition: 0.5s; }
        #viewContainer { width: 100%; height: 60vh; background: #fff; border-radius: 8px; margin-bottom: 10px; }
        @media print { .no-print { display: none !important; } body { background: white; } table#tabela-main { color: black; border: 1px solid #000; } }
    </style>
</head>
<body>
<div class="container">
    <div id="userWelcomeBar" class="no-print"></div>
    <div id="headerTopo" class="no-print" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <div><h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2><span id="status-save">● Sincronizado</span></div>
        <div style="display:flex; gap:10px; flex-wrap: wrap;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="border-color:var(--gold); color:var(--gold); width:auto; padding:0 15px;" onclick="window.print()">🖨️</button>
            <button id="btnAcesso" class="input-dark" style="width:auto; padding:0 15px;" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button id="btnSair" class="input-dark" style="border-color:red; color:red; width:auto; padding:0 15px; display:none;" onclick="sair()">🚪 SAIR</button>
            <button id="btnAdmin" class="input-dark" style="border-color:var(--orange); color:var(--orange); width:auto; padding:0 15px; display:none;" onclick="toggleAdmin()">⚙️ PAINEL</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid">
            <div class="admin-section"><h4>MINISTÉRIO DO DIA</h4><div id="listaMinisterios"></div></div>
            <div class="admin-section"><h4>ANCIÃO DO MÊS</h4><div id="gridMeses"></div></div>
            <div class="admin-section"><h4>APOIO</h4><div id="gridApoioAnciao"></div></div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;" id="headerTitulo">CARREGANDO...</th></tr>
            <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1rem; padding:0 12px 12px 12px; text-align:left;" id="headerAnciao">Responsável: </th></tr>
            <tr><th style="width:130px">DIA</th><th style="width:50px">DATA</th><th>SABATINA</th><th>PREGADOR(A)</th><th>MÚSICA ESPECIAL</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;"><button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button></div></div>
<div id="popViewImg" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()" style="background:#fff; color:#000;"><h4 id="nomeArquivoView"></h4><div id="viewContainer"></div><a id="btnLinkExterno" href="#" target="_blank" class="btn-min" style="background:var(--blue); color:#fff; text-align:center; text-decoration:none; line-height:2.5;">VER TELA CHEIA</a><button onclick="document.getElementById('popViewImg').style.display='none'" class="btn-fechar">FECHAR</button></div></div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", pastor: "Pastor", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes", aventureiros: "Aventureiros", desbravadores: "Desbravadores", jovem: "M. Jovem" };
    const LISTA_ANCIAOS = ["Wesley", "Jesuino", "Ester", "Marcilio", "Albert", "Manoel"]; 
    let db = {}; let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); }
        else { db = { escalas:{}, senhas:{admin:'123456'}, anciaos:{}, apoio_anciao:{}, regras_manuais:{} }; save(); }
    });

    function login() {
        const u = document.getElementById('userLogin').value.toLowerCase().trim();
        const p = document.getElementById('passLogin').value;
        const senhaDb = db.senhas?.[u] || (u === 'admin' ? '123456' : null);
        if(senhaDb === p) { localStorage.setItem('iasd_curUser', u); location.reload(); } else { alert("Erro!"); }
    }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function toggleAdmin() { const p = document.getElementById('adminPanel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        document.getElementById('headerAnciao').innerText = `Responsável: ${db.anciaos?.[mIdx] || ''}`;
        const isV = curUser === 'visitante', isAdmin = ['admin','ger'].includes(curUser);
        document.getElementById('btnSair').style.display = isV ? 'none' : 'block';
        document.getElementById('btnAcesso').style.display = isV ? 'block' : 'none';
        document.getElementById('btnAdmin').style.display = isAdmin ? 'block' : 'none';
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let tr = `<tr><td><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let canEdit = isAdmin || (curUser !== 'visitante' && ((curUser==='diaconato' && col==='di') || (curUser==='musica' && (col==='mu'||col==='lo'))));
                    tr += `<td><textarea ${canEdit?'':'disabled'} class="auto-expand" onchange="atuCel('${dStr}','${col}',this.value)" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${db.escalas?.[dStr]?.[col]||''}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        if(isAdmin) renderAdmin();
    }

    function renderAdmin() {
        const mIdx = parseInt(document.getElementById('selMes').value);
        const gMes = document.getElementById('gridMeses'); gMes.innerHTML = "";
        LISTA_ANCIAOS.forEach(a => {
            const active = db.anciaos?.[mIdx] === a;
            gMes.innerHTML += `<button class="btn-min ${active?'active':''}" onclick="db.anciaos[${mIdx}]='${a}';save();">${a}</button>`;
        });
    }

    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function save() { dbCloud.collection('dados').doc('estrela_v102').set(db).then(() => { const st = document.getElementById('status-save'); st.style.opacity="1"; setTimeout(()=>st.style.opacity="0", 2000); }); }

    const sM = document.getElementById('selMes');
    if(sM.options.length === 0) MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
