<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        #saveIndicator { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); padding: 8px 25px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 20000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .saving { background: var(--orange); color: white; border: 2px solid white; }
        .saved { background: var(--green); color: white; border: 2px solid white; }

        .btn-modern { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); background: transparent; color: var(--neon); cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.8rem; }
        .btn-modern:hover { background: var(--neon); color: var(--blue); box-shadow: 0 0 10px var(--neon); }

        #userWelcomeBar { display: none; background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon); padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95rem; color: #fff; text-align: center; }
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 2fr 1.2fr; gap: 15px; align-items: start; } 
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; height: auto; min-height: 520px; }
        
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 6px; box-sizing: border-box; outline: none; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 0.7rem; transition: 0.2s; }
        
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; border-radius: 10px 10px 0 0; overflow: hidden; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.9rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; }
        
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 1.1rem; display: block; padding: 8px 0; outline: none; }
        
        .cron-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .cron-container { background: white; color: black; padding: 25px; border-radius: 15px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        
        /* Estilos do Cronograma */
        .cron-header { padding: 10px; font-weight: bold; text-align: center; border: 1px solid #ccc; margin-top: 10px; color: #000; }
        .cron-item-row { display: grid; grid-template-columns: 1fr 100px 40px; border: 1px solid #eee; border-top: none; }
        .cron-item-row input { border: none; padding: 8px; font-size: 0.95rem; }
        .cron-item-row .time-field { text-align: center; font-weight: bold; border-left: 1px solid #eee; }
        
        @media print { 
            .no-print, button, select, .admin-box, .overlay { display: none !important; }
            .cron-overlay { display: block !important; position: static; background: white; }
            .cron-container { box-shadow: none; width: 100%; max-width: 100%; padding: 0; }
        }
    </style>
</head>
<body>

<div id="saveIndicator"></div>

<div class="container">
    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:8px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button id="btnAcesso" class="btn-modern" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="btn-modern" style="border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div class="no-print" style="display:flex; gap:10px; margin-bottom:15px; justify-content:center; flex-wrap: wrap;">
        <button class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="abrirCronograma()">📝 ORDEM DO CULTO</button>
        <button id="btnMembros" class="btn-modern" style="display:none;" onclick="document.getElementById('popMembros').style.display='flex'">👥 EQUIPE</button>
    </div>

    <div id="areaEscalaPrincipal">
        <table id="tabela-main">
            <thead>
                <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.6rem; padding:15px;" id="headerTitulo">ESCALA</th></tr>
                <tr><th style="width:130px">DIA</th><th style="width:50px">DATA</th><th>SABATINA</th><th>PREGADOR(A)</th><th>ESPECIAL</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>
</div>

<div id="modalCronograma" class="cron-overlay" onclick="this.style.display='none'">
    <div class="cron-container" onclick="event.stopPropagation()">
        <h2 style="text-align: center; color: var(--blue); margin: 0 0 20px 0;">ORDEM DO CULTO</h2>
        <div id="cronograma-lista"></div>
        <div class="no-print" id="adminCronControls" style="margin-top:20px; display:none; gap:10px; justify-content:center;">
            <button class="btn-modern" style="background:var(--blue); color:white; border:none;" onclick="addBlocoCron()">+ Bloco</button>
            <button class="btn-modern" style="background:var(--orange); color:white; border:none;" onclick="gerarModeloAutomatico()">♻️ Resetar Modelo</button>
            <button class="btn-modern" style="background:var(--green); color:white; border:none;" onclick="salvarCronograma()">💾 Salvar</button>
        </div>
        <button class="btn-fechar" onclick="document.getElementById('modalCronograma').style.display='none'">FECHAR</button>
    </div>
</div>

<script>
    // Configurações Firebase e Variáveis (Mantidas do original)
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();
    let db = {}; let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];

    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); }
    });

    function save() { dbCloud.collection('dados').doc('estrela_v102').set(db); }

    // --- LÓGICA DO CRONOGRAMA ---
    function abrirCronograma() {
        const hoje = new Date();
        const dStr = `${hoje.getDate()}/${hoje.getMonth()+1}/${hoje.getFullYear()}`;
        document.getElementById('modalCronograma').style.display = 'flex';
        if(db.cronogramas_diarios && db.cronogramas_diarios[dStr]) {
            renderCron(db.cronogramas_diarios[dStr]);
        } else {
            gerarModeloAutomatico();
        }
    }

    function gerarModeloAutomatico() {
        const sem = new Date().getDay();
        let modelo = [];

        if(sem === 6) { // SÁBADO (BASEADO NA SUA FOTO)
            modelo = [
                { titulo: "LOUVOR", cor: "#fff2cc", itens: [{n:"Louvor de 8:45 as 9:00", t:""}] },
                { titulo: "ESCOLA SABATINA DE 9:00 AS 10:20", cor: "#f6b26b", itens: [
                    {n:"ORAÇÃO", t:""}, {n:"ANÚNCIO DE INÍCIO", t:""}, {n:"HINO INICIAL", t:""}, 
                    {n:"CARTA MISSIONÁRIA", t:""}, {n:"MUSICA ESPECIAL", t:""}, 
                    {n:"RECAPITULAÇÃO ESCOLA SABATINA", t:"60"}, {n:"MUSICA ESPECIAL", t:""}, {n:"ORAÇÃO", t:""}
                ]},
                { titulo: "DOXOLOGIA DE 10:20 AS 10:23", cor: "#9fc5e8", itens: [{n:"MÚSICA", t:""}, {n:"ORAÇÃO PREG.", t:""}, {n:"COMUNICAÇÃO (ANÚNCIOS)", t:""}] },
                { titulo: "OFERTORIO DE 10:23 AS 10:30", cor: "#ffff00", itens: [{n:"VIDEO PROVAI E VEDE", t:""}, {n:"MUSICA", t:""}] },
                { titulo: "LOUVOR COM A IGREJA DE 10:30 AS 10:45", cor: "#93c47d", itens: [{n:"1ª MUSICA", t:""}, {n:"2ª MUSICA", t:""}, {n:"HINO INICIAL (DE PÉ)", t:""}] },
                { titulo: "ORAÇÃO (DE JOELHOS) 10:45 AS 10:50", cor: "#cfe2f3", itens: [] },
                { titulo: "MOMENTO DA CRIANÇA DE 10:50 AS 10:57", cor: "#d5a6bd", itens: [] },
                { titulo: "MENSAGEM BÍBLICA + MÚSICA ESPECIAL 10:57 AS 11:45", cor: "#3d85c6", itens: [{n:"MUSICA ESPECIAL", t:""}, {n:"SERMÃO (PREGAÇÃO)", t:"45"}, {n:"MUSICA ESPECIAL", t:""}] }
            ];
        } else if (sem === 3) { // QUARTA
            modelo = [
                { titulo: "CULTO DE ORAÇÃO", cor: "#d9d9d9", itens: [{n:"Louvor Inicial", t:"10"}, {n:"Pedidos e Agradecimentos", t:"10"}, {n:"Mensagem Bíblica", t:"35"}, {n:"Oração Final", t:""}] }
            ];
        } else { // DOMINGO
            modelo = [
                { titulo: "CULTO EVANGELÍSTICO", cor: "#d9d9d9", itens: [{n:"Louvor", t:"10"}, {n:"Música Especial", t:"5"}, {n:"Pregação", t:"35"}, {n:"Oração Final", t:""}] }
            ];
        }
        renderCron(modelo);
    }

    function renderCron(lista) {
        const container = document.getElementById('cronograma-lista');
        container.innerHTML = "";
        lista.forEach(bloco => {
            const isAdmin = ['admin','ger'].includes(curUser);
            let html = `<div class="bloco-cron">
                <div class="cron-header" style="background:${bloco.cor || '#eee'}">
                    <input value="${bloco.titulo}" style="background:transparent; border:none; width:90%; text-align:center; font-weight:bold;" ${!isAdmin?'disabled':''}>
                </div>`;
            bloco.itens.forEach(it => {
                html += `<div class="cron-item-row">
                    <input class="it-n" value="${it.n}" ${!isAdmin?'disabled':''}>
                    <input class="it-t time-field" value="${it.t ? it.t+' min' : ''}" placeholder="--" ${!isAdmin?'disabled':''}>
                    ${isAdmin ? `<button onclick="this.closest('.cron-item-row').remove()" style="border:none; color:red; cursor:pointer;">x</button>` : ''}
                </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        });
        if(['admin','ger'].includes(curUser)) document.getElementById('adminCronControls').style.display = 'flex';
    }

    function salvarCronograma() {
        const hoje = new Date();
        const dStr = `${hoje.getDate()}/${hoje.getMonth()+1}/${hoje.getFullYear()}`;
        if(!db.cronogramas_diarios) db.cronogramas_diarios = {};
        
        db.cronogramas_diarios[dStr] = Array.from(document.querySelectorAll('.bloco-cron')).map(b => ({
            titulo: b.querySelector('.cron-header input').value,
            cor: b.querySelector('.cron-header').style.backgroundColor,
            itens: Array.from(b.querySelectorAll('.cron-item-row')).map(row => ({
                n: row.querySelector('.it-n').value,
                t: row.querySelector('.it-t').value.replace(' min', '')
            }))
        }));
        save();
        alert("Cronograma salvo!");
    }

    // --- FUNÇÕES DE RENDERIZAÇÃO DA ESCALA (Resumo do original) ---
    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let tr = `<tr><td><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let val = db.escalas?.[dStr]?.[col] || '';
                    tr += `<td><textarea disabled class="auto-expand">${val}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    const sM = document.getElementById('selMes'); MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
