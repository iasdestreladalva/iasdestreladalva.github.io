<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - v102.49</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1450px; margin: auto; }
        
        /* Painel Admin */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 220px 1fr 2.5fr; gap: 20px; }
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .admin-section h4 { color: var(--neon); font-size: 0.75rem; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; text-transform: uppercase; }

        /* Botões e Inputs */
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 10px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; text-align: center; text-decoration: none; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }

        /* Cores da Escala */
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; } .row-homens { background-color: #ecfeff !important; }
        .row-familia { background-color: #faf5ff !important; } .row-adolescentes { background-color: #f8fafc !important; }
        .row-mulher { background-color: #fdf2f8 !important; } .row-musica { background-color: #fff1f2 !important; }

        /* Tabelas */
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; border-radius: 8px; overflow: hidden; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 55px; }
        
        /* Seções Inferiores */
        .planejamento-anual { margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--gold); }
        .tesouraria-display { display: none; margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--green); }
        .chart-container { margin-top: 20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--orange); }

        /* Modais e Overlays */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:500px; max-height: 80vh; overflow-y: auto; }
        
        /* Visualizador de Arquivos */
        #zoomOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        #viewerContent img { max-width: 90%; max-height: 85vh; border: 4px solid white; }
        #viewerContent embed { width: 85vw; height: 85vh; border: 4px solid white; }

        @media print { 
            body { background: white !important; color: black !important; padding: 0; }
            .no-print { display: none !important; }
            .print-area { display: block !important; width: 100% !important; margin: 0 !important; }
            table, .chart-container, .planejamento-anual { border: 1px solid #000 !important; color: black !important; background: white !important; }
        }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="width:auto; padding:0 10px; border-color:white; color:white; cursor:pointer;" onclick="document.getElementById('popPrint').style.display='flex'">🖨️ IMPRIMIR</button>
            <button id="btnTesourariaAdmin" class="input-dark" style="width:auto; padding:0 10px; border-color:var(--green); color:var(--green); display:none; cursor:pointer;" onclick="abrirTesourariaAdmin()">⚙️ FINANCEIRO</button>
            <button id="btnDados" class="input-dark" style="width:auto; padding:0 10px; border-color:var(--orange); color:var(--orange); display:none; cursor:pointer;" onclick="abrirPopMissionario()">📊 MISSIONÁRIO</button>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon);" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>
        <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>1. MINISTÉRIO DO DIA</h4>
                <div id="listaMinisterios"></div>
                <button class="btn-min" style="border-color:red; color:red; margin-top:10px;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR</button>
            </div>
            <div class="admin-section"><h4>2. RESPONSÁVEL MENSAL</h4><div id="gridMeses" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div></div>
            <div class="admin-section"><h4>3. LOGINS E SENHAS</h4><div style="max-height:300px; overflow-y:auto;"><table style="width:100%;"><tbody id="corpoCreds"></tbody></table></div></div>
        </div>
    </div>

    <div id="print-escala" class="print-area">
        <table id="tabela-main">
            <thead>
                <tr><th colspan="9" id="headerTitulo" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;">ESCALA</th></tr>
                <tr><th colspan="9" id="headerAnciao" style="background:var(--blue); color:var(--gold); font-size:1rem; padding:0 12px 12px 12px; text-align:left;">Ancião: </th></tr>
                <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div id="print-planejamento" class="planejamento-anual print-area">
        <h3 style="margin:0 0 15px 0; color:var(--gold);">📅 PLANEJAMENTO ANUAL 2026</h3>
        <div id="gridPlanejamento" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px;"></div>
    </div>

    <div id="print-grafico" class="chart-container print-area">
        <h3 style="margin:0 0 15px 0; color:var(--orange);">📊 DESEMPENHO MISSIONÁRIO</h3>
        <div style="height: 300px;"><canvas id="missionaryChart"></canvas></div>
    </div>

    <div id="displayTesouraria" class="tesouraria-display no-print">
        <h3 style="margin:0; color:var(--green);">💰 COMPROVANTES - <span id="mesTesouraria"></span></h3>
        <div id="gridArquivosPublicos" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap:10px; margin-top:10px;"></div>
    </div>
</div>

<div id="zoomOverlay" onclick="this.style.display='none'"><div id="viewerContent"></div><p style="color:white; text-align:center;">Clique para fechar</p></div>
<div id="popTesouraria" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--green);text-align:center;">FINANCEIRO</h3><input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none" onchange="processarUpload()"><button onclick="document.getElementById('fileInput').click()" class="btn-min">SUBIR ARQUIVO</button><div id="listaAdminArquivos" style="margin-top:10px;"></div></div></div>
<div id="popPrint" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--neon);text-align:center;">IMPRIMIR</h3><button class="btn-min" onclick="imprimirSo('print-escala')">ESCALA</button><button class="btn-min" onclick="imprimirSo('print-planejamento')">PLANEJAMENTO</button><button class="btn-min" onclick="imprimirSo('print-grafico')">GRÁFICO</button></div></div>
<div id="popMissionario" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--orange);text-align:center;">DADOS</h3><div id="camposMissionarios"></div></div></div>
<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="color:#000!important;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="color:#000!important; margin-top:5px;"><button class="btn-min" style="background:var(--blue); color:white; margin-top:10px;" onclick="login()">ENTRAR</button></div></div>

<script>
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes" };
    const REGRAS = { pessoal: "1S", mordomia: "2S", saude: "1D", homens: "2Q", familia: "3D", adolescentes: "3Q", mulher: "UQ" };
    let missionChart, db = JSON.parse(localStorage.getItem('iasd_v100')) || { senhas: { admin: "iasd118", ger: "ger123", diaconato: "diac123", musica: "mus123", sonoplastia: "sono123", mulher: "mulher123", sabatina: "sab123", pessoal: "mp123", mordomia: "mord123", saude: "saude123", homens: "homem123", familia: "fam123", adolescentes: "adol123" }, anciaos: {}, escalas: {}, regras_manuais: {}, mis_v3: {}, docs: {}, eventos_anuais: {} };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    window.minSelecionado = null;

    function save() { localStorage.setItem('iasd_v100', JSON.stringify(db)); }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const isAdm = ['admin', 'ger'].includes(curUser);
        document.getElementById('adminPanel').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnTesourariaAdmin').style.display = isAdm ? 'block' : 'none';
        document.getElementById('displayTesouraria').style.display = (curUser === 'visitante') ? 'none' : 'block';
        document.getElementById('btnSair').style.display = (curUser === 'visitante') ? 'none' : 'block';
        document.getElementById('btnAcesso').style.display = (curUser === 'visitante') ? 'block' : 'none';
        document.getElementById('btnDados').style.display = (['admin','ger','pessoal'].includes(curUser)) ? 'block' : 'none';
        document.getElementById('headerAnciao').innerText = `Ancião: ${db.anciaos[mIdx] || '---'}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        document.getElementById('mesTesouraria').innerText = MESES[mIdx];
        renderEscala(mIdx); renderAdmin(); renderPlanejamento(); renderArquivosPublicos(mIdx); updateChart(mIdx);
    }

    function renderEscala(mIdx) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay(), minAuto = "";
            Object.keys(REGRAS).forEach(k => { let r = REGRAS[k], n = parseInt(r[0]), sD = r[1]==="S"?6:(r[1]==="D"?0:3); if(r==="UQ" && sem===3 && d>(diasNoMes-7)) minAuto=k; else if(sem===sD && d>(n-1)*7 && d<=n*7) minAuto=k; });
            let minID = db.regras_manuais[dStr] || minAuto;
            if([0,3,6].includes(sem)) {
                let tr = `<tr class="row-${minID}"><td onclick="cliqueDia('${dStr}')" style="cursor:pointer; border-left: 5px solid var(--neon);"><b>${["DOMINGO","SEG","TER","QUARTA","QUI","SEX","SÁBADO"][sem]}</b><br><small>${MINS[minID]||''}</small></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let pode = (['admin','ger'].includes(curUser)) || (curUser === minID && col === 'pr');
                    tr += `<td><input ${pode?'':'disabled'} style="width:100%; border:none; background:transparent; text-align:center; text-transform:uppercase;" value="${db.escalas[dStr]?.[col]||''}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`;
                }); corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function cliqueDia(dStr) { if(['admin','ger'].includes(curUser)) { db.regras_manuais[dStr] = window.minSelecionado; save(); renderTodo(); } }
    function processarUpload() { const file = document.getElementById('fileInput').files[0]; if(!file) return; const reader = new FileReader(); reader.onload = function(e) { const m = document.getElementById('selMes').value; if(!db.docs[m]) db.docs[m] = []; db.docs[m].push({ nome: file.name, data: e.target.result, tipo: file.type }); save(); renderAdminDocs(); renderArquivosPublicos(m); }; reader.readAsDataURL(file); }
    function renderAdminDocs() { const m = document.getElementById('selMes').value, lista = document.getElementById('listaAdminArquivos'); lista.innerHTML = ""; if(!db.docs[m]) return; db.docs[m].forEach((doc, i) => { lista.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:5px; background:#1e293b; padding:5px;"><span>${doc.nome}</span><button onclick="db.docs[${m}].splice(${i},1); save(); renderAdminDocs(); renderArquivosPublicos(${m});">X</button></div>`; }); }
    function renderArquivosPublicos(m) { const grid = document.getElementById('gridArquivosPublicos'); grid.innerHTML = ""; if(!db.docs[m]) return; db.docs[m].forEach(doc => { grid.innerHTML += `<div onclick="abrirViewer('${doc.data}', '${doc.tipo}')" style="background:#000; height:100px; border:1px solid #334155; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; overflow:hidden;">${doc.tipo.includes('pdf')?'📄':'<img src="'+doc.data+'" style="width:100%; height:100%; object-fit:cover;">'}<div style="position:absolute; bottom:0; background:rgba(0,0,0,0.7); width:100%; font-size:0.5rem; text-align:center;">${doc.nome}</div></div>`; }); }
    function abrirViewer(data, tipo) { const overlay = document.getElementById('zoomOverlay'), content = document.getElementById('viewerContent'); content.innerHTML = tipo.includes('pdf') ? `<embed src="${data}" type="application/pdf" width="100%" height="100%">` : `<img src="${data}">`; overlay.style.display = 'flex'; }
    function renderAdmin() { const list = document.getElementById('listaMinisterios'); list.innerHTML = ""; ["pessoal","mordomia","saude","homens","familia","adolescentes","mulher","musica"].forEach(m => { list.innerHTML += `<button class="btn-min ${window.minSelecionado===m?'active':''}" onclick="window.minSelecionado='${m}'; renderAdmin();">${MINS[m]}</button>`; }); const gM = document.getElementById('gridMeses'); gM.innerHTML = ""; MESES.forEach((m, i) => { gM.innerHTML += `<div><small>${m}</small><input class="input-dark" value="${db.anciaos[i]||''}" onchange="db.anciaos[${i}]=this.value;save();"></div>`; }); const tC = document.getElementById('corpoCreds'); tC.innerHTML = ""; Object.keys(MINS).forEach(k => { tC.innerHTML += `<tr style="border-bottom:1px solid #222;"><td style="color:var(--gold); padding:4px; font-size:0.7rem;">${MINS[k]}</td><td><input class="input-dark" value="${db.senhas[k]}" onchange="db.senhas['${k}']=this.value;save();"></td></tr>`; }); }
    function renderPlanejamento() { const grid = document.getElementById('gridPlanejamento'); grid.innerHTML = ""; const isAdm = ['admin', 'ger'].includes(curUser); MESES.forEach((m, i) => { grid.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; border:1px solid #334155;"><h4 style="margin:0 0 5px 0; color:var(--neon);">${m}</h4><textarea ${isAdm?'':'disabled'} class="input-dark" style="height:80px; resize:none;" onchange="db.eventos_anuais[${i}]=this.value; save();">${db.eventos_anuais[i] || ""}</textarea></div>`; }); }
    function imprimirSo(id) { document.getElementById('popPrint').style.display = 'none'; setTimeout(() => { document.querySelectorAll('.print-area').forEach(el => el.classList.add('no-print')); document.getElementById(id).classList.remove('no-print'); window.print(); document.querySelectorAll('.print-area').forEach(el => el.classList.remove('no-print')); }, 350); }
    function abrirPopMissionario() { const m = document.getElementById('selMes').value, c = document.getElementById('camposMissionarios'); c.innerHTML = ""; if(!db.mis_v3[m]) db.mis_v3[m] = [0,0,0,0,0]; ["Encontros", "Classes", "Estudos", "Ministrantes", "Duplas"].forEach((l, i) => { c.innerHTML += `<div style="margin-bottom:8px;"><label>${l}</label><input type="number" class="input-dark" value="${db.mis_v3[m][i]}" onchange="db.mis_v3[${m}][${i}]=this.value; save(); updateChart(${m});"></div>`; }); document.getElementById('popMissionario').style.display='flex'; }
    function updateChart(m) { const ctx = document.getElementById('missionaryChart').getContext('2d'); if(missionChart) missionChart.destroy(); missionChart = new Chart(ctx, { type: 'bar', data: { labels: ["Enc", "Cla", "Est", "Min", "Dup"], datasets: [{ data: db.mis_v3[m] || [0,0,0,0,0], backgroundColor: ['#00d2ff', '#ffd700', '#ff7f50', '#2ecc71', '#ff4757'] }] }, options: { responsive: true, maintainAspectRatio: false } }); }
    function abrirTesourariaAdmin() { document.getElementById('popTesouraria').style.display='flex'; renderAdminDocs(); }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function login() { const u = document.getElementById('userLogin').value.toLowerCase().trim(), p = document.getElementById('passLogin').value; if(db.senhas[u] === p) { localStorage.setItem('iasd_curUser', u); location.reload(); } else alert("Erro!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    const sM = document.getElementById('selMes'); MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script>
</body>
</html>
