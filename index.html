<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v110.0 Tech</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --iasd-blue: #002b5c; /* Azul Oficial IASD */
            --bg-dark: #0a0e14; 
            --card-bg: #111827;
            --neon-blue: #38bdf8; 
            --text-main: #f8fafc;
            --border: #1e293b;
        }
        body { background: var(--bg-dark); color: var(--text-main); font-family: 'Inter', 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* PINCEL SUTIL: Apenas uma borda lateral e fundo muito leve */
        .row-pessoal td { border-left: 4px solid #0ea5e9 !important; background: rgba(14, 165, 233, 0.03); }
        .row-mordomia td { border-left: 4px solid #f59e0b !important; background: rgba(245, 158, 11, 0.03); }
        .row-divino td { border-left: 4px solid #10b981 !important; background: rgba(16, 185, 129, 0.03); }
        .row-jovens td { border-left: 4px solid #8b5cf6 !important; background: rgba(139, 92, 246, 0.03); }
        .row-mulher td { border-left: 4px solid #ec4899 !important; background: rgba(236, 72, 153, 0.03); }

        /* PAINEL TECH */
        .admin-box { display: none; background: var(--card-bg); border: 1px solid var(--border); padding: 25px; border-radius: 8px; margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: 240px 1fr 2fr; gap: 30px; }
        .admin-section h4 { color: var(--neon-blue); font-size: 0.7rem; letter-spacing: 2px; margin-bottom: 15px; opacity: 0.8; }

        .btn-min { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); color: #94a3b8; cursor: pointer; border-radius: 4px; font-size: 0.75rem; text-align: left; transition: 0.3s; }
        .btn-min:hover { border-color: var(--neon-blue); color: white; }
        .btn-min.active { border-color: var(--neon-blue); background: rgba(56, 189, 248, 0.1); color: var(--neon-blue); }

        .input-dark { background: #000; color: #fff; border: 1px solid var(--border); padding: 10px; border-radius: 4px; width: 100%; font-size: 0.85rem; }
        
        /* TABELA CLEAN */
        .table-wrap { background: var(--card-bg); border-radius: 8px; border: 1px solid var(--border); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; color: #cbd5e1; }
        th { background: #0f172a; color: #94a3b8; padding: 15px; font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; text-align: center; border-bottom: 1px solid var(--border); }
        td { border-bottom: 1px solid rgba(255,255,255,0.03); padding: 0; height: 60px; text-align: center; }
        
        .input-cell { width: 100%; height: 60px; border: none; background: transparent; text-align: center; color: white; font-weight: 500; font-size: 0.85rem; outline: none; }
        .input-cell:focus { background: rgba(255,255,255,0.02); }
        .input-cell[readonly] { color: #64748b; font-weight: 400; }

        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 15px; border-bottom: 1px solid var(--border); }
        .btn-top { background: transparent; border: 1px solid var(--border); color: #94a3b8; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; transition: 0.3s; }
        .btn-top:hover { border-color: var(--neon-blue); color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-main">
        <div style="display: flex; align-items: center; gap: 15px;">
            <div style="width: 40px; height: 40px; background: var(--iasd-blue); border-radius: 4px; display: flex; align-items: center; justify-content: center;">
                <span style="font-weight: bold; color: white;">†</span>
            </div>
            <h2 style="margin: 0; font-weight: 400; letter-spacing: 2px;">ESTRELA DALVA <span style="font-size: 0.7rem; opacity: 0.4;">v110</span></h2>
        </div>
        <div style="display: flex; gap: 10px;">
            <select id="selMes" onchange="renderTodo()" class="input-dark" style="width: 140px; border: none; background: transparent; color: var(--neon-blue); font-weight: bold;"></select>
            <button class="btn-top" onclick="abrirCalendario()">ANUAL</button>
            <button class="btn-top" id="btnAcc" onclick="document.getElementById('modalLogin').style.display='flex'">LOGIN</button>
            <button class="btn-top" id="btnSair" style="display:none; color: var(--red);" onclick="sair()">SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>MINISTÉRIO EM FOCO</h4>
                <div id="p-pessoal" class="btn-min" onclick="selPincel('pessoal','M. PESSOAL')">M. Pessoal</div>
                <div id="p-mordomia" class="btn-min" onclick="selPincel('mordomia','MORDOMIA')">Mordomia</div>
                <div id="p-divino" class="btn-min" onclick="selPincel('divino','C. DIVINO')">C. Divino</div>
                <div id="p-jovens" class="btn-min" onclick="selPincel('jovens','JOVENS')">Jovens</div>
                <div id="p-mulher" class="btn-min" onclick="selPincel('mulher','M. MULHER')">M. Mulher</div>
                <button class="btn-min" style="margin-top: 10px; border: none; opacity: 0.5;" onclick="selPincel('','')">Limpar Seleção</button>
            </div>

            <div class="admin-section">
                <h4>GESTOR DO MÊS</h4>
                <input type="text" id="ancMesInput" class="input-dark" placeholder="Nome do Ancião" onchange="salvarAnciao(this.value)">
                <div id="btnConfig" style="margin-top: 30px; display: flex; gap: 10px;">
                     <button class="btn-top" style="flex:1" onclick="document.getElementById('popTesouraria').style.display='flex'">Tesouraria</button>
                     <button class="btn-top" style="flex:1" onclick="abrirMissionario()">Missionário</button>
                </div>
            </div>

            <div class="admin-section">
                <h4>ACESSO DE SISTEMA</h4>
                <div id="corpoCreds" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.7rem; color: #64748b;"></div>
            </div>
        </div>
    </div>

    <div class="table-wrap">
        <div style="padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
            <span id="headerTitulo" style="color: #94a3b8; font-size: 0.8rem; letter-spacing: 2px;">CARREGANDO ESCALA...</span>
            <span id="headerAnciao" style="color: var(--neon-blue); font-size: 0.8rem;"></span>
        </div>
        <table id="tabela-main">
            <thead>
                <tr>
                    <th style="width: 120px;">PERÍODO</th>
                    <th style="width: 80px;">DATA</th>
                    <th>SABATINA</th>
                    <th>PREGADOR</th>
                    <th>MÚSICA</th>
                    <th>LOUVOR</th>
                    <th>SONO</th>
                    <th>RECEPÇÃO</th>
                    <th>DIACONATO</th>
                </tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 25px;">
        <div style="background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border);">
             <h4 style="margin: 0 0 15px 0; font-size: 0.7rem; color: #64748b; letter-spacing: 1px;">GRÁFICO DE ATIVIDADE</h4>
             <div style="height: 200px;"><canvas id="missionaryChart"></canvas></div>
        </div>
        <div style="background: var(--card-bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border);">
             <h4 style="margin: 0 0 15px 0; font-size: 0.7rem; color: #64748b; letter-spacing: 1px;">DOCUMENTAÇÃO</h4>
             <div id="gridArquivosPublicos" style="display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px;"></div>
        </div>
    </div>
</div>

<script>
    // [Aqui entra a mesma lógica do Firebase e Funções do código anterior]
    // A única diferença é que a função pintar(dStr) agora aplica estilos mais sutis.
</script>
</body> </html>
