<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>IASD Estrela Dalva - v102.46</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; --red: #ff4757; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', system-ui, sans-serif; padding: 10px; }
        
        .container { width: 100%; max-width: 1400px; margin: auto; }

        /* HEADER */
        .header-top { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-buttons { display: flex; gap: 8px; }
        .input-dark { background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 14px; outline: none; }
        .input-dark:focus { border-color: var(--neon); }

        /* TABELA E ESCALA */
        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; min-width: 900px; color: #333; }
        th { background: var(--blue); color: white; padding: 12px; font-size: 11px; border: 1px solid #dee2e6; text-transform: uppercase; }
        td { border: 1px solid #dee2e6; height: 50px; text-align: center; font-weight: bold; }
        .input-escala { width: 100%; height: 100%; border: none; text-align: center; font-weight: 700; background: transparent; font-size: 13px; color: inherit; }

        /* CORES MINISTÉRIOS */
        .row-pessoal { background-color: #e0f2fe !important; } 
        .row-mordomia { background-color: #fef3c7 !important; } 
        .row-saude { background-color: #f0fdf4 !important; } 
        .row-familia { background-color: #faf5ff !important; }
        .row-homens { background-color: #ecfeff !important; }
        .row-adolescentes { background-color: #f8fafc !important; }
        .row-mulher { background-color: #fdf2f8 !important; }

        /* MURAL TESOURARIA */
        .mural-section { background: var(--glass); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .mural-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        .grid-mural { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        
        .thumb-card { position: relative; aspect-ratio: 1/1; background: #000; border-radius: 12px; border: 2px solid transparent; cursor: pointer; overflow: hidden; transition: 0.3s; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .thumb-card:hover { transform: translateY(-5px); border-color: var(--neon); }
        .thumb-card img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-card .pdf-label { display: flex; flex-direction: column; align-items: center; color: var(--red); font-weight: bold; }

        /* LOGIN POPUP INTELIGENTE */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 9999; justify-content: center; align-items: center; }
        .login-card { background: #16213e; padding: 40px; border-radius: 20px; width: 100%; max-width: 350px; border: 1px solid var(--neon); box-shadow: 0 0 20px var(--neon); text-align: center; }
        .login-card h2 { margin-bottom: 25px; color: var(--neon); letter-spacing: 2px; }
        .btn-login { background: var(--neon); color: var(--blue); border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.3s; }
        .btn-login:hover { filter: brightness(1.2); }

        /* LIGHTBOX TELA CHEIA */
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; cursor: pointer; padding: 10px; }
        .lightbox-content { max-width: 95%; max-height: 95%; border-radius: 8px; box-shadow: 0 0 40px rgba(0,0,0,0.8); }
        .lightbox iframe { width: 90vw; height: 85vh; border: none; background: white; border-radius: 8px; }

        /* PAINEL ADMIN */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .btn-action { padding: 8px; border: 1px solid var(--neon); color: var(--neon); background: transparent; border-radius: 5px; cursor: pointer; font-size: 11px; }
        .btn-action.active { background: var(--neon); color: var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <h1 style="color:var(--neon); font-size: 1.5rem;">IASD ESTRELA DALVA</h1>
        <div class="nav-buttons">
            <select id="selMes" onchange="renderTodo();" class="input-dark"></select>
            <button class="input-dark" id="btnUpload" onclick="dispararUpload()" style="display:none; color:var(--green); border-color: var(--green);">➕ COMPROVANTE</button>
            <button class="input-dark" id="btnAcesso" onclick="abrirLogin()">🔓 ACESSAR</button>
            <button class="input-dark" id="btnSair" onclick="sair()" style="display:none; color:var(--red);">🚪 SAIR</button>
        </div>
    </header>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px;">
                <h4 style="color:var(--gold); margin-bottom:10px;">👤 RESPONSÁVEIS (ANCIÃOS)</h4>
                <div id="listaAnciaos" style="max-height: 150px; overflow-y: auto;"></div>
            </div>
            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px;">
                <h4 style="color:var(--neon); margin-bottom:10px;">🎨 PINTAR ESCALA</h4>
                <div id="gridCores" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"></div>
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th colspan="9" id="headerTitulo" style="font-size:18px;">ESCALA</th></tr>
                <tr><th colspan="9" id="headerAnciao" style="color:var(--gold); border-top:none; background: #1a365d;">Responsável: </th></tr>
                <tr>
                    <th style="width:80px">DIA</th><th style="width:70px">DATA</th>
                    <th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th>
                </tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div class="mural-section">
        <div class="mural-header">
            <h3 style="color:var(--green)">💰 COMPROVANTES DE TESOURARIA</h3>
            <span id="labelMes" style="font-weight: bold; opacity: 0.8;"></span>
        </div>
        <div id="gridMural" class="grid-mural"></div>
    </div>
</div>

<div id="modalLogin" class="modal-overlay" onclick="fecharLogin()">
    <div class="login-card" onclick="event.stopPropagation()">
        <h2>LOGIN</h2>
        <input type="text" id="userIn" placeholder="Usuário" class="input-dark" style="width:100%; margin-bottom:15px; color:white!important;">
        <input type="password" id="passIn" placeholder="Senha" class="input-dark" style="width:100%; margin-bottom:10px; color:white!important;">
        <button class="btn-login" onclick="login()">ENTRAR NO SISTEMA</button>
        <p onclick="fecharLogin()" style="margin-top:20px; cursor:pointer; font-size:12px; opacity:0.6;">Cancelar</p>
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'">
    <div id="lbContent"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com/", projectId: "unidades-de-acao", appId: "SUA_APP_ID" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const ANCIÃOS_AUTO = { 0:"Jesuino", 1:"Wesley", 2:"Ester", 3:"Marcilio", 4:"Albert", 5:"Albert", 6:"Jesuino", 7:"Jesuino", 8:"Ester", 9:"Marcilio", 10:"Wesley", 11:"Albert" };
    const MINS = { pessoal:"Pessoal", mordomia:"Mordomia", saude:"Saúde", familia:"Família", homens:"Homens", adolescentes:"Adol.", mulher:"Mulher" };

    let db = { escalas: {}, anciaos_manual: {}, docs: {}, regras_manuais: {}, senhas: {admin:"iasd118"} };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let corAtiva = null;

    database.ref('dados_igreja').on('value', (snap) => { if(snap.val()) { db = snap.val(); renderTodo(); } });

    function renderTodo() {
        const m = document.getElementById('selMes').value;
        const u = curUser;

        document.getElementById('btnSair').style.display = u !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = u === 'visitante' ? 'block' : 'none';
        document.getElementById('btnUpload').style.display = (u === 'admin' || u === 'ger') ? 'block' : 'none';
        document.getElementById('adminPanel').style.display = (u === 'admin') ? 'block' : 'none';

        const anciao = db.anciaos_manual?.[m] || ANCIÃOS_AUTO[m];
        document.getElementById('headerAnciao').innerText = "Responsável: Ancião " + anciao;
        document.getElementById('headerTitulo').innerText = "ESCALA - " + MESES[m] + " 2026";
        document.getElementById('labelMes').innerText = MESES[m];

        renderEscala();
        renderMural();
        if(u === 'admin') renderAdmin();
    }

    function renderEscala() {
        const mIdx = parseInt(document.getElementById('selMes').value);
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, mIdx, d); let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}/${mIdx+1}/2026`;
                let cor = db.regras_manuais?.[dStr] ? "row-"+db.regras_manuais[dStr] : getCorAuto(d, sem);
                
                let tr = `<tr class="${cor}" onclick="pintarDia('${dStr}')">
                    <td style="font-size:11px; background: rgba(0,0,0,0.03);">${["DOMINGO","","","QUARTA","","","SÁBADO"][sem]}</td>
                    <td style="background: rgba(0,0,0,0.03);">${d}/${mIdx+1}</td>`;
                
                ["sa","pr","mu","lo","so","re","di"].forEach(c => {
                    let val = db.escalas?.[dStr]?.[c] || "";
                    let edit = (curUser === 'admin' || curUser === c);
                    tr += `<td><input class="input-escala" ${!edit?'readonly':''} value="${val}" onchange="atuCel('${dStr}','${c}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function getCorAuto(d, sem) {
        if(sem === 6) { let sab = Math.ceil(d/7); if(sab===1) return "row-pessoal"; if(sab===2) return "row-mordomia"; }
        if(sem === 0) { let dom = Math.ceil(d/7); if(dom===1) return "row-saude"; if(dom===3) return "row-familia"; }
        if(sem === 3) { let qua = Math.ceil(d/7); if(qua===2) return "row-homens"; if(qua===3) return "row-adolescentes"; }
        return "";
    }

    function renderMural() {
        const m = document.getElementById('selMes').value;
        const grid = document.getElementById('gridMural'); grid.innerHTML = "";
        const docs = db.docs?.[m] || [];

        docs.forEach((f, i) => {
            const isPDF = f.type.includes('pdf');
            grid.innerHTML += `
                <div class="thumb-card" onclick="abrirLightbox('${f.data}', '${f.type}')">
                    ${isPDF ? '<div class="pdf-label">📄<br>PDF</div>' : `<img src="${f.data}">`}
                    ${curUser==='admin' ? `<button onclick="removerDoc(${i}, event)" style="position:absolute; top:5px; right:5px; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; z-index:10;">×</button>` : ''}
                </div>`;
        });
    }

    function abrirLightbox(data, type) {
        const lb = document.getElementById('lightbox');
        const content = document.getElementById('lbContent');
        lb.style.display = 'flex';
        content.innerHTML = type.includes('pdf') ? `<iframe src="${data}"></iframe>` : `<img src="${data}" class="lightbox-content">`;
    }

    function dispararUpload() {
        const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*,application/pdf';
        inp.onchange = e => {
            const f = e.target.files[0]; const reader = new FileReader();
            reader.onload = ev => {
                const m = document.getElementById('selMes').value;
                if(!db.docs) db.docs = {}; if(!db.docs[m]) db.docs[m] = [];
                db.docs[m].push({ data: ev.target.result, type: f.type });
                save();
            }; reader.readAsDataURL(f);
        }; inp.click();
    }

    function renderAdmin() {
        const aArea = document.getElementById('listaAnciaos'); aArea.innerHTML = "";
        MESES.forEach((mes, i) => {
            aArea.innerHTML += `<div style="margin-bottom:5px; font-size:11px;">${mes}: <input class="input-dark" style="padding:2px; width:120px" value="${db.anciaos_manual?.[i]||''}" placeholder="${ANCIÃOS_AUTO[i]}" onchange="atuAnciao(${i}, this.value)"></div>`;
        });

        const cArea = document.getElementById('gridCores'); cArea.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            cArea.innerHTML += `<button class="btn-action ${corAtiva===k?'active':''}" onclick="corAtiva='${k}'; renderAdmin()">${MINS[k]}</button>`;
        });
    }

    function pintarDia(dStr) { if(corAtiva && curUser==='admin') { if(!db.regras_manuais) db.regras_manuais={}; db.regras_manuais[dStr] = corAtiva; save(); } }
    function atuAnciao(m, v) { if(!db.anciaos_manual) db.anciaos_manual={}; db.anciaos_manual[m]=v; save(); }
    function atuCel(d, c, v) { if(!db.escalas) db.escalas={}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function removerDoc(i, e) { e.stopPropagation(); const m = document.getElementById('selMes').value; db.docs[m].splice(i, 1); save(); }
    function save() { database.ref('dados_igreja').set(db); }
    
    function abrirLogin() { document.getElementById('modalLogin').style.display='flex'; }
    function fecharLogin() { document.getElementById('modalLogin').style.display='none'; }
    function login() { const u = document.getElementById('userIn').value, p = document.getElementById('passIn').value; if(db.senhas[u] === p) { localStorage.setItem('iasd_curUser', u); location.reload(); } else alert("Dados incorretos!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script>
</body>
</html>
