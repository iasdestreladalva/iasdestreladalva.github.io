<!DOCTYPE html> <html lang="pt-br"> <head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IASD Estrela Dalva - GESTÃO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top:10px; }
        .admin-box { display: none; background: #16213e; border: 2px solid var(--orange); padding: 12px; border-radius: 12px; margin: 15px 0; }
        .table-wrap { width: 100%; overflow-x: auto; background: white; border-radius: 8px; margin-top:10px; }
        table { width: 100%; border-collapse: collapse; color: black; min-width: 800px; font-size: 0.8rem; }
        th { background: var(--blue); color: white; padding: 10px; }
        td { border: 1px solid #cbd5e1; text-align: center; height: 45px; font-weight: bold; }
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .input-dark { background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; width: 100%; }
        .btn-min { display: block; width: 100%; padding: 12px; background: none; border: 1px solid var(--neon); color: var(--neon); border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* GALERIA E ZOOM */
        .grid-docs { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 10px; }
        .doc-card { background: #1c2541; border: 1px solid var(--green); border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; height: 110px; }
        .doc-card img { width: 100%; height: 100%; object-fit: cover; }
        .pdf-icon { display:flex; align-items:center; justify-content:center; height:100%; font-size:2.5rem; background:#2d3748; }
        
        /* LIGHTBOX TELA CHEIA */
        #zoomOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; cursor: zoom-out; }
        #zoomOverlay img, #zoomOverlay iframe { max-width: 95%; max-height: 95%; border-radius: 8px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }

        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; padding: 15px; }
        .pop-content { background:var(--bg); border:2px solid var(--orange); padding:20px; border-radius:15px; width:100%; max-width:400px; }
    </style> </head> <body>

<div id="zoomOverlay" onclick="this.style.display='none'"></div>

<h2 style="color:var(--neon); text-align: center; margin:0;">IASD ESTRELA DALVA</h2>
<div class="nav-buttons">
    <select id="selMes" onchange="renderTodo()" class="input-dark"></select>
    <button id="btnAcesso" class="btn-min" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 LOGIN</button>
    <button id="btnSair" class="btn-min" style="border-color:red; color:red; display:none;" onclick="sair()">SAIR</button>
</div>
<div class="nav-buttons">
    <button id="btnDados" class="btn-min" style="border-color:var(--orange); color:var(--orange); display:none;" onclick="abrirPopMis()">📊 DADOS</button>
    <button id="btnTesouro" class="btn-min" style="border-color:var(--green); color:var(--green); display:none;" onclick="document.getElementById('popTes').style.display='flex'">💰 TESOURARIA</button>
</div>

<div id="adminPanel" class="admin-box">
    <div id="listaMinisterios" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;"></div>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr><th colspan="9" id="headerTitulo" style="text-align:left;">ESCALA</th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="areaRestrita" style="display:none; margin-top:20px;">
    <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:12px;">
        <h3 style="color:var(--orange); margin:0;">📊 MISSIONÁRIO - <span id="mesMisTitulo"></span></h3>
        <div style="height:180px;"><canvas id="chartMis"></canvas></div>
    </div>
    
    <div style="margin-top:20px;">
        <h3 style="color:var(--green); margin:0;">💰 TESOURARIA (TRIMESTRE)</h3>
        <div id="gridPublicoDocs" class="grid-docs"></div>
    </div>
</div>

<div id="popTes" class="overlay"><div class="pop-content">
    <h3 style="color:var(--green)">POSTAR (Máx 3 por Trimestre)</h3>
    <input type="file" id="fileIn" accept="image/*,application/pdf" style="display:none" onchange="uploadDoc()">
    <button onclick="document.getElementById('fileIn').click()" class="btn-min" style="border-color:var(--green); color:var(--green)">+ NOVO ARQUIVO</button>
    <div id="listaAdminDocs" style="margin-top:15px; max-height:200px; overflow-y:auto;"></div>
    <button onclick="document.getElementById('popTes').style.display='none'" class="btn-min" style="margin-top:15px; border-color:#fff; color:#fff;">FECHAR</button>
</div></div>

<div id="modalLogin" class="overlay"><div class="pop-content" style="background:white; color:black;">
    <h3 style="text-align:center;">LOGIN</h3>
    <input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;">
    <input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:15px;">
    <button onclick="fazerLogin()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold;">ENTRAR</button>
</div></div>

<div id="popMis" class="overlay"><div class="pop-content">
    <h3>DADOS MISSIONÁRIOS</h3>
    <div id="camposMis" style="display:flex; flex-direction:column; gap:10px;"></div>
    <button onclick="document.getElementById('popMis').style.display='none'; renderTodo();" style="width:100%; padding:15px; background:var(--green); border:none; border-radius:8px; margin-top:15px; font-weight:bold; color:black;">SALVAR</button>
</div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
        authDomain: "unidades-de-acao.firebaseapp.com",
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com",
        projectId: "unidades-de-acao",
        storageBucket: "unidades-de-acao.firebasestorage.app",
        messagingSenderId: "1088355029870",
        appId: "1:1088355029870:web:7bb98d3115e7b7767f677f"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_v105');

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    let db = { senhas:{admin:"iasd118"}, escalas:{}, mis:{}, docs:{} };
    let curUser = localStorage.getItem('iasd_user') || 'visitante';
    let myChart;

    dbRef.on('value', snap => { if(snap.val()) { db = snap.val(); renderTodo(); } });
    function save() { dbRef.set(db); }
    function sair() { localStorage.removeItem('iasd_user'); location.reload(); }
    function fazerLogin() {
        const u = document.getElementById('userLogin').value.toLowerCase().trim();
        const p = document.getElementById('passLogin').value;
        if (db.senhas[u] && db.senhas[u] === p) { localStorage.setItem('iasd_user', u); location.reload(); } else { alert("Senha incorreta"); }
    }

    function getTri(m) { return Math.floor(m / 3); }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const isLogado = curUser !== 'visitante';
        const isGestor = (curUser === 'admin' || curUser === 'ger');
        const tri = getTri(m);

        document.getElementById('btnSair').style.display = isLogado ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = !isLogado ? 'block' : 'none';
        document.getElementById('btnDados').style.display = (isGestor || curUser === 'pessoal') ? 'block' : 'none';
        document.getElementById('btnTesouro').style.display = isGestor ? 'block' : 'none';
        document.getElementById('adminPanel').style.display = isGestor ? 'block' : 'none';
        document.getElementById('areaRestrita').style.display = isLogado ? 'block' : 'none';
        
        document.getElementById('headerTitulo').innerText = "ESCALA - " + MESES[m];
        document.getElementById('mesMisTitulo').innerText = MESES[m];
        
        renderEscala(m); renderGrafico(m); renderDocs(tri);
    }

    function uploadDoc() {
        const m = parseInt(document.getElementById('selMes').value);
        const tri = getTri(m);
        if(!db.docs) db.docs = {}; if(!db.docs[tri]) db.docs[tri] = [];
        
        if(db.docs[tri].length >= 3) { alert("Limite de 3 arquivos por trimestre atingido!"); return; }

        const file = document.getElementById('fileIn').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            db.docs[tri].push({ n: file.name, d: e.target.result, t: file.type });
            save();
        }; reader.readAsDataURL(file);
    }

    function renderDocs(tri) {
        const grid = document.getElementById('gridPublicoDocs');
        const listAdmin = document.getElementById('listaAdminDocs');
        grid.innerHTML = ""; listAdmin.innerHTML = "";
        
        const arquivos = db.docs?.[tri] || [];
        arquivos.forEach((doc, i) => {
            // Galeria
            const content = doc.t.includes('pdf') ? `<div class="pdf-icon">📄</div>` : `<img src="${doc.d}">`;
            grid.innerHTML += `<div class="doc-card" onclick="verZoom('${doc.d}','${doc.t}')">${content}</div>`;
            
            // Lista Admin (para apagar)
            listAdmin.innerHTML += `<div style="display:flex; justify-content:space-between; padding:8px; background:#000; margin-bottom:5px; border-radius:5px; font-size:0.7rem;">
                <span>${doc.n.substring(0,20)}</span>
                <button onclick="db.docs[${tri}].splice(${i},1); save();" style="color:red; background:none; border:none; font-weight:bold;">APAGAR</button>
            </div>`;
        });
    }

    function verZoom(data, type) {
        const ov = document.getElementById('zoomOverlay');
        ov.innerHTML = type.includes('pdf') ? `<iframe src="${data}" style="width:90%; height:80vh;"></iframe>` : `<img src="${data}">`;
        ov.style.display = 'flex';
    }

    function renderEscala(mIdx) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        let cS=0, cD=0, cQ=0;
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d); let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                if(sem===6) cS++; if(sem===0) cD++; if(sem===3) cQ++;
                let dStr = `${d}/${mIdx+1}/2026`;
                let row = `<tr><td>${["DOM","","","QUA","","","SAB"][sem]}</td><td>${d}/${mIdx+1}</td>`;
                ["sa","pr","mu","lo","so","re","di"].forEach(col => {
                    let val = db.escalas?.[dStr]?.[col] || "";
                    let canEdit = (curUser === 'admin' || curUser === 'ger' || curUser === col);
                    row += `<td><input class="input-cell" style="width:100%; border:none; text-align:center;" ${!canEdit?'readonly':''} value="${val}" onchange="atu('${dStr}','${col}',this.value)"></td>`;
                });
                corpo.innerHTML += row + "</tr>";
            }
        }
    }

    function atu(d, c, v) { if(!db.escalas) db.escalas={}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function renderGrafico(m) {
        const ctx = document.getElementById('chartMis').getContext('2d');
        const d = db.mis?.[m] || {b:0, e:0, v:0, d:0};
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type:'bar', data: { labels:['Batismos','Estudos','Visitas','Duplas'], datasets:[{label:'Total', data:[d.b, d.e, d.v, d.d], backgroundColor:['#ffd700','#00d2ff','#2ecc71','#ff7f50']}] }, options:{ maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{y:{ticks:{color:'#fff'}}, x:{ticks:{color:'#fff'}}} } });
    }
    function abrirPopMis() {
        const m = document.getElementById('selMes').value; const d = db.mis?.[m] || {b:0, e:0, v:0, d:0};
        document.getElementById('camposMis').innerHTML = `Batismos: <input type="number" class="input-dark" value="${d.b}" onchange="atuMis(${m},'b',this.value)">Estudos: <input type="number" class="input-dark" value="${d.e}" onchange="atuMis(${m},'e',this.value)">Visitas: <input type="number" class="input-dark" value="${d.v}" onchange="atuMis(${m},'v',this.value)">Duplas: <input type="number" class="input-dark" value="${d.d}" onchange="atuMis(${m},'d',this.value)">`;
        document.getElementById('popMis').style.display='flex';
    }
    function atuMis(m,k,v) { if(!db.mis[m]) db.mis[m]={b:0,e:0,v:0,d:0}; db.mis[m][k]=parseInt(v); save(); }
    const sM = document.getElementById('selMes'); MESES.forEach((m,i)=>sM.innerHTML+=`<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script> </body> </html>
