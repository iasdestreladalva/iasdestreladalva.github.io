<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        /* Indicador de Salvamento */
        #saveIndicator { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); padding: 8px 25px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 20000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid white; }
        .saving { background: var(--orange); color: white; }
        .saved { background: var(--green); color: white; }

        /* Estilos de Interface */
        .btn-modern { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--neon); background: transparent; color: var(--neon); cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-modern:hover { background: var(--neon); color: var(--blue); }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.85rem; padding: 10px; border-radius: 6px; box-sizing: border-box; }

        /* Barra de Progresso de Batismos */
        .progress-container { background: #16213e; border-radius: 10px; height: 25px; width: 100%; margin-top: 10px; position: relative; overflow: hidden; border: 1px solid var(--gold); }
        .progress-bar { background: linear-gradient(90deg, var(--gold), #ffa500); height: 100%; transition: width 0.5s; width: 0%; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.8rem; font-weight: bold; line-height: 25px; color: white; text-shadow: 1px 1px 2px black; }

        /* Tabela e Conflitos */
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; border-radius: 12px 12px 0 0; overflow: hidden; }
        #tabela-main th { background: #f1f5f9; padding: 12px; border: 1px solid #cbd5e1; color: var(--blue); }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        .conflito { color: var(--red) !important; text-decoration: underline; font-weight: 900 !important; }

        /* Filtro de Busca */
        #buscaRapida { background: rgba(255,255,255,0.1); border: 1px solid var(--neon); color: white; padding: 8px 15px; border-radius: 20px; width: 250px; outline: none; }

        @media print { 
            .no-print, button, select, #buscaRapida, #saveIndicator { display: none !important; }
            body { background: white; color: black; }
            table#tabela-main { border: 2px solid black !important; }
            #headerTitulo { font-size: 2.5rem !important; color: black !important; }
            .row-ministerio { background-color: #f0f0f0 !important; }
        }
    </style>
</head>
<body>

<div id="saveIndicator"></div>

<div class="container">
    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <div>
            <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
            <input type="text" id="buscaRapida" placeholder="🔍 Buscar nome na escala..." oninput="renderTodo()">
        </div>
        
        <div style="display:flex; gap:8px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button id="btnAcesso" class="btn-modern" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button id="btnSair" class="btn-modern" style="border-color:var(--red); color:var(--red); display:none;" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="userWelcomeBar" class="no-print" style="margin-bottom:15px; text-align:right; font-size:0.9rem;"></div>

    <div id="adminPanel" class="admin-box no-print" style="display:none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px;">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
            <div class="admin-section">
                <h4 style="color:var(--gold)">META DE BATISMOS</h4>
                <input type="number" id="metaBatismos" class="input-dark" onchange="db.meta_anual=this.value; updateProgresso(); save();">
                <div class="progress-container">
                    <div id="progressoMeta" class="progress-bar"></div>
                    <div id="textoMeta" class="progress-text">0/0</div>
                </div>
            </div>
            <div class="admin-section">
                <h4 style="color:var(--neon)">SISTEMA</h4>
                <button class="btn-min" style="width:100%; margin-bottom:5px" onclick="gerarBackupNuvem()">💾 BACKUP NUVEM</button>
                <button class="btn-min" style="width:100%" onclick="abrirPopBackups()">📂 RESTAURAR</button>
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.8rem; padding:15px;" id="headerTitulo">ESCALA</th></tr>
            <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1.2rem; padding:0 15px 15px 15px;" id="headerAnciao">Ancião: </th></tr>
            <tr><th style="width:120px">DIA</th><th style="width:50px">DATA</th><th>SABATINA</th><th>PREGADOR(A)</th><th>MÚSICA</th><th>LOUVOR</th><th>SOM</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

</div>

<script>
    // [Configurações do Firebase permanecem as mesmas]
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    let db = {}; let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    // Monitoramento Real-time
    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); updateProgresso(); }
    });

    function save() {
        document.getElementById('saveIndicator').style.display = 'block';
        document.getElementById('saveIndicator').innerText = "Salvando...";
        document.getElementById('saveIndicator').className = "saving";
        
        dbCloud.collection('dados').doc('estrela_v102').set(db).then(() => {
            document.getElementById('saveIndicator').innerText = "✅ Salvo com sucesso!";
            document.getElementById('saveIndicator').className = "saved";
            setTimeout(() => document.getElementById('saveIndicator').style.display = 'none', 2000);
        });
    }

    // NOVA FUNÇÃO: Atualiza a barra de progresso de batismos
    function updateProgresso() {
        const meta = parseInt(db.meta_anual || 0);
        let totalBatismos = 0;
        Object.keys(db.mis_v3 || {}).forEach(mes => {
            totalBatismos += parseInt(db.mis_v3[mes][5] || 0);
        });
        
        const perc = meta > 0 ? Math.min((totalBatismos / meta) * 100, 100) : 0;
        document.getElementById('progressoMeta').style.width = perc + "%";
        document.getElementById('textoMeta').innerText = `${totalBatismos} de ${meta} Batismos`;
    }

    // NOVA FUNÇÃO: Verifica se a pessoa está em mais de uma coluna no mesmo dia
    function checarConflito(dStr, valor) {
        if(!valor || valor.length < 3) return false;
        let contagem = 0;
        const dia = db.escalas?.[dStr] || {};
        Object.values(dia).forEach(v => { if(v === valor) contagem++; });
        return contagem > 1;
    }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const busca = document.getElementById('buscaRapida').value.toUpperCase();
        
        document.getElementById('headerAnciao').innerText = `Ancião Responsável: ${db.anciaos?.[mIdx] || 'Não definido'}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        const corpo = document.getElementById('corpoEscala');
        corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            let idEv = db.eventos_especiais?.[dt.toISOString().split('T')[0]];
            let minDia = db.regras_manuais?.[dStr];

            // Filtro de Busca Inteligente
            let valoresDia = Object.values(db.escalas?.[dStr] || {}).join(" ");
            if(busca && !valoresDia.includes(busca)) continue;

            if([0,3,6].includes(sem) || idEv) {
                let tr = `<tr class="${minDia?'row-ministerio':''}">
                    <td><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b></td>
                    <td>${d}/${mIdx+1}</td>`;
                
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let val = db.escalas?.[dStr]?.[col] || '';
                    let isConflito = checarConflito(dStr, val);
                    
                    tr += `<td><textarea class="auto-expand ${isConflito?'conflito':''}" 
                        onchange="atuCel('${dStr}','${col}',this.value)"
                        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${val}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function atuCel(d, c, v) {
        if(!db.escalas[d]) db.escalas[d] = {};
        db.escalas[d][c] = v.toUpperCase().trim();
        save();
        renderTodo(); // Re-renderiza para mostrar o alerta de conflito se houver
    }

    // Inicialização do seletor
    const sM = document.getElementById('selMes'); 
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
