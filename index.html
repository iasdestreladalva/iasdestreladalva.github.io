<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v225 Fix</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #070a0f; --card-bg: #0f172a; --neon-blue: #38bdf8; --text-main: #f1f5f9; --border: #1e293b; }
        body { background: var(--bg-dark); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1400px; margin: auto; }

        /* CORES DAS LINHAS - APLICADAS VIA CLASSE NO TR */
        tr.pessoal td { background-color: #e0f2fe !important; } 
        tr.pessoal td:first-child { border-left: 10px solid #0ea5e9 !important; }
        
        tr.mordomia td { background-color: #fef3c7 !important; } 
        tr.mordomia td:first-child { border-left: 10px solid #f59e0b !important; }
        
        tr.divino td { background-color: #d1fae5 !important; } 
        tr.divino td:first-child { border-left: 10px solid #10b981 !important; }
        
        tr.jovens td { background-color: #ede9fe !important; } 
        tr.jovens td:first-child { border-left: 10px solid #8b5cf6 !important; }
        
        tr.mulher td { background-color: #fce7f3 !important; } 
        tr.mulher td:first-child { border-left: 10px solid #ec4899 !important; }
        
        tr.anciao td { background-color: #f1f5f9 !important; } 
        tr.anciao td:first-child { border-left: 10px solid #94a3b8 !important; }
        
        tr.infantil td { background-color: #fffbeb !important; } 
        tr.infantil td:first-child { border-left: 10px solid #fbbf24 !important; }
        
        tr.familia td { background-color: #fee2e2 !important; } 
        tr.familia td:first-child { border-left: 10px solid #f87171 !important; }

        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
        .admin-panel { display: none; background: var(--card-bg); border: 1px solid var(--neon-blue); padding: 15px; border-radius: 8px; margin: 10px 0; }
        
        .btn { padding: 8px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: rgba(255,255,255,0.05); color: white; display: flex; align-items: center; width: 100%; margin-bottom: 4px; font-size: 0.75rem; }
        .btn.active { background: var(--neon-blue) !important; color: black !important; font-weight: bold; }
        .led { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }

        .table-container { background: white; border-radius: 8px; overflow: hidden; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; color: black; }
        th { background: #002b5c; color: white; padding: 10px; font-size: 0.7rem; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; height: 50px; text-align: center; font-size: 0.8rem; }
        
        .clickable { cursor: pointer; font-weight: bold; }
        .input-cell { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; text-transform: uppercase; background: transparent; color: black; }
        
        .modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:100; align-items:center; justify-content:center; }
        .modal-box { background: var(--card-bg); padding: 20px; border-radius: 8px; width: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h3 style="color: var(--neon-blue); margin:0;">IASD ESTRELA DALVA</h3>
        <div style="display: flex; gap: 8px;">
            <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid var(--neon-blue); padding:5px;"></select>
            <button class="btn" onclick="document.getElementById('modalLogin').style.display='flex'" style="width:auto; margin:0">🔓 LOGIN</button>
            <button id="btnSair" class="btn" onclick="sair()" style="display:none; width:auto; margin:0; color:red">SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-panel">
        <div style="display: grid; grid-template-columns: 250px 1fr; gap: 20px;">
            <div id="listaPinceis">
                <p style="font-size:0.7rem; color:#64748b; margin-top:0">SELECIONE E CLIQUE NA TABELA:</p>
                <button class="btn" onclick="selPincel('anciao','ANCIÃO')"><div class="led" style="background:#94a3b8"></div> ANCIÃO</button>
                <button class="btn" onclick="selPincel('pessoal','M. PESSOAL')"><div class="led" style="background:#0ea5e9"></div> M. PESSOAL</button>
                <button class="btn" onclick="selPincel('mordomia','MORDOMIA')"><div class="led" style="background:#f59e0b"></div> MORDOMIA</button>
                <button class="btn" onclick="selPincel('jovens','JOVENS')"><div class="led" style="background:#8b5cf6"></div> JOVENS</button>
                <button class="btn" onclick="selPincel('mulher','M. MULHER')"><div class="led" style="background:#ec4899"></div> M. MULHER</button>
                <button class="btn" onclick="selPincel('infantil','M. INFANTIL')"><div class="led" style="background:#fbbf24"></div> M. INFANTIL</button>
                <button class="btn" onclick="selPincel('familia','FAMÍLIA')"><div class="led" style="background:#f87171"></div> FAMÍLIA</button>
                <button class="btn" onclick="selPincel('','')">❌ LIMPAR PINCEL</button>
            </div>
            <div id="listaAnciaosAno" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;"></div>
        </div>
    </div>

    <div class="table-container">
        <div style="background: #002b5c; color: white; padding: 10px; display: flex; justify-content: space-between; font-size: 0.8rem;">
            <span id="txtMesAno" style="font-weight: bold;"></span>
            <span id="txtAnciaoMes" style="color: #ffd700; font-weight: bold;"></span>
        </div>
        <table>
            <thead>
                <tr>
                    <th style="width: 120px;">DIA</th><th style="width: 70px;">DATA</th>
                    <th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th>
                </tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>
</div>

<div id="modalLogin" class="modal">
    <div class="modal-box">
        <input type="text" id="uLog" placeholder="Usuário" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="password" id="pLog" placeholder="Senha" style="width:100%; padding:8px;">
        <button class="btn" style="margin-top:15px; background:var(--neon-blue); color:black; justify-content:center;" onclick="execLogin()">ENTRAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com",
        projectId: "unidades-de-acao",
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v225');

    let db = { senhas:{admin:"iasd118"}, escalas:{}, cores:{}, anciaos:{} };
    let curUser = localStorage.getItem('iasd_user') || 'visitante';
    let pID = null; let pNome = "";
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    dbRef.on('value', snap => { if(snap.val()) db = snap.val(); renderTodo(); });

    function execLogin() {
        const u = document.getElementById('uLog').value.toLowerCase().trim();
        const p = document.getElementById('pLog').value;
        if(u === 'admin' && p === 'iasd118') { localStorage.setItem('iasd_user', u); location.reload(); }
        else alert("Acesso negado");
    }
    function sair() { localStorage.removeItem('iasd_user'); location.reload(); }

    function selPincel(id, nome) {
        pID = id; pNome = nome;
        document.querySelectorAll('#listaPinceis .btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function pintar(dStr) {
        if(curUser === 'admin' && pID !== null) {
            if(!db.cores) db.cores = {};
            if(pID === "") delete db.cores[dStr];
            else db.cores[dStr] = { id: pID, nome: pNome };
            dbRef.child('cores').set(db.cores);
        }
    }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('adminPanel').style.display = (curUser === 'admin') ? 'block' : 'none';
        document.getElementById('btnSair').style.display = (curUser !== 'visitante') ? 'block' : 'none';
        document.getElementById('txtMesAno').innerText = meses[m] + " / 2026";
        document.getElementById('txtAnciaoMes').innerText = "ANCIÃO: " + (db.anciaos?.[m] || "---");

        let hAnciao = "";
        meses.forEach((n, i) => {
            hAnciao += `<div style="font-size:0.6rem;">${n}<input style="width:100%;" value="${db.anciaos?.[i]||''}" onchange="if(!db.anciaos)db.anciaos={}; db.anciaos[${i}]=this.value.toUpperCase(); dbRef.child('anciaos').set(db.anciaos)"></div>`;
        });
        document.getElementById('listaAnciaosAno').innerHTML = hAnciao;

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, m, d);
            let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}/${m+1}/2026`;
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr');
                if(c.id) tr.className = c.id; // Aqui aplica a cor do CSS
                
                tr.innerHTML = `
                    <td class="clickable" onclick="pintar('${dStr}')">
                        <div style="font-size:0.65rem; color:#64748b">${["DOMINGO","","","QUARTA","","","SÁBADO"][sem]}</div>
                        <div style="font-size:0.6rem; color:#002b5c; font-weight:bold">${c.nome}</div>
                    </td>
                    <td class="clickable" onclick="pintar('${dStr}')">${d}/${m+1}</td>
                    ${["sa","pr","mu","lo","so","re","di"].map(colId => {
                        return `<td><input class="input-cell" value="${db.escalas?.[dStr]?.[colId] || ''}" onchange="atu('${dStr}','${colId}',this.value)"></td>`;
                    }).join('')}
                `;
                corpo.appendChild(tr);
            }
        }
    }

    function atu(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
