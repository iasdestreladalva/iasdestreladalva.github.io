<!DOCTYPE html> <html lang="pt-br"> <head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IASD Estrela Dalva - GESTÃO</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top:10px; }
        .table-wrap { width: 100%; overflow-x: auto; background: white; border-radius: 8px; margin-top:10px; }
        table { width: 100%; border-collapse: collapse; color: black; min-width: 900px; font-size: 0.8rem; }
        
        /* CORES DE DESTAQUE DETERMINADAS */
        .row-pessoal td { background-color: #e0f2fe !important; }
        .row-mordomia td { background-color: #ffedd5 !important; }
        .row-divino td { background-color: #fef3c7 !important; }
        .row-jovens td { background-color: #f3e8ff !important; }
        .row-mulher td { background-color: #fce7f3 !important; }

        td { border: 1px solid #cbd5e1; text-align: center; height: 55px; padding: 0; }
        .dia-box { display: flex; flex-direction: column; line-height: 1.2; }
        .dia-txt { font-weight: 800; font-size: 0.85rem; color: #1e293b; }
        .min-txt { font-size: 0.55rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-top: 2px; }
        
        .input-cell { width: 100%; height: 55px; border: none; background: transparent; text-align: center; font-weight: bold; font-size: 0.8rem; color: #000; text-transform: uppercase; }
        .btn-min { display: block; width: 100%; padding: 10px; background: none; border: 1px solid var(--neon); color: var(--neon); border-radius: 6px; font-weight: bold; cursor: pointer; margin-bottom: 5px; font-size: 0.7rem; }
        .btn-active { background: var(--neon); color: #000; box-shadow: 0 0 10px var(--neon); }

        .admin-painter { display: none; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 2px solid var(--orange); margin: 15px 0; }
        .clickable-row { cursor: crosshair; }
    </style> </head> <body>

<h2 style="color:var(--neon); text-align: center; margin:0;">IASD ESTRELA DALVA</h2>

<div id="painterPanel" class="admin-painter">
    <h4 style="margin:0 0 10px 0; color:var(--orange); text-align:center;">🎨 DETERMINAR MINISTÉRIO DO DIA</h4>
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px;">
        <button class="btn-min" id="btn-pessoal" onclick="selPincel('pessoal', 'Min. Pessoal')">M. PESSOAL</button>
        <button class="btn-min" id="btn-mordomia" onclick="selPincel('mordomia', 'Mordomia')">MORDOMIA</button>
        <button class="btn-min" id="btn-divino" onclick="selPincel('divino', 'Culto Divino')">C. DIVINO</button>
        <button class="btn-min" id="btn-jovens" onclick="selPincel('jovens', 'JA / Jovens')">JOVENS</button>
        <button class="btn-min" id="btn-mulher" onclick="selPincel('mulher', 'M. Mulher')">MULHER</button>
        <button class="btn-min" style="border-color:#fff; color:#fff;" onclick="selPincel('', '')">BRANCO (LIMPAR)</button>
    </div>
</div>

<div class="nav-buttons">
    <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; padding:10px; border-radius:6px;"></select>
    <button id="btnAcesso" class="btn-min" style="margin:0" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 LOGIN</button>
    <button id="btnSair" class="btn-min" style="margin:0; border-color:red; color:red; display:none;" onclick="sair()">SAIR</button>
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr><th colspan="9" id="headerTitulo" style="background:var(--blue); color:white; padding:12px;">ESCALA</th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="modalLogin" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; padding:15px;">
    <div style="background:white; color:black; padding:20px; border-radius:15px; width:100%; max-width:400px;">
        <h3 style="text-align:center;">LOGIN</h3>
        <input type="text" id="userLogin" placeholder="Usuário" style="width:100%; padding:10px; margin-bottom:10px; box-sizing:border-box;">
        <input type="password" id="passLogin" placeholder="Senha" style="width:100%; padding:10px; margin-bottom:15px; box-sizing:border-box;">
        <button onclick="fazerLogin()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold;">ENTRAR</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
        authDomain: "unidades-de-acao.firebaseapp.com",
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com",
        projectId: "unidades-de-acao",
        storageBucket: "unidades-de-acao.firebasestorage.app",
        messagingSenderId: "1088355029870",
        appId: "1:1088355029870:web:7bb98d3115e7b7767f677f"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_v110');

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    let db = { senhas:{admin:"iasd118"}, escalas:{}, cores:{} };
    let curUser = localStorage.getItem('iasd_user') || 'visitante';
    let pincelAtivo = null;
    let nomePincel = "";

    dbRef.on('value', snap => { if(snap.val()) { db = snap.val(); renderTodo(); } });

    function save() { dbRef.set(db); }
    function sair() { localStorage.removeItem('iasd_user'); location.reload(); }
    function fazerLogin() {
        const u = document.getElementById('userLogin').value.toLowerCase().trim();
        const p = document.getElementById('passLogin').value;
        if (db.senhas[u] && db.senhas[u] === p) { localStorage.setItem('iasd_user', u); location.reload(); } else { alert("Senha incorreta"); }
    }

    function selPincel(id, nome) {
        pincelAtivo = id;
        nomePincel = nome;
        document.querySelectorAll('.btn-min').forEach(b => b.classList.remove('btn-active'));
        if(id) document.getElementById('btn-'+id).classList.add('btn-active');
    }

    function pintarLinha(data) {
        if((curUser === 'admin' || curUser === 'ger') && pincelAtivo !== null) {
            if(!db.cores) db.cores = {};
            if(pincelAtivo === "") delete db.cores[data];
            else db.cores[data] = { id: pincelAtivo, nome: nomePincel };
            save();
        }
    }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const isGestor = (curUser === 'admin' || curUser === 'ger');
        
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = curUser === 'visitante' ? 'block' : 'none';
        document.getElementById('painterPanel').style.display = isGestor ? 'block' : 'none';
        
        document.getElementById('headerTitulo').innerText = "ESCALA - " + MESES[m] + " 2026";
        renderEscala(m);
    }

    function renderEscala(mIdx) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        const diasSemana = ["DOM", "SEG", "TER", "QUA", "QUI", "SEX", "SÁB"];
        const isGestor = (curUser === 'admin' || curUser === 'ger');

        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d); 
            let sem = dt.getDay();
            
            if([0,3,6].includes(sem)) {
                let dStr = `${d}/${mIdx+1}/2026`;
                let corInfo = db.cores?.[dStr] || { id: "", nome: "" };
                let classeRow = corInfo.id ? "row-" + corInfo.id : "";

                let row = `<tr class="${classeRow} ${isGestor?'clickable-row':''}" onclick="pintarLinha('${dStr}')">
                    <td><div class="dia-box"><span class="dia-txt" style="color:${corInfo.id?'#000':'#1e293b'}">${diasSemana[sem]}</span><span class="min-txt">${corInfo.nome}</span></div></td>
                    <td><div class="dia-txt" style="color:${corInfo.id?'#000':'#1e293b'}">${d}/${mIdx+1}</div></td>`;

                const colunas = [
                    {id:"sa", p:"sabatina"}, {id:"pr", p:"pregador"}, {id:"mu", p:"musica"}, 
                    {id:"lo", p:"louvor"}, {id:"so", p:"som"}, {id:"re", p:"recepcao"}, {id:"di", p:"diaconato"}
                ];

                colunas.forEach(col => {
                    let val = db.escalas?.[dStr]?.[col.id] || "";
                    // Permissão: Admin/Ger ou o próprio ministério na sua coluna
                    let canEdit = (isGestor || curUser === col.p || (curUser === 'sonoplastia' && col.id === 'so'));
                    row += `<td><input class="input-cell" ${!canEdit?'readonly':''} value="${val}" onchange="atu('${dStr}','${col.id}',this.value)"></td>`;
                });
                corpo.innerHTML += row + "</tr>";
            }
        }
    }

    function atu(d, c, v) { if(!db.escalas) db.escalas={}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }

    const sM = document.getElementById('selMes');
    if(sM.innerHTML === "") {
        MESES.forEach((m,i)=>sM.innerHTML+=`<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    }
    window.onload = renderTodo;
</script> </body> </html>
