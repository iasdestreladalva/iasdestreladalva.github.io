<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - SISTEMA COMPLETO</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --pink: #fd79a8; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1450px; margin: auto; }
        
        /* ADMIN BOX */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 220px 1fr 2.5fr; gap: 20px; }
        
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; padding: 8px; border-radius: 4px; box-sizing: border-box; margin-bottom: 5px; }
        .btn-min { display: block; width: 100%; padding: 10px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; text-align: center; text-decoration: none; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }

        /* TABELA E CORES */
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; border-radius: 8px; overflow: hidden; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 55px; }
        
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; } .row-homens { background-color: #ecfeff !important; }
        .row-familia { background-color: #faf5ff !important; } .row-mulher { background-color: #fdf2f8 !important; }
        .row-musica { background-color: #fff1f2 !important; }

        /* GRIDS */
        .grid-arquivos { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .thumb-card { background: #000; height: 110px; border: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; border-radius: 8px; overflow: hidden; }
        .thumb-card .label { position: absolute; bottom: 0; background: rgba(0,0,0,0.8); width: 100%; font-size: 0.6rem; text-align: center; padding: 4px; }

        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:500px; max-height: 80vh; overflow-y: auto; }
        #zoomOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px; flex-wrap: wrap;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="width:auto; color:var(--green); border-color:var(--green); display:none;" id="btnFin" onclick="abrirPop('popTesouraria')">💰 FINANCEIRO</button>
            <button class="input-dark" style="width:auto; color:var(--pink); border-color:var(--pink); display:none;" id="btnMus" onclick="abrirPop('popMusica')">🎵 MÚSICA</button>
            <button class="input-dark" style="width:auto; color:var(--orange); border-color:var(--orange); display:none;" id="btnMis" onclick="abrirPopMissionario()">📊 MISSÃO</button>
            <button class="input-dark" style="width:auto; border-color:var(--neon); color:var(--neon);" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>
        <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid">
            <div style="border-right:1px solid #334155; padding-right:10px;">
                <h4 style="color:var(--neon); margin-top:0;">1. ESCALA COLORIDA</h4>
                <div id="listaMinisterios"></div>
                <button class="btn-min" style="border-color:red; color:red; margin-top:10px;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR COR</button>
            </div>
            <div>
                <h4 style="color:var(--neon); margin-top:0;">2. ANCIÃO DO MÊS</h4>
                <input id="inAnciao" class="input-dark" placeholder="Nome do Ancião" onchange="salvarAnciao(this.value)">
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" id="headerTitulo" style="background:var(--blue); color:white; font-size:1.2rem; padding:10px;">ESCALA</th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div id="displayArquivos" style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-top:20px;" class="no-print">
        <div id="boxFin" style="display:none; border:1px solid var(--green); padding:10px; border-radius:8px;">
            <h4 style="color:var(--green); margin:0;">💰 COMPROVANTES</h4>
            <div id="gridFin" class="grid-arquivos"></div>
        </div>
        <div id="boxMus" style="display:none; border:1px solid var(--pink); padding:10px; border-radius:8px;">
            <h4 style="color:var(--pink); margin:0;">🎵 MÚSICAS / VÍDEOS</h4>
            <div id="gridMus" class="grid-arquivos"></div>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:20px; margin-top:20px;">
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; border:1px solid var(--gold);">
            <h4 style="color:var(--gold); margin-top:0;">📅 PLANEAMENTO ANUAL</h4>
            <div id="gridPlanejamento" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
        </div>
        <div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; border:1px solid var(--orange);">
            <h4 style="color:var(--orange); margin-top:0;">📊 MISSIONÁRIO</h4>
            <div style="height:200px;"><canvas id="chartMis"></canvas></div>
        </div>
    </div>
</div>

<div id="popTesouraria" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--green);">UPLOAD FINANCEIRO</h3><input type="file" id="inFin" class="input-dark" onchange="upload('financeiro', 'inFin')"></div></div>
<div id="popMusica" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--pink);">UPLOAD MÚSICA/VÍDEO</h3><input type="file" id="inMus" class="input-dark" accept="audio/*,video/*" onchange="upload('musica', 'inMus')"></div></div>
<div id="popMissionario" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3>DADOS MISSIONÁRIOS</h3><div id="camposMis"></div></div></div>
<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div class="pop-content" style="background:white; width:250px;" onclick="event.stopPropagation()"><input id="u" placeholder="Usuário" class="input-dark" style="color:black!important;"><input id="p" type="password" placeholder="Senha" class="input-dark" style="color:black!important;"><button class="btn-min" style="background:var(--blue); color:white; border:none;" onclick="login()">ENTRAR</button></div></div>
<div id="zoomOverlay"><div id="viewerContent" style="width:90%; height:70%; display:flex; justify-content:center; align-items:center;"></div><div id="viewerActions" style="margin-top:20px;"><button class="btn-min" style="color:white; border-color:white;" onclick="document.getElementById('zoomOverlay').style.display='none'">FECHAR</button></div></div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
      authDomain: "unidades-de-acao.firebaseapp.com",
      projectId: "unidades-de-acao",
      storageBucket: "unidades-de-acao.firebasestorage.app",
      messagingSenderId: "1088355029870",
      appId: "1:1088355029870:web:7bb98d3115e7b7767f677f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(), storage = firebase.storage();
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { pessoal:"M. Pessoal", mordomia:"Mordomia", saude:"Saúde", homens:"Homens", familia:"Família", mulher:"Mulher", musica:"Música" };
    
    let dbLocal = JSON.parse(localStorage.getItem('iasd_v105')) || { escalas:{}, cores:{}, anciaos:{}, missao:{}, plano:{} };
    let curUser = localStorage.getItem('iasd_user') || 'visitante';
    let chart;

    function save() { localStorage.setItem('iasd_v105', JSON.stringify(dbLocal)); }

    function renderTodo() {
        const m = document.getElementById('selMes').value;
        const isAdm = (curUser === 'admin'), isMus = (isAdm || curUser === 'musica');
        
        document.getElementById('adminPanel').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnFin').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnMus').style.display = isMus ? 'block' : 'none';
        document.getElementById('btnMis').style.display = (isAdm || curUser === 'pessoal') ? 'block' : 'none';
        document.getElementById('boxFin').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('boxMus').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = curUser === 'visitante' ? 'block' : 'none';

        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[m]} 2026 | Ancião: ${dbLocal.anciaos[m] || '---'}`;
        
        renderEscala(m); renderAdmin(); renderPlanejamento(); updateChart(m);
        renderGrid(m, 'financeiro', 'gridFin'); renderGrid(m, 'musica', 'gridMus');
    }

    function renderEscala(m) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, parseInt(m)+1, 0).getDate();
        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, m, d), sem = dt.getDay(), dStr = `${d}/${parseInt(m)+1}`;
            if([0,3,6].includes(sem)) {
                let cor = dbLocal.cores[dStr] || "";
                let tr = `<tr class="row-${cor}"><td onclick="setCor('${dStr}')" style="cursor:pointer"><b>${["DOM","SEG","TER","QUA","QUI","SEX","SÁB"][sem]}</b><br><small>${MINS[cor]||''}</small></td><td>${dStr}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(c => {
                    let edit = (curUser === 'admin' || (curUser === cor && c === 'pr'));
                    tr += `<td><input ${edit?'':'disabled'} value="${dbLocal.escalas[dStr]?.[c]||''}" onchange="atu('${dStr}','${c}',this.value)" style="width:100%; border:none; background:transparent; text-align:center; text-transform:uppercase;"></td>`;
                }); corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function atu(d, c, v) { if(!dbLocal.escalas[d]) dbLocal.escalas[d]={}; dbLocal.escalas[d][c]=v.toUpperCase(); save(); }
    function setCor(d) { if(curUser==='admin') { dbLocal.cores[d] = window.minSelecionado; if(!window.minSelecionado) delete dbLocal.cores[d]; save(); renderTodo(); } }
    function salvarAnciao(v) { dbLocal.anciaos[document.getElementById('selMes').value] = v; save(); renderTodo(); }

    async function upload(pasta, id) {
        const f = document.getElementById(id).files[0]; if(!f) return;
        const m = document.getElementById('selMes').value;
        const ref = storage.ref(`iasd/${pasta}/${m}/${f.name}`);
        try {
            alert("Enviando para o Cloud...");
            const snap = await ref.put(f);
            const url = await snap.ref.getDownloadURL();
            await db.collection(pasta).add({ nome: f.name, url: url, tipo: f.type, mes: m });
            alert("Sucesso!"); renderTodo();
        } catch(e) { alert("Erro de permissão no Firebase."); }
    }

    async function renderGrid(m, pasta, gridId) {
        const grid = document.getElementById(gridId); grid.innerHTML = "";
        const snap = await db.collection(pasta).where("mes", "==", m).get();
        snap.forEach(doc => {
            const d = doc.data();
            const card = document.createElement('div'); card.className = 'thumb-card';
            card.innerHTML = `<div style="font-size:1.5rem">${d.tipo.includes('video')?'🎬':(d.tipo.includes('image')?'🖼️':'🎵')}</div><div class="label">${d.nome}</div>`;
            card.onclick = () => abrirViewer(d); grid.appendChild(card);
        });
    }

    function abrirViewer(arq) {
        const c = document.getElementById('viewerContent'); c.innerHTML = "";
        if(arq.tipo.includes('video')) c.innerHTML = `<video controls autoplay style="max-width:100%;"><source src="${arq.url}"></video>`;
        else if(arq.tipo.includes('audio')) c.innerHTML = `<audio controls autoplay><source src="${arq.url}"></audio>`;
        else c.innerHTML = `<img src="${arq.url}" style="max-height:100%;">`;
        const act = document.getElementById('viewerActions');
        const old = document.getElementById('btnDl'); if(old) old.remove();
        const b = document.createElement('a'); b.id = 'btnDl'; b.href = arq.url; b.target = "_blank"; b.className = "btn-min"; b.style="background:var(--green); color:white; border:none; width:150px;"; b.innerText="BAIXAR";
        act.appendChild(b); document.getElementById('zoomOverlay').style.display='flex';
    }

    function renderAdmin() {
        const l = document.getElementById('listaMinisterios'); l.innerHTML = "";
        Object.keys(MINS).forEach(k => l.innerHTML += `<button class="btn-min ${window.minSelecionado===k?'active':''}" onclick="window.minSelecionado='${k}'; renderAdmin();">${MINS[k]}</button>`);
        document.getElementById('inAnciao').value = dbLocal.anciaos[document.getElementById('selMes').value] || "";
    }

    function renderPlanejamento() {
        const g = document.getElementById('gridPlanejamento'); g.innerHTML = "";
        MESES.forEach((m, i) => g.innerHTML += `<div><small>${m}</small><textarea class="input-dark" onchange="dbLocal.plano[${i}]=this.value; save();">${dbLocal.plano[i]||''}</textarea></div>`);
    }

    function updateChart(m) {
        if(chart) chart.destroy();
        const d = dbLocal.missao[m] || [0,0,0,0,0];
        chart = new Chart(document.getElementById('chartMis'), { type:'bar', data:{ labels:['Enc','Cla','Est','Min','Dup'], datasets:[{ data:d, backgroundColor:['#00d2ff','#ffd700','#ff7f50','#2ecc71','#ff4757'] }] }, options:{ maintainAspectRatio:false, plugins:{legend:{display:false}} } });
    }

    function abrirPopMissionario() {
        const m = document.getElementById('selMes').value, c = document.getElementById('camposMis'); c.innerHTML = "";
        ['Encontros','Classes','Estudos','Ministrantes','Duplas'].forEach((l, i) => {
            c.innerHTML += `<label>${l}</label><input type="number" class="input-dark" value="${(dbLocal.missao[m]||[0,0,0,0,0])[i]}" onchange="if(!dbLocal.missao[${m}])dbLocal.missao[${m}]=[0,0,0,0,0]; dbLocal.missao[${m}][${i}]=this.value; save(); updateChart(${m});">`;
        }); document.getElementById('popMissionario').style.display='flex';
    }

    function login() {
        const user = document.getElementById('u').value.toLowerCase(), pass = document.getElementById('p').value;
        if((user==='admin' && pass==='iasd118') || (user==='musica' && pass==='mus123') || (user==='pessoal' && pass==='mis123')) {
            localStorage.setItem('iasd_user', user); location.reload();
        } else alert("Acesso Negado!");
    }
    function sair() { localStorage.removeItem('iasd_user'); location.reload(); }
    function abrirPop(id) { document.getElementById(id).style.display='flex'; }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script>
</body>
</html>
