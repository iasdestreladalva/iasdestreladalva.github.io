<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        #userWelcomeBar { display: none; background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon); padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95rem; color: #fff; text-align: center; }
        
        /* Ajuste do Painel Admin para expansão total sem rolagem */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 2fr 1.2fr; gap: 15px; align-items: start; } 
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; height: auto; overflow: visible; }
        
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }
        
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; }
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 0.85rem; display: block; padding: 5px 0; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 90vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }
        .row-especial { background-color: #fff4e6 !important; border-left: 5px solid var(--orange) !important; }
        .plan-table { width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid #334155; border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.02); }
        .plan-table td { padding: 15px; border-bottom: 1px solid #334155; font-size: 0.95rem; vertical-align: top; }
        .plan-month-col { background: rgba(0, 210, 255, 0.05); color: var(--gold); font-weight: bold; text-align: center; width: 140px; text-transform: uppercase; }
        .plan-text-area { width: 100%; background: transparent !important; color: #e6f1ff !important; border: none !important; resize: none; overflow: hidden; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div id="userWelcomeBar"></div>

    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="border-color:var(--gold); color:var(--gold); width:auto; padding:0 15px;" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button id="btnLinks" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon); display:none;" onclick="abrirPopLinks()">🔗 LINKS</button>
            <button id="btnEventos" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--red); color:var(--red); display:none;" onclick="abrirPopEventos()">🔥 EVENTOS</button>
            <button id="btnTesourariaAdmin" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--green); color:var(--green); display:none;" onclick="abrirTesourariaAdmin()">⚙️ DOCS</button>
            <button id="btnDados" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--orange); color:var(--orange); display:none;" onclick="abrirPop()">📊 DADOS</button>
            <button class="input-dark" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid">
            <div class="admin-section">
                <h4 style="margin-top:0">1. MINISTÉRIO</h4>
                <div id="listaMinisterios"></div>
                <button class="btn-min" style="border-color:red; color:red; margin-top:10px;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR</button>
            </div>
            <div class="admin-section">
                <h4 style="margin-top:0">2. ANCIÃO DO MÊS</h4>
                <div id="gridMeses" style="display:grid; grid-template-columns: 1fr; gap:5px;"></div>
            </div>
            <div class="admin-section">
                <h4 style="margin-top:0">3. LOGINS & SENHAS</h4>
                <table style="width:100%; font-size:0.75rem; color:white; border-collapse: collapse;">
                    <tbody id="corpoCreds"></tbody>
                </table>
            </div>
            <div class="admin-section">
                <h4 style="margin-top:0">4. APOIO ANCIÃO</h4>
                <div id="gridApoioAnciao"></div>
                <hr style="border:0; border-top:1px solid #334155; margin: 15px 0;">
                <h4 style="color:var(--gold); margin-top:0">5. SISTEMA</h4>
                <button class="btn-min" onclick="exportarBackup()" style="border-color:var(--gold); color:var(--gold)">💾 GERAR BACKUP</button>
                <input type="file" id="fileImport" style="display:none" onchange="importarBackup(event)">
                <button class="btn-min" onclick="document.getElementById('fileImport').click()" style="border-color:var(--green); color:var(--green)">📤 RESTAURAR</button>
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;" id="headerTitulo">ESCALA</th></tr>
            <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1rem; padding:0 12px 12px 12px; text-align:left;" id="headerAnciao">Responsável: </th></tr>
            <tr><th style="width:150px">DIA</th><th style="width:60px">DATA</th><th>ESCOLA SABATINA</th><th>PREGADOR</th><th>MÚSICA ESPECIAL</th><th>LOUVOR CONGREGACIONAL</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div id="secPlan" style="margin-top:40px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #334155;">
        <h3 style="color:var(--gold); margin-bottom: 20px;">🗓️ PLANEJAMENTO ANUAL 2026</h3>
        <table class="plan-table"><tbody id="corpoPlan"></tbody></table>
    </div>
</div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;"><button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button></div></div>
<div id="popEventos" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--red); text-align:center;">EVENTOS</h3><input type="text" id="evtNome" class="input-dark" placeholder="Título"><div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;"><input type="date" id="evtInicio" class="input-dark"><input type="date" id="evtFim" class="input-dark"></div><button class="btn-min" style="background:var(--red); color:white; border:none; margin-top:15px;" onclick="salvarEventoEspecial()">CRIAR EVENTO</button><div id="listaEventosAtivos" style="margin-top:15px;"></div><button onclick="document.getElementById('popEventos').style.display='none'" class="btn-fechar">FECHAR</button></div></div>
<div id="popLinks" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--neon); text-align:center;">POSTAR LINKS</h3><input type="text" id="linkTit" class="input-dark" placeholder="Título"><input type="text" id="linkUrl" class="input-dark" placeholder="URL (https://...)" style="margin-top:10px;"><button class="btn-min" style="background:var(--neon); color:var(--blue); border:none; margin-top:15px;" onclick="salvarLink()">POSTAR</button><div id="listaLinksAtivos" style="margin-top:15px;"></div><button onclick="document.getElementById('popLinks').style.display='none'" class="btn-fechar">FECHAR</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", pastor: "Pastor", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes", aventureiros: "Aventureiros", desbravadores: "Desbravadores", jovem: "M. Jovem" };
    const LISTA_ANCIAOS = ["Wesley", "Jesuino", "Ester", "Marcilio", "Albert", "Manoel"]; 
    let db = {}; let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); } 
        else { db = { senhas:{admin:'123456'}, anciaos:{}, apoio_anciao:{}, eventos_especiais:{}, docs:{}, escalas:{}, mis_v3:{}, regras_manuais:{}, plan_anual:{}, links_externos:[] }; save(); }
    });

    function save() { dbCloud.collection('dados').doc('estrela_v102').set(db); }

    function login() { 
        const u = document.getElementById('userLogin').value.toLowerCase().trim(), p = document.getElementById('passLogin').value;
        const senhaDb = (db.senhas && db.senhas[u]) ? db.senhas[u] : (u === 'admin' ? '123456' : null);
        if(senhaDb === p) { localStorage.setItem('iasd_curUser', u); location.reload(); } else alert("Erro!");
    }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerAnciao').innerText = `Ancião Responsável: ${db.anciaos?.[mIdx] || ''}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        const isV = curUser === 'visitante';
        const isAdmin = ['admin','ger'].includes(curUser);
        
        document.getElementById('userWelcomeBar').style.display = isV ? 'none' : 'block';
        if(!isV) document.getElementById('userWelcomeBar').innerHTML = `Olá, <b>${MINS[curUser]}</b>! Apoio: <b>${db.apoio_anciao?.[curUser] || "Conselho"}</b>`;
        
        ['btnSair','btnEventos','btnLinks','btnDados'].forEach(id => {
            const el = document.getElementById(id); if(el) el.style.display = isV ? 'none' : 'block';
        });
        document.getElementById('btnAcesso').style.display = isV ? 'block' : 'none';

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay(), dtF = dt.toISOString().split('T')[0];
            let idEv = db.eventos_especiais?.[dtF], minDoDia = db.regras_manuais?.[dStr] || null;
            if([0,3,6].includes(sem) || idEv) {
                let tr = `<tr class="${idEv?'row-especial':''}"><td onclick="cliqueDia('${dStr}')" style="cursor:pointer;"><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b><br><small>${idEv?.nome || (MINS[minDoDia] || '')}</small></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => { 
                    let canEdit = isAdmin || (curUser !== 'visitante' && ((curUser==='diaconato' && col==='di') || (curUser==='musica' && (col==='mu'||col==='lo')) || (curUser==='sonoplastia' && col==='so') || (curUser==='sabatina' && col==='sa') || (col==='pr' && (minDoDia===curUser || (idEv && idEv.owner===curUser)))));
                    tr += `<td><textarea ${canEdit?'':'disabled'} class="auto-expand" onchange="atuCel('${dStr}','${col}',this.value)" oninput="autoResize(this)">${db.escalas?.[dStr]?.[col]||''}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        
        const corpoPlan = document.getElementById('corpoPlan'); corpoPlan.innerHTML = "";
        MESES.forEach((m, i) => { corpoPlan.innerHTML += `<tr><td class="plan-month-col">${m}</td><td><textarea ${!isAdmin?'disabled':''} class="plan-text-area" onchange="db.plan_anual[${i}]=this.value; save();" oninput="autoResize(this)">${db.plan_anual?.[i] || ''}</textarea></td></tr>`; });

        if(isAdmin) { document.getElementById('adminPanel').style.display='block'; renderAdmin(); }
        setTimeout(() => { document.querySelectorAll('textarea').forEach(el => autoResize(el)); }, 200);
    }

    function renderAdmin() {
        const lista = document.getElementById('listaMinisterios'); lista.innerHTML = "";
        Object.keys(MINS).filter(m => m !== 'admin' && m !== 'ger').forEach(m => { lista.innerHTML += `<button class="btn-min ${window.minSelecionado===m?'active':''}" onclick="window.minSelecionado='${m}'; renderAdmin();">${MINS[m]}</button>`; });
        
        const gM = document.getElementById('gridMeses'); gM.innerHTML = "";
        MESES.forEach((m, i) => { gM.innerHTML += `<div style="margin-bottom:3px;"><small>${m}</small><input class="input-dark" value="${db.anciaos?.[i]||''}" onchange="db.anciaos[${i}]=this.value;save();"></div>`; });
        
        const tC = document.getElementById('corpoCreds'); tC.innerHTML = ""; if(!db.senhas) db.senhas = {};
        Object.keys(MINS).forEach(k => { 
            tC.innerHTML += `<tr><td style="padding:4px;">${MINS[k]}</td><td style="padding:4px;"><input class="input-dark" value="${db.senhas[k]||''}" onchange="db.senhas['${k}']=this.value;save();"></td></tr>`; 
        });

        const gA = document.getElementById('gridApoioAnciao'); gA.innerHTML = "";
        Object.keys(MINS).filter(k => !['admin', 'ger', 'pastor'].includes(k)).forEach(mKey => {
            let options = LISTA_ANCIAOS.map(anc => `<option value="${anc}" ${db.apoio_anciao?.[mKey] === anc ? 'selected' : ''}>${anc}</option>`).join('');
            gA.innerHTML += `<div style="margin-bottom:6px;"><small>${MINS[mKey]}</small><select class="input-dark" onchange="db.apoio_anciao['${mKey}']=this.value; save();"><option value="">--</option>${options}</select></div>`;
        });
    }

    function salvarEventoEspecial() { 
        const nome = document.getElementById('evtNome').value, ini = document.getElementById('evtInicio').value, fim = document.getElementById('evtFim').value || ini; 
        if(!nome || !ini) return alert("Título e Data são obrigatórios!"); 
        let dIn = new Date(ini + "T00:00:00"), dFim = new Date(fim + "T00:00:00"); 
        if(!db.eventos_especiais) db.eventos_especiais = {};
        while(dIn <= dFim) { db.eventos_especiais[dIn.toISOString().split('T')[0]] = { nome: nome.toUpperCase(), owner: curUser }; dIn.setDate(dIn.getDate()+1); } 
        save(); document.getElementById('evtNome').value = ""; renderListaEventos();
    }
    function renderListaEventos() { 
        const lista = document.getElementById('listaEventosAtivos'); lista.innerHTML = ""; 
        Object.keys(db.eventos_especiais || {}).sort().forEach(k => { 
            lista.innerHTML += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #444;"><span>${k.split('-').reverse().join('/')} - ${db.eventos_especiais[k].nome}</span><button onclick="delete db.eventos_especiais['${k}']; save(); renderListaEventos();" style="color:red; background:none; border:none; cursor:pointer">X</button></div>`; 
        }); 
    }
    function abrirPopEventos() { document.getElementById('popEventos').style.display='flex'; renderListaEventos(); }

    function importarBackup(event) {
        const file = event.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try { db = JSON.parse(e.target.result); save(); alert("Sucesso!"); location.reload(); } catch (err) { alert("Erro!"); }
        };
        reader.readAsText(file);
    }
    function autoResize(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function cliqueDia(dStr) { if(['admin','ger'].includes(curUser)) { window.minSelecionado ? (db.regras_manuais[dStr]=window.minSelecionado) : (delete db.regras_manuais[dStr]); save(); } }
    function exportarBackup() { const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db)); const a = document.createElement('a'); a.setAttribute("href", dataStr); a.setAttribute("download", "BACKUP.json"); a.click(); }
    function abrirPopLinks() { document.getElementById('popLinks').style.display='flex'; renderListaLinks(); }
    function salvarLink() { const t = document.getElementById('linkTit').value, u = document.getElementById('linkUrl').value; if(!t || !u) return; if(!db.links_externos) db.links_externos = []; db.links_externos.push({titulo:t.toUpperCase(), url:u}); save(); renderListaLinks(); }
    function renderListaLinks() { const lista = document.getElementById('listaLinksAtivos'); lista.innerHTML = ""; (db.links_externos || []).forEach((l, i) => { lista.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; background:rgba(255,255,255,0.05); padding:10px; border-radius:5px;"><a href="${l.url}" target="_blank" style="color:var(--neon)">${l.titulo}</a><button onclick="db.links_externos.splice(${i},1); save(); renderListaLinks();" style="color:red; background:none; border:none;">X</button></div>`; }); }

    const sM = document.getElementById('selMes'); MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
