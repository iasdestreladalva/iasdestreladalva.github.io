<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - GESTÃO TOTAL v330</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; }
        
        .main-title { color: var(--neon-blue); font-size: 2rem; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }

        /* PAINEL DE GESTÃO FIXO (BASEADO NA FOTO) */
        .admin-main-box { 
            background: #0f172a; border: 2px solid var(--accent-orange); 
            border-radius: 20px; padding: 25px; margin-bottom: 30px;
        }
        .admin-grid { display: grid; grid-template-columns: 240px 320px 1fr; gap: 30px; }
        .col-header { color: var(--neon-blue); font-size: 0.85rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        
        /* Coluna 1: Pincéis de Ministério */
        .btn-min { width: 100%; padding: 12px; margin-bottom: 8px; background: transparent; border: 1.5px solid var(--neon-blue); color: var(--neon-blue); border-radius: 10px; cursor: pointer; font-weight: bold; }
        .btn-min.active { background: var(--neon-blue); color: #000; box-shadow: 0 0 15px var(--neon-blue); }
        .btn-min.limpar { border-color: #ef4444; color: #ef4444; }

        /* Coluna 2: Responsáveis Mensais */
        .resp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .label-mes { font-size: 0.65rem; color: #fff; display: block; margin-bottom: 4px; font-weight: bold; }
        .input-dark { background: #000; border: 1px solid #334155; color: #fff; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; }

        /* Coluna 3: Logins e Senhas Reais */
        .login-table { width: 100%; border-collapse: collapse; color: #fbbf24; font-size: 0.85rem; }
        .login-table th { text-align: left; padding-bottom: 10px; border-bottom: 1.5px solid #1e293b; color: #fbbf24; }
        .login-table td { padding: 10px 0; border-bottom: 1px solid #1e293b; }
        .user-text { color: var(--neon-blue); font-weight: bold; }

        /* ESCALA COM GRADES DEFINIDAS */
        .table-wrap { background: white; border-radius: 10px; padding: 10px; overflow-x: auto; }
        table.escala { width: 100%; border-collapse: collapse !important; color: black; min-width: 1000px; border: 2px solid #000 !important; }
        table.escala th { background: var(--iasd-blue) !important; color: white !important; padding: 12px; border: 1px solid #000 !important; }
        table.escala td { border: 1px solid #000 !important; height: 45px; text-align: center; font-weight: bold; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; }

        /* CORES DAS LINHAS */
        tr.pessoal td { background-color: #e0f2fe !important; } tr.mordomia td { background-color: #fef3c7 !important; }
        tr.saude td { background-color: #f1f5f9 !important; } tr.homens td { background-color: #dcfce7 !important; }
        tr.familia td { background-color: #fee2e2 !important; } tr.adolescentes td { background-color: #f0fdf4 !important; }
        tr.mulher td { background-color: #fce7f3 !important; } tr.musica td { background-color: #ede9fe !important; }

        /* PLANEJAMENTO ANUAL 2026 */
        .anual-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 30px; }
        .card-mes { background: #000; border: 1.5px solid #334155; border-radius: 12px; padding: 15px; }
        .card-mes h4 { color: var(--neon-blue); margin: 0 0 10px 0; font-size: 0.8rem; }
        .txt-anual { width: 100%; height: 80px; background: transparent; border: none; color: #fff; resize: none; }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: flex-start;">
    <div class="main-title">IASD ESTRELA DALVA</div>
    <div style="text-align: right;">
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1.5px solid var(--neon-blue); padding:10px; border-radius:8px; font-weight:bold;"></select>
    </div>
</div>

<div class="admin-main-box">
    <div class="admin-grid">
        <div class="column">
            <div class="col-header">1. Ministério do Dia</div>
            <button class="btn-min" onclick="selPincel('pessoal','M. Pessoal')">M. Pessoal</button>
            <button class="btn-min" onclick="selPincel('mordomia','Mordomia')">Mordomia</button>
            <button class="btn-min" onclick="selPincel('saude','Saúde')">Saúde</button>
            <button class="btn-min" onclick="selPincel('homens','M. Homens')">M. Homens</button>
            <button class="btn-min" onclick="selPincel('familia','M. Família')">M. Família</button>
            <button class="btn-min" onclick="selPincel('adolescentes','Adolescentes')">Adolescentes</button>
            <button class="btn-min" onclick="selPincel('mulher','M. Mulher')">M. Mulher</button>
            <button class="btn-min" onclick="selPincel('musica','Música')">Música</button>
            <button class="btn-min limpar" onclick="selPincel('','')">LIMPAR</button>
        </div>
        
        <div class="column">
            <div class="col-header">2. Responsável Mensal</div>
            <div id="gridResponsaveis" class="resp-grid"></div>
        </div>

        <div class="column">
            <div class="col-header">3. Controle de Logins e Senhas</div>
            <table class="login-table">
                <thead><tr><th>MINISTÉRIO</th><th>USUÁRIO</th><th>SENHA</th></tr></thead>
                <tbody id="listaLogins"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="table-wrap">
    <table class="escala">
        <thead>
            <tr>
                <th style="width: 140px;">DIA</th><th style="width: 80px;">DATA</th>
                <th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th>
            </tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div class="anual-grid" id="gridAnual"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_master_final_v330');

    let db = { escalas:{}, cores:{}, anciaos:{}, anual:{} };
    let pID = null; let pNome = "";
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    dbRef.on('value', snap => { db = snap.val() || { escalas:{}, cores:{}, anciaos:{}, anual:{} }; renderTodo(); });

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());

        // Responsáveis
        document.getElementById('gridResponsaveis').innerHTML = meses.map((n, i) => `
            <div><label class="label-mes">${n}</label>
            <input class="input-dark" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)"></div>
        `).join('');

        // Logins Completos conforme Fotos
        const logs = [
            {m:"Administrador", u:"admin", s:"iasd118"}, {m:"Gerência", u:"ger", s:"ger123"},
            {m:"Diaconato", u:"diaconato", s:"diac123"}, {m:"Música", u:"musica", s:"mus123"},
            {m:"Sonoplastia", u:"sonoplastia", s:"sono123"}, {m:"M. Mulher", u:"mulher", s:"mulher123"},
            {m:"Escola Sabatina", u:"sabatina", s:"sab123"}
        ];
        document.getElementById('listaLogins').innerHTML = logs.map(l => `
            <tr><td>${l.m}</td><td class="user-text">${l.u}</td><td>${l.s}</td></tr>
        `).join('');

        // Anual
        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `
            <div class="card-mes"><h4>${n}</h4>
            <textarea class="txt-anual" onchange="atuAnual(${i}, this.value)">${db.anual?.[i]||''}</textarea></div>
        `).join('');

        // Escala
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasMes; d++) {
            let dt = new Date(2026, m, d);
            if([0,3,6].includes(dt.getDay())) {
                let dStr = `${d}_${m+1}_2026`;
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr');
                if(c.id) tr.className = c.id;
                tr.innerHTML = `<td onclick="pintar('${dStr}')" style="cursor:pointer"><div>${["DOMINGO","","","QUARTA","","","SÁBADO"][dt.getDay()]}</div><div style="font-size:10px; color:#333">${c.nome||''}</div></td>
                <td onclick="pintar('${dStr}')" style="cursor:pointer">${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)"></td>`).join('');
                corpo.appendChild(tr);
            }
        }
    }

    function selPincel(id, nome) { pID = id; pNome = nome; document.querySelectorAll('.btn-min').forEach(b => b.classList.remove('active')); event.currentTarget.classList.add('active'); }
    function pintar(dStr) { if(pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}
    function atu(d,c,v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }
    function atuAnc(i,v) { if(!db.anciaos) db.anciaos={}; db.anciaos[i]=v.toUpperCase(); dbRef.child('anciaos').set(db.anciaos); }
    function atuAnual(i,v) { if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
