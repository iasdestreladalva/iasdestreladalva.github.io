<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - Versão Otimizada</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        /* Indicador de Salvamento */
        #saveStatus { position: fixed; top: 10px; right: 10px; padding: 8px 15px; border-radius: 5px; font-weight: bold; display: none; z-index: 10001; }
        .saving { background: var(--orange); color: white; }
        .saved { background: var(--green); color: white; }

        /* Estilos de Tabela e Legibilidade */
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 12px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.9rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 6px; text-align: center; font-weight: bold; }
        
        /* Letras Maiores para Escala e Planejamento */
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 1.1rem; display: block; padding: 8px 0; outline: none; }
        .plan-text-area { width: 100%; background: transparent !important; color: #e6f1ff !important; border: none !important; resize: none; overflow: hidden; display: block; font-size: 1.1rem; padding: 10px; }

        /* Cores de Destaque para Linhas com Ministério */
        .row-ministerio { background-color: #e3f2fd !important; } 
        .row-especial { background-color: #fff4e6 !important; border-left: 8px solid var(--orange) !important; }

        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 2fr 1.2fr; gap: 15px; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.85rem; padding: 8px; border-radius: 4px; }

        @media print { 
            .no-print, #adminPanel, #userWelcomeBar, #saveStatus, button, select { display: none !important; }
            body { background: white; color: black; }
            #headerTitulo { font-size: 2.5rem !important; text-align: center !important; margin-bottom: 10px; }
            #headerAnciao { font-size: 1.5rem !important; text-align: center !important; color: black !important; border-bottom: 2px solid black; padding-bottom: 10px; }
            table#tabela-main { border: 2px solid black; }
            #tabela-main th, #tabela-main td { border: 1px solid black !important; font-size: 11pt; }
            .auto-expand { font-size: 1.2rem !important; color: black !important; }
        }
    </style>
</head>
<body>

<div id="saveStatus"></div>

<div class="container">
    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="border-color:var(--gold); color:var(--gold); width:auto; padding:0 15px;" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button class="input-dark" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid">
            <div class="admin-section">
                <h4 style="color:var(--gold)">NUVEM E BACKUP</h4>
                <button class="input-dark" style="border-color:var(--neon); color:var(--neon); margin-bottom:10px;" onclick="backupNuvem()">💾 SALVAR NA NUVEM</button>
                <button class="input-dark" style="border-color:var(--green); color:var(--green);" onclick="restaurarNuvem()">📂 RESTAURAR NUVEM</button>
            </div>
            </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.6rem; padding:15px;" id="headerTitulo">ESCALA</th></tr>
            <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1.2rem; padding:5px 15px 15px 15px;" id="headerAnciao">Responsável: </th></tr>
            <tr><th style="width:130px">DIA</th><th style="width:50px">DATA</th><th>SABATINA</th><th>PREGADOR(A)</th><th>MÚSICA ESPECIAL</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div id="secPlan" style="margin-top:40px;" class="no-print">
        <h3 style="color:var(--gold);">🗓️ PLANEJAMENTO ANUAL 2026</h3>
        <table class="plan-table" style="width:100%"><tbody id="corpoPlan"></tbody></table>
    </div>
</div>

<script>
    // Configurações iniciais do Firebase conforme seu arquivo
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();
    
    let db = {};
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];

    // Monitoramento em tempo real
    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); }
    });

    // Função de salvamento com confirmação visual
    function save() {
        const status = document.getElementById('saveStatus');
        status.innerText = "Salvando...";
        status.className = "saving";
        status.style.display = "block";

        dbCloud.collection('dados').doc('estrela_v102').set(db).then(() => {
            status.innerText = "✅ Alterações Salvas";
            status.className = "saved";
            setTimeout(() => { status.style.display = "none"; }, 2000);
        });
    }

    // Gerenciamento de Teclado: Enter, Tab e Blur (clique fora)
    function handleKeys(e, d, c) {
        if (e.key === 'Enter') {
            e.preventDefault();
            e.target.blur(); // Salva ao sair do campo
            const nextRow = e.target.closest('tr').nextElementSibling;
            if (nextRow) {
                const fields = nextRow.querySelectorAll('textarea');
                const index = Array.from(e.target.closest('tr').querySelectorAll('textarea')).indexOf(e.target);
                if (fields[index]) fields[index].focus();
            }
        }
    }

    // Backup na Nuvem (Coleção separada para evitar erro de 1MB)
    async function backupNuvem() {
        const nome = prompt("Dê um nome para este backup (ex: Versão Abril):");
        if(!nome) return;
        try {
            await dbCloud.collection('backups_seguros').add({
                nome: nome,
                data: new Date().toLocaleString(),
                conteudo: db
            });
            alert("Backup salvo com sucesso na nuvem!");
        } catch(e) { alert("Erro ao salvar: " + e.message); }
    }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerAnciao').innerText = `Ancião Responsável: ${db.anciaos?.[mIdx] || 'Não definido'}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        const corpo = document.getElementById('corpoEscala');
        corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        const isAdmin = ['admin','ger'].includes(curUser);

        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            let idEv = db.eventos_especiais?.[dt.toISOString().split('T')[0]];
            let minDia = db.regras_manuais?.[dStr];

            if([0,3,6].includes(sem) || idEv) {
                // Aplica cor na linha inteira se houver ministério
                let rowClass = minDia ? 'row-ministerio' : (idEv ? 'row-especial' : '');
                let tr = `<tr class="${rowClass}">
                    <td><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b></td>
                    <td>${d}/${mIdx+1}</td>`;
                
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    tr += `<td><textarea class="auto-expand" 
                        onkeydown="handleKeys(event, '${dStr}', '${col}')" 
                        onchange="db.escalas['${dStr}']['${col}']=this.value.toUpperCase(); save();"
                        oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${db.escalas?.[dStr]?.[col]||''}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        // ... (resto das funções de renderização do seu código original)
    }

    // Inicialização do seletor de meses
    const sM = document.getElementById('selMes'); 
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
