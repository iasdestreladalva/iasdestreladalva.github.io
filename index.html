<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v230</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #070a0f; --neon-blue: #38bdf8; }
        body { background: var(--bg-dark); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        
        /* CORES DAS LINHAS - FORÇADAS */
        tr.pessoal td { background-color: #e0f2fe !important; color: #000; }
        tr.mordomia td { background-color: #fef3c7 !important; color: #000; }
        tr.divino td { background-color: #d1fae5 !important; color: #000; }
        tr.jovens td { background-color: #ede9fe !important; color: #000; }
        tr.mulher td { background-color: #fce7f3 !important; color: #000; }
        tr.anciao td { background-color: #f1f5f9 !important; color: #000; }
        tr.infantil td { background-color: #fffbeb !important; color: #000; }
        tr.familia td { background-color: #fee2e2 !important; color: #000; }

        .admin-panel { display: none; background: #0f172a; border: 1px solid var(--neon-blue); padding: 15px; border-radius: 8px; margin: 10px 0; }
        .btn { padding: 8px; border: 1px solid #1e293b; border-radius: 4px; cursor: pointer; background: rgba(255,255,255,0.05); color: white; width: 100%; margin-bottom: 4px; display: flex; align-items: center; }
        .btn.active { background: var(--neon-blue) !important; color: #000 !important; font-weight: bold; }
        .led { width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; border: 1px solid #000; }

        .table-container { background: white; border-radius: 8px; overflow: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; color: black; min-width: 1000px; }
        th { background: #002b5c; color: white; padding: 10px; font-size: 0.7rem; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; height: 55px; text-align: center; }
        
        .clickable { cursor: pointer; font-weight: bold; background: #f8fafc; }
        .input-cell { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; text-transform: uppercase; background: transparent; }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center;">
    <h3 style="color: var(--neon-blue);">IASD ESTRELA DALVA</h3>
    <div style="display: flex; gap: 5px;">
        <select id="selMes" onchange="renderTodo()" style="padding: 5px;"></select>
        <button id="btnLog" onclick="login()" style="padding: 5px; cursor: pointer;">🔓 LOGIN ADMIN</button>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display: grid; grid-template-columns: 250px 1fr; gap: 20px;">
        <div id="listaPinceis">
            <button class="btn" onclick="selPincel('anciao','ANCIÃO')"><div class="led" style="background:#94a3b8"></div> ANCIÃO</button>
            <button class="btn" onclick="selPincel('pessoal','M. PESSOAL')"><div class="led" style="background:#0ea5e9"></div> M. PESSOAL</button>
            <button class="btn" onclick="selPincel('mordomia','MORDOMIA')"><div class="led" style="background:#f59e0b"></div> MORDOMIA</button>
            <button class="btn" onclick="selPincel('jovens','JOVENS')"><div class="led" style="background:#8b5cf6"></div> JOVENS</button>
            <button class="btn" onclick="selPincel('mulher','M. MULHER')"><div class="led" style="background:#ec4899"></div> M. MULHER</button>
            <button class="btn" onclick="selPincel('infantil','M. INFANTIL')"><div class="led" style="background:#fbbf24"></div> M. INFANTIL</button>
            <button class="btn" onclick="selPincel('familia','FAMÍLIA')"><div class="led" style="background:#f87171"></div> FAMÍLIA</button>
            <button class="btn" onclick="selPincel('','')">❌ LIMPAR PINCEL</button>
        </div>
        <div id="listaAnciaos" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px;"></div>
    </div>
</div>

<div class="table-container">
    <table id="tabelaEscala">
        <thead>
            <tr>
                <th style="width: 120px;">DIA</th><th style="width: 70px;">DATA</th>
                <th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th>
            </tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com",
        projectId: "unidades-de-acao",
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v230');

    let db = { escalas:{}, cores:{}, anciaos:{} };
    let user = localStorage.getItem('iasd_user') || 'v';
    let pID = null; let pNome = "";
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    function login() {
        const p = prompt("Senha:");
        if(p === 'iasd118') { localStorage.setItem('iasd_user', 'admin'); location.reload(); }
    }

    dbRef.on('value', snap => {
        db = snap.val() || { escalas:{}, cores:{}, anciaos:{} };
        renderTodo();
    });

    function selPincel(id, nome) {
        pID = id; pNome = nome;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function pintar(dStr) {
        if(user !== 'admin') return;
        if(pID === null) { alert("Selecione um ministério primeiro!"); return; }
        
        if(!db.cores) db.cores = {};
        if(pID === "") delete db.cores[dStr];
        else db.cores[dStr] = { id: pID, nome: pNome };
        
        dbRef.child('cores').set(db.cores);
    }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('adminPanel').style.display = (user === 'admin') ? 'block' : 'none';

        // Anciãos
        let hAnc = "";
        meses.forEach((n, i) => {
            hAnc += `<div style="font-size:0.6rem;">${n}<input style="width:100%;" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i}, this.value)"></div>`;
        });
        document.getElementById('listaAnciaos').innerHTML = hAnc;

        // Escala
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, m+1, 0).getDate();

        for(let d=1; d<=diasMes; d++) {
            let dt = new Date(2026, m, d);
            let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}_${m+1}_2026`; // ID único sem barras para o Firebase
                let c = db.cores?.[dStr] || {id:'', nome:''};
                
                let tr = document.createElement('tr');
                if(c.id) tr.className = c.id;

                tr.innerHTML = `
                    <td class="clickable" onclick="pintar('${dStr}')">
                        <div style="font-size:0.6rem; color:#64748b">${["DOMINGO","","","QUARTA","","","SÁBADO"][sem]}</div>
                        <div style="font-size:0.65rem; font-weight:bold">${c.nome || ''}</div>
                    </td>
                    <td class="clickable" onclick="pintar('${dStr}')">${d}/${m+1}</td>
                    ${["sa","pr","mu","lo","so","re","di"].map(col => `
                        <td><input class="input-cell" value="${db.escalas?.[dStr]?.[col] || ''}" onchange="atu('${dStr}','${col}',this.value)"></td>
                    `).join('')}
                `;
                corpo.appendChild(tr);
            }
        }
    }

    function atu(d, c, v) { 
        if(!db.escalas) db.escalas = {};
        if(!db.escalas[d]) db.escalas[d] = {};
        db.escalas[d][c] = v.toUpperCase();
        dbRef.child('escalas').set(db.escalas);
    }

    function atuAnc(i, v) {
        if(!db.anciaos) db.anciaos = {};
        db.anciaos[i] = v.toUpperCase();
        dbRef.child('anciaos').set(db.anciaos);
    }

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
