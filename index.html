<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        #userWelcomeBar { display: none; background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon); padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center; }
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: var(--blue); color: white; padding: 10px; border: 1px solid #cbd5e1; font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 50px; }
        /* Nomes na escala sempre em Negrito */
        #tabela-main input { width: 100%; border: none; background: transparent; text-align: center; font-weight: bold; color: black; font-size: 0.85rem; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:20px; border-radius:15px; width:90%; max-width:500px; }
        .btn-fechar { width:100%; padding:10px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; margin-top:10px; font-weight:bold; }
    </style>
</head>
<body>
<div class="container">
    <div id="userWelcomeBar"></div>
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:130px; border-color:var(--neon);"></select>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon); cursor:pointer;" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:red; color:red; display:none; cursor:pointer;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="8" id="headerTitulo">ESCALA</th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="modalLogin" class="overlay">
    <div class="pop-content">
        <h3 style="color:var(--neon); text-align:center;">LOGIN</h3>
        <input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="margin-bottom:10px;">
        <input type="password" id="passLogin" placeholder="Senha" class="input-dark">
        <button class="btn-fechar" style="background:var(--neon); color:black;" onclick="login()">ENTRAR</button>
        <button class="btn-fechar" style="background:transparent;" onclick="document.getElementById('modalLogin').style.display='none'">CANCELAR</button>
    </div>
</div>

<div id="popView" class="overlay" onclick="this.style.display='none'">
    <div id="viewerContent" style="width:95%; height:85%; display:flex; justify-content:center;"></div>
    <button class="btn-fechar" style="position:fixed; bottom:20px; width:200px;">FECHAR</button>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    let db = {};
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    dbCloud.collection('dados').doc('estrela_v115').onSnapshot(doc => {
        if(doc.exists) { 
            db = doc.data(); 
            if(!db.senhas) { corrigir(); } // Força a criação das senhas se não existirem
            renderTodo(); 
        } else { corrigir(); }
    });

    function corrigir() {
        db.senhas = { admin: "iasd118", ger: "ger123", musica: "mus123", diaconato: "diac123" };
        db.escalas = db.escalas || {};
        save();
    }

    function save() { dbCloud.collection('dados').doc('estrela_v115').set(db); }

    function login() {
        const u = document.getElementById('userLogin').value.toLowerCase().trim();
        const p = document.getElementById('passLogin').value;
        if(db.senhas && db.senhas[u] === p) {
            localStorage.setItem('iasd_curUser', u);
            location.reload();
        } else { alert("Usuário ou Senha inválidos!"); }
    }

    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    function verArquivo(data, nome) {
        const display = document.getElementById('viewerContent');
        display.innerHTML = "";
        if(data.includes("pdf") || nome.toLowerCase().endsWith(".pdf")) {
            display.innerHTML = `<embed src="${data}" type="application/pdf" width="100%" height="100%">`;
        } else {
            display.innerHTML = `<img src="${data}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
        }
        document.getElementById('popView').style.display = 'flex';
    }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        if(curUser !== 'visitante') {
            document.getElementById('btnAcesso').style.display='none';
            document.getElementById('btnSair').style.display='block';
            document.getElementById('userWelcomeBar').style.display='block';
            document.getElementById('userWelcomeBar').innerHTML = `Bem-vindo, <b>${curUser.toUpperCase()}</b>`;
        }

        const corpo = document.getElementById('corpoEscala');
        corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), sem = dt.getDay(), dStr = `${d}/${mIdx+1}/2026`;
            if([0, 3, 6].includes(sem)) {
                let tr = `<tr><td>${["DOM","","","QUA","","","SAB"][sem]}</td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','so','re','di'].forEach(col => {
                    let podeEditar = (curUser === 'admin' || curUser === 'ger');
                    if(curUser === 'musica' && col === 'mu') podeEditar = true;
                    if(curUser === 'diaconato' && col === 'di') podeEditar = true;
                    
                    tr += `<td><input ${podeEditar ? '' : 'disabled'} value="${db.escalas?.[dStr]?.[col] || ''}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function atuCel(d, c, v) {
        if(!db.escalas[d]) db.escalas[d] = {};
        db.escalas[d][c] = v.toUpperCase();
        save();
    }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
