<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - GESTÃO TOTAL v320</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; }
        
        .header-main { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid var(--neon-blue); padding-bottom: 10px; }

        /* PAINEL DE GESTÃO - SEMPRE VISÍVEL E NO TOPO */
        .admin-container { 
            background: rgba(15, 23, 42, 0.95); 
            border: 2px solid var(--accent-orange); 
            border-radius: 15px; padding: 20px; 
            margin-bottom: 30px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .admin-grid { display: grid; grid-template-columns: 240px 320px 1fr; gap: 20px; }
        .col-title { color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        
        /* Coluna 1: Pincéis */
        .btn-min { width: 100%; padding: 10px; margin-bottom: 6px; background: transparent; border: 1.5px solid var(--neon-blue); color: var(--neon-blue); border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem; text-align: center; }
        .btn-min.active { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }
        .btn-min.limpar { border-color: #ef4444; color: #ef4444; }

        /* Coluna 2: Responsáveis */
        .resp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .label-mes { font-size: 0.6rem; color: #94a3b8; display: block; margin-bottom: 2px; text-transform: uppercase; }
        .input-dark { background: #000; border: 1px solid #334155; color: #fff; padding: 6px; border-radius: 4px; width: 100%; box-sizing: border-box; font-size: 0.8rem; }

        /* Coluna 3: Logins */
        .login-table { width: 100%; border-collapse: collapse; color: #fbbf24; font-size: 0.8rem; }
        .login-table td { padding: 6px 0; border-bottom: 1px solid #1e293b; }

        /* ESCALA COM LINHAS E COLUNAS VISÍVEIS */
        .escala-container { background: white; border-radius: 8px; padding: 10px; overflow-x: auto; }
        table.escala { width: 100%; border-collapse: collapse !important; color: black; min-width: 1000px; border: 2px solid #000 !important; }
        table.escala th { background: var(--iasd-blue) !important; color: white !important; padding: 10px; border: 1px solid #000 !important; font-size: 0.75rem; }
        table.escala td { border: 1px solid #000 !important; height: 40px; text-align: center; font-weight: bold; }
        .cell-in { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; font-size: 0.85rem; }

        /* CORES DAS LINHAS (FIEIS AOS MINISTÉRIOS) */
        tr.pessoal td { background-color: #e0f2fe !important; }
        tr.mordomia td { background-color: #fef3c7 !important; }
        tr.saude td { background-color: #f1f5f9 !important; }
        tr.homens td { background-color: #dcfce7 !important; }
        tr.familia td { background-color: #fee2e2 !important; }
        tr.adolescentes td { background-color: #f0fdf4 !important; }
        tr.mulher td { background-color: #fce7f3 !important; }
        tr.musica td { background-color: #ede9fe !important; }

        /* SEÇÃO ANUAL NO RODAPÉ */
        .anual-section { margin-top: 40px; border-top: 1px solid #334155; padding-top: 20px; }
        .grid-anual { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .mes-card { background: #000; border: 1px solid #334155; border-radius: 8px; padding: 10px; }
        .anual-text { width: 100%; height: 60px; background: transparent; border: none; color: #fff; resize: none; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="header-main">
    <h2 style="color: var(--neon-blue); margin:0;">IASD ESTRELA DALVA - PAINEL MASTER</h2>
    <div style="display: flex; gap: 15px; align-items: center;">
        <label>MÊS DA ESCALA:</label>
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid var(--neon-blue); padding:8px; border-radius:6px; font-weight:bold; cursor:pointer;"></select>
        <button onclick="window.print()" style="background:var(--accent-orange); color:white; border:none; padding:8px 15px; border-radius:6px; font-weight:bold; cursor:pointer;">🖨️ IMPRIMIR</button>
    </div>
</div>

<div class="admin-container">
    <div class="admin-grid">
        <div class="column">
            <div class="col-title">1. Selecionar Ministério</div>
            <button class="btn-min" onclick="selPincel('pessoal','M. Pessoal')">M. Pessoal</button>
            <button class="btn-min" onclick="selPincel('mordomia','Mordomia')">Mordomia</button>
            <button class="btn-min" onclick="selPincel('saude','Saúde')">Saúde</button>
            <button class="btn-min" onclick="selPincel('homens','M. Homens')">M. Homens</button>
            <button class="btn-min" onclick="selPincel('familia','M. Família')">M. Família</button>
            <button class="btn-min" onclick="selPincel('adolescentes','Adolescentes')">Adolescentes</button>
            <button class="btn-min" onclick="selPincel('mulher','M. Mulher')">M. Mulher</button>
            <button class="btn-min" onclick="selPincel('musica','Música')">Música</button>
            <button class="btn-min limpar" onclick="selPincel('','')">LIMPAR SELEÇÃO</button>
        </div>
        <div class="column">
            <div class="col-title">2. Responsáveis Mensais</div>
            <div id="gridResponsaveis" class="resp-grid"></div>
        </div>
        <div class="column">
            <div class="col-title">3. Logins de Acesso</div>
            <table class="login-table">
                <tbody id="listaLogins"></tbody>
            </table>
            <p style="font-size: 0.65rem; color: #94a3b8; margin-top: 15px;">* Clique no Dia ou na Data na tabela abaixo para aplicar a cor do ministério selecionado.</p>
        </div>
    </div>
</div>

<div class="escala-container">
    <table class="escala">
        <thead>
            <tr>
                <th style="width: 140px;">DIA</th><th style="width: 80px;">DATA</th>
                <th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th>
            </tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div class="anual-section">
    <h3 style="color: var(--accent-orange); font-size: 0.9rem;">🗓️ PLANEJAMENTO ANUAL 2026</h3>
    <div id="gridAnual" class="grid-anual"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_fixed_admin_v320');

    let db = { escalas:{}, cores:{}, anciaos:{}, anual:{} };
    let pID = null; let pNome = "";
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    dbRef.on('value', snap => { db = snap.val() || { escalas:{}, cores:{}, anciaos:{}, anual:{} }; renderTodo(); });

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());

        // Render Responsáveis
        document.getElementById('gridResponsaveis').innerHTML = meses.map((n, i) => `
            <div><label class="label-mes">${n}</label>
            <input class="input-dark" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)"></div>
        `).join('');

        // Render Logins
        const logs = [{m:"Admin", u:"admin", s:"iasd118"}, {m:"Música", u:"musica", s:"mus123"}, {m:"Diac.", u:"diac", s:"diac123"}];
        document.getElementById('listaLogins').innerHTML = logs.map(l => `<tr><td>${l.m}</td><td style="color:var(--neon-blue)">${l.u}</td><td>${l.s}</td></tr>`).join('');

        // Render Anual
        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `
            <div class="mes-card"><div style="color:var(--neon-blue); font-size:0.65rem; font-weight:bold; margin-bottom:5px;">${n}</div>
            <textarea class="anual-text" onchange="atuAnual(${i}, this.value)">${db.anual?.[i]||''}</textarea></div>
        `).join('');

        // Render Escala com BORDAS REAIS
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasMes; d++) {
            let dt = new Date(2026, m, d);
            if([0,3,6].includes(dt.getDay())) {
                let dStr = `${d}_${m+1}_2026`;
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr');
                if(c.id) tr.className = c.id;
                tr.innerHTML = `<td onclick="pintar('${dStr}')" style="cursor:pointer"><div>${["DOMINGO","","","QUARTA","","","SÁBADO"][dt.getDay()]}</div><div style="font-size:10px; color:#333">${c.nome||''}</div></td>
                <td onclick="pintar('${dStr}')" style="cursor:pointer">${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-in" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)"></td>`).join('');
                corpo.appendChild(tr);
            }
        }
    }

    function selPincel(id, nome) { 
        pID = id; pNome = nome; 
        document.querySelectorAll('.btn-min').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function pintar(dStr) { if(pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}
    function atu(d,c,v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }
    function atuAnc(i,v) { if(!db.anciaos) db.anciaos={}; db.anciaos[i]=v.toUpperCase(); dbRef.child('anciaos').set(db.anciaos); }
    function atuAnual(i,v) { if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
