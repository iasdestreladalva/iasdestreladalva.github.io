<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v245</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #070a0f; --neon-blue: #38bdf8; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        /* CORES DAS LINHAS - PADRÃO SOLICITADO */
        tr.pessoal td { background-color: #e0f2fe !important; color: #000; }
        tr.mordomia td { background-color: #fef3c7 !important; color: #000; }
        tr.mulher td { background-color: #fce7f3 !important; color: #000; }
        tr.homens td { background-color: #dcfce7 !important; color: #000; }
        tr.infantil td { background-color: #ffedd5 !important; color: #000; }
        tr.familia td { background-color: #fee2e2 !important; color: #000; }
        tr.jovem td { background-color: #ede9fe !important; color: #000; }
        tr.saude td { background-color: #f1f5f9 !important; color: #000; }

        .admin-panel { display: none; background: #0f172a; border: 1px solid var(--neon-blue); padding: 15px; border-radius: 8px; margin: 10px 0; }
        .btn { padding: 10px; border: 1px solid #1e293b; border-radius: 4px; cursor: pointer; background: rgba(255,255,255,0.05); color: white; width: 100%; margin-bottom: 5px; display: flex; align-items: center; font-size: 0.9rem; }
        .btn.active { background: var(--neon-blue) !important; color: #000 !important; font-weight: bold; }
        .led { width: 12px; height: 12px; border-radius: 50%; margin-right: 12px; border: 1px solid #000; flex-shrink: 0; }

        .table-container { background: white; border-radius: 8px; overflow: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; color: black; min-width: 1100px; }
        th { background: #002b5c; color: white; padding: 12px; font-size: 0.8rem; border: 1px solid #ddd; }
        td { border: 1px solid #ddd; height: 58px; text-align: center; }
        
        .clickable { cursor: pointer; font-weight: bold; }
        .input-cell { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; text-transform: uppercase; background: transparent; }
        select { padding: 8px; background: #000; color: #fff; border: 1px solid var(--neon-blue); border-radius: 4px; }
    </style>
</head>
<body>

<div style="display: flex; justify-content: space-between; align-items: center; padding: 10px;">
    <h2 style="color: var(--neon-blue); margin:0;">IASD ESTRELA DALVA</h2>
    <div style="display: flex; gap: 10px;">
        <select id="selMes" onchange="renderTodo()"></select>
        <button onclick="login()" style="padding: 10px 20px; cursor: pointer; background: var(--neon-blue); border:none; font-weight:bold; border-radius:4px;">🔓 GESTÃO</button>
    </div>
</div>

<div id="adminPanel" class="admin-panel">
    <div style="display: grid; grid-template-columns: 350px 1fr; gap: 30px;">
        <div id="listaPinceis">
            <h4 style="color:var(--neon-blue); margin: 0 0 15px 0; letter-spacing: 1px;">SELECIONE O MINISTÉRIO</h4>
            
            <button class="btn" onclick="selPincel('pessoal','Min. Pessoal')"><div class="led" style="background:#0ea5e9"></div> Min. Pessoal</button>
            <button class="btn" onclick="selPincel('mordomia','Mordomia')"><div class="led" style="background:#f59e0b"></div> Mordomia</button>
            <button class="btn" onclick="selPincel('mulher','Min. Mulher')"><div class="led" style="background:#ec4899"></div> Min. Mulher</button>
            <button class="btn" onclick="selPincel('homens','Min. Homens')"><div class="led" style="background:#22c55e"></div> Min. Homens</button>
            <button class="btn" onclick="selPincel('infantil','Min. Infantil')"><div class="led" style="background:#fbbf24"></div> Min. Infantil</button>
            <button class="btn" onclick="selPincel('familia','Min. Família')"><div class="led" style="background:#f87171"></div> Min. Família</button>
            <button class="btn" onclick="selPincel('jovem','Min. Jovem')"><div class="led" style="background:#8b5cf6"></div> Min. Jovem</button>
            <button class="btn" onclick="selPincel('saude','Min. Saúde e temperança')"><div class="led" style="background:#64748b"></div> Min. Saúde e temperança</button>
            
            <button class="btn" style="margin-top:15px; color:#ff4444; border-color: #ff4444;" onclick="selPincel('','')">❌ LIMPAR SELEÇÃO</button>
        </div>
        <div>
            <h4 style="color:var(--neon-blue); margin: 0 0 15px 0;">ANCIÕES DO MÊS</h4>
            <div id="listaAnciaos" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;"></div>
        </div>
    </div>
</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th style="width: 160px;">DIA</th>
                <th style="width: 90px;">DATA</th>
                <th>SABATINA</th>
                <th>PREGADOR</th>
                <th>MÚSICA</th>
                <th>LOUVOR</th>
                <th>SONO</th>
                <th>RECEPÇÃO</th>
                <th>DIACONATO</th>
            </tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com",
        projectId: "unidades-de-acao",
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v245');

    let db = { escalas:{}, cores:{}, anciaos:{} };
    let user = localStorage.getItem('iasd_user') || 'v';
    let pID = null; let pNome = "";
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    function login() {
        if(prompt("Senha:") === 'iasd118') { localStorage.setItem('iasd_user', 'admin'); location.reload(); }
    }

    dbRef.on('value', snap => {
        db = snap.val() || { escalas:{}, cores:{}, anciaos:{} };
        renderTodo();
    });

    function selPincel(id, nome) {
        pID = id; pNome = nome;
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        event.currentTarget.classList.add('active');
    }

    function pintar(dStr) {
        if(user !== 'admin' || pID === null) return;
        if(!db.cores) db.cores = {};
        if(pID === "") delete db.cores[dStr];
        else db.cores[dStr] = { id: pID, nome: pNome };
        dbRef.child('cores').set(db.cores);
    }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('adminPanel').style.display = (user === 'admin') ? 'block' : 'none';

        let hAnc = "";
        meses.forEach((n, i) => {
            hAnc += `<div><label style="font-size:11px; color:#aaa">${n}</label><input style="width:100%;background:#000;color:#fff;border:1px solid #444;padding:4px;" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i}, this.value)"></div>`;
        });
        document.getElementById('listaAnciaos').innerHTML = hAnc;

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, m+1, 0).getDate();

        for(let d=1; d<=diasMes; d++) {
            let dt = new Date(2026, m, d);
            let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}_${m+1}_2026`;
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr');
                if(c.id) tr.className = c.id;

                tr.innerHTML = `
                    <td class="clickable" onclick="pintar('${dStr}')">
                        <div style="font-size:0.7rem; color:#64748b; margin-bottom:2px">${["DOMINGO","","","QUARTA","","","SÁBADO"][sem]}</div>
                        <div style="font-size:0.8rem; font-weight:bold">${c.nome || ''}</div>
                    </td>
                    <td class="clickable" onclick="pintar('${dStr}')">${d}/${m+1}</td>
                    ${["sa","pr","mu","lo","so","re","di"].map(col => `
                        <td><input class="input-cell" value="${db.escalas?.[dStr]?.[col] || ''}" onchange="atu('${dStr}','${col}',this.value)"></td>
                    `).join('')}
                `;
                corpo.appendChild(tr);
            }
        }
    }

    function atu(d, c, v) { 
        if(!db.escalas) db.escalas = {};
        if(!db.escalas[d]) db.escalas[d] = {};
        db.escalas[d][c] = v.toUpperCase();
        dbRef.child('escalas').set(db.escalas);
    }

    function atuAnc(i, v) {
        if(!db.anciaos) db.anciaos = {};
        db.anciaos[i] = v.toUpperCase();
        dbRef.child('anciaos').set(db.anciaos);
    }

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
