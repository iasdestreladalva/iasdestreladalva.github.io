<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - Management System</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --pink: #fd79a8; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Estilizada */
        .sidebar { width: 260px; background: #0f172a; border-right: 1px solid #1e293b; display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { color: var(--neon); font-size: 1.2rem; text-align: center; margin-bottom: 30px; }
        
        /* Painel Central */
        .main-content { flex: 1; overflow-y: auto; padding: 25px; position: relative; }
        
        /* Admin Box Restaurado */
        .admin-panel { display: none; background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid var(--orange); margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

        /* Botões e Inputs */
        .btn-nav { width: 100%; padding: 12px; background: none; border: 1px solid #334155; color: #94a3b8; border-radius: 8px; cursor: pointer; text-align: left; margin-bottom: 10px; transition: 0.3s; }
        .btn-nav:hover, .btn-nav.active { background: var(--blue); color: var(--neon); border-color: var(--neon); }
        .btn-action { background: var(--neon); color: var(--blue); border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        /* Tabelas */
        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; color: #1e293b; }
        th { background: #f1f5f9; padding: 12px; font-size: 0.75rem; text-transform: uppercase; border: 1px solid #e2e8f0; }
        td { border: 1px solid #e2e8f0; padding: 5px; text-align: center; font-weight: 600; }
        input[type="text"] { width: 100%; border: none; background: transparent; text-align: center; font-family: inherit; font-weight: inherit; text-transform: uppercase; }

        /* Cores dos Ministérios */
        .row-pessoal { background-color: #e0f2fe !important; }
        .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; }
        .row-homens { background-color: #ecfeff !important; }
        .row-familia { background-color: #faf5ff !important; }
        .row-mulher { background-color: #fdf2f8 !important; }
        .row-musica { background-color: #fff1f2 !important; }

        /* Upload e Cards */
        .grid-files { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .file-card { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .file-card:hover { border-color: var(--neon); transform: translateY(-3px); }
        
        .progress-bar { width: 100%; height: 8px; background: #334155; border-radius: 4px; margin-top: 10px; display: none; }
        .progress-fill { height: 100%; background: var(--green); width: 0%; border-radius: 4px; transition: width 0.3s; }

        #zoomOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:1000; flex-direction:column; align-items:center; justify-content:center; }
    </style>
</head>
<body>

<div class="sidebar no-print">
    <h2>ESTRELA DALVA</h2>
    <select id="selMes" onchange="init();" class="btn-nav" style="background:#000; color:var(--neon);"></select>
    
    <button class="btn-nav active" onclick="showTab('escala')">📅 Escala Mensal</button>
    <button class="btn-nav" id="navMusica" onclick="showTab('musica')">🎵 Louvor & Vídeos</button>
    <button class="btn-nav" id="navFinanceiro" onclick="showTab('financeiro')">💰 Tesouraria</button>
    <button class="btn-nav" onclick="showTab('missao')">📊 Missionário</button>
    <button class="btn-nav" onclick="showTab('planejamento')">📝 Planejamento</button>
    
    <div style="margin-top:auto;">
        <button class="btn-nav" id="btnAcesso" onclick="abrirLogin()" style="border-color:var(--neon);">🔓 Acessar</button>
        <button class="btn-nav" id="btnSair" onclick="sair()" style="display:none; border-color:var(--orange);">🚪 Sair</button>
    </div>
</div>

<div class="main-content">
    <div id="adminPanel" class="admin-panel no-print">
        <h3 style="color:var(--orange); margin-top:0;">Painel de Controle Admin</h3>
        <div class="admin-grid">
            <div>
                <label>Cor do Ministério:</label>
                <div id="gridCores" style="display:grid; grid-template-columns:1fr 1fr; gap:5px; margin-top:10px;"></div>
            </div>
            <div>
                <label>Ancião do Mês:</label>
                <input type="text" id="inAnciao" class="btn-nav" style="background:#000;" onchange="salvarAnciao(this.value)">
            </div>
            <div>
                <label>Gestão de Senhas:</label>
                <div id="gridSenhas"></div>
            </div>
        </div>
    </div>

    <div id="tab-escala" class="tab-content">
        <div class="table-container">
            <table>
                <thead>
                    <tr><th colspan="9" id="headTit" style="font-size:1.4rem; background:var(--blue); color:white;">ESCALA</th></tr>
                    <tr><th colspan="9" id="headAnc" style="background:#1e293b; color:var(--gold);">ANCIÃO: ---</th></tr>
                    <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
                </thead>
                <tbody id="corpoEscala"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-musica" class="tab-content" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3>Músicas e Vídeos para o Culto</h3>
            <div id="uploadZoneMusica" style="display:none;">
                <input type="file" id="fMus" hidden onchange="fastUpload('musica', 'fMus')">
                <button class="btn-action" onclick="document.getElementById('fMus').click()">+ Enviar Arquivo</button>
            </div>
        </div>
        <div class="progress-bar" id="pb-musica"><div class="progress-fill" id="pf-musica"></div></div>
        <div id="gridMusica" class="grid-files" style="margin-top:20px;"></div>
    </div>

    <div id="tab-financeiro" class="tab-content" style="display:none;">
        <h3>Comprovantes de Tesouraria</h3>
        <input type="file" id="fFin" hidden onchange="fastUpload('financeiro', 'fFin')">
        <button class="btn-action" style="background:var(--green);" onclick="document.getElementById('fFin').click()">+ Enviar Comprovante</button>
        <div class="progress-bar" id="pb-financeiro"><div class="progress-fill" id="pf-financeiro"></div></div>
        <div id="gridFinanceiro" class="grid-files" style="margin-top:20px;"></div>
    </div>

    <div id="tab-missao" class="tab-content" style="display:none;">
        <div style="display:grid; grid-template-columns: 1fr 2fr; gap:30px;">
            <div id="formMissao"></div>
            <div style="height:400px; background:rgba(255,255,255,0.05); padding:20px; border-radius:15px;">
                <canvas id="chartMissao"></canvas>
            </div>
        </div>
    </div>
</div>

<div id="zoomOverlay">
    <div id="zoomView" style="width:90%; height:75%; display:flex; justify-content:center; align-items:center;"></div>
    <div style="margin-top:20px; display:flex; gap:15px;">
        <button class="btn-action" id="btnDownload" style="background:var(--green);">⬇ Baixar</button>
        <button class="btn-action" onclick="document.getElementById('zoomOverlay').style.display='none'" style="background:#555;">Fechar</button>
    </div>
</div>

<script>
    // CREDENCIAIS REAIS DO SEU FIREBASE
    const firebaseConfig = {
      apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
      authDomain: "unidades-de-acao.firebaseapp.com",
      projectId: "unidades-de-acao",
      storageBucket: "unidades-de-acao.firebasestorage.app",
      messagingSenderId: "1088355029870",
      appId: "1:1088355029870:web:7bb98d3115e7b7767f677f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore(), storage = firebase.storage();
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { pessoal:"M. Pessoal", mordomia:"Mordomia", saude:"Saúde", homens:"Homens", familia:"Família", mulher:"Mulher", musica:"Música" };

    let dbL = JSON.parse(localStorage.getItem('iasd_final_v1')) || { escalas:{}, cores:{}, anciaos:{}, missao:{}, plano:{}, senhas:{admin:"iasd118", musica:"mus123", pessoal:"mis123"} };
    let curUser = localStorage.getItem('iasd_user') || 'visitante';
    let myChart;

    function save() { localStorage.setItem('iasd_final_v1', JSON.stringify(dbL)); }

    function init() {
        const m = document.getElementById('selMes').value;
        const isAdm = (curUser === 'admin');
        
        document.getElementById('adminPanel').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = curUser === 'visitante' ? 'block' : 'none';
        document.getElementById('uploadZoneMusica').style.display = (isAdm || curUser === 'musica') ? 'block' : 'none';

        document.getElementById('headTit').innerText = `ESCALA - ${MESES[m]} 2026`;
        document.getElementById('headAnc').innerText = `ANCIÃO RESPONSÁVEL: ${dbL.anciaos[m] || 'NÃO DEFINIDO'}`;
        
        renderEscala(m);
        renderAdmin();
        loadFiles(m);
        updateMissaoChart(m);
    }

    function renderEscala(m) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, parseInt(m)+1, 0).getDate();
        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, m, d), sem = dt.getDay(), dStr = `${d}/${parseInt(m)+1}`;
            if([0,3,6].includes(sem)) {
                let cor = dbL.cores[dStr] || "";
                let tr = `<tr class="row-${cor}"><td onclick="aplicarCor('${dStr}')" style="cursor:pointer"><b>${["DOM","SEG","TER","QUA","QUI","SEX","SÁB"][sem]}</b></td><td>${dStr}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(c => {
                    let canEdit = (curUser === 'admin' || (curUser === cor && c === 'pr'));
                    tr += `<td><input ${canEdit?'':'disabled'} value="${dbL.escalas[dStr]?.[c]||''}" onchange="updateEscala('${dStr}','${c}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    async function fastUpload(pasta, inputId) {
        const file = document.getElementById(inputId).files[0];
        if(!file) return;
        const m = document.getElementById('selMes').value;
        const pb = document.getElementById(`pb-${pasta}`), pf = document.getElementById(`pf-${pasta}`);
        
        pb.style.display = 'block';
        const task = storage.ref(`iasd_v2/${pasta}/${m}/${file.name}`).put(file);

        task.on('state_changed', 
            s => pf.style.width = (s.bytesTransferred / s.totalBytes * 100) + '%',
            e => alert("Erro no upload"),
            async () => {
                const url = await task.snapshot.ref.getDownloadURL();
                await db.collection(pasta).add({ nome: file.name, url, tipo: file.type, mes: m, ts: Date.now() });
                pb.style.display = 'none'; pf.style.width = '0%';
                loadFiles(m);
            }
        );
    }

    async function loadFiles(m) {
        ['musica', 'financeiro'].forEach(async pasta => {
            const grid = document.getElementById(`grid${pasta.charAt(0).toUpperCase() + pasta.slice(1)}`);
            grid.innerHTML = "Carregando...";
            const snap = await db.collection(pasta).where("mes", "==", m).get();
            grid.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                const card = document.createElement('div'); card.className = 'file-card';
                let icon = d.tipo.includes('video') ? '🎬' : (d.tipo.includes('image') ? '🖼️' : '🎵');
                card.innerHTML = `<div style="font-size:2rem; margin-bottom:10px;">${icon}</div><small>${d.nome}</small>`;
                card.onclick = () => abrirZoom(d);
                grid.appendChild(card);
            });
        });
    }

    function abrirZoom(arq) {
        const v = document.getElementById('zoomView'); v.innerHTML = "";
        if(arq.tipo.includes('video')) v.innerHTML = `<video controls autoplay style="max-width:100%; max-height:100%;"><source src="${arq.url}"></video>`;
        else if(arq.tipo.includes('image')) v.innerHTML = `<img src="${arq.url}" style="max-height:100%;">`;
        else v.innerHTML = `<div style="text-align:center;"><h2>🎵 ${arq.nome}</h2><audio controls autoplay><source src="${arq.url}"></audio></div>`;
        
        document.getElementById('btnDownload').onclick = () => window.open(arq.url);
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    // Funções Administrativas
    function renderAdmin() {
        const gC = document.getElementById('gridCores'); gC.innerHTML = "";
        Object.keys(MINS).forEach(k => gC.innerHTML += `<button class="btn-nav" style="padding:5px; font-size:0.7rem; ${window.corSel===k?'border-color:white;':''}" onclick="window.corSel='${k}'; renderAdmin();">${MINS[k]}</button>`);
        
        const gS = document.getElementById('gridSenhas'); gS.innerHTML = "";
        ['admin','musica','pessoal'].forEach(u => gS.innerHTML += `<div style="display:flex; gap:5px; margin-bottom:5px;"><small>${u}:</small><input class="btn-nav" style="padding:2px; height:20px; font-size:0.7rem;" value="${dbL.senhas[u]}" onchange="dbL.senhas['${u}']=this.value; save();"></div>`);
        
        document.getElementById('inAnciao').value = dbL.anciaos[document.getElementById('selMes').value] || "";
    }

    function aplicarCor(d) { if(curUser==='admin') { dbL.cores[d] = window.corSel; save(); renderTodo(); } }
    function updateEscala(d, c, v) { if(!dbL.escalas[d]) dbL.escalas[d]={}; dbL.escalas[d][c]=v.toUpperCase(); save(); }
    function salvarAnciao(v) { dbL.anciaos[document.getElementById('selMes').value] = v; save(); renderTodo(); }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.btn-nav').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-'+t).style.display = 'block';
        event.currentTarget.classList.add('active');
        if(t==='missao') updateMissaoChart(document.getElementById('selMes').value);
    }

    function abrirLogin() {
        let u = prompt("Usuário:"), p = prompt("Senha:");
        if(dbL.senhas[u?.toLowerCase()] === p) { localStorage.setItem('iasd_user', u.toLowerCase()); location.reload(); }
        else alert("Acesso negado");
    }

    function sair() { localStorage.removeItem('iasd_user'); location.reload(); }

    // Gráfico Missionário Otimizado
    function updateMissaoChart(m) {
        const ctx = document.getElementById('chartMissao').getContext('2d');
        if(myChart) myChart.destroy();
        const data = dbL.missao[m] || [0,0,0,0,0];
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: ['Encontros', 'Classes', 'Estudos', 'Ministrantes', 'Duplas'], datasets: [{ data: data, backgroundColor: ['#00d2ff','#ffd700','#ff7f50','#2ecc71','#ff4757'] }] },
            options: { maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
        
        const fM = document.getElementById('formMissao'); fM.innerHTML = "<h4>Dados do Mês</h4>";
        ['Encontros', 'Classes', 'Estudos', 'Ministrantes', 'Duplas'].forEach((l, i) => {
            fM.innerHTML += `<div style="margin-bottom:10px;"><label>${l}</label><input type="number" class="btn-nav" value="${data[i]}" onchange="if(!dbL.missao[${m}])dbL.missao[${m}]=[0,0,0,0,0]; dbL.missao[${m}][${i}]=this.value; save(); updateMissaoChart(${m});"></div>`;
        });
    }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = init;
</script>
</body>
</html>
