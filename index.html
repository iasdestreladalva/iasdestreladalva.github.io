<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>IASD Estrela Dalva - v102.43</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; --red: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #e6f1ff; font-family: sans-serif; padding: 10px; overflow-x: hidden; }
        .container { width: 100%; max-width: 1400px; margin: auto; }

        /* HEADER E NAV */
        .header-top { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
        .input-dark { background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 14px; }

        /* ESCALA TABELA */
        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 8px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; color: black; }
        th { background: var(--blue); color: white; padding: 10px; font-size: 12px; border: 1px solid #ccc; }
        td { border: 1px solid #ddd; height: 45px; text-align: center; font-weight: bold; }
        .input-escala { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; }

        /* ADMIN PANEL */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .btn-min { padding: 10px; border: 1px solid var(--neon); color: var(--neon); background: transparent; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-min.active { background: var(--neon); color: var(--blue); }

        /* TESOURARIA E MINIATURAS */
        .tesouraria-section { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--green); }
        .grid-arquivos { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 15px; }
        .thumb-box { position: relative; width: 120px; height: 120px; background: #000; border: 2px solid #334155; border-radius: 8px; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .thumb-box:hover { border-color: var(--neon); transform: scale(1.05); }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .pdf-icon { color: var(--red); font-weight: bold; font-size: 24px; text-align: center; }

        /* VISUALIZADOR TELA CHEIA (LIGHTBOX) */
        .fullscreen-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 20000; justify-content: center; align-items: center; cursor: zoom-out; }
        .fullscreen-overlay img { max-width: 95%; max-height: 95%; border-radius: 5px; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .fullscreen-overlay iframe { width: 90%; height: 90%; border: none; background: white; }

        /* CORES ESCALA */
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; } .row-familia { background-color: #faf5ff !important; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <h2 style="color:var(--neon)">IASD ESTRELA DALVA</h2>
        <div class="nav-buttons">
            <select id="selMes" onchange="renderTodo();" class="input-dark"></select>
            <button class="input-dark" id="btnTesourariaAdmin" onclick="abrirPainelUpload()" style="display:none; color:var(--green)">➕ ARQUIVO</button>
            <button class="input-dark" id="btnAcesso" onclick="abrirLogin()">🔓</button>
            <button class="input-dark" id="btnSair" onclick="sair()" style="display:none; color:red">🚪</button>
        </div>
    </header>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-sec">
                <h4 style="color:var(--neon); margin-bottom:10px">ANCIÃO DO MÊS</h4>
                <input class="input-dark" id="inAnciao" onchange="atuAnciaoManual(this.value)" style="width:100%" placeholder="Trocar nome...">
            </div>
            <div class="admin-sec">
                <h4 style="color:var(--neon); margin-bottom:10px">COR DO DIA</h4>
                <div id="listaMinisterios" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px"></div>
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th colspan="9" id="headerTitulo">ESCALA</th></tr>
                <tr><th colspan="9" id="headerAnciao" style="color:var(--gold)">Responsável:</th></tr>
                <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div class="tesouraria-section">
        <h3 style="color:var(--green)">💰 COMPROVANTES DE TESOURARIA</h3>
        <p style="font-size: 12px; color: #888;">Clique na miniatura para ampliar</p>
        <div id="gridPublico" class="grid-arquivos"></div>
    </div>
</div>

<div id="visualizador" class="fullscreen-overlay" onclick="fecharVisualizador()">
    <div id="conteudoMídia" style="width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;"></div>
</div>

<div id="modalLogin" class="fullscreen-overlay" style="cursor: default;">
    <div style="background:white; padding:30px; border-radius:15px; width:300px;">
        <h3 style="color:black; margin-bottom:15px">Acesso Restrito</h3>
        <input type="text" id="user" placeholder="Usuário" class="input-dark" style="color:black!important; width:100%; margin-bottom:10px">
        <input type="password" id="pass" placeholder="Senha" class="input-dark" style="color:black!important; width:100%">
        <button class="btn-min" style="background:var(--blue); color:white; margin-top:20px" onclick="login()">ENTRAR</button>
        <button onclick="fecharLogin()" style="width:100%; background:none; border:none; margin-top:10px; color:#666; cursor:pointer">Cancelar</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com/", projectId: "unidades-de-acao", appId: "SUA_APP_ID" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const ANCIÃOS_AUTO = { 0:"Jesuino", 1:"Wesley", 2:"Ester", 3:"Marcilio", 4:"Albert", 5:"Albert", 6:"Jesuino", 7:"Jesuino", 8:"Ester", 9:"Marcilio", 10:"Wesley", 11:"Albert" };
    const MINS = { pessoal:"Pess.", mordomia:"Mord.", saude:"Saúde", familia:"Fam." };

    let db = { escalas: {}, anciaos_manual: {}, docs: {}, senhas: {admin:"iasd118"} };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let minSel = null;

    database.ref('dados_igreja').on('value', (snap) => { if(snap.val()) { db = snap.val(); renderTodo(); } });

    function renderTodo() {
        const m = document.getElementById('selMes').value;
        const u = curUser;
        
        document.getElementById('btnSair').style.display = u !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnTesourariaAdmin').style.display = (u === 'admin' || u === 'ger') ? 'block' : 'none';
        document.getElementById('adminPanel').style.display = (u === 'admin') ? 'block' : 'none';

        const anciao = db.anciaos_manual?.[m] || ANCIÃOS_AUTO[m];
        document.getElementById('headerAnciao').innerText = "Responsável: Ancião " + anciao;
        document.getElementById('headerTitulo').innerText = "ESCALA - " + MESES[m] + " 2026";

        renderEscala();
        renderMiniaturas();
        renderBotoesAdmin();
    }

    function renderEscala() {
        const mIdx = parseInt(document.getElementById('selMes').value);
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, mIdx, d); let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}/${mIdx+1}/2026`;
                let cor = db.regras_manuais?.[dStr] ? "row-"+db.regras_manuais[dStr] : "";
                let tr = `<tr class="${cor}" onclick="pintarLinha('${dStr}')">
                    <td style="font-size:10px">${["DOM","","","QUA","","","SÁB"][sem]}</td>
                    <td>${d}/${mIdx+1}</td>`;
                ["sa","pr","mu","lo","so","re","di"].forEach(c => {
                    let val = db.escalas?.[dStr]?.[c] || "";
                    tr += `<td><input class="input-escala" value="${val}" onchange="atuCel('${dStr}','${c}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    // FUNÇÕES DE TESOURARIA (UPLOAD E VIEW)
    function renderMiniaturas() {
        const m = document.getElementById('selMes').value;
        const grid = document.getElementById('gridPublico'); grid.innerHTML = "";
        const arquivos = db.docs?.[m] || [];

        arquivos.forEach((file, index) => {
            const isPDF = file.type.includes('pdf');
            const html = `
                <div class="thumb-box" onclick="abrirVisualizador('${file.data}', '${file.type}')">
                    ${isPDF ? '<div class="pdf-icon">📄<br><small>PDF</small></div>' : `<img src="${file.data}">`}
                    ${(curUser==='admin') ? `<button onclick="removerDoc(${index}, event)" style="position:absolute; top:2px; right:2px; background:red; color:white; border:none; border-radius:50%; width:20px; height:20px; cursor:pointer">X</button>` : ''}
                </div>`;
            grid.innerHTML += html;
        });
    }

    function abrirVisualizador(data, type) {
        const f = document.getElementById('visualizador');
        const content = document.getElementById('conteudoMídia');
        f.style.display = 'flex';
        
        if(type.includes('pdf')) {
            content.innerHTML = `<iframe src="${data}"></iframe>`;
        } else {
            content.innerHTML = `<img src="${data}">`;
        }
    }

    function fecharVisualizador() {
        document.getElementById('visualizador').style.display = 'none';
        document.getElementById('conteudoMídia').innerHTML = "";
    }

    function abrirPainelUpload() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*,application/pdf';
        input.onchange = e => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = event => {
                const m = document.getElementById('selMes').value;
                if(!db.docs) db.docs = {};
                if(!db.docs[m]) db.docs[m] = [];
                db.docs[m].push({ data: event.target.result, type: file.type });
                save();
            };
            reader.readAsDataURL(file);
        };
        input.click();
    }

    function removerDoc(idx, e) {
        e.stopPropagation();
        const m = document.getElementById('selMes').value;
        db.docs[m].splice(idx, 1);
        save();
    }

    // ACESSÓRIOS ADMIN
    function renderBotoesAdmin() {
        const div = document.getElementById('listaMinisterios'); div.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            div.innerHTML += `<button class="btn-min ${minSel===k?'active':''}" onclick="minSel='${k}'; renderBotoesAdmin()">${MINS[k]}</button>`;
        });
    }

    function pintarLinha(dStr) { if(minSel && curUser==='admin') { if(!db.regras_manuais) db.regras_manuais={}; db.regras_manuais[dStr]=minSel; save(); } }
    function atuCel(d, c, v) { if(!db.escalas) db.escalas={}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function atuAnciaoManual(v) { const m = document.getElementById('selMes').value; if(!db.anciaos_manual) db.anciaos_manual={}; db.anciaos_manual[m]=v; save(); }
    function save() { database.ref('dados_igreja').set(db); }
    function login() { if(db.senhas[document.getElementById('user').value] === document.getElementById('pass').value) { localStorage.setItem('iasd_curUser', document.getElementById('user').value); location.reload(); } else alert("Erro!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function abrirLogin() { document.getElementById('modalLogin').style.display='flex'; }
    function fecharLogin() { document.getElementById('modalLogin').style.display='none'; }

    // INICIAR MESES
    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script>
</body>
</html>
