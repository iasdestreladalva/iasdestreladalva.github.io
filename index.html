<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; --exit-red: #ef4444; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-top: 80px; }
        
        /* BARRA FIXA */
        .toolbar { 
            position: fixed; top: 0; left: 0; right: 0; height: 70px; 
            background: #111827; display: flex; align-items: center; 
            padding: 0 20px; z-index: 1000; border-bottom: 3px solid var(--neon-blue);
            gap: 10px; justify-content: space-between;
        }
        .btn-tool { background: transparent; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem; text-transform: uppercase; }
        .btn-eventos { border-color: var(--accent-orange); color: #fff; background: rgba(249, 115, 22, 0.1); }
        .btn-login { background: var(--neon-blue); color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-logout { background: var(--exit-red); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; }

        /* MODAL EVENTOS (CONFORME IMAGEM) */
        .modal-eventos { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 3000; align-items: center; justify-content: center; }
        .card-eventos { background: #1e293b; padding: 30px; border-radius: 15px; border: 2px solid var(--accent-orange); width: 600px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .card-eventos h2 { color: #f87171; text-align: center; margin-top: 0; font-size: 1.4rem; text-transform: uppercase; letter-spacing: 1px; }
        .ev-label { display: block; color: var(--neon-blue); font-size: 0.75rem; font-weight: bold; margin-bottom: 5px; margin-top: 15px; }
        .ev-input { width: 100%; background: #000; border: 1px solid #334155; color: #fff; padding: 12px; border-radius: 6px; box-sizing: border-box; font-size: 0.9rem; }
        .ev-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-criar-ev { width: 100%; background: #f87171; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-concluir { width: 100%; background: #ff3b00; color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 1rem; }

        /* PAINEL GESTÃO */
        #painelAdmin { display: none; background: #0f172a; border: 2px solid var(--accent-orange); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: 220px 300px 1fr; gap: 25px; }
        .col-header { color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        .btn-min { width: 100%; padding: 10px; margin-bottom: 5px; background: transparent; border: 1.5px solid var(--neon-blue); color: var(--neon-blue); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon-blue); color: #000; }
        .login-scroll { max-height: 350px; overflow-y: auto; background: #000; border-radius: 8px; padding: 5px; border: 1px solid #334155; }
        .login-table { width: 100%; border-collapse: collapse; color: #fbbf24; font-size: 0.8rem; }
        .login-table th { color: var(--accent-orange); text-align: left; padding: 5px; font-size: 0.7rem; }

        /* TABELA ESCALA */
        #secaoEscala { background: white; border-radius: 8px; padding: 15px; overflow-x: auto; margin-bottom: 30px; border: 2px solid #000; }
        table.escala { width: 100%; border-collapse: collapse; color: black; min-width: 1000px; }
        table.escala th { background: var(--iasd-blue); color: white; padding: 10px; border: 1px solid #000; font-size: 0.75rem; }
        table.escala td { border: 1px solid #000; text-align: center; font-weight: bold; height: 40px; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; }

        @media print { .toolbar, #painelAdmin, .modal-eventos, .modal-overlay { display: none !important; } body { padding-top: 0; } }

        /* CORES MINISTÉRIOS */
        tr.pessoal td { background-color: #e0f2fe !important; } tr.mordomia td { background-color: #fef3c7 !important; }
        tr.saude td { background-color: #f1f5f9 !important; } tr.homens td { background-color: #dcfce7 !important; }
        tr.familia td { background-color: #fee2e2 !important; } tr.adolescentes td { background-color: #f0fdf4 !important; }
        tr.mulher td { background-color: #fce7f3 !important; } tr.musica td { background-color: #ede9fe !important; }
    </style>
</head>
<body>

<div class="toolbar">
    <div style="display: flex; gap: 8px; align-items: center;">
        <span style="font-weight: bold; color: var(--neon-blue); margin-right: 10px; font-size: 0.9rem;">IASD ESTRELA DALVA</span>
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid #444; padding:8px; border-radius:6px; font-weight:bold;"></select>
        <button class="btn-tool" onclick="imprimir('anual')">🗓️ ANUAL</button>
        <button class="btn-tool btn-eventos" onclick="abrirEventos()">🔥 EVENTOS</button>
        <button class="btn-tool">⚙️ TESOURARIA</button>
        <button class="btn-tool">📊 MISSIONÁRIO</button>
    </div>
    <div style="display: flex; gap: 10px;">
        <button id="btnEntrar" class="btn-login" onclick="abrirLogin()">ENTRAR</button>
        <button id="btnSair" class="btn-logout" onclick="fazerLogout()">🚪 SAIR</button>
    </div>
</div>

<div id="modalEventos" class="modal-eventos">
    <div class="card-eventos">
        <h2>Criar Semana de Oração / Evento</h2>
        
        <label class="ev-label">NOME DO EVENTO (EX: SEMANA DE ORAÇÃO)</label>
        <input type="text" class="ev-input" placeholder="Opcional">

        <div class="ev-row">
            <div>
                <label class="ev-label">DATA INÍCIO</label>
                <input type="text" class="ev-input" placeholder="dd/mm/aaaa">
            </div>
            <div>
                <label class="ev-label">DATA FIM</label>
                <input type="text" class="ev-input" placeholder="dd/mm/aaaa">
            </div>
        </div>

        <label class="ev-label">HORÁRIO (OPCIONAL)</label>
        <input type="text" class="ev-input" placeholder="--:--">

        <button class="btn-criar-ev">Criar Evento no Período</button>
        <button class="btn-concluir" onclick="fecharEventos()">CONCLUÍDO</button>
    </div>
</div>

<div id="painelAdmin">
    <div class="admin-grid">
        <div class="column">
            <div class="col-header">1. MINISTÉRIO DO DIA</div>
            <button class="btn-min" onclick="selPincel('pessoal','M. Pessoal')">M. Pessoal</button>
            <button class="btn-min" onclick="selPincel('mordomia','Mordomia')">Mordomia</button>
            <button class="btn-min" onclick="selPincel('saude','Saúde')">Saúde</button>
            <button class="btn-min" onclick="selPincel('homens','M. Homens')">M. Homens</button>
            <button class="btn-min" onclick="selPincel('familia','M. Família')">M. Família</button>
            <button class="btn-min" onclick="selPincel('adolescentes','Adolescentes')">Adolescentes</button>
            <button class="btn-min" onclick="selPincel('mulher','M. Mulher')">M. Mulher</button>
            <button class="btn-min" onclick="selPincel('musica','Música')">Música</button>
            <button class="btn-min" style="border-color:var(--exit-red); color:var(--exit-red)" onclick="selPincel('','')">LIMPAR</button>
        </div>
        <div class="column">
            <div class="col-header">2. RESPONSÁVEL MENSAL</div>
            <div id="gridAnciaos" style="display:grid; grid-template-columns:1fr 1fr; gap:8px;"></div>
        </div>
        <div class="column">
            <div class="col-header">3. CONTROLE DE LOGINS E SENHAS</div>
            <div class="login-scroll">
                <table class="login-table">
                    <thead><tr><th>MINISTÉRIO</th><th>USUÁRIO</th><th>SENHA</th></tr></thead>
                    <tbody id="corpoLogins"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="secaoEscala">
    <div style="text-align:center; color:#000; margin-bottom:15px">
        <div id="txtAnciao" style="font-size:1.2rem; font-weight:900; color:var(--iasd-blue)">ANCIÃO: ---</div>
        <div style="font-weight:bold">ESCALA DE <span id="txtMes">---</span></div>
    </div>
    <table class="escala">
        <thead><tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr></thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_dalva_final');

    let db = { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{} };
    let logado = false;
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    dbRef.on('value', snap => { db = snap.val() || { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{} }; renderTodo(); });

    function abrirEventos() { document.getElementById('modalEventos').style.display = 'flex'; }
    function fecharEventos() { document.getElementById('modalEventos').style.display = 'none'; }

    function abrirLogin() {
        let u = prompt("Usuário:"); let s = prompt("Senha:");
        if(u === "admin" && s === "iasd118") {
            logado = true;
            document.getElementById('painelAdmin').style.display = 'block';
            document.getElementById('btnEntrar').style.display = 'none';
            document.getElementById('btnSair').style.display = 'block';
            renderTodo();
        } else { alert("Acesso Negado"); }
    }

    function fazerLogout() { location.reload(); }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('txtMes').innerText = meses[m];
        document.getElementById('txtAnciao').innerText = `ANCIÃO: ${db.anciaos?.[m] || "---"}`;

        document.getElementById('gridAnciaos').innerHTML = meses.map((n, i) => `
            <div><label style="font-size:9px; color:#94a3b8">${n}</label>
            <input style="background:#000; color:#fff; border:1px solid #334155; width:100%; padding:5px" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)" ${!logado?'disabled':''}></div>
        `).join('');

        const loginsExemplo = ["Administrador","Gerência","Diaconato","Música","Sonoplastia","M. Mulher","Escola Sabatina","M. Pessoal","Mordomia","Saúde","M. Homens","M. Família","Adolescentes"];
        document.getElementById('corpoLogins').innerHTML = loginsExemplo.map(cargo => `
            <tr><td style="padding:5px">${cargo}</td><td>---</td><td><input style="background:transparent; border:none; color:#fbbf24; width:100%" value="******" disabled></td></tr>
        `).join('');

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasMes; d++) {
            let dt = new Date(2026, m, d);
            if([0,3,6].includes(dt.getDay())) {
                let dStr = `${d}_${m+1}_2026`;
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr'); if(c.id) tr.className = c.id;
                tr.innerHTML = `<td onclick="${logado?`pintar('${dStr}')`:''}" style="cursor:pointer"><div>${["DOM","","","QUA","","","SAB"][dt.getDay()]}</div><div style="font-size:8px">${c.nome||''}</div></td>
                <td>${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)" ${!logado?'disabled':''}></td>`).join('');
                corpo.appendChild(tr);
            }
        }
    }

    function atuAnc(i,v) { if(logado){ if(!db.anciaos) db.anciaos={}; db.anciaos[i]=v.toUpperCase(); dbRef.child('anciaos').set(db.anciaos); }}
    function atu(d,c,v) { if(logado){ if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }}
    
    let pID = null; let pNome = "";
    function selPincel(id, nome) { pID = id; pNome = nome; document.querySelectorAll('.btn-min').forEach(b => b.classList.remove('active')); if(id!=="") event.currentTarget.classList.add('active'); }
    function pintar(dStr) { if(logado && pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}
    function imprimir(t) { window.print(); }

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
