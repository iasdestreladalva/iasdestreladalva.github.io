<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        #saveIndicator { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); padding: 8px 25px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 20000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .saving { background: var(--orange); color: white; border: 2px solid white; }
        .saved { background: var(--green); color: white; border: 2px solid white; }

        .btn-modern { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); background: transparent; color: var(--neon); cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.8rem; }
        .btn-modern:hover { background: var(--neon); color: var(--blue); box-shadow: 0 0 10px var(--neon); }

        #userWelcomeBar { display: none; background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon); padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95rem; color: #fff; text-align: center; }
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 2fr 1.2fr; gap: 15px; align-items: start; } 
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; height: auto; min-height: 520px; }
        
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 6px; box-sizing: border-box; outline: none; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 0.7rem; transition: 0.2s; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }
        
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; border-radius: 10px 10px 0 0; overflow: hidden; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.9rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; }
        
        .hoje { outline: 3px solid var(--gold) !important; position: relative; z-index: 5; box-shadow: 0 0 15px rgba(255, 215, 0, 0.5); }
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 1.1rem; display: block; padding: 8px 0; outline: none; }
        .conflito { color: var(--red) !important; text-decoration: underline; font-weight: 900 !important; }
        
        .progress-container { background: #000; border-radius: 10px; height: 25px; width: 100%; margin-top: 8px; position: relative; overflow: hidden; border: 1px solid var(--gold); }
        .progress-bar { background: linear-gradient(90deg, var(--gold), #ffa500); height: 100%; transition: width 0.6s; width: 0%; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 0.75rem; font-weight: bold; line-height: 25px; color: white; text-shadow: 1px 1px 2px black; z-index: 1; }

        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 90vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }

        .cron-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .cron-container { background: white; color: black; padding: 25px; border-radius: 15px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.5); position: relative; }
        
        /* Estilos Novos para o Cronograma Pré-Moldado */
        .bloco-cron { border: 1px solid #ccc; margin-bottom: 10px; border-radius: 5px; overflow: hidden; }
        .cron-header { padding: 8px; display: flex; gap: 10px; align-items: center; }
        .cron-header input { border: none; background: transparent; font-weight: bold; text-align: center; width: 100%; }
        .cron-table { width: 100%; border-collapse: collapse; }
        .cron-table td { border-top: 1px solid #eee; padding: 5px; }
        .cron-table input { border: none; width: 95%; font-size: 0.9rem; }

        #btnTopo { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: var(--neon); color: var(--blue); border: none; font-weight: bold; font-size: 1.5rem; cursor: pointer; display: none; z-index: 999; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        @media print { 
            .no-print, #adminPanel, #userWelcomeBar, #secPlan, #secTesouraria, #secLinksPublicos, .chart-container, .pop-content, button, select, #headerTopo, #saveIndicator, .busca-container, #newsTicker, .cron-overlay, #btnTopo { display: none !important; }
            #areaCronograma { display: block !important; position: static !important; width: 100% !important; box-shadow: none !important; }
            body { background: white; padding: 0; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            table#tabela-main { margin-top: 0; width: 100%; border: 1px solid #ccc !important; }
            #headerTitulo { background: var(--blue) !important; color: white !important; display: table-cell !important; padding: 15px !important; }
            #headerAnciao { background: var(--blue) !important; color: var(--gold) !important; display: table-cell !important; padding: 0 15px 15px 15px !important; }
        }
    </style>
</head>
<body>

<div id="saveIndicator"></div>
<div id="newsTicker"><span></span></div>
<button id="btnTopo" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>

<div class="container">
    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:8px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button id="btnAcesso" class="btn-modern" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="btn-modern" style="border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="userWelcomeBar" class="no-print"></div>

    <div class="no-print" style="display:flex; gap:10px; margin-bottom:15px; justify-content:center; flex-wrap: wrap;">
        <button id="btnCron" class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="abrirCronograma()">📝 ORDEM DO CULTO</button>
        <button id="btnMembros" class="btn-modern" style="border-color:var(--neon); color:var(--neon); display:none;" onclick="document.getElementById('popMembros').style.display='flex'; renderMembros();">👥 EQUIPE</button>
        <button id="btnLinks" class="btn-modern" style="display:none;" onclick="abrirPopLinks()">🔗 LINKS</button>
        <button id="btnEventos" class="btn-modern" style="border-color:var(--red); color:var(--red); display:none;" onclick="abrirPopEventos()">🔥 EVENTOS</button>
        <button id="btnTesourariaAdmin" class="btn-modern" style="border-color:var(--green); color:var(--green); display:none;" onclick="abrirTesourariaAdmin()">⚙️ DOCS</button>
        <button id="btnDados" class="btn-modern" style="border-color:var(--orange); color:var(--orange); display:none;" onclick="abrirPop()">📊 TERMÔMETRO</button>
    </div>

    <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid">
            <div class="admin-section"><h4>1. MINISTÉRIO DO DIA</h4><div id="listaMinisterios"></div><button class="btn-min" style="border-color:red; color:red; margin-top:10px;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR SELEÇÃO</button></div>
            <div class="admin-section"><h4>2. ANCIÃO DO MÊS</h4><div id="gridMeses"></div></div>
            <div class="admin-section">
                <h4>3. LOGINS & SENHAS</h4>
                <input type="text" id="inputTicker" class="input-dark" placeholder="Texto rolante..." onchange="db.aviso_ticker=this.value; save(); renderAvisos();" style="margin-bottom:10px;">
                <div style="border:1px solid var(--gold); padding:10px; border-radius:8px; margin-bottom:15px;">
                    <small style="color:var(--gold); font-weight:bold;">META ANUAL DE BATISMOS</small>
                    <input type="number" id="metaBatismos" class="input-dark" onchange="db.meta_anual=this.value; updateProgresso(); save();" style="margin-top:5px; text-align:center;">
                    <div class="progress-container"><div id="progressoMeta" class="progress-bar"></div><div id="textoMeta" class="progress-text">0/0</div></div>
                </div>
                <table style="width:100%; font-size:0.75rem; color:white;"><tbody id="corpoCreds"></tbody></table>
            </div>
            <div class="admin-section">
                <h4>4. APOIO ANCIÃO</h4><div id="gridApoioAnciao"></div><hr style="border:0; border-top:1px solid #334155; margin:15px 0;">
                <h4 style="color:var(--gold)">5. NUVEM / PDF</h4>
                <button class="btn-min" onclick="gerarBackupNuvem()" style="border-color:var(--gold); color:var(--gold)">💾 SALVAR NA NUVEM</button>
                <button class="btn-min" onclick="exportarRelatorioPDF()" style="border-color:var(--green); color:var(--green)">📄 GERAR PDF MÊS</button>
            </div>
        </div>
    </div>

    <div id="modalCronograma" class="cron-overlay" onclick="this.style.display='none'">
        <div id="areaCronograma" class="cron-container" onclick="event.stopPropagation()">
            <h2 style="text-align: center; color: var(--blue); margin-top:0;">ORDEM DO CULTO</h2>
            <div id="cronograma-lista"></div>
            <div class="no-print" id="adminCronControls" style="margin-top:20px; display:none; gap:10px; justify-content:center;">
                <button class="btn-modern" style="background:var(--blue); color:white; border:none;" onclick="addBlocoCron()">+ SEÇÃO</button>
                <button class="btn-modern" style="background:var(--orange); color:white; border:none;" onclick="gerarModeloAutomatico()">♻️ GERAR MODELO</button>
                <button class="btn-modern" style="background:var(--green); color:white; border:none;" onclick="salvarCronograma()">💾 SALVAR ORDEM</button>
            </div>
            <button class="btn-fechar" onclick="document.getElementById('modalCronograma').style.display='none'">FECHAR CRONOGRAMA</button>
        </div>
    </div>

    <div id="areaEscalaPrincipal">
        <div class="busca-container no-print" style="text-align:center; margin-bottom:15px;">
            <input type="text" id="buscaRapida" class="input-dark" placeholder="🔍 Buscar nome na escala..." style="width:100%; max-width:450px; border-color:var(--neon); height:40px;" oninput="renderTodo()">
        </div>
        <table id="tabela-main">
            <thead>
                <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.6rem; padding:15px; text-align:left;" id="headerTitulo">ESCALA</th></tr>
                <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1.2rem; padding:0 15px 15px 15px; text-align:left;" id="headerAnciao">Responsável: </th></tr>
                <tr><th style="width:130px">DIA</th><th style="width:50px">DATA</th><th>SABATINA</th><th>PREGADOR(A)</th><th>MÚSICA ESPECIAL</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div id="secPlan" style="margin-top:40px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #334155;" class="no-print">
        <h3 style="color:var(--gold); margin-bottom: 20px;">🗓️ PLANEJAMENTO ANUAL 2026</h3>
        <table style="width:100%; border-collapse: collapse; color:white;"><tbody id="corpoPlan"></tbody></table>
    </div>
</div>

<div id="popMembros" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--neon); text-align:center;">EQUIPE</h3><div style="display:flex; gap:5px; margin-bottom:10px;"><input id="mbNome" placeholder="Nome" class="input-dark"><input id="mbCargo" placeholder="Cargo" class="input-dark"><button class="btn-modern" onclick="addMembro()">+</button></div><div id="listaMembros"></div><button onclick="document.getElementById('popMembros').style.display='none'" class="btn-fechar">FECHAR</button></div></div>
<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important; margin-top:10px;"><button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", pastor: "Pastor", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes", aventureiros: "Aventureiros", desbravadores: "Desbravadores", jovem: "M. Jovem" };
    const LISTA_ANCIAOS = ["Wesley", "Jesuino", "Ester", "Marcilio", "Albert", "Manoel"]; 
    let db = {}; let curUser = localStorage.getItem('iasd_curUser') || 'visitante'; let missionChart;

    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); renderAvisos(); if(db.cronograma) carregarCronograma(db.cronograma); } 
        else { db = { senhas:{admin:'123456'}, anciaos:{}, apoio_anciao:{}, eventos_especiais:{}, docs:{}, escalas:{}, mis_v3:{}, regras_manuais:{}, plan_anual:{}, links_externos:[], meta_anual: 15 }; save(); }
    });

    function showStatus(txt, classe) { const el = document.getElementById('saveIndicator'); el.innerText = txt; el.className = classe; el.style.display = "block"; if(classe === 'saved') setTimeout(() => { el.style.display = "none"; }, 2000); }
    function save() { showStatus("Salvando...", "saving"); dbCloud.collection('dados').doc('estrela_v102').set(db).then(() => { showStatus("✅ Alterações Salvas", "saved"); }); }

    // --- LÓGICA DO CRONOGRAMA PRÉ-MOLDADO ---
    function abrirCronograma() {
        document.getElementById('modalCronograma').style.display = 'flex';
        // Se estiver vazio, tenta carregar o modelo do dia automaticamente
        if(!db.cronograma || db.cronograma.length === 0) gerarModeloAutomatico();
    }

    function gerarModeloAutomatico() {
        const sem = new Date().getDay();
        let modelo = [];

        if(sem === 6) { // SÁBADO (BASEADO NA SUA FOTO)
            modelo = [
                { horario: "08:45", titulo: "LOUVOR", cor: "#fff2cc", itens: [{nome:"Hinos de Louvor", tempo:""}] },
                { horario: "09:00", titulo: "ESCOLA SABATINA", cor: "#f6b26b", itens: [
                    {nome:"ORAÇÃO", tempo:""}, {nome:"ANUNCIO DE INICIO", tempo:""}, {nome:"HINO INICIAL", tempo:""}, 
                    {nome:"CARTA MISSIONARIA", tempo:""}, {nome:"MUSICA ESPECIAL", tempo:""}, 
                    {nome:"RECAPITULAÇÃO ESCOLA SABATINA", tempo:"60"}, {nome:"MUSICA ESPECIAL", tempo:""}, {nome:"ORAÇÃO", tempo:""}
                ]},
                { horario: "10:20", titulo: "DOXOLOGIA", cor: "#9fc5e8", itens: [{nome:"MÚSICA / ORAÇÃO PREG.", tempo:""}, {nome:"COMUNICAÇÃO (ANÚNCIOS)", tempo:""}] },
                { horario: "10:23", titulo: "OFERTORIO", cor: "#ffff00", itens: [{nome:"VIDEO PROVAI E VEDE", tempo:""}, {nome:"MUSICA", tempo:""}] },
                { horario: "10:30", titulo: "LOUVOR COM A IGREJA", cor: "#93c47d", itens: [{nome:"1ª MUSICA / 2ª MUSICA", tempo:""}, {nome:"HINO INICIAL (DE PÉ)", tempo:""}] },
                { horario: "10:45", titulo: "ORAÇÃO (DE JOELHOS)", cor: "#cfe2f3", itens: [] },
                { horario: "10:50", titulo: "MOMENTO DA CRIANÇA", cor: "#d5a6bd", itens: [] },
                { horario: "10:57", titulo: "MENSAGEM BÍBLICA + MÚSICA", cor: "#3d85c6", itens: [{nome:"MUSICA ESPECIAL", tempo:""}, {nome:"SERMÃO", tempo:"45"}] }
            ];
        } else {
            modelo = [{ horario: "19:30", titulo: "INÍCIO DO CULTO", cor: "#eee", itens: [{nome:"Louvor", tempo:"10"}] }];
        }
        carregarCronograma(modelo);
    }

    function carregarCronograma(lista) { 
        const container = document.getElementById('cronograma-lista'); 
        container.innerHTML = ""; 
        lista.forEach(d => addBlocoCron(d)); 
    }

    function addBlocoCron(dados = { horario: '', titulo: '', itens: [], cor: '#f0f0f0' }) {
        const isAdmin = ['admin','ger'].includes(curUser);
        const b = document.createElement('div'); b.className = 'bloco-cron';
        b.innerHTML = `
            <div class="cron-header" style="background:${dados.cor || '#f0f0f0'}">
                <input style="width:70px; font-weight:bold" value="${dados.horario}" ${!isAdmin?'disabled':''} class="cron-h">
                <input style="flex-grow:1; font-weight:bold" value="${dados.titulo}" ${!isAdmin?'disabled':''} class="cron-v">
                ${isAdmin ? `<button onclick="addItemCron(this)">+</button><button onclick="this.closest('.bloco-cron').remove()">X</button>` : ''}
            </div>
            <table class="cron-table"><tbody></tbody></table>`;
        document.getElementById('cronograma-lista').appendChild(b);
        if(dados.itens) dados.itens.forEach(it => addItemCron(b.querySelector('table'), it));
    }

    function addItemCron(target, it = { nome: '', tempo: '' }) {
        const isAdmin = ['admin','ger'].includes(curUser);
        const tb = target.tagName === 'TABLE' ? target.querySelector('tbody') : target.closest('.bloco-cron').querySelector('tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = `<td style="padding-left:10px"><input class="it-n" value="${it.nome}" ${!isAdmin?'disabled':''}></td><td width="80"><input class="it-t" value="${it.tempo}" placeholder="min" ${!isAdmin?'disabled':''}></td>${isAdmin ? `<td width="30"><button onclick="this.closest('tr').remove()" style="color:red; background:none; border:none;">x</button></td>` : ''}`;
        tb.appendChild(tr);
    }

    function salvarCronograma() { 
        db.cronograma = Array.from(document.querySelectorAll('.bloco-cron')).map(b => ({ 
            horario: b.querySelector('.cron-h').value, 
            titulo: b.querySelector('.cron-v').value, 
            cor: b.querySelector('.cron-header').style.backgroundColor,
            itens: Array.from(b.querySelectorAll('tbody tr')).map(tr => ({ 
                nome: tr.querySelector('.it-n').value, 
                tempo: tr.querySelector('.it-t').value 
            })) 
        })); 
        save(); 
        alert("Ordem salva com sucesso!");
    }

    // --- FUNÇÕES ORIGINAIS DE ESCALA (Mantidas 100%) ---
    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const busca = document.getElementById('buscaRapida').value.toUpperCase();
        const hojeObj = new Date();
        const hojeFormatado = `${hojeObj.getDate()}/${hojeObj.getMonth()+1}/${hojeObj.getFullYear()}`;
        document.getElementById('headerAnciao').innerText = `Responsável: ${db.anciaos?.[mIdx] || 'Não definido'}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        const isV = curUser === 'visitante', isAdmin = ['admin','ger'].includes(curUser);
        document.getElementById('btnAcesso').style.display = isV ? 'block' : 'none';
        document.getElementById('btnSair').style.display = isV ? 'none' : 'block';
        if(!isV) document.getElementById('userWelcomeBar').style.display='block';
        if(!isV) document.getElementById('userWelcomeBar').innerHTML = `Olá, <b>${MINS[curUser]}</b>!`;
        
        ['btnEventos','btnLinks','btnDados','btnTesourariaAdmin','btnMembros'].forEach(id => { if(document.getElementById(id)) document.getElementById(id).style.display = isV ? 'none' : 'block'; });

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay(), dtF = dt.toISOString().split('T')[0];
            let idEv = db.eventos_especiais?.[dtF], minDoDia = db.regras_manuais?.[dStr] || null;
            if(busca && !JSON.stringify(db.escalas?.[dStr]||"").toUpperCase().includes(busca)) continue;
            if([0,3,6].includes(sem) || idEv) {
                let rowClass = idEv ? 'row-especial' : (minDoDia ? 'row-ministerio' : '');
                if(dStr === hojeFormatado) rowClass += ' hoje';
                let tr = `<tr class="${rowClass}"><td><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => { 
                    let val = db.escalas?.[dStr]?.[col] || '';
                    let canEdit = isAdmin || (curUser !== 'visitante' && ((curUser==='diaconato' && col==='di') || (curUser==='musica' && (col==='mu'||col==='lo'))));
                    tr += `<td><textarea ${canEdit?'':'disabled'} class="auto-expand" onchange="atuCel('${dStr}','${col}',this.value)" oninput="autoResize(this)">${val}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        if(isAdmin) { document.getElementById('adminPanel').style.display='block'; document.getElementById('adminCronControls').style.display='flex'; renderAdmin(); }
        setTimeout(() => { document.querySelectorAll('textarea').forEach(el => autoResize(el)); }, 200);
    }

    function renderAvisos() { if(db.aviso_ticker) { document.getElementById('newsTicker').style.display='block'; document.getElementById('newsTicker').querySelector('span').innerText = db.aviso_ticker; } }
    function login() { const u = document.getElementById('userLogin').value.toLowerCase().trim(), p = document.getElementById('passLogin').value; if((db.senhas?.[u]||'123456') === p) { localStorage.setItem('iasd_curUser', u); location.reload(); } }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function autoResize(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; }
    const sM = document.getElementById('selMes'); MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
