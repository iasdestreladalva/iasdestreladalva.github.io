<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - SISTEMA COMPLETO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        /* Cabeçalho */
        .btn-header { background: none; border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.75rem; transition: 0.3s; }
        .btn-header:hover { background: rgba(255,255,255,0.1); }

        /* Painel Admin (Conforme Imagem) */
        .admin-box { display: none; background: #0f172a; border: 1px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 2fr 1.2fr; gap: 15px; align-items: start; } 
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; min-height: 550px; }
        
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }

        /* Tabela */
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; }
        .dia-destaque { background: #0f172a !important; color: var(--neon) !important; cursor: pointer; }
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 0.85rem; display: block; padding: 5px 0; outline: none; }

        /* Modais */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:2px solid var(--orange); padding:25px; border-radius:15px; width:90%; max-width:500px; color: white; }
        .btn-fechar { width:100%; padding:12px; background:var(--red); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }
    </style>
</head>
<body>

<div class="container">
    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:8px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:120px; border-color:var(--neon);"></select>
            <button class="btn-header" style="border-color:var(--gold); color:var(--gold);" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button class="btn-header" style="border-color:var(--neon); color:var(--neon);" onclick="abrirPop('popLinks')">🔗 LINKS</button>
            <button class="btn-header" style="border-color:var(--red); color:var(--red);" onclick="abrirPop('popEventos')">🔥 EVENTOS</button>
            <button class="btn-header" style="border-color:var(--green); color:var(--green);" onclick="abrirPop('popDocs')">⚙️ DOCS</button>
            <button class="btn-header" style="border-color:var(--orange); color:var(--orange);" onclick="abrirPop('popDados')">📊 DADOS</button>
            <button class="btn-header" id="btnAcesso" onclick="abrirPop('modalLogin')">🔓 ACESSAR</button>
            <button class="btn-header" style="border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>1. MINISTÉRIO DO DIA</h4>
                <div id="listaMinisterios"></div>
                <button class="btn-min" style="border-color:red; color:red;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR</button>
            </div>
            <div class="admin-section">
                <h4>2. ANCIÃO DO MÊS</h4>
                <div id="gridMeses"></div>
            </div>
            <div class="admin-section">
                <h4>3. LOGINS & SENHAS</h4>
                <table style="width:100%; font-size:0.7rem;"><tbody id="corpoCreds"></tbody></table>
            </div>
            <div class="admin-section">
                <h4>4. APOIO ANCIÃO / BACKUP</h4>
                <div id="gridApoioAnciao"></div>
                <hr style="border-color:#334155;">
                <button class="btn-min" onclick="gerarBackupNuvem()" style="border-color:var(--gold); color:var(--gold)">💾 GERAR BACKUP</button>
                <button class="btn-min" onclick="abrirPop('popBackups')" style="border-color:var(--green); color:var(--green)">📂 VER VERSÕES</button>
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;" id="headerTitulo">ESCALA</th></tr>
            <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1rem; padding:0 12px 12px 12px; text-align:left;" id="headerAnciao">Ancião: </th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="popLinks" class="overlay" onclick="fecharPop(this)"><div class="pop-content" onclick="event.stopPropagation()">
    <h3>🔗 MEUS LINKS</h3>
    <input type="text" id="linkTit" class="input-dark" placeholder="Nome">
    <input type="text" id="linkUrl" class="input-dark" placeholder="URL" style="margin-top:5px;">
    <button class="btn-min" style="margin-top:10px" onclick="salvarLink()">ADICIONAR</button>
    <div id="listaLinks" style="margin-top:10px; max-height:200px; overflow-y:auto;"></div>
    <button class="btn-fechar" onclick="fecharPop()">FECHAR</button>
</div></div>

<div id="popEventos" class="overlay" onclick="fecharPop(this)"><div class="pop-content" onclick="event.stopPropagation()">
    <h3>🔥 EVENTOS ESPECIAIS</h3>
    <input type="text" id="evtNome" class="input-dark" placeholder="Evento">
    <input type="date" id="evtData" class="input-dark" style="margin-top:5px;">
    <button class="btn-min" style="margin-top:10px" onclick="salvarEvento()">CRIAR</button>
    <div id="listaEvt" style="margin-top:10px;"></div>
    <button class="btn-fechar" onclick="fecharPop()">FECHAR</button>
</div></div>

<div id="popDados" class="overlay" onclick="fecharPop(this)"><div class="pop-content" onclick="event.stopPropagation()">
    <h3>📊 DADOS MISSIONÁRIOS (Mês Atual)</h3>
    <div id="formDados"></div>
    <button class="btn-fechar" onclick="fecharPop()">FECHAR</button>
</div></div>

<div id="popBackups" class="overlay" onclick="fecharPop(this)"><div class="pop-content" onclick="event.stopPropagation()">
    <h3>☁️ RESTAURAR BACKUP</h3>
    <div id="listaBkp"></div>
    <button class="btn-fechar" onclick="fecharPop()">FECHAR</button>
</div></div>

<div id="modalLogin" class="overlay" onclick="fecharPop(this)"><div class="pop-content" style="max-width:280px" onclick="event.stopPropagation()">
    <h3 style="text-align:center">LOGIN</h3>
    <input type="text" id="userLogin" placeholder="Usuário" class="input-dark">
    <input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="margin-top:10px">
    <button class="btn-min" style="margin-top:15px; background:var(--neon); color:var(--blue)" onclick="login()">ENTRAR</button>
</div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", pastor: "Pastor", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Sabatina", pessoal: "Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "Homens", familia: "Família", adolescentes: "Adolescentes", aventureiros: "Aventureiros", desbravadores: "Desbravadores", jovem: "M. Jovem" };
    const LISTA_ANCIAOS = ["Wesley", "Jesuino", "Ester", "Marcilio", "Albert", "Manoel"]; 

    let db = {}; let bkpData = { lista: [] };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); }
    });

    dbCloud.collection('dados').doc('backups_estrela').onSnapshot(doc => {
        if(doc.exists) bkpData = doc.data();
    });

    function save() { if(curUser === 'visitante') return; dbCloud.collection('dados').doc('estrela_v102').set(db); }

    function abrirPop(id) { document.getElementById(id).style.display = 'flex'; if(id === 'popLinks') renderLinks(); if(id === 'popEventos') renderEvts(); if(id === 'popBackups') renderBkp(); if(id === 'popDados') renderDados(); }
    function fecharPop() { document.querySelectorAll('.overlay').forEach(o => o.style.display = 'none'); }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerAnciao').innerText = `Ancião Responsável: ${db.anciaos?.[mIdx] || ''}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        document.getElementById('btnAcesso').style.display = curUser==='visitante'?'block':'none';
        document.getElementById('btnSair').style.display = curUser==='visitante'?'none':'block';

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, mIdx + 1, 0).getDate();
        
        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            let evt = db.eventos?.[dt.toISOString().split('T')[0]];
            let minDia = db.regras_manuais?.[dStr];

            if([0,3,6].includes(sem) || evt) {
                let tr = `<tr><td onclick="cliqueDia('${dStr}')" class="${minDia?'dia-destaque':''}"><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b><br><small>${evt ? evt.nome : (MINS[minDia]||'')}</small></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(c => {
                    tr += `<td><textarea ${curUser!=='visitante'?'':'disabled'} class="auto-expand" onchange="atuCel('${dStr}','${c}',this.value)" oninput="autoResize(this)">${db.escalas?.[dStr]?.[c]||''}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        if(['admin','ger'].includes(curUser)) { document.getElementById('adminPanel').style.display='block'; renderAdmin(); }
        setTimeout(() => document.querySelectorAll('textarea').forEach(t => autoResize(t)), 200);
    }

    function renderAdmin() {
        const l = document.getElementById('listaMinisterios'); l.innerHTML = "";
        Object.keys(MINS).filter(m => !['admin','ger'].includes(m)).forEach(m => {
            l.innerHTML += `<button class="btn-min ${window.minSelecionado===m?'active':''}" onclick="window.minSelecionado='${m}'; renderAdmin();">${MINS[m]}</button>`;
        });
        const gM = document.getElementById('gridMeses'); gM.innerHTML = "";
        MESES.forEach((m, i) => { gM.innerHTML += `<div style="margin-bottom:3px;"><small>${m}</small><input class="input-dark" value="${db.anciaos?.[i]||''}" onchange="if(!db.anciaos)db.anciaos={}; db.anciaos[${i}]=this.value; save();"></div>`; });
        
        const tC = document.getElementById('corpoCreds'); tC.innerHTML = "";
        Object.keys(MINS).forEach(k => { tC.innerHTML += `<tr><td>${MINS[k]}</td><td>${k}</td><td><input class="input-dark" value="${db.senhas?.[k]||''}" onchange="if(!db.senhas)db.senhas={}; db.senhas['${k}']=this.value;save();"></td></tr>`; });

        const gA = document.getElementById('gridApoioAnciao'); gA.innerHTML = "";
        Object.keys(MINS).filter(k => !['admin','ger','pastor'].includes(k)).forEach(m => {
            let opts = LISTA_ANCIAOS.map(a => `<option value="${a}" ${db.apoio_anciao?.[m]===a?'selected':''}>${a}</option>`).join('');
            gA.innerHTML += `<div style="margin-bottom:5px;"><small>${MINS[m]}</small><select class="input-dark" onchange="if(!db.apoio_anciao)db.apoio_anciao={}; db.apoio_anciao['${m}']=this.value; save();"><option value="">--</option>${opts}</select></div>`;
        });
    }

    // --- FUNÇÕES DOS BOTÕES ---
    function salvarLink() { const t = document.getElementById('linkTit').value, u = document.getElementById('linkUrl').value; if(!t || !u) return; if(!db.links) db.links = []; db.links.push({t, u}); save(); renderLinks(); }
    function renderLinks() { const d = document.getElementById('listaLinks'); d.innerHTML = (db.links||[]).map((l, i) => `<div style="padding:5px; border-bottom:1px solid #444"><a href="${l.u}" target="_blank" style="color:var(--neon)">${l.t}</a> <button onclick="db.links.splice(${i},1); save(); renderLinks()">X</button></div>`).join(''); }
    
    function salvarEvento() { const n = document.getElementById('evtNome').value, d = document.getElementById('evtData').value; if(!n || !d) return; if(!db.eventos) db.eventos = {}; db.eventos[d] = {nome: n.toUpperCase()}; save(); renderEvts(); }
    function renderEvts() { const d = document.getElementById('listaEvt'); d.innerHTML = Object.keys(db.eventos||{}).map(k => `<div style="padding:5px">${k}: ${db.eventos[k].nome} <button onclick="delete db.eventos['${k}']; save(); renderEvts()">X</button></div>`).join(''); }

    function gerarBackupNuvem() {
        const nome = prompt("Nome do Backup:"); if(!nome) return;
        const b = { id: Date.now(), nome: nome.toUpperCase(), data: new Date().toLocaleString(), conteudo: JSON.parse(JSON.stringify(db)) };
        if(!bkpData.lista) bkpData.lista = []; bkpData.lista.unshift(b);
        if(bkpData.lista.length > 10) bkpData.lista.pop();
        dbCloud.collection('dados').doc('backups_estrela').set(bkpData).then(() => alert("Backup Criado!"));
    }
    function renderBkp() { const d = document.getElementById('listaBkp'); d.innerHTML = (bkpData.lista||[]).map((b, i) => `<div style="padding:8px; border:1px solid #444; margin-bottom:5px">${b.nome} (${b.data}) <button onclick="restaurar(${i})">USAR</button></div>`).join(''); }
    function restaurar(i) { if(confirm("Restaurar?")) { db = bkpData.lista[i].conteudo; save(); location.reload(); } }

    function login() { const u = document.getElementById('userLogin').value.toLowerCase().trim(), p = document.getElementById('passLogin').value; if(db.senhas?.[u] === p || (u==='admin' && p==='123456')) { localStorage.setItem('iasd_curUser', u); location.reload(); } else alert("Erro!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function autoResize(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function cliqueDia(d) { if(['admin','ger'].includes(curUser)) { if(!db.regras_manuais) db.regras_manuais={}; window.minSelecionado ? db.regras_manuais[d]=window.minSelecionado : delete db.regras_manuais[d]; save(); } }

    const sM = document.getElementById('selMes'); MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
