<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v112</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; --red: #ff4757; }
        
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        
        /* Cabeçalho Minimalista */
        .header-main { background: #070d14; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 1000; }
        
        /* Container da Tabela - Ocupa a tela toda */
        .content-wrapper { padding: 15px; max-width: 100%; overflow-x: hidden; }
        .table-card { background: white; border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        table { width: 100%; border-collapse: collapse; min-width: 1200px; color: #333; }
        th { background: #f8fafc; color: var(--blue); padding: 15px; border: 1px solid #cbd5e1; font-size: 0.85rem; text-transform: uppercase; }
        td { border: 1px solid #cbd5e1; height: 50px; text-align: center; font-weight: bold; font-size: 0.9rem; }
        
        /* Estilização dos Inputs na Tabela */
        td input { width: 100%; height: 100%; border: none; background: transparent; text-align: center; font-weight: bold; text-transform: uppercase; }
        td input:focus { background: #fff9c4; outline: none; }

        /* Cores das Linhas por Ministério */
        .row-pessoal { background-color: #e0f2fe !important; }
        .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; }
        .row-musica { background-color: #fff1f2 !important; }
        .row-jovens { background-color: #ede9fe !important; }
        .row-infantis { background-color: #fdf2f8 !important; }
        .row-evento-especial { background-color: #ffd700 !important; border-left: 10px solid #b8860b !important; }

        /* Painel Admin Moderno (Drawer) */
        .admin-drawer { background: #0f172a; border-bottom: 2px solid var(--orange); padding: 20px; display: none; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .admin-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 10px; border: 1px solid #334155; }

        /* Botões */
        .btn { padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid var(--neon); background: none; color: var(--neon); transition: 0.3s; font-size: 0.75rem; }
        .btn:hover { background: var(--neon); color: #000; }
        .btn-block { width: 100%; margin-bottom: 8px; }

        /* Popups / Overlays */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; }
        .popup { background: var(--bg); border: 2px solid var(--orange); padding: 25px; border-radius: 15px; width: 90%; max-width: 450px; max-height: 90vh; overflow-y: auto; }
        
        .input-dark { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; width: 100%; margin: 8px 0; box-sizing: border-box; }

        .chart-box { background: rgba(255,255,255,0.03); margin-top: 30px; padding: 20px; border-radius: 12px; border: 1px solid var(--blue); height: 350px; }
    </style>
</head>
<body>

    <header class="header-main">
        <h3 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h3>
        <div style="display:flex; gap:8px;">
            <select id="selMes" class="input-dark" style="width:120px; margin:0;" onchange="renderTodo()"></select>
            <button id="btnAdminToggle" class="btn" style="display:none;" onclick="toggleAdmin()">⚙️ GESTÃO</button>
            <button id="btnLogin" class="btn" onclick="abrirPop('modalLogin')">🔓 LOGIN</button>
            <button id="btnSair" class="btn" style="display:none; border-color:red; color:red;" onclick="sair()">🚪 SAIR</button>
        </div>
    </header>

    <div id="adminPanel" class="admin-drawer">
        <div class="admin-grid">
            <div class="admin-card">
                <h4 style="color:var(--neon); margin-top:0;">1. PINCEL DE MINISTÉRIO</h4>
                <div id="listaPinceis"></div>
                <button class="btn btn-block" style="border-color:red; color:red; margin-top:10px;" onclick="window.minSelecionado=null; alert('Pincel Limpo')">✖ LIMPAR SELEÇÃO</button>
            </div>
            
            <div class="admin-card">
                <h4 style="color:var(--orange); margin-top:0;">2. EVENTOS ESPECIAIS</h4>
                <button class="btn btn-block" style="background:var(--orange); color:white; border:none;" onclick="abrirPop('popNovoEvento')">➕ CRIAR SEMANA/EVENTO</button>
                <button class="btn btn-block" style="border-color:var(--green); color:var(--green);" onclick="abrirPop('popTesouraria')">💰 TESOURARIA</button>
                <button class="btn btn-block" style="border-color:var(--gold); color:var(--gold);" onclick="abrirPop('popMissionario')">📊 DADOS MISSIONÁRIOS</button>
            </div>

            <div class="admin-card">
                <h4 style="color:var(--gold); margin-top:0;">3. CONFIGURAÇÕES</h4>
                <button class="btn btn-block" onclick="abrirPop('popAnciaos')">👤 EDITAR ANCIÃOS</button>
                <button class="btn btn-block" onclick="abrirPop('popSenhas')">🔑 EDITAR SENHAS</button>
            </div>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="table-card">
            <table>
                <thead>
                    <tr><th colspan="9" id="titEscala" style="background:var(--blue); color:white; font-size:1.4rem; text-align:left; padding:15px;">ESCALA</th></tr>
                    <tr><th colspan="9" id="txtAnciao" style="background:var(--blue); color:var(--gold); text-align:left; padding:0 15px 15px 15px; font-size:1rem;">Ancião: ---</th></tr>
                    <tr>
                        <th width="120">DIA</th>
                        <th width="100">DATA</th>
                        <th width="200">SABATINA / EVENTO</th>
                        <th>PREGADOR</th>
                        <th>MÚSICA</th>
                        <th>LOUVOR</th>
                        <th>SONO</th>
                        <th>RECEPÇÃO</th>
                        <th>DIACONATO</th>
                    </tr>
                </thead>
                <tbody id="corpoEscala"></tbody>
            </table>
        </div>

        <div class="chart-box">
            <canvas id="graficoMissionario"></canvas>
        </div>
    </div>

    <div id="popNovoEvento" class="overlay" onclick="fecharPops()">
        <div class="popup" onclick="event.stopPropagation()">
            <h3 style="color:var(--orange)">NOVA SEMANA / EVENTO</h3>
            <input type="text" id="evNome" class="input-dark" placeholder="EX: SEMANA DE ORAÇÃO">
            <label style="font-size: 0.7rem;">MINISTÉRIO ORGANIZADOR:</label>
            <select id="evMin" class="input-dark"></select>
            <div style="display:flex; gap:10px;">
                <input type="number" id="evIni" class="input-dark" placeholder="DIA INÍCIO">
                <input type="number" id="evFim" class="input-dark" placeholder="DIA FIM">
            </div>
            <button class="btn btn-block" style="background:var(--green); color:white; border:none; margin-top:10px;" onclick="salvarEventoEspecial()">CRIAR NA ESCALA</button>
        </div>
    </div>

    <div id="popAnciaos" class="overlay" onclick="fecharPops()">
        <div class="popup" onclick="event.stopPropagation()">
            <h3 style="color:var(--gold)">RESPONSÁVEIS MENSAIS</h3>
            <div id="listaEdicaoAnciaos" style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;"></div>
            <button class="btn btn-block" style="margin-top:15px;" onclick="fecharPops()">SALVAR E FECHAR</button>
        </div>
    </div>

    <div id="modalLogin" class="overlay" onclick="fecharPops()">
        <div class="popup" style="background:white;" onclick="event.stopPropagation()">
            <h3 style="color:#000; margin-top:0;">ACESSO RESTRITO</h3>
            <input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="color:#000!important; background:#eee!important;">
            <input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="color:#000!important; background:#eee!important;">
            <button class="btn btn-block" style="background:var(--blue); color:white; border:none;" onclick="login()">ENTRAR</button>
        </div>
    </div>

<script>
    // Configurações e Dados Iniciais (Baseado no seu arquivo v102.43)
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", musica: "Música", jovens: "Jovens", infantis: "Infantis", diaconato: "Diaconato" };
    
    let db = JSON.parse(localStorage.getItem('iasd_v112')) || {
        anciaos: {0:"Albert", 1:"Wesley", 2:"Jesuino"}, 
        senhas: {admin: "iasd118"},
        escalas: {}, regras_manuais: {}, eventos: {}, mis_v3: {}
    };

    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let myChart = null;

    function save() { localStorage.setItem('iasd_v112', JSON.stringify(db)); renderTodo(); }

    function renderTodo() {
        const m = document.getElementById('selMes').value || new Date().getMonth();
        const isAdm = (curUser === 'admin');
        
        document.getElementById('btnAdminToggle').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnLogin').style.display = curUser === 'visitante' ? 'block' : 'none';
        
        document.getElementById('titEscala').innerText = `ESCALA - ${MESES[m]} 2026`;
        document.getElementById('txtAnciao').innerText = `Ancião Responsável: ${db.anciaos[m] || 'A definir'}`;
        
        renderEscala(m);
        renderAdminParts();
        updateChart(m);
    }

    function renderEscala(m) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, parseInt(m) + 1, 0).getDate();
        
        for(let d=1; d<=diasMes; d++) {
            let dStr = `${d}/${parseInt(m)+1}`;
            let dt = new Date(2026, m, d);
            let sem = dt.getDay();
            let regraMin = db.regras_manuais[dStr] || "";
            let evento = db.eventos?.[dStr] || null;

            if([0,3,6].includes(sem) || regraMin || evento) {
                let tr = document.createElement('tr');
                tr.className = evento ? `row-evento-especial` : (regraMin ? `row-${regraMin}` : "");
                
                // Função Pincel
                tr.onclick = () => { if(curUser==='admin' && window.minSelecionado) { db.regras_manuais[dStr] = window.minSelecionado; save(); } };
                
                let sabContent = evento ? `<div>${evento.nome}</div><small>${MINS[evento.min]}</small>` : `<input value="${db.escalas[dStr]?.sa || ''}" onchange="atuCel('${dStr}','sa',this.value)">`;

                let html = `<td>${["DOMINGO","SEG","TER","QUA","QUI","SEX","SÁBADO"][sem]}</td>
                            <td>${dStr}</td>
                            <td style="position:relative">${sabContent}</td>`;
                
                ['pr','mu','lo','so','re','di'].forEach(col => {
                    let pode = (curUser==='admin' || (curUser===regraMin && col==='pr'));
                    html += `<td><input ${pode?'':'disabled'} value="${db.escalas[dStr]?.[col] || ''}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`;
                });
                tr.innerHTML = html; corpo.appendChild(tr);
            }
        }
    }

    function renderAdminParts() {
        // Render Pinceis
        const pDiv = document.getElementById('listaPinceis'); pDiv.innerHTML = "";
        const selEv = document.getElementById('evMin'); selEv.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            pDiv.innerHTML += `<button class="btn btn-block" style="font-size:10px;" onclick="window.minSelecionado='${k}'; alert('Pincel: ${MINS[k]}')">${MINS[k]}</button>`;
            selEv.innerHTML += `<option value="${k}">${MINS[k]}</option>`;
        });

        // Edição Anciãos
        const ancDiv = document.getElementById('listaEdicaoAnciaos'); ancDiv.innerHTML = "";
        MESES.forEach((mes, i) => {
            ancDiv.innerHTML += `<div><small>${mes}</small><input class="input-dark" value="${db.anciaos[i]||''}" onchange="db.anciaos[${i}]=this.value.toUpperCase(); save();"></div>`;
        });
    }

    function salvarEventoEspecial() {
        const m = document.getElementById('selMes').value;
        const nome = document.getElementById('evNome').value.toUpperCase();
        const min = document.getElementById('evMin').value;
        const ini = parseInt(document.getElementById('evIni').value);
        const fim = parseInt(document.getElementById('evFim').value);

        if(!nome || !ini || !fim) return alert("Preencha tudo!");
        if(!db.eventos) db.eventos = {};
        for(let d=ini; d<=fim; d++) { db.eventos[`${d}/${parseInt(m)+1}`] = { nome, min }; }
        save(); fecharPops();
    }

    function toggleAdmin() { const p = document.getElementById('adminPanel'); p.style.display = p.style.display==='block' ? 'none' : 'block'; }
    function abrirPop(id) { document.getElementById(id).style.display = 'flex'; }
    function fecharPops() { document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none'); }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function login() { const u = document.getElementById('userLogin').value.toLowerCase().trim(), p = document.getElementById('passLogin').value; if(p === 'iasd118') { localStorage.setItem('iasd_curUser', 'admin'); location.reload(); } else alert("Erro!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    function updateChart(m) {
        const ctx = document.getElementById('graficoMissionario').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'bar', data: { labels: ['ENC', 'CLA', 'EST', 'PREG', 'DUP'], datasets: [{ label: 'MISSIONÁRIO', data: db.mis_v3[m] || [0,0,0,0,0], backgroundColor: ['#00d2ff','#ffd700','#ff7f50','#2ecc71','#ff4757'] }] }, options: { responsive: true, maintainAspectRatio: false } });
    }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script>
</body>
</html>
