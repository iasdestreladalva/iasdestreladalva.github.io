<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - Gestão 2026</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-top: 80px; }
        
        /* NAVBAR FIXA */
        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 70px; background: #0b0f19; display: flex; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 2px solid #1e293b; gap: 10px; }
        .nav-title { font-weight: 900; color: var(--neon); font-size: 1.1rem; text-transform: uppercase; margin-right: 10px; }
        
        /* BOTÕES E INPUTS */
        .btn-nav { background: transparent; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .input-dark { background: #000; border: 1px solid #444; color: #fff; padding: 6px; border-radius: 4px; font-size: 0.8rem; }
        .btn-min { width: 100%; padding: 8px; margin-bottom: 5px; background: transparent; border: 1px solid var(--neon); color: var(--neon); border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon); color: #000; }

        /* PAINEL ADMIN */
        #adminPanel { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 1.8fr; gap: 20px; }
        .col-title { color: var(--neon); font-size: 0.75rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #333; }

        /* ESCALA (MODO CLARO PARA IMPRESSÃO) */
        #secaoEscala { background: white; border-radius: 10px; padding: 20px; color: #000; border: 3px solid #000; overflow-x: auto; }
        table.escala { width: 100%; border-collapse: collapse; min-width: 1000px; }
        table.escala th { background: var(--blue); color: white; padding: 10px; border: 1px solid #000; font-size: 0.75rem; }
        table.escala td { border: 1px solid #000; text-align: center; font-weight: 900; height: 50px; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: 900; background: transparent; text-transform: uppercase; }

        /* CORES MINISTÉRIOS */
        .pessoal td { background-color: #e0f2fe !important; } .mordomia td { background-color: #fef3c7 !important; }
        .saude td { background-color: #dcfce7 !important; } .mulher td { background-color: #fce7f3 !important; }
        .especial td { background-color: #ffedd5 !important; }

        /* GRÁFICO E PLANEJAMENTO */
        .grid-anual { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .card-anual { background: #1a2634; border: 1px solid #334155; padding: 10px; border-radius: 8px; }
        .card-anual h4 { margin: 0 0 5px 0; font-size: 0.8rem; color: var(--gold); }
        .card-anual textarea { width: 100%; height: 60px; background: transparent; border: none; color: #fff; resize: none; font-size: 0.75rem; }

        /* GALERIA DE MÍDIAS */
        .grid-midia { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 10px; }
        .thumb-box { background: #000; border: 2px solid #334155; border-radius: 8px; overflow: hidden; cursor: pointer; position: relative; height: 90px; }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-label { position: absolute; bottom: 0; background: rgba(0,0,0,0.7); width: 100%; font-size: 0.6rem; padding: 2px; text-align: center; }

        /* VISUALIZADOR TELA CHEIA */
        #viewer { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:20000; flex-direction:column; align-items:center; justify-content:center; }
        #viewer img { max-width: 90%; max-height: 80vh; border: 2px solid white; }

        @media print { .navbar, #adminPanel, #viewer, .btn-nav { display: none !important; } }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="nav-title">ESTRELA DALVA</span>
    <select id="selMes" class="input-dark" onchange="renderTodo()"></select>
    <button class="btn-nav" onclick="window.print()">🖨️ IMPRIMIR</button>
    <div style="flex-grow: 1;"></div>
    <button id="btnAcesso" class="btn-nav" style="border-color:var(--neon); color:var(--neon)" onclick="fazerLogin()">🔓 ACESSAR</button>
    <button id="btnSair" class="btn-nav" style="display:none; border-color:red; color:red" onclick="location.reload()">🚪 SAIR</button>
</nav>

<div id="adminPanel">
    <div class="admin-grid">
        <div class="column">
            <div class="col-title">1. Pincel Ministério</div>
            <div id="pinceis"></div>
            <button class="btn-min" style="border-color:red; color:red; margin-top:10px;" onclick="selP('','')">LIMPAR SELEÇÃO</button>
        </div>
        <div class="column">
            <div class="col-title">2. Responsável Mensal</div>
            <div id="gridAnciaos" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"></div>
        </div>
        <div class="column">
            <div class="col-title">3. Logins e Senhas</div>
            <div style="max-height: 250px; overflow-y: auto;">
                <table style="width:100%; font-size:0.7rem;"><tbody id="corpoLogins"></tbody></table>
            </div>
        </div>
    </div>
</div>

<div id="secaoEscala">
    <div style="text-align:center; margin-bottom:15px;">
        <h2 id="txtAnciao" style="margin:0; color:var(--blue); text-transform:uppercase;"></h2>
        <h3 style="margin:5px 0;">ESCALA DE <span id="txtMes"></span> - 2026</h3>
    </div>
    <table class="escala">
        <thead>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="secaoAnual">
    <h3 style="color:var(--neon); border-bottom: 1px solid #333; padding-bottom: 10px; margin-top: 30px;">🗓️ PLANEJAMENTO ANUAL 2026</h3>
    <div id="gridAnual" class="grid-anual"></div>
</div>

<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px;">
    <div id="boxMus" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--neon);">
        <h4 style="margin:0; color:var(--neon);">🎵 MÚSICAS DA SEMANA</h4>
        <input type="file" id="fMus" style="display:none" onchange="upload('musicas')">
        <button id="btnUMus" class="btn-nav" style="margin-top:10px; display:none" onclick="document.getElementById('fMus').click()">+ ADD MÚSICA</button>
        <div id="gridMus" class="grid-midia"></div>
    </div>
    <div id="boxTes" style="background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--green);">
        <h4 style="margin:0; color:var(--green);">💰 TESOURARIA / COMPROVANTES</h4>
        <input type="file" id="fTes" style="display:none" onchange="upload('tesouraria')">
        <button id="btnUTes" class="btn-nav" style="margin-top:10px; display:none" onclick="document.getElementById('fTes').click()">+ ADD COMPROVANTE</button>
        <div id="gridTes" class="grid-midia"></div>
    </div>
</div>

<div id="viewer" onclick="this.style.display='none'">
    <div id="viewerContent"></div>
    <div style="margin-top:20px;">
        <a id="downLink" href="#" download class="btn-nav" style="border-color:white;">BAIXAR ARQUIVO</a>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v102_final');

    const MESES = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
    const MINS = { admin:"Admin", ger:"Gerência", diaconato:"Diaconato", musica:"Música", sonoplastia:"Sonoplastia", recepcao:"Recepção", sabatina:"Sabatina", pessoal:"M. Pessoal", mordomia:"Mordomia", saude:"Saúde", homens:"M. Homens", familia:"M. Família", adolescentes:"Adol." };
    
    let db = { escalas:{}, cores:{}, anciaos:{}, anual:{}, musicas:[], tesouraria:{}, logins:{} };
    let logado = false; let pAtivo = ""; let pNome = "";

    dbRef.on('value', snap => { if(snap.exists()) db = snap.val(); renderTodo(); });

    function fazerLogin() {
        let u = prompt("Usuário:").toLowerCase(), s = prompt("Senha:");
        if((u==='admin' && s==='admin123') || (db.logins && db.logins[u] === s)) {
            logado = true;
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('btnAcesso').style.display = 'none';
            document.getElementById('btnSair').style.display = 'block';
            document.getElementById('btnUMus').style.display = 'block';
            document.getElementById('btnUTes').style.display = 'block';
            renderTodo();
        } else { alert("Acesso Negado!"); }
    }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('txtMes').innerText = MESES[m];
        document.getElementById('txtAnciao').innerText = "Ancião Responsável: " + (db.anciaos?.[m] || "---");

        // Pinceis Admin
        const p = document.getElementById('pinceis'); p.innerHTML = "";
        ['pessoal','mordomia','saude','mulher','especial'].forEach(k => {
            p.innerHTML += `<button class="btn-min ${pAtivo===k?'active':''}" onclick="selP('${k}','${k.toUpperCase()}')">${k.toUpperCase()}</button>`;
        });

        // Logins
        const cL = document.getElementById('corpoLogins'); cL.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            cL.innerHTML += `<tr><td style="color:var(--gold)">${MINS[k]}</td><td><input class="input-dark" style="width:80px" value="${db.logins?.[k] || '123'}" onchange="atuLog('${k}',this.value)"></td></tr>`;
        });

        // Escala
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, m, d), dStr = `${d}_${m+1}_2026`, sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let tr = document.createElement('tr');
                if(db.cores?.[dStr]) tr.className = db.cores[dStr].id || db.cores[dStr];
                tr.innerHTML = `<td onclick="pintar('${dStr}')" style="cursor:pointer"><b>${["DOM","SEG","TER","QUA","QUI","SEX","SÁB"][sem]}</b><br><small>${db.cores?.[dStr]?.n || ''}</small></td><td>${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(c => `<td><input class="cell-input" ${!logado?'disabled':''} value="${db.escalas?.[dStr]?.[c]||''}" onchange="atuE('${dStr}','${c}',this.value)"></td>`).join('');
                corpo.appendChild(tr);
            }
        }

        // Planejamento
        const gA = document.getElementById('gridAnual'); gA.innerHTML = "";
        MESES.forEach((n, i) => {
            gA.innerHTML += `<div class="card-anual"><h4>${n}</h4><textarea ${!logado?'disabled':''} onchange="atuAnu(${i},this.value)">${db.anual?.[i]||''}</textarea></div>`;
        });

        // Responsáveis
        const gAnc = document.getElementById('gridAnciaos'); gAnc.innerHTML = "";
        MESES.forEach((n, i) => {
            gAnc.innerHTML += `<div><small>${n}</small><input class="input-dark" style="width:90%" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)" ${!logado?'disabled':''}></div>`;
        });

        renderMidia('musicas', 'gridMus');
        renderMidia('tesouraria', 'gridTes', m);
    }

    function selP(id, n) { pAtivo = id; pNome = n; renderTodo(); }
    function pintar(d) { if(logado) { if(!db.cores) db.cores={}; if(!pAtivo) delete db.cores[d]; else db.cores[d]={id:pAtivo, n:pNome}; dbRef.child('cores').set(db.cores); }}
    function atuE(d,c,v) { if(logado) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }}
    function atuAnu(i,v) { if(logado) { if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }}
    function atuAnc(i,v) { if(logado) { if(!db.anciaos) db.anciaos={}; db.anciaos[i]=v.toUpperCase(); dbRef.child('anciaos').set(db.anciaos); }}
    function atuLog(k,v) { if(logado) { if(!db.logins) db.logins={}; db.logins[k]=v; dbRef.child('logins').set(db.logins); }}

    function upload(tipo) {
        const file = document.getElementById(tipo==='musicas'?'fMus':'fTes').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            const m = document.getElementById('selMes').value;
            if(tipo==='musicas') { if(!db.musicas) db.musicas=[]; db.musicas.push({n:file.name, d:e.target.result, t:file.type}); }
            else { if(!db.tesouraria) db.tesouraria={}; if(!db.tesouraria[m]) db.tesouraria[m]=[]; db.tesouraria[m].push({n:file.name, d:e.target.result, t:file.type}); }
            dbRef.set(db);
        };
        reader.readAsDataURL(file);
    }

    function renderMidia(tipo, id, m=null) {
        const g = document.getElementById(id); g.innerHTML = "";
        const lista = tipo==='musicas' ? db.musicas : db.tesouraria?.[m];
        if(!lista) return;
        lista.forEach((item, i) => {
            let icon = item.t.includes('image') ? `<img src="${item.d}">` : `<div style="padding:20px">🎵</div>`;
            g.innerHTML += `<div class="thumb-box" onclick="abrirV('${item.d}','${item.t}','${item.n}')">${icon}<div class="thumb-label">${item.n}</div></div>`;
        });
    }

    function abrirV(d, t, n) {
        const cont = document.getElementById('viewerContent');
        cont.innerHTML = t.includes('image') ? `<img src="${d}">` : `<audio src="${d}" controls autoplay></audio>`;
        document.getElementById('downLink').href = d;
        document.getElementById('downLink').download = n;
        document.getElementById('viewer').style.display = 'flex';
    }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
