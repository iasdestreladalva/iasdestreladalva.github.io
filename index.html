<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - Gestão 2026</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 260px; background: #0f172a; border-right: 1px solid #1e293b; display: flex; flex-direction: column; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        .sidebar h2 { color: var(--neon); font-size: 1.2rem; text-align: center; margin-bottom: 30px; letter-spacing: 1px; }
        
        .main-content { flex: 1; overflow-y: auto; padding: 25px; }
        
        .btn-nav { width: 100%; padding: 12px; background: none; border: 1px solid #334155; color: #94a3b8; border-radius: 8px; cursor: pointer; text-align: left; margin-bottom: 10px; transition: 0.3s; font-weight: 500; }
        .btn-nav:hover, .btn-nav.active { background: var(--blue); color: var(--neon); border-color: var(--neon); box-shadow: 0 0 10px rgba(0,210,255,0.2); }
        
        .admin-panel { display: none; background: rgba(30, 41, 59, 0.7); border-radius: 12px; padding: 20px; border: 1px solid var(--orange); margin-bottom: 25px; backdrop-filter: blur(10px); }
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }

        .table-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; color: #1e293b; }
        th { background: #f1f5f9; padding: 12px; font-size: 0.7rem; text-transform: uppercase; border: 1px solid #e2e8f0; color: var(--blue); }
        td { border: 1px solid #e2e8f0; padding: 4px; text-align: center; font-weight: 600; font-size: 0.85rem; }
        
        input[type="text"], input[type="number"] { width: 100%; border: none; background: transparent; text-align: center; font-family: inherit; font-weight: inherit; text-transform: uppercase; padding: 8px 0; }
        
        .row-pessoal { background-color: #e0f2fe !important; }
        .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; }
        .row-homens { background-color: #ecfeff !important; }
        .row-familia { background-color: #faf5ff !important; }
        .row-mulher { background-color: #fdf2f8 !important; }
        .row-musica { background-color: #fff1f2 !important; }

        .chart-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 12px; border: 1px solid #334155; height: 300px; }
        @media print { .no-print { display: none !important; } body { background: white; color: black; } .table-card { box-shadow: none; } }
    </style>
</head>
<body>

<div class="sidebar no-print">
    <h2>ESTRELA DALVA</h2>
    <select id="selMes" onchange="inicializar()" class="btn-nav" style="background:#000; color:var(--neon); border-color:var(--neon);"></select>
    
    <button class="btn-nav active" onclick="showTab('escala')">📅 Escala de Cultos</button>
    <button class="btn-nav" onclick="showTab('missao')">📊 Missionário</button>
    <button class="btn-nav" onclick="showTab('planejamento')">📝 Planejamento</button>
    
    <div style="margin-top:auto; padding-top:20px; border-top:1px solid #334155;">
        <button class="btn-nav" id="btnAcesso" onclick="fazerLogin()">🔓 Painel Admin</button>
        <button class="btn-nav" id="btnSair" onclick="fazerSair()" style="display:none; color:var(--orange);">🚪 Sair do Sistema</button>
    </div>
</div>

<div class="main-content">
    <div id="adminPanel" class="admin-panel no-print">
        <h3 style="color:var(--orange); margin:0 0 15px 0; font-size:1rem;">CONFIGURAÇÕES ADMINISTRATIVAS</h3>
        <div class="admin-grid">
            <div>
                <small>1. SELECIONE O MINISTÉRIO (COR):</small>
                <select id="corAtiva" class="btn-nav" style="background:#000; margin-top:5px;">
                    <option value="">Nenhum (Branco)</option>
                    <option value="pessoal">M. Pessoal (Azul)</option>
                    <option value="mordomia">Mordomia (Amarelo)</option>
                    <option value="saude">Saúde (Verde)</option>
                    <option value="musica">Música (Rosa)</option>
                </select>
            </div>
            <div>
                <small>2. ANCIÃO DO MÊS:</small>
                <input type="text" id="inAnciao" class="btn-nav" style="background:#000; margin-top:5px; text-align:left;" placeholder="Nome..." onchange="salvarAnciao(this.value)">
            </div>
            <div>
                <small>3. AÇÕES:</small>
                <button class="btn-nav" style="background:var(--green); color:#000; border:none;" onclick="window.print()">🖨️ IMPRIMIR ESCALA</button>
            </div>
        </div>
    </div>

    <div id="tab-escala" class="tab-content">
        <div class="table-card">
            <table>
                <thead>
                    <tr><th colspan="9" id="txtMes" style="background:var(--blue); color:white; font-size:1.5rem; padding:15px;">MÊS</th></tr>
                    <tr><th colspan="9" id="txtAnciao" style="background:#1e293b; color:var(--gold); font-size:1rem;">ANCIÃO: ---</th></tr>
                    <tr>
                        <th style="width:50px;">DIA</th><th style="width:70px;">DATA</th><th>SABATINA</th><th>PREGADOR</th>
                        <th>MÚSICA (NOME/LINK)</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th>
                    </tr>
                </thead>
                <tbody id="corpoEscala"></tbody>
            </table>
        </div>
    </div>
        <div id="tab-missao" class="tab-content" style="display:none;">
        <h3 style="color:var(--neon);">Relatório Missionário</h3>
        <div style="display:grid; grid-template-columns: 1fr 2fr; gap:25px;">
            <div id="missaoForm" class="admin-panel" style="display:block;"></div>
            <div class="chart-box"><canvas id="graficoMissao"></canvas></div>
        </div>
    </div>

    <div id="tab-planejamento" class="tab-content" style="display:none;">
        <h3 style="color:var(--gold);">Planejamento Anual 2026</h3>
        <div id="gridPlano" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:20px;"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
      authDomain: "unidades-de-acao.firebaseapp.com",
      projectId: "unidades-de-acao",
      appId: "1:1088355029870:web:7bb98d3115e7b7767f677f"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    
    let dbLocal = { escalas:{}, cores:{}, anciaos:{}, missao:{}, plano:{} };
    let curUser = localStorage.getItem('iasd_user') || 'visitante';
    let chartObj;

    function sincronizarCloud() {
        db.collection('dados').doc('sistema').onSnapshot(doc => {
            if(doc.exists) { dbLocal = doc.data(); renderizarInterface(); }
        });
    }

    function salvarCloud() {
        db.collection('dados').doc('sistema').set(dbLocal);
    }

    function inicializar() {
        const s = document.getElementById('selMes');
        if(s.innerHTML === "") {
            MESES.forEach((m, i) => s.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
        }
        sincronizarCloud();
        renderizarInterface();
    }

    function renderizarInterface() {
        const m = document.getElementById('selMes').value;
        const isAdm = (curUser === 'admin');
        document.getElementById('adminPanel').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = curUser === 'visitante' ? 'block' : 'none';
        document.getElementById('txtMes').innerText = `ESCALA - ${MESES[m]} 2026`;
        document.getElementById('txtAnciao').innerText = `ANCIÃO RESPONSÁVEL: ${dbLocal.anciaos?.[m] || '---'}`;
        document.getElementById('inAnciao').value = dbLocal.anciaos?.[m] || "";
        renderEscala(m); renderPlanejamento();
        if(document.getElementById('tab-missao').style.display !== 'none') updateMissaoChart(m);
    }

    function renderEscala(m) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, parseInt(m)+1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let data = new Date(2026, m, d), sem = data.getDay(), dStr = `${d}/${parseInt(m)+1}`;
            if([0, 3, 6].includes(sem)) {
                let cor = dbLocal.cores?.[dStr] || "";
                let tr = `<tr class="row-${cor}"><td onclick="pintarLinha('${dStr}')" style="cursor:pointer"><b>${["DOM","SEG","TER","QUA","QUI","SEX","SÁB"][sem]}</b></td><td>${dStr}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let val = dbLocal.escalas?.[dStr]?.[col] || "";
                    let canEdit = (curUser === 'admin' || (curUser === cor && col === 'pr'));
                    tr += `<td><input ${canEdit?'':'disabled'} value="${val}" onchange="atuEscala('${dStr}','${col}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function atuEscala(d, c, v) {
        if(!dbLocal.escalas) dbLocal.escalas = {}; if(!dbLocal.escalas[d]) dbLocal.escalas[d] = {};
        dbLocal.escalas[d][c] = v.toUpperCase(); salvarCloud();
    }

    function pintarLinha(d) {
        if(curUser === 'admin') {
            if(!dbLocal.cores) dbLocal.cores = {};
            const cor = document.getElementById('corAtiva').value;
            if(cor) dbLocal.cores[d] = cor; else delete dbLocal.cores[d];
            salvarCloud(); renderizarInterface();
        }
    }

    function salvarAnciao(v) {
        if(!dbLocal.anciaos) dbLocal.anciaos = {};
        dbLocal.anciaos[document.getElementById('selMes').value] = v.toUpperCase();
        salvarCloud(); renderizarInterface();
    }

    function renderPlanejamento() {
        const g = document.getElementById('gridPlano'); g.innerHTML = "";
        MESES.forEach((m, i) => {
            g.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px; border:1px solid #334155;">
                <h4 style="margin:0; color:var(--neon);">${m}</h4>
                <textarea onchange="atuPlano(${i}, this.value)" style="width:100%; height:80px; background:transparent; color:white; border:none; margin-top:10px; font-family:inherit;">${dbLocal.plano?.[i]||''}</textarea>
            </div>`;
        });
    }

    function atuPlano(m, v) { if(!dbLocal.plano) dbLocal.plano = {}; dbLocal.plano[m] = v; salvarCloud(); }

    function updateMissaoChart(m) {
        const ctx = document.getElementById('graficoMissao').getContext('2d');
        if(chartObj) chartObj.destroy();
        const dados = dbLocal.missao?.[m] || [0,0,0,0,0];
        chartObj = new Chart(ctx, { type: 'bar', data: { labels: ['Encontros', 'Classes', 'Estudos', 'Ministrantes', 'Duplas'], datasets: [{ data: dados, backgroundColor: ['#00d2ff','#ffd700','#ff7f50','#2ecc71','#ff4757'] }] }, options: { maintainAspectRatio: false, plugins: { legend: { display: false } } } });
        const f = document.getElementById('missaoForm'); f.innerHTML = "<h4>Dados Missionários</h4>";
        ['Encontros', 'Classes', 'Estudos', 'Ministrantes', 'Duplas'].forEach((label, i) => {
            f.innerHTML += `<div style="margin-bottom:10px;"><label><small>${label}</small></label><input type="number" class="btn-nav" style="background:#000; margin:0;" value="${dados[i]}" onchange="atuMissao(${m},${i},this.value)"></div>`;
        });
    }

    function atuMissao(m, i, v) {
        if(!dbLocal.missao) dbLocal.missao = {}; if(!dbLocal.missao[m]) dbLocal.missao[m] = [0,0,0,0,0];
        dbLocal.missao[m][i] = parseInt(v); salvarCloud(); updateMissaoChart(m);
    }

    function showTab(t) {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.querySelectorAll('.btn-nav').forEach(el => el.classList.remove('active'));
        document.getElementById('tab-'+t).style.display = 'block';
        event.currentTarget.classList.add('active');
        if(t === 'missao') updateMissaoChart(document.getElementById('selMes').value);
    }

    function fazerLogin() {
        if(prompt("Senha:") === "iasd118") { curUser = 'admin'; localStorage.setItem('iasd_user', 'admin'); renderizarInterface(); }
    }

    function fazerSair() { localStorage.removeItem('iasd_user'); location.reload(); }
    window.onload = inicializar;
</script>
</body>
</html>
