<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        @media print {
            body { background: white; color: black; }
            .no-print, button, select, #userWelcomeBar { display: none !important; }
            table#tabela-main { width: 100% !important; border: 1px solid black !important; color: black !important; }
            #tabela-main th, #tabela-main td { border: 1px solid black !important; color: black !important; }
            #tabela-main input { color: black !important; border: none !important; background: transparent !important; }
        }

        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; padding: 10px; border-radius: 4px; box-sizing: border-box; }
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 50px; }
        #tabela-main input { width: 100%; height: 100%; border: none; text-align: center; font-family: inherit; font-size: 0.8rem; }
        
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 300px; color: black; }
    </style>
</head>
<body>
<div class="container">
    <div id="userWelcomeBar" style="display:none; text-align:center; padding:10px; color:var(--gold); border: 1px solid var(--neon); margin-bottom: 10px; border-radius: 8px;"></div>
    
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="width:auto; padding:0 20px; border-color:var(--neon); color:var(--neon); cursor:pointer;" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; padding:0 20px; border-color:red; color:red; display:none; cursor:pointer;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" id="headerTitulo" style="background:var(--blue); color:white; font-size:1.4rem; padding:15px;">ESCALA</th></tr>
            <tr><th colspan="9" id="headerAnciao" style="background:var(--blue); color:var(--gold);">Responsável: </th></tr>
            <tr><th style="width:100px;">DIA</th><th style="width:80px;">DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div id="secTesouraria" class="no-print" style="display:none; margin-top:30px; border:1px solid var(--green); padding:15px; border-radius:12px;">
        <h3 style="color:var(--green);">💰 COMPROVANTES DA TESOURARIA</h3>
        <div id="gridArquivosPublicos" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap:15px;"></div>
    </div>
</div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3 style="margin-top:0; text-align:center;">LOGIN DO SISTEMA</h3>
        <label style="font-size:0.8rem;">Usuário:</label>
        <input type="text" id="userLogin" class="input-dark" style="color:black!important; background:#eee!important; margin-bottom:15px;">
        <label style="font-size:0.8rem;">Senha:</label>
        <input type="password" id="passLogin" class="input-dark" style="color:black!important; background:#eee!important;">
        <button onclick="login()" style="width:100%; margin-top:20px; padding:12px; background:var(--blue); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">ENTRAR</button>
    </div>
</div>

<div id="popViewImg" class="overlay" onclick="this.style.display='none'">
    <div style="width:95vw; height:90vh; display:flex; flex-direction:column;" onclick="event.stopPropagation()">
        <div id="fileContent" style="flex:1; background:white; border-radius:8px; overflow:hidden;"></div>
        <button style="background:red; color:white; padding:15px; border:none; margin-top:10px; border-radius:8px; font-weight:bold; cursor:pointer;" onclick="document.getElementById('popViewImg').style.display='none'">FECHAR</button>
    </div>
</div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes", aventureiros: "Aventureiros", desbravadores: "Desbravadores", jovem: "M. Jovem" };
    
    let db = {};
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    // FUNÇÃO QUE GARANTE QUE O LOGIN FUNCIONE
    function verificarIntegridade() {
        let mudou = false;
        if (!db.senhas || Object.keys(db.senhas).length === 0) {
            db.senhas = { admin: "iasd118", ger: "ger123" }; 
            mudou = true;
        }
        if (!db.anciaos) { db.anciaos = {}; mudou = true; }
        if (!db.escalas) { db.escalas = {}; mudou = true; }
        if (!db.docs) { db.docs = {}; mudou = true; }
        if (mudou) save();
    }

    dbCloud.collection('dados').doc('estrela_v115').onSnapshot(doc => {
        if(doc.exists) { 
            db = doc.data();
            verificarIntegridade();
            renderTodo(); 
        } else {
            // Se o documento não existe, ele cria um novo com a senha admin para você entrar
            db = { senhas: { admin: "iasd118" }, anciaos: {}, escalas: {}, docs: {} };
            save();
        }
    });

    function save() { dbCloud.collection('dados').doc('estrela_v115').set(db); }

    function login() { 
        const u = document.getElementById('userLogin').value.toLowerCase().trim();
        const p = document.getElementById('passLogin').value;
        
        if (db.senhas && db.senhas[u] === p) {
            localStorage.setItem('iasd_curUser', u);
            location.reload();
        } else {
            alert("Acesso negado! Se o banco foi resetado, tente usuário 'admin' e senha 'iasd118'.");
        }
    }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerAnciao').innerText = `Responsável: ${db.anciaos?.[mIdx] || 'A definir'}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        if (curUser !== 'visitante') {
            document.getElementById('userWelcomeBar').style.display = 'block';
            document.getElementById('userWelcomeBar').innerHTML = `Bem-vindo, <b>${MINS[curUser] || curUser}</b>`;
            document.getElementById('btnSair').style.display = 'block';
            document.getElementById('btnAcesso').style.display = 'none';
            document.getElementById('secTesouraria').style.display = 'block';
        }

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let tr = `<tr><td>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => { 
                    let val = db.escalas?.[dStr]?.[col] || '';
                    tr += `<td><input ${curUser==='visitante'?'disabled':''} value="${val}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`; 
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        renderArquivosPublicos();
    }

    function verArquivo(src) { 
        const content = document.getElementById('fileContent');
        content.innerHTML = "";
        if (src.includes("pdf") || src.startsWith("data:application/pdf")) {
            content.innerHTML = `<embed src="${src}" type="application/pdf" width="100%" height="100%">`;
        } else {
            content.innerHTML = `<img src="${src}" style="max-width:100%; max-height:100%; object-fit:contain;">`;
        }
        document.getElementById('popViewImg').style.display = 'flex';
    }

    function renderArquivosPublicos() {
        const m = document.getElementById('selMes').value;
        const grid = document.getElementById('gridArquivosPublicos'); grid.innerHTML = "";
        (db.docs?.[m] || []).forEach(doc => { 
            grid.innerHTML += `<div style="background:#1e293b; padding:10px; text-align:center; border-radius:8px;">
                <p style="font-size:0.6rem; color:white; margin-bottom:5px;">${doc.nome}</p>
                <button onclick="verArquivo('${doc.data}')" style="background:var(--neon); border:none; padding:8px; cursor:pointer; width:100%; font-weight:bold; border-radius:4px;">VER</button>
            </div>`; 
        });
    }

    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
