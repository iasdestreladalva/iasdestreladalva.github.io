<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - SISTEMA RESTAURADO</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        #saveIndicator { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); padding: 8px 25px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 20000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .saving { background: var(--orange); color: white; border: 2px solid white; }
        .saved { background: var(--green); color: white; border: 2px solid white; }

        .btn-modern { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); background: transparent; color: var(--neon); cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.8rem; }
        .btn-modern:hover { background: var(--neon); color: var(--blue); box-shadow: 0 0 10px var(--neon); }

        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; align-items: start; } 
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; height: auto; min-height: 400px; }
        
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 6px; box-sizing: border-box; outline: none; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 0.7rem; }
        
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; border-radius: 10px; overflow: hidden; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; }
        
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-weight: bold; font-size: 1.1rem; outline: none; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 90vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }

        .cron-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .cron-container { background: white; color: black; padding: 25px; border-radius: 15px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
        
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div id="saveIndicator"></div>

<div class="container">
    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:8px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="btn-modern" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button id="btnAcesso" class="btn-modern" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="btn-modern" style="border-color:red; color:red;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div class="no-print" style="display:flex; gap:10px; margin-bottom:15px; justify-content:center; flex-wrap: wrap;">
        <button class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="document.getElementById('modalCronograma').style.display='flex'">📝 ORDEM DO CULTO</button>
        <button class="btn-modern" id="btnAdminToggle" onclick="toggleAdminPanel()">⚙️ PAINEL CONTROLE</button>
        <button class="btn-modern" onclick="document.getElementById('popMembros').style.display='flex'; renderMembros();">👥 EQUIPE</button>
    </div>

    <div id="adminPanel" class="admin-box no-print" style="display: block;"> <div class="admin-grid">
            <div class="admin-section">
                <h4>1. ANCIÃO DO MÊS</h4>
                <div id="gridMeses"></div>
            </div>
            <div class="admin-section">
                <h4>2. LOGINS & SENHAS</h4>
                <table style="width:100%; font-size:0.75rem; color:white;" id="corpoCreds"></table>
            </div>
            <div class="admin-section">
                <h4>3. BACKUP & NUVEM</h4>
                <button class="btn-min" onclick="gerarBackupNuvem()" style="border-color:var(--gold); color:var(--gold)">💾 SALVAR BACKUP AGORA</button>
                <button class="btn-min" onclick="abrirPopBackups()" style="border-color:var(--neon); color:var(--neon)">📂 RESTAURAR BACKUP</button>
                <button class="btn-min" onclick="exportarRelatorioPDF()" style="border-color:var(--green); color:var(--green)">📄 GERAR PDF</button>
            </div>
        </div>
    </div>

    <div id="areaEscalaPrincipal">
        <table id="tabela-main">
            <thead>
                <tr><th colspan="9" id="headerTitulo" style="background:var(--blue); color:white; padding:15px; font-size:1.5rem;">ESCALA</th></tr>
                <tr><th colspan="9" id="headerAnciao" style="background:var(--blue); color:var(--gold); padding-bottom:10px;">Responsável: </th></tr>
                <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>ESPECIAL</th><th>LOUVOR</th><th>SOM</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div id="secPlan" style="margin-top:40px; background: rgba(255,255,255,0.02); padding: 20px; border-radius: 15px; border: 1px solid #334155;" class="no-print">
        <h3 style="color:var(--gold);">🗓️ PLANEJAMENTO ANUAL 2026</h3>
        <table style="width:100%; color:white;"><tbody id="corpoPlan"></tbody></table>
    </div>

    <div id="modalCronograma" class="cron-overlay" onclick="this.style.display='none'">
        <div id="areaCronograma" class="cron-container" onclick="event.stopPropagation()">
            <h2 style="text-align: center; color: var(--blue);">ORDEM DO CULTO</h2>
            <div id="cronograma-lista"></div>
            <div class="no-print" style="margin-top:20px; display:flex; gap:10px; justify-content:center;">
                <button class="btn-modern" style="background:var(--blue); color:white;" onclick="addBlocoCron()">+ SEÇÃO</button>
                <button class="btn-modern" style="background:var(--green); color:white;" onclick="salvarCronograma()">💾 SALVAR ORDEM</button>
            </div>
            <button class="btn-fechar" onclick="document.getElementById('modalCronograma').style.display='none'">FECHAR</button>
        </div>
    </div>

</div>

<div id="popMembros" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3>EQUIPE</h3><div id="listaMembros"></div><button class="btn-fechar">FECHAR</button></div></div>
<div id="popBackups" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3>BACKUPS NA NUVEM</h3><div id="listaBackupsNuvem"></div></div></div>
<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; color:black;"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="color:black!important;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark"><button onclick="login()">ENTRAR</button></div></div>

<script>
    // Configuração do Banco de Dados
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();
    const DOC_ID = 'estrela_v102'; // CERTIFIQUE-SE QUE ESTE É O NOME DO SEU BANCO

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", sabatina: "Escola Sabatina" };
    let db = {}; let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    // MONITORAMENTO EM TEMPO REAL
    dbCloud.collection('dados').doc(DOC_ID).onSnapshot(doc => {
        if(doc.exists) { 
            db = doc.data(); 
            renderTodo();
            if(db.cronograma) carregarCronograma(db.cronograma);
        } else {
            db = { senhas:{admin:'123456'}, anciaos:{}, escalas:{}, plan_anual:{}, cronograma:[] };
            save();
        }
    });

    function save() {
        const el = document.getElementById('saveIndicator');
        el.innerText = "Salvando..."; el.className = "saving"; el.style.display = "block";
        dbCloud.collection('dados').doc(DOC_ID).set(db).then(() => {
            el.innerText = "✅ Salvo com Sucesso!"; el.className = "saved";
            setTimeout(() => el.style.display = "none", 2000);
        });
    }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerAnciao').innerText = `Responsável: ${db.anciaos?.[mIdx] || 'Não definido'}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;

        // Render Escala
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let tr = `<tr><td><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => { 
                    let val = db.escalas?.[dStr]?.[col] || '';
                    tr += `<td><textarea class="auto-expand" onchange="atuCel('${dStr}','${col}',this.value)">${val}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }

        // Render Planejamento
        const cPlan = document.getElementById('corpoPlan'); cPlan.innerHTML = "";
        MESES.forEach((m, i) => {
            cPlan.innerHTML += `<tr><td style="color:var(--gold); padding:10px;">${m}</td><td><textarea style="width:100%; color:white; background:none; border:none;" onchange="if(!db.plan_anual)db.plan_anual={}; db.plan_anual[${i}]=this.value; save();">${db.plan_anual?.[i] || ''}</textarea></td></tr>`;
        });

        renderAdmin();
    }

    function renderAdmin() {
        const gM = document.getElementById('gridMeses'); gM.innerHTML = "";
        MESES.forEach((m, i) => {
            gM.innerHTML += `<div><small>${m}</small><input class="input-dark" value="${db.anciaos?.[i]||''}" onchange="if(!db.anciaos)db.anciaos={}; db.anciaos[${i}]=this.value; save();"></div>`;
        });
    }

    function toggleAdminPanel() {
        const p = document.getElementById('adminPanel');
        p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function atuCel(d, c, v) { if(!db.escalas) db.escalas = {}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }

    // CRONOGRAMA
    function carregarCronograma(lista) { const container = document.getElementById('cronograma-lista'); container.innerHTML = ""; lista.forEach(d => addBlocoCron(d)); }
    function addBlocoCron(dados = { horario: '', titulo: '', itens: [] }) {
        const b = document.createElement('div'); b.style.border = "1px solid #ddd"; b.style.marginBottom="10px";
        b.innerHTML = `<div style="background:#f0f0f0; padding:10px; display:flex; gap:10px;"><input style="width:70px;" value="${dados.horario}" class="cron-h"><input style="flex-grow:1;" value="${dados.titulo}" class="cron-t"><button onclick="addItemCron(this)">+</button><button onclick="this.parentElement.parentElement.remove()">X</button></div><table style="width:100%"><tbody></tbody></table>`;
        document.getElementById('cronograma-lista').appendChild(b);
        if(dados.itens) dados.itens.forEach(it => addItemCron(b.querySelector('table'), it));
    }
    function addItemCron(target, it = { nome: '', tempo: '' }) {
        const tb = target.tagName === 'TABLE' ? target.querySelector('tbody') : target.closest('div').nextSibling;
        const tr = document.createElement('tr');
        tr.innerHTML = `<td><input class="it-n" style="width:90%" value="${it.nome}"></td><td width="60"><input class="it-t" style="width:100%" value="${it.tempo}"></td>`;
        tb.appendChild(tr);
    }
    function salvarCronograma() {
        db.cronograma = Array.from(document.querySelectorAll('#cronograma-lista > div')).map(b => ({
            horario: b.querySelector('.cron-h').value,
            titulo: b.querySelector('.cron-t').value,
            itens: Array.from(b.querySelectorAll('tr')).map(tr => ({ nome: tr.querySelector('.it-n').value, tempo: tr.querySelector('.it-t').value }))
        }));
        save();
    }

    // Inicialização
    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    
    function login() { const u = document.getElementById('userLogin').value; if(u==='admin'){ localStorage.setItem('iasd_curUser', 'admin'); location.reload(); } }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
</script>
</body>
</html>
