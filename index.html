<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v102.43 (GitHub Fix)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1450px; margin: auto; }
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 220px 1fr 2.5fr; gap: 20px; }
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .admin-section h4 { color: var(--neon); font-size: 0.75rem; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; text-transform: uppercase; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 10px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; border-color: var(--neon) !important; }
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; } .row-homens { background-color: #ecfeff !important; }
        .row-familia { background-color: #faf5ff !important; } .row-adolescentes { background-color: #f8fafc !important; }
        .row-mulher { background-color: #fdf2f8 !important; } .row-musica { background-color: #fff1f2 !important; }
        .row-especial { background-color: #fff4e6 !important; border-left: 5px solid var(--red) !important; }
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 55px; }
        .tesouraria-display { margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--green); }
        .chart-container { margin-top: 20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--orange); }
        .grid-arquivos { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .thumb-doc { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #334155; transition: 0.3s; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 85vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }
    </style>
</head>
<body>

<div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:var(--gold); color:var(--gold); cursor:pointer; font-weight:bold;" onclick="abrirCalendarioAnual()">📅 ANUAL</button>
            <button id="btnEventos" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--red); color:var(--red); display:none; cursor:pointer; font-weight:bold;" onclick="abrirPopEventos()">🔥 EVENTOS</button>
            <button id="btnTesourariaAdmin" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--green); color:var(--green); cursor:pointer; font-weight:bold; display:none;" onclick="abrirTesourariaAdmin()">⚙️ TESOURARIA</button>
            <button id="btnDados" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--orange); color:var(--orange); display:none; cursor:pointer; font-weight:bold;" onclick="abrirPop()">📊 MISSIONÁRIO</button>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon); cursor:pointer;" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; padding:0 15px; border-color:red; color:red; display:none; cursor:pointer;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-section"><h4>1. MINISTÉRIO DO DIA</h4><div id="listaMinisterios"></div><button class="btn-min" style="border-color:red; color:red;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR</button></div>
            <div class="admin-section"><h4>2. RESPONSÁVEL MENSAL</h4><div id="gridMeses" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"></div></div>
            <div class="admin-section">
                <h4>3. CONTROLE DE LOGINS</h4>
                <div style="max-height: 350px; overflow-y: auto;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.75rem;">
                        <thead style="background:#111; color:var(--gold);">
                            <tr><th style="padding:5px;">MINISTÉRIO</th><th>SENHA</th></tr>
                        </thead>
                        <tbody id="corpoCreds"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;" id="headerTitulo">ESCALA</th></tr>
            <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1rem; padding:0 12px 12px 12px; text-align:left;" id="headerAnciao">Responsável: </th></tr>
            <tr><th style="width:150px">DIA</th><th style="width:60px">DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div class="chart-container">
        <div style="height: 300px;"><canvas id="missionaryChart"></canvas></div>
    </div>
    <div class="tesouraria-display">
        <h3 style="margin:0; color:var(--green);">💰 COMPROVANTES - <span id="mesTesouraria"></span></h3>
        <div id="gridArquivosPublicos" class="grid-arquivos"></div>
    </div>
</div>

<div id="zoomOverlay" class="overlay" onclick="this.style.display='none'"><div class="zoom-inner"><img id="imgExpandida" style="max-width:90%; max-height:90%; border:2px solid white;"><iframe id="pdfExpandido" style="width:90%; height:90%; display:none;"></iframe></div></div>
<div id="popCalendario" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--gold); text-align:center;">📅 PLANEJAMENTO ANUAL</h3><div id="listaEventosAnuais" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap:10px;"></div><button onclick="document.getElementById('popCalendario').style.display='none'" class="btn-fechar">FECHAR</button></div></div>
<div id="popEventos" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--red); text-align:center;">EVENTOS ESPECIAIS</h3><div style="background:rgba(255,255,255,0.05); padding:15px; border-radius:10px;"><input type="text" id="evtNome" class="input-dark" placeholder="Nome do Evento"><div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;"><input type="date" id="evtInicio" class="input-dark"><input type="date" id="evtFim" class="input-dark"></div><input type="time" id="evtHora" class="input-dark" style="margin-top:10px;"><button class="btn-min" style="margin-top:15px; background:var(--red); color:white;" onclick="salvarEventoEspecial()">CRIAR EVENTO</button></div><div id="listaEventosAtivos" style="margin-top:10px;"></div><button onclick="document.getElementById('popEventos').style.display='none'" class="btn-fechar">FECHAR</button></div></div>
<div id="popOverlay" class="overlay" onclick="fecharPop()"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--orange);text-align:center;">DADOS MISSIONÁRIOS</h3><div id="camposMissionarios"></div><button onclick="fecharPop()" class="btn-fechar">FECHAR</button></div></div>
<div id="popTesouraria" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--green);text-align:center;">ARQUIVOS</h3><input type="file" id="fileInput" accept="image/*,application/pdf" style="display:none" onchange="uploadArquivo()"><button onclick="document.getElementById('fileInput').click()" class="btn-min">FAZER UPLOAD</button><div id="listaAdminArquivos" style="margin-top:15px;"></div><button onclick="document.getElementById('popTesouraria').style.display='none'" class="btn-fechar">FECHAR</button></div></div>
<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;"><button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button></div></div>

<script>
    // 1. CONFIGURAÇÃO FIREBASE
    const firebaseConfig = { 
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", 
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", 
        projectId: "unidades-de-acao" 
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_final');

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes" };
    const REGRAS = { pessoal: "1S", mordomia: "2S", saude: "1D", homens: "2Q", familia: "3D", adolescentes: "3Q", mulher: "UQ" };
    
    let db = { senhas: { admin: "iasd118" }, anciaos: {}, escalas: {}, regras_manuais: {}, mis_v3: {}, docs: {}, eventos_anuais: {}, eventos_especiais: {} };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let isLoaded = false;

    // 2. CARREGAMENTO INICIAL
    dbRef.on('value', snap => {
        if(snap.exists()) {
            db = snap.val();
        } else {
            // Se o banco estiver vazio, cria os logins padrão
            db.senhas = { admin: "iasd118", ger: "ger123", diaconato: "diac123", musica: "mus123", sonoplastia: "sono123", mulher: "mulher123", sabatina: "sab123", pessoal: "mp123", mordomia: "mord123", saude: "saude123", homens: "homem123", familia: "fam123", adolescentes: "adol123" };
            db.anciaos = {0:"Jesuino", 1:"Wesley", 2:"Ester", 3:"Marcilio", 4:"Albert", 5:"Albert", 6:"Jesuino", 7:"Jesuino", 8:"Ester", 9:"Marcilio", 10:"Wesley", 11:"Albert"};
            dbRef.set(db);
        }
        isLoaded = true;
        renderTodo();
    });

    function save() { dbRef.set(db); }

    function renderTodo() {
        if(!isLoaded) return;
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerAnciao').innerText = `Responsável: ${db.anciaos?.[mIdx] || '---'}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        document.getElementById('mesTesouraria').innerText = MESES[mIdx];

        if(['admin','ger'].includes(curUser)) {
            document.getElementById('adminPanel').style.display='block';
            document.getElementById('btnTesourariaAdmin').style.display='block';
            document.getElementById('btnSair').style.display='block';
            document.getElementById('btnAcesso').style.display='none';
            renderAdmin();
        }
        if(['admin','ger','pessoal'].includes(curUser)) document.getElementById('btnDados').style.display='block';
        if(curUser !== 'visitante') document.getElementById('btnEventos').style.display='block';

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            let dtFormatada = dt.toISOString().split('T')[0];
            let minAuto = "";
            Object.keys(REGRAS).forEach(k => {
                let r = REGRAS[k], n = parseInt(r[0]), sDay = r[1]==="S"?6:(r[1]==="D"?0:3);
                if(r==="UQ" && sem===3 && d>(diasNoMes-7)) minAuto=k;
                else if(sem===sDay && d>(n-1)*7 && d<=n*7) minAuto=k;
            });

            let idEvento = db.eventos_especiais?.[dtFormatada];
            let minID = idEvento ? idEvento.user : (db.regras_manuais?.[dStr] || minAuto);
            let classeRow = idEvento ? "row-especial" : `row-${minID}`;

            if([0,3,6].includes(sem) || idEvento) {
                let tr = `<tr class="${classeRow}"><td onclick="cliqueDia('${dStr}')" style="cursor:pointer;"><b>${["DOM","SEG","TER","QUA","QUI","SEX","SÁB"][sem]}</b><br><small>${idEvento?.nome || MINS[minID] || ''}</small></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let podeEditar = (['admin','ger'].includes(curUser)) || (curUser !== 'visitante');
                    tr += `<td><input ${podeEditar?'':'disabled'} style="width:100%; border:none; background:transparent; text-align:center; font-size:0.7rem;" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`;
                }); corpo.innerHTML += tr + "</tr>";
            }
        }
        renderArquivosPublicos();
        updateChart(mIdx);
    }

    // FUNÇÕES DE APOIO
    function login() {
        const u = document.getElementById('userLogin').value.toLowerCase().trim();
        const p = document.getElementById('passLogin').value;
        if(db.senhas[u] && db.senhas[u] === p) {
            localStorage.setItem('iasd_curUser', u);
            location.reload();
        } else {
            alert("Usuário ou Senha incorretos!");
        }
    }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function atuCel(d, c, v) { if(!db.escalas) db.escalas = {}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function cliqueDia(dStr) { if(['admin','ger'].includes(curUser)) { if(!db.regras_manuais) db.regras_manuais = {}; db.regras_manuais[dStr] = window.minSelecionado; save(); } }
    
    function updateChart(mIdx) {
        const ctx = document.getElementById('missionaryChart');
        const vals = db.mis_v3?.[mIdx] || [0,0,0,0,0];
        if(missionChart) missionChart.destroy();
        missionChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ["Encontros", "Classes", "Estudos", "Ministrantes", "Duplas"],
                datasets: [{ data: vals, backgroundColor: ['#00d2ff', '#ffd700', '#ff7f50', '#2ecc71', '#ff4757'] }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
        });
    }

    function renderAdmin() {
        const lista = document.getElementById('listaMinisterios'); lista.innerHTML = "";
        ["pessoal","mordomia","saude","homens","familia","adolescentes","mulher","musica"].forEach(m => { lista.innerHTML += `<button class="btn-min ${window.minSelecionado===m?'active':''}" onclick="window.minSelecionado='${m}'; renderAdmin();">${MINS[m]}</button>`; });
        const gM = document.getElementById('gridMeses'); gM.innerHTML = "";
        MESES.forEach((m, i) => { gM.innerHTML += `<div><small>${m}</small><input class="input-dark" value="${db.anciaos?.[i] || ''}" onchange="if(!db.anciaos) db.anciaos={}; db.anciaos[${i}]=this.value; save();"></div>`; });
        const tC = document.getElementById('corpoCreds'); tC.innerHTML = "";
        Object.keys(db.senhas).forEach(k => { tC.innerHTML += `<tr><td style="color:var(--gold);">${k}</td><td><input class="input-dark" value="${db.senhas[k]}" onchange="db.senhas['${k}']=this.value; save();"></td></tr>`; });
    }

    function abrirCalendarioAnual() {
        const container = document.getElementById('listaEventosAnuais'); container.innerHTML = "";
        MESES.forEach((mes, idx) => { 
            container.innerHTML += `<div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px;">
                <h4 style="color:var(--neon); margin:0;">${mes}</h4>
                <textarea class="input-dark" style="height:80px;" onchange="if(!db.eventos_anuais) db.eventos_anuais={}; db.eventos_anuais[${idx}] = this.value; save();">${db.eventos_anuais?.[idx] || ""}</textarea>
            </div>`; 
        });
        document.getElementById('popCalendario').style.display = 'flex';
    }

    function salvarEventoEspecial() {
        const ini = document.getElementById('evtInicio').value, fim = document.getElementById('evtFim').value, nome = document.getElementById('evtNome').value;
        if(!ini || !fim) return;
        if(!db.eventos_especiais) db.eventos_especiais = {};
        let dAtu = new Date(ini + "T12:00:00"), dFim = new Date(fim + "T12:00:00");
        while(dAtu <= dFim) { db.eventos_especiais[dAtu.toISOString().split('T')[0]] = { user: curUser, nome: nome.toUpperCase(), hora: document.getElementById('evtHora').value }; dAtu.setDate(dAtu.getDate() + 1); }
        save();
    }

    function renderArquivosPublicos() {
        const m = document.getElementById('selMes').value, grid = document.getElementById('gridArquivosPublicos');
        grid.innerHTML = ""; if(!db.docs?.[m]) return;
        db.docs[m].forEach(doc => { grid.innerHTML += `<div><img src="${doc.data}" class="thumb-doc" onclick="ampliar('${doc.data}')"></div>`; });
    }

    function ampliar(s
