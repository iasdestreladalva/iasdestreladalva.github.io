<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IASD Estrela Dalva - v102.43</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 5px; }
        .container { max-width: 1450px; margin: auto; }
        
        [span_2](start_span)/* Cores dos Ministérios[span_2](end_span) */
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; } .row-homens { background-color: #ecfeff !important; }
        .row-familia { background-color: #faf5ff !important; } .row-adolescentes { background-color: #f8fafc !important; }
        .row-mulher { background-color: #fdf2f8 !important; }
        
        [span_3](start_span)/* Estilos da Tesouraria[span_3](end_span) */
        .tesouraria-display { margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--green); }
        .grid-arquivos { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 15px; }
        .thumb-doc { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #334155; transition: 0.3s; }
        .thumb-doc:hover { border-color: var(--neon); transform: scale(1.02); }
        
        [span_4](start_span)/* Overlay de Zoom[span_4](end_span) */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        #zoomOverlay { cursor: pointer; display: none; }
        #imgExpandida { max-width: 95%; max-height: 95%; object-fit: contain; border: 2px solid white; }
        
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { width: 100%; padding: 12px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; }
        
        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 8px; }
        table#tabela-main { width: 100%; border-collapse: collapse; color: black; min-width: 800px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 55px; }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px; flex-wrap: wrap; gap:10px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px; flex-wrap: wrap;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:130px;"></select>
            <button class="input-dark" style="width:auto; color:var(--green); display:none;" id="btnTesourariaAdmin" onclick="abrirTesourariaAdmin()">⚙️ TESOURARIA</button>
            <button class="input-dark" style="width:auto; color:var(--orange); display:none;" id="btnDados" onclick="abrirPopMissionario()">📊 MISSIONÁRIO</button>
            <button class="input-dark" style="width:auto; color:var(--neon);" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="tabela-main">
            <thead>
                <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem;" id="headerTitulo">ESCALA</th></tr>
                <tr><th colspan="9" style="background:var(--blue); color:var(--gold);" id="headerAnciao">Responsável: </th></tr>
                <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div class="tesouraria-display">
        <h3 style="margin:0; color:var(--green); border-bottom: 1px solid #334155; padding-bottom: 10px;">💰 COMPROVANTES - <span id="mesTesourariaDisplay"></span></h3>
        <div id="gridArquivosPublicos" class="grid-arquivos"></div>
    </div>
</div>

<div id="zoomOverlay" class="overlay" onclick="this.style.display='none'">
    <img id="imgExpandida" src="">
</div>

<div id="popGen" class="overlay" onclick="this.style.display='none'">
    <div style="background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px;" onclick="event.stopPropagation()" id="popContent"></div>
</div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'">
    <div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()">
        <input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="color:black!important; margin-bottom:10px;">
        <input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="color:black!important;">
        <button class="btn-min" style="background:var(--blue); color:white; margin-top:15px; border:none;" onclick="login()">ENTRAR</button>
    </div>
</div>

<script>
    [span_5](start_span)// Cole aqui suas chaves do Firebase[span_5](end_span)
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com/",
        projectId: "unidades-de-acao",
        appId: "SEU_APP_ID"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    let db = { anciaos: {}, escalas: {}, mis_v3: {}, docs: {}, senhas: {admin:"iasd118", ger:"ger123"} };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    database.ref('dados_igreja').on('value', (snap) => {
        if(snap.val()) { db = snap.val(); renderTodo(); }
    });

    function renderTodo() {
        const u = curUser;
        document.getElementById('btnSair').style.display = u !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = u === 'visitante' ? 'block' : 'none';
        document.getElementById('btnTesourariaAdmin').style.display = (u === 'admin' || u === 'ger') ? 'block' : 'none';
        document.getElementById('btnDados').style.display = (u === 'admin' || u === 'pessoal') ? 'block' : 'none';
        
        const mIdx = document.getElementById('selMes').value;
        document.getElementById('mesTesourariaDisplay').innerText = MESES[mIdx];
        renderEscala();
        renderDocsPublicos();
    }

    function renderDocsPublicos() {
        const m = document.getElementById('selMes').value;
        const grid = document.getElementById('gridArquivosPublicos');
        grid.innerHTML = "";
        (db.docs?.[m] || []).forEach(url => {
            grid.innerHTML += `<img src="${url}" class="thumb-doc" onclick="zoom('${url}')">`;
        });
    }

    function zoom(url) {
        document.getElementById('imgExpandida').src = url;
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    function abrirTesourariaAdmin() {
        const m = document.getElementById('selMes').value;
        document.getElementById('popContent').innerHTML = `
            <h3 style="color:var(--green)">UPLOAD TESOURARIA - ${MESES[m]}</h3>
            <input type="file" id="fIn" class="input-dark" accept="image/*">
            <button class="btn-min" style="margin-top:10px" onclick="upload()">ENVIAR AGORA</button>
            <div id="listaDocsAdmin" class="grid-arquivos"></div>
        `;
        document.getElementById('popGen').style.display = 'flex';
        renderDocsAdmin();
    }

    function upload() {
        const file = document.getElementById('fIn').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const m = document.getElementById('selMes').value;
            if(!db.docs) db.docs = {};
            if(!db.docs[m]) db.docs[m] = [];
            db.docs[m].push(e.target.result);
            database.ref('dados_igreja').set(db);
        };
        reader.readAsDataURL(file);
    }

    function renderDocsAdmin() {
        const m = document.getElementById('selMes').value;
        const list = document.getElementById('listaDocsAdmin');
        list.innerHTML = "";
        (db.docs?.[m] || []).forEach((url, i) => {
            list.innerHTML += `
                <div style="position:relative">
                    <img src="${url}" class="thumb-doc">
                    <button onclick="removerDoc(${i})" style="position:absolute; top:0; right:0; background:red; color:white; border:none; cursor:pointer">X</button>
                </div>`;
        });
    }

    function removerDoc(i) {
        const m = document.getElementById('selMes').value;
        db.docs[m].splice(i, 1);
        database.ref('dados_igreja').set(db);
        renderDocsAdmin();
    }

    // [Outras funções de escala seguem a lógica anterior...]
    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
    
    function login() {
        const u = document.getElementById('userLogin').value.toLowerCase(), p = document.getElementById('passLogin').value;
        if(db.senhas[u] === p) { localStorage.setItem('iasd_curUser', u); location.reload(); } else { alert("Erro!"); }
    }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
</script>
</body>
</html>
