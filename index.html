<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1500px; margin: auto; }
        
        /* Estilos de Impressão (O que pediste) */
        @media print {
            @page { size: landscape; margin: 1cm; }
            .no-print { display: none !important; }
            .only-print { display: block !important; }
            .print-header { background-color: black !important; color: white !important; text-align: center; padding: 20px; -webkit-print-color-adjust: exact; }
            .print-header h1 { font-size: 35pt; margin: 0; }
            table { width: 100%; border-collapse: collapse; color: black !important; }
            th, td { border: 1px solid black !important; padding: 5px; }
        }

        .only-print { display: none; }
        .no-print { display: block; }
        table { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        .input-dark { background: #000; color: #fff; border: 1px solid var(--neon); padding: 10px; width: 100%; border-radius: 5px; }
        textarea { width: 100%; border: none; font-weight: bold; text-align: center; resize: none; }
        #saveIndicator { position: fixed; top: 10px; right: 10px; padding: 10px; border-radius: 5px; display: none; z-index: 1000; }
    </style>
</head>
<body>

<div id="saveIndicator" class="no-print" style="background: var(--orange);">Salvando...</div>

<div class="container">
    <div class="only-print print-header">
        <h1>IASD ESTRELA DALVA</h1>
        <h2 id="printSub">ESCALA DE ATIVIDADES</h2>
    </div>

    <div class="no-print">
        <h2 style="color:var(--neon)">IASD ESTRELA DALVA</h2>
        <div id="userWelcome" style="color:var(--gold); margin-bottom: 10px;"></div>
        
        <div style="display:flex; gap:10px; margin-bottom: 20px;">
            <select id="selMes" class="input-dark" style="width: 200px;" onchange="render()"></select>
            <button onclick="window.print()" style="padding: 10px; cursor: pointer;">🖨️ IMPRIMIR</button>
            <button onclick="document.getElementById('modalLogin').style.display='flex'" style="padding: 10px; cursor: pointer;">🔓 LOGIN</button>
        </div>

        <input type="text" id="busca" class="input-dark" placeholder="🔍 Buscar nome..." oninput="render()">
    </div>

    <table id="tabela">
        <thead>
            <tr id="tabHead">
                <th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SOM</th><th>RECEPÇÃO</th><th>DIACONATO</th>
            </tr>
        </thead>
        <tbody id="corpo"></tbody>
    </table>
</div>

<div id="modalLogin" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); align-items:center; justify-content:center;" class="no-print">
    <div style="background:white; padding:20px; border-radius:10px; color:black;">
        <h3>Acesso</h3>
        <input type="text" id="u" placeholder="Usuário" style="display:block; margin-bottom:10px;">
        <input type="password" id="p" placeholder="Senha" style="display:block; margin-bottom:10px;">
        <button onclick="fazerLogin()">Entrar</button>
        <button onclick="document.getElementById('modalLogin').style.display='none'">Fechar</button>
    </div>
</div>

<script>
    // Configurações (Certifica-te que estes dados batem com o teu Firebase)
    const firebaseConfig = { 
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", 
        authDomain: "unidades-de-acao.firebaseapp.com", 
        projectId: "unidades-de-acao", 
        appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" 
    };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();
    
    let db = {};
    let user = localStorage.getItem('user_iasd') || 'visitante';
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];

    // 1. Carregar Dados
    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) {
            db = doc.data();
            render();
        }
    });

    function render() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('printSub').innerText = "ESCALA DE ATIVIDADES - " + MESES[mIdx] + " 2026";
        document.getElementById('userWelcome').innerText = "Utilizador: " + user.toUpperCase();

        const corpo = document.getElementById('corpo');
        const busca = document.getElementById('busca').value.toUpperCase();
        corpo.innerHTML = "";

        const totalDias = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=totalDias; d++) {
            let dt = new Date(2026, mIdx, d), sem = dt.getDay(), dStr = `${d}/${mIdx+1}/2026`;
            
            // Mostrar apenas Quarta(3), Sábado(6) e Domingo(0)
            if([0,3,6].includes(sem)) {
                let dadosDia = db.escalas?.[dStr] || {};
                let txtDia = JSON.stringify(Object.values(dadosDia)).toUpperCase();
                
                if(busca && !txtDia.includes(busca)) continue;

                let tr = `<tr>
                    <td>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</td>
                    <td>${d}/${mIdx+1}</td>`;
                
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let val = dadosDia[col] || '';
                    let canEdit = (user !== 'visitante'); // Simplificado para garantir que consigas editar agora
                    tr += `<td><textarea ${canEdit?'':'disabled'} onchange="atualizar('${dStr}','${col}',this.value)">${val}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function atualizar(dia, col, val) {
        if(!db.escalas) db.escalas = {};
        if(!db.escalas[dia]) db.escalas[dia] = {};
        db.escalas[dia][col] = val.toUpperCase();
        
        document.getElementById('saveIndicator').style.display = "block";
        dbCloud.collection('dados').doc('estrela_v102').set(db).then(() => {
            setTimeout(() => { document.getElementById('saveIndicator').style.display = "none"; }, 1000);
        });
    }

    function fazerLogin() {
        const u = document.getElementById('u').value.toLowerCase();
        const p = document.getElementById('p').value;
        // Validação simples baseada no que tinhas
        if(p === "1905" || (db.senhas && db.senhas[u] === p)) {
            localStorage.setItem('user_iasd', u);
            location.reload();
        } else {
            alert("Senha incorreta");
        }
    }

    // Iniciar seletor de meses
    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
