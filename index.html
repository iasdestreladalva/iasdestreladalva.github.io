<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - MASTER v490</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; --exit-red: #ef4444; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-top: 85px; }
        
        /* BARRA FIXA */
        .toolbar { 
            position: fixed; top: 0; left: 0; right: 0; height: 75px; 
            background: #111827; display: flex; align-items: center; 
            padding: 0 20px; z-index: 1000; border-bottom: 3px solid var(--neon-blue);
            gap: 10px; justify-content: space-between;
        }
        .btn-tool { background: transparent; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .btn-eventos { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(249, 115, 22, 0.1); }
        .btn-login { background: var(--neon-blue); color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-logout { background: var(--exit-red); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; }

        /* MODAL EVENTOS */
        .modal-eventos { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; align-items: center; justify-content: center; }
        .card-eventos { background: #1e293b; padding: 30px; border-radius: 15px; border: 2px solid var(--accent-orange); width: 500px; }
        .card-eventos h2 { color: #f87171; text-align: center; margin-top: 0; text-transform: uppercase; }
        .ev-label { display: block; color: var(--neon-blue); font-size: 0.7rem; font-weight: bold; margin-bottom: 5px; margin-top: 15px; }
        .ev-input { width: 100%; background: #000; border: 1px solid #334155; color: #fff; padding: 12px; border-radius: 6px; box-sizing: border-box; }
        .btn-concluir { width: 100%; background: #ff3b00; color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; }

        /* PAINEL GESTÃO RESTAURADO */
        #painelAdmin { display: none; background: #0f172a; border: 2px solid var(--accent-orange); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: 220px 300px 1fr; gap: 20px; }
        .col-header { color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #1e293b; }
        .btn-min { width: 100%; padding: 10px; margin-bottom: 5px; background: transparent; border: 1.5px solid var(--neon-blue); color: var(--neon-blue); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon-blue); color: #000; }
        
        .login-scroll { max-height: 300px; overflow-y: auto; background: #000; border-radius: 8px; border: 1px solid #334155; }
        .login-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .login-table th { color: var(--accent-orange); text-align: left; padding: 5px; position: sticky; top: 0; background: #000; }
        .input-login { background: transparent; border: none; color: #fbbf24; width: 95%; padding: 5px; }

        /* TABELA ESCALA */
        #secaoEscala { background: white; border-radius: 8px; padding: 15px; overflow-x: auto; margin-bottom: 30px; border: 2px solid #000; }
        table.escala { width: 100%; border-collapse: collapse; color: black; min-width: 1000px; }
        table.escala th { background: var(--iasd-blue); color: white; padding: 10px; border: 1px solid #000; }
        table.escala td { border: 1px solid #000; text-align: center; font-weight: bold; height: 38px; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; }

        @media print {
            .toolbar, #painelAdmin, .modal-eventos { display: none !important; }
            body { padding-top: 0 !important; }
            body.print-escala #secaoAnual { display: none !important; }
            body.print-anual #secaoEscala { display: none !important; }
        }
        
        /* CORES MINISTÉRIOS */
        tr.pessoal td { background-color: #e0f2fe !important; } tr.mordomia td { background-color: #fef3c7 !important; }
        tr.saude td { background-color: #f1f5f9 !important; } tr.homens td { background-color: #dcfce7 !important; }
        tr.familia td { background-color: #fee2e2 !important; } tr.adolescentes td { background-color: #f0fdf4 !important; }
        tr.mulher td { background-color: #fce7f3 !important; } tr.musica td { background-color: #ede9fe !important; }
    </style>
</head>
<body id="mainBody">

<div class="toolbar">
    <div style="display: flex; gap: 8px; align-items: center;">
        <span style="font-weight: 900; color: var(--neon-blue); font-size: 0.8rem;">ESTRELA DALVA</span>
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid #444; padding:5px; border-radius:6px;"></select>
        <button class="btn-tool" onclick="imprimir('escala')">🖨️ ESCALA</button>
        <button class="btn-tool" onclick="imprimir('anual')">🗓️ ANUAL</button>
        <button class="btn-tool btn-eventos" onclick="abrirEventos()">🔥 EVENTOS</button>
    </div>
    <div style="display: flex; gap: 8px; align-items: center;">
        <div id="statusUser" style="font-size: 0.65rem; color: #94a3b8;">Modo Visitante</div>
        <button id="btnEntrar" class="btn-login" onclick="abrirLogin()">ENTRAR</button>
        <button id="btnSair" class="btn-logout" onclick="fazerLogout()">SAIR</button>
    </div>
</div>

<div id="modalEventos" class="modal-eventos">
    <div class="card-eventos">
        <h2>Criar Semana de Oração / Evento</h2>
        <label class="ev-label">NOME DO EVENTO</label>
        <input type="text" class="ev-input" placeholder="Ex: Semana Santa">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <div><label class="ev-label">INÍCIO</label><input type="text" class="ev-input" placeholder="dd/mm/aaaa"></div>
            <div><label class="ev-label">FIM</label><input type="text" class="ev-input" placeholder="dd/mm/aaaa"></div>
        </div>
        <button class="btn-concluir" onclick="fecharEventos()">CONCLUÍDO</button>
    </div>
</div>

<div id="painelAdmin">
    <div class="admin-grid">
        <div class="column">
            <div class="col-header">1. PINCÉIS</div>
            <button class="btn-min" onclick="selPincel('pessoal','M. Pessoal')">M. Pessoal</button>
            <button class="btn-min" onclick="selPincel('mordomia','Mordomia')">Mordomia</button>
            <button class="btn-min" onclick="selPincel('saude','Saúde')">Saúde</button>
            <button class="btn-min" onclick="selPincel('homens','M. Homens')">M. Homens</button>
            <button class="btn-min" onclick="selPincel('familia','M. Família')">M. Família</button>
            <button class="btn-min" onclick="selPincel('adolescentes','Adolescentes')">Adolescentes</button>
            <button class="btn-min" onclick="selPincel('mulher','M. Mulher')">M. Mulher</button>
            <button class="btn-min" onclick="selPincel('musica','Música')">Música</button>
            <button class="btn-min" style="border-color:var(--exit-red); color:var(--exit-red)" onclick="selPincel('','')">LIMPAR</button>
        </div>
        <div class="column">
            <div class="col-header">2. ANCIÃOS RESPONSÁVEIS</div>
            <div id="gridAnciaos" style="display:grid; grid-template-columns:1fr 1fr; gap:5px;"></div>
        </div>
        <div class="column">
            <div class="col-header">3. CONFIGURAÇÃO DE LOGINS</div>
            <div class="login-scroll">
                <table class="login-table">
                    <thead><tr><th>CARGO</th><th>USER</th><th>SENHA</th></tr></thead>
                    <tbody id="corpoLogins"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="secaoEscala">
    <div style="text-align:center; color:#000; margin-bottom:15px">
        <div id="txtAnciao" style="font-size:1.1rem; font-weight:900; color:var(--iasd-blue); text-transform:uppercase;">ANCIÃO: ---</div>
        <div style="font-weight:bold;">ESCALA DE <span id="txtMes">---</span></div>
    </div>
    <table class="escala">
        <thead><tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr></thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="secaoAnual">
    <h3 style="color: var(--accent-orange); margin: 20px 0 10px 0;">🗓️ PLANEJAMENTO ANUAL 2026</h3>
    <div id="gridAnual" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_final_v490');

    let db = { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{} };
    let logado = false;
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
    const loginsPadrao = [{c:"Administrador", u:"admin", s:"iasd118"},{c:"Música", u:"musica", s:"mus123"},{c:"Diaconato", u:"diaconato", s:"diac123"}];

    window.onload = () => { if(localStorage.getItem('iasd_logado') === 'true') { ativarModoAdmin(); } };

    dbRef.on('value', snap => { 
        db = snap.val() || { escalas:{}, cores:{}, anciaos:{}, logins:loginsPadrao, anual:{} }; 
        if(!db.logins || db.logins.length === 0) db.logins = loginsPadrao;
        renderTodo(); 
    });

    function abrirLogin() {
        let u = prompt("Usuário:"); let s = prompt("Senha:");
        const f = db.logins.find(l => l.u === u && l.s === s);
        if(f) { localStorage.setItem('iasd_logado', 'true'); ativarModoAdmin(); renderTodo(); } 
        else { alert("Incorreto!"); }
    }

    function ativarModoAdmin() {
        logado = true;
        document.getElementById('painelAdmin').style.display = 'block';
        document.getElementById('btnEntrar').style.display = 'none';
        document.getElementById('btnSair').style.display = 'block';
        document.getElementById('statusUser').innerText = "Modo: Administrador";
    }

    function fazerLogout() { localStorage.removeItem('iasd_logado'); location.reload(); }
    function abrirEventos() { document.getElementById('modalEventos').style.display = 'flex'; }
    function fecharEventos() { document.getElementById('modalEventos').style.display = 'none'; }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('txtMes').innerText = meses[m];
        document.getElementById('txtAnciao').innerText = `ANCIÃO: ${db.anciaos?.[m] || "---"}`;

        document.getElementById('gridAnciaos').innerHTML = meses.map((n, i) => `
            <div><label style="font-size:8px; color:#94a3b8">${n}</label>
            <input style="background:#000; color:#fff; border:1px solid #334155; width:100%; font-size:0.7rem" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)" ${!logado?'disabled':''}></div>
        `).join('');

        document.getElementById('corpoLogins').innerHTML = db.logins.map((l, idx) => `
            <tr><td><input class="input-login" value="${l.c}" onchange="atuLog(${idx},'c',this.value)" ${!logado?'disabled':''}></td>
            <td><input class="input-login" style="color:var(--neon-blue)" value="${l.u}" onchange="atuLog(${idx},'u',this.value)" ${!logado?'disabled':''}></td>
            <td><input class="input-login" value="${l.s}" onchange="atuLog(${idx},'s',this.value)" ${!logado?'disabled':''}></td></tr>
        `).join('');

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasMes; d++) {
            let dt = new Date(2026, m, d);
            if([0,3,6].includes(dt.getDay())) {
                let dStr = `${d}_${m+1}_2026`;
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr'); if(c.id) tr.className = c.id;
                tr.innerHTML = `<td onclick="${logado?`pintar('${dStr}')`:''}" style="cursor:pointer"><div>${["DOM","","","QUA","","","SAB"][dt.getDay()]}</div><div style="font-size:8px">${c.nome||''}</div></td>
                <td>${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)" ${!logado?'disabled':''}></td>`).join('');
                corpo.appendChild(tr);
            }
        }

        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `
            <div style="background:#000; border:1px solid #334155; padding:8px; border-radius:8px;">
            <h4 style="color:var(--neon-blue); margin:0; font-size:0.7rem">${n}</h4>
            <textarea style="width:100%; height:40px; background:transparent; color:#fff; border:none; resize:none; font-size:0.7rem" onchange="atuAnu(${i}, this.value)" ${!logado?'disabled':''}>${db.anual?.[i]||''}</textarea></div>
        `).join('');
    }

    function atuAnc(i,v) { if(logado){ if(!db.anciaos) db.anciaos={}; db.anciaos[i]=v.toUpperCase(); dbRef.child('anciaos').set(db.anciaos); }}
    function atuLog(idx, c, v) { if(logado){ db.logins[idx][c]=v; dbRef.child('logins').set(db.logins); }}
    function atu(d,c,v) { if(logado){ if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }}
    function atuAnu(i,v) { if(logado){ if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }}
    
    let pID = null; let pNome = "";
    function selPincel(id, nome) { pID = id; pNome = nome; document.querySelectorAll('.btn-min').forEach(b => b.classList.remove('active')); if(id!=="") event.currentTarget.classList.add('active'); }
    function pintar(dStr) { if(logado && pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}
    function imprimir(t) { document.getElementById('mainBody').className = 'print-'+t; setTimeout(() => { window.print(); }, 200); }

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
