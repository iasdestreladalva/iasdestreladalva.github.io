<!DOCTYPE html> <html lang="pt-br"> <head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IASD Estrela Dalva - GESTÃO FINAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .nav-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top:10px; }
        .table-wrap { width: 100%; overflow-x: auto; background: white; border-radius: 8px; margin-top:10px; }
        table { width: 100%; border-collapse: collapse; color: black; min-width: 900px; font-size: 0.8rem; }
        
        /* CORES DOS MINISTÉRIOS QUE ESCALAM PREGADORES */
        .row-pessoal td { background-color: #e0f2fe !important; }
        .row-mordomia td { background-color: #ffedd5 !important; }
        .row-divino td { background-color: #fef3c7 !important; }
        .row-jovens td { background-color: #f3e8ff !important; }
        .row-mulher td { background-color: #fce7f3 !important; }

        td { border: 1px solid #cbd5e1; text-align: center; height: 50px; padding: 0; }
        .dia-txt { font-weight: 800; font-size: 0.85rem; color: #1e293b; }
        .min-txt { font-size: 0.55rem; font-weight: 700; color: #64748b; text-transform: uppercase; }
        .input-cell { width: 100%; height: 50px; border: none; background: transparent; text-align: center; font-weight: bold; text-transform: uppercase; }
        
        .panel { background: #16213e; padding: 15px; border-radius: 12px; border: 2px solid var(--orange); margin-bottom: 15px; display: none; }
        .paint-btn { border: 1px solid #fff; color: #fff; padding: 10px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; font-weight: bold; text-align: center; }
        .input-dark { background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        .btn-action { padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; width: 100%; }
    </style> </head> <body>

<h2 style="color:var(--neon); text-align: center; margin:0;">IASD ESTRELA DALVA</h2>

<div id="adminPanel" class="panel">
    <h4 style="margin:0 0 10px 0; color:var(--orange); text-align:center;">PAINEL DO GESTOR</h4>
    
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 15px;">
        <div class="paint-btn" id="p-pessoal" style="background:#0ea5e9" onclick="selPincel('pessoal','M. PESSOAL')">M. PESSOAL</div>
        <div class="paint-btn" id="p-mordomia" style="background:#f97316" onclick="selPincel('mordomia','MORDOMIA')">MORDOMIA</div>
        <div class="paint-btn" id="p-divino" style="background:#eab308" onclick="selPincel('divino','C. DIVINO')">C. DIVINO</div>
        <div class="paint-btn" id="p-jovens" style="background:#a855f7" onclick="selPincel('jovens','JOVENS')">JOVENS</div>
        <div class="paint-btn" id="p-mulher" style="background:#ec4899" onclick="selPincel('mulher','M. MULHER')">M. MULHER</div>
        <div class="paint-btn" style="background:#444" onclick="selPincel('','')">LIMPAR COR</div>
    </div>

    <div style="background: rgba(0,0,0,0.4); padding: 10px; border-radius: 8px; margin-bottom: 10px;">
        <h5 style="margin:0 0 5px 0;">👥 GERIR ACESSOS (Login | Senha)</h5>
        <div id="listaLogins" style="font-size: 0.75rem; max-height: 80px; overflow-y: auto; margin-bottom: 10px;"></div>
        <div style="display: flex; gap: 5px;">
            <input type="text" id="nu" placeholder="User" class="input-dark" style="height:35px">
            <input type="text" id="np" placeholder="Pass" class="input-dark" style="height:35px">
            <button onclick="addLog()" style="background:var(--green); border:none; padding: 0 15px; border-radius: 5px;">+</button>
        </div>
    </div>
</div>

<div class="nav-buttons">
    <select id="selMes" onchange="renderTodo()" class="input-dark"></select>
    <button id="btnAcesso" class="btn-action" style="background:var(--blue); color:white;" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 LOGIN</button>
    <button id="btnSair" class="btn-action" style="background:red; color:white; display:none;" onclick="sair()">SAIR</button>
</div>

<div id="areaAnciaos" style="margin-top:15px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; border-left: 4px solid var(--gold);">
    <span style="font-size: 0.7rem; color: var(--gold); font-weight: bold;">ANCIÃOS DO MÊS:</span>
    <input type="text" id="ancInput" class="input-dark" style="border:none; background:transparent; font-size:0.9rem;" placeholder="Definir anciãos..." onchange="saveAnc(this.value)">
</div>

<div class="table-wrap">
    <table>
        <thead>
            <tr><th colspan="9" id="headerTitulo" style="background:var(--blue); color:white; padding:12px;">ESCALA</th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="modalLogin" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.95); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; color:black; padding:25px; border-radius:15px; width:90%; max-width:350px;">
        <h3 style="text-align:center; margin-top:0;">ACESSO GESTOR</h3>
        <input type="text" id="user" placeholder="Utilizador" class="input-dark" style="background:#eee; color:#000; margin-bottom:10px;">
        <input type="password" id="pass" placeholder="Palavra-passe" class="input-dark" style="background:#eee; color:#000; margin-bottom:15px;">
        <button onclick="login()" style="width:100%; padding:15px; background:var(--blue); color:white; border:none; border-radius:8px; font-weight:bold;">ENTRAR</button>
        <button onclick="document.getElementById('modalLogin').style.display='none'" style="width:100%; background:none; border:none; margin-top:10px; color:#666;">Cancelar</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
        authDomain: "unidades-de-acao.firebaseapp.com",
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com",
        projectId: "unidades-de-acao",
        storageBucket: "unidades-de-acao.firebasestorage.app",
        messagingSenderId: "1088355029870",
        appId: "1:1088355029870:web:7bb98d3115e7b7767f677f"
    };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_v120');

    let db = { senhas:{admin:"iasd118"}, escalas:{}, cores:{}, anciaos:{} };
    let curUser = localStorage.getItem('iasd_user') || 'visitante';
    let pincel = null;
    let nomePincel = "";

    dbRef.on('value', snap => { 
        const data = snap.val();
        if(data) db = data; 
        if(!db.senhas) db.senhas = {admin:"iasd118"};
        renderTodo(); 
    });

    function save() { dbRef.set(db); }
    function sair() { localStorage.removeItem('iasd_user'); location.reload(); }

    function login() {
        const u = document.getElementById('user').value.toLowerCase().trim();
        const p = document.getElementById('pass').value;
        if(db.senhas[u] && db.senhas[u] === p) {
            localStorage.setItem('iasd_user', u);
            location.reload();
        } else { alert("Acesso inválido"); }
    }

    function addLog() {
        const u = document.getElementById('nu').value.toLowerCase().trim();
        const p = document.getElementById('np').value;
        if(u && p) { db.senhas[u] = p; save(); alert("Utilizador adicionado!"); }
    }

    function selPincel(id, nome) {
        pincel = id; nomePincel = nome;
        document.querySelectorAll('.paint-btn').forEach(b => b.style.outline = "none");
        if(id) document.getElementById('p-'+id).style.outline = "3px solid white";
    }

    function pintar(data) {
        if((curUser==='admin' || curUser==='ger') && pincel !== null) {
            if(!db.cores) db.cores = {};
            if(pincel === "") delete db.cores[data];
            else db.cores[data] = { id: pincel, nome: nomePincel };
            save();
        }
    }

    function saveAnc(v) {
        const m = document.getElementById('selMes').value;
        if(!db.anciaos) db.anciaos = {};
        db.anciaos[m] = v;
        save();
    }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const isMaster = (curUser === 'admin' || curUser === 'ger');
        
        document.getElementById('adminPanel').style.display = isMaster ? 'block' : 'none';
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = curUser === 'visitante' ? 'block' : 'none';
        
        document.getElementById('ancInput').value = db.anciaos?.[m] || "";
        document.getElementById('ancInput').readOnly = !isMaster;

        if(isMaster) {
            document.getElementById('listaLogins').innerHTML = Object.entries(db.senhas).map(([u,p]) => 
                `<div>• ${u} (${p}) <b onclick="delLog('${u}')" style="color:red; cursor:pointer">[x]</b></div>`
            ).join('');
        }

        document.getElementById('headerTitulo').innerText = "ESCALA - " + ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"][m] + " 2026";
        renderEscala(m);
    }

    function delLog(u) { if(u!=='admin') { delete db.senhas[u]; save(); } }

    function renderEscala(mIdx) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        const isMaster = (curUser === 'admin' || curUser === 'ger');

        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d); 
            let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}/${mIdx+1}/2026`;
                let cor = db.cores?.[dStr] || { id: "", nome: "" };
                let row = `<tr class="row-${cor.id}">
                    <td onclick="pintar('${dStr}')"><div style="padding:5px"><span class="dia-txt">${["DOM","","","QUA","","","SAB"][sem]}</span><br><span class="min-txt">${cor.nome}</span></div></td>
                    <td onclick="pintar('${dStr}')"><span class="dia-txt">${d}/${mIdx+1}</span></td>`;

                ["sa","pr","mu","lo","so","re","di"].forEach(col => {
                    let val = db.escalas?.[dStr]?.[col] || "";
                    let canEdit = isMaster || (curUser === col) || (curUser==='musica' && col==='mu') || (curUser==='sonoplastia' && col==='so');
                    row += `<td><input class="input-cell" ${!canEdit?'readonly':''} value="${val}" onchange="atu('${dStr}','${col}',this.value)"></td>`;
                });
                corpo.innerHTML += row + "</tr>";
            }
        }
    }

    function atu(d, c, v) { if(!db.escalas) db.escalas={}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }

    const s = document.getElementById('selMes');
    if(s.innerHTML === "") {
        ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"].forEach((m,i)=>s.innerHTML+=`<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    }
    renderTodo();
</script> </body> </html>
