<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - MASTER v420</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-top: 80px; }
        
        /* BARRA FIXA */
        .toolbar { 
            position: fixed; top: 0; left: 0; right: 0; height: 65px; 
            background: #111827; display: flex; align-items: center; 
            padding: 0 20px; z-index: 1000; border-bottom: 3px solid var(--neon-blue);
            gap: 15px; justify-content: space-between;
        }
        .btn-print { background: #22c55e; color: white; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.8rem; display: flex; align-items: center; gap: 8px; }
        .btn-print.anual { background: #8b5cf6; }

        /* PAINEL DE GESTÃO */
        .admin-main-box { background: #0f172a; border: 2px solid var(--accent-orange); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: 220px 300px 1fr; gap: 25px; }
        .col-header { color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        
        .btn-min { width: 100%; padding: 10px; margin-bottom: 5px; background: transparent; border: 1.5px solid var(--neon-blue); color: var(--neon-blue); border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon-blue); color: #000; box-shadow: 0 0 10px var(--neon-blue); }
        .btn-min.limpar { border-color: #ef4444; color: #ef4444; }

        .resp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .input-dark { background: #000; border: 1px solid #334155; color: #fff; padding: 6px; border-radius: 4px; width: 100%; font-size: 0.8rem; }

        /* TABELA DE LOGINS COMPLETA */
        .login-scroll { max-height: 350px; overflow-y: auto; padding-right: 5px; border: 1px solid #1e293b; border-radius: 8px; background: #000; }
        .login-table { width: 100%; border-collapse: collapse; }
        .login-table th { text-align: left; font-size: 0.7rem; color: var(--accent-orange); padding: 10px; border-bottom: 1px solid #1e293b; position: sticky; top: 0; background: #111827; z-index: 10; }
        .login-table td { padding: 5px; border-bottom: 1px solid #111827; }
        .input-login { background: transparent; border: 1px solid transparent; color: #fbbf24; width: 90%; padding: 5px; border-radius: 4px; font-size: 0.8rem; }
        .input-login:hover { border-color: #334155; }
        .input-login.user { color: var(--neon-blue); font-weight: bold; }

        /* ESCALA */
        #secaoEscala { background: white; border-radius: 8px; padding: 15px; overflow-x: auto; margin-bottom: 30px; border: 2px solid #000;}
        .escala-header { color: #000; text-align: center; margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .anciao-title { font-size: 1.2rem; font-weight: 900; color: var(--iasd-blue); text-transform: uppercase; margin: 5px 0; }
        
        table.escala { width: 100%; border-collapse: collapse !important; color: black; min-width: 1000px; border: 2px solid #000 !important; }
        table.escala th { background: var(--iasd-blue) !important; color: white !important; padding: 10px; border: 1px solid #000 !important; font-size: 0.75rem; }
        table.escala td { border: 1px solid #000 !important; height: 40px; text-align: center; font-weight: bold; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; }

        /* PLANEJAMENTO */
        .anual-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .card-mes { background: #000; border: 1.5px solid #334155; border-radius: 10px; padding: 12px; }
        .card-mes h4 { color: var(--neon-blue); margin: 0 0 8px 0; font-size: 0.75rem; border-bottom: 1px solid #1e293b; }
        .txt-anual { width: 100%; height: 70px; background: transparent; border: none; color: #fff; resize: none; font-size: 0.8rem; outline: none; }

        @media print {
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            .toolbar, .admin-main-box, h3 { display: none !important; }
            body.print-escala #secaoAnual { display: none !important; }
            body.print-anual #secaoEscala { display: none !important; }
            body.print-anual .card-mes { border: 1px solid #000 !important; background: white !important; }
            body.print-anual .card-mes h4, body.print-anual .txt-anual { color: black !important; }
        }

        /* CORES MINISTÉRIOS */
        tr.pessoal td { background-color: #e0f2fe !important; } tr.mordomia td { background-color: #fef3c7 !important; }
        tr.saude td { background-color: #f1f5f9 !important; } tr.homens td { background-color: #dcfce7 !important; }
        tr.familia td { background-color: #fee2e2 !important; } tr.adolescentes td { background-color: #f0fdf4 !important; }
        tr.mulher td { background-color: #fce7f3 !important; } tr.musica td { background-color: #ede9fe !important; }
    </style>
</head>
<body>

<div class="toolbar">
    <div style="display: flex; gap: 10px;">
        <button class="btn-print" onclick="imprimir('escala')">🖨️ IMPRIMIR ESCALA</button>
        <button class="btn-print anual" onclick="imprimir('anual')">🗓️ IMPRIMIR ANUAL</button>
    </div>
    <div style="display: flex; align-items: center; gap: 15px;">
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid var(--neon-blue); padding:8px; border-radius:6px; font-weight:bold;"></select>
        <div style="font-size: 0.8rem; background: #374151; padding: 5px 12px; border-radius: 15px; border: 1px solid var(--neon-blue);">Logado: <strong>ADMIN</strong></div>
    </div>
</div>

<div class="admin-main-box">
    <div class="admin-grid">
        <div class="column">
            <div class="col-header">1. Pincéis</div>
            <button class="btn-min" onclick="selPincel('pessoal','M. Pessoal')">M. Pessoal</button>
            <button class="btn-min" onclick="selPincel('mordomia','Mordomia')">Mordomia</button>
            <button class="btn-min" onclick="selPincel('saude','Saúde')">Saúde</button>
            <button class="btn-min" onclick="selPincel('homens','M. Homens')">M. Homens</button>
            <button class="btn-min" onclick="selPincel('familia','M. Família')">M. Família</button>
            <button class="btn-min" onclick="selPincel('adolescentes','Adolescentes')">Adolescentes</button>
            <button class="btn-min" onclick="selPincel('mulher','M. Mulher')">M. Mulher</button>
            <button class="btn-min" onclick="selPincel('musica','Música')">Música</button>
            <button class="btn-min limpar" onclick="selPincel('','')">LIMPAR</button>
        </div>
        <div class="column">
            <div class="col-header">2. Responsáveis</div>
            <div id="gridResponsaveis" class="resp-grid"></div>
        </div>
        <div class="column">
            <div class="col-header">3. Logins e Senhas (Completo)</div>
            <div class="login-scroll">
                <table class="login-table">
                    <thead><tr><th>CARGO</th><th>USUÁRIO</th><th>SENHA</th></tr></thead>
                    <tbody id="corpoLogins"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="secaoEscala">
    <div class="escala-header">
        <div id="anciaoDestaque" class="anciao-title">ANCIÃO RESPONSÁVEL: ...</div>
        <div style="font-weight: bold; font-size: 1.1rem; color: #000;">ESCALA DO MÊS DE <span id="mesDestaque">...</span></div>
    </div>
    <table class="escala">
        <thead>
            <tr>
                <th style="width: 140px;">DIA</th><th style="width: 80px;">DATA</th>
                <th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th>
            </tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="secaoAnual">
    <h3 style="color: var(--accent-orange);">🗓️ PLANEJAMENTO ANUAL 2026</h3>
    <div id="gridAnual" class="anual-grid"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_final_v420');

    let db = { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{} };
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    // TODOS OS 13 DEPARTAMENTOS INSERIDOS MANUALMENTE
    const loginsPadrao = [
        {c:"Administrador", u:"admin", s:"iasd118"},
        {c:"Gerência", u:"ger", s:"ger123"},
        {c:"Diaconato", u:"diaconato", s:"diac123"},
        {c:"Música", u:"musica", s:"mus123"},
        {c:"Sonoplastia", u:"sonoplastia", s:"sono123"},
        {c:"M. Mulher", u:"mulher", s:"mulher123"},
        {c:"Escola Sabatina", u:"sabatina", s:"sab123"},
        {c:"M. Pessoal", u:"pessoal", s:"mp123"},
        {c:"Mordomia", u:"mordomia", s:"mord123"},
        {c:"Saúde", u:"saude", s:"saude123"},
        {c:"M. Homens", u:"homens", s:"homem123"},
        {c:"M. Família", u:"familia", s:"fam123"},
        {c:"Adolescentes", u:"adolescentes", s:"adol123"}
    ];

    dbRef.on('value', snap => { 
        db = snap.val() || { escalas:{}, cores:{}, anciaos:{}, logins:loginsPadrao, anual:{} }; 
        if(!db.logins || db.logins.length < 13) db.logins = loginsPadrao;
        renderTodo(); 
    });

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('mesDestaque').innerText = meses[m];
        document.getElementById('anciaoDestaque').innerText = `ANCIÃO RESPONSÁVEL: ${db.anciaos?.[m] || "(NÃO DEFINIDO)"}`;

        document.getElementById('gridResponsaveis').innerHTML = meses.map((n, i) => `
            <div><label style="font-size:9px; color:#94a3b8">${n}</label>
            <input class="input-dark" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)"></div>
        `).join('');

        document.getElementById('corpoLogins').innerHTML = db.logins.map((l, idx) => `
            <tr>
                <td><input class="input-login" value="${l.c}" onchange="atuLogin(${idx},'c',this.value)"></td>
                <td><input class="input-login user" value="${l.u}" onchange="atuLogin(${idx},'u',this.value)"></td>
                <td><input class="input-login" value="${l.s}" onchange="atuLogin(${idx},'s',this.value)"></td>
            </tr>
        `).join('');

        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `
            <div class="card-mes"><h4>${n}</h4>
            <textarea class="txt-anual" onchange="atuAnual(${i}, this.value)">${db.anual?.[i]||''}</textarea></div>
        `).join('');

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasMes; d++) {
            let dt = new Date(2026, m, d);
            if([0,3,6].includes(dt.getDay())) {
                let dStr = `${d}_${m+1}_2026`;
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr');
                if(c.id) tr.className = c.id;
                tr.innerHTML = `<td onclick="pintar('${dStr}')" style="cursor:pointer"><div>${["DOMINGO","","","QUARTA","","","SÁBADO"][dt.getDay()]}</div><div style="font-size:9px; color:#555">${c.nome||''}</div></td>
                <td onclick="pintar('${dStr}')" style="cursor:pointer">${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)"></td>`).join('');
                corpo.appendChild(tr);
            }
        }
    }

    function imprimir(tipo) {
        document.body.classList.remove('print-escala', 'print-anual');
        document.body.classList.add('print-' + tipo);
        setTimeout(() => { window.print(); }, 200);
    }

    function atuLogin(idx, campo, valor) { db.logins[idx][campo] = valor; dbRef.child('logins').set(db.logins); }
    function atuAnc(i,v) { if(!db.anciaos) db.anciaos={}; db.anciaos[i]=v.toUpperCase(); dbRef.child('anciaos').set(db.anciaos); }
    function atuAnual(i,v) { if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }
    function atu(d,c,v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }
    function selPincel(id, nome) { pID = id; pNome = nome; document.querySelectorAll('.btn-min').forEach(b => b.classList.remove('active')); event.currentTarget.classList.add('active'); }
    function pintar(dStr) { if(pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
