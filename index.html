<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        /* Estilo da Tabela no Site */
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; border-radius: 10px 10px 0 0; overflow: hidden; }
        #tabela-main th { background: #f1f5f9; padding: 12px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.85rem; text-transform: uppercase; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 0; text-align: center; font-weight: bold; }
        
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 1rem; display: block; padding: 10px 0; outline: none; color: black; }
        
        /* Elementos que NÃO saem na impressão */
        .no-print { display: block; }

        /* Elementos que SÓ saem na impressão */
        .only-print { display: none; }

        #saveIndicator { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); padding: 8px 25px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 20000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .saving { background: var(--orange); color: white; border: 2px solid white; }
        .saved { background: var(--green); color: white; border: 2px solid white; }
        .btn-modern { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); background: transparent; color: var(--neon); cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.8rem; }
        .input-dark { width: 100%; background: #000; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; outline: none; }
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }

        @media print {
            @page { size: landscape; margin: 1cm; }
            body { background: white !important; color: black !important; padding: 0; }
            .no-print { display: none !important; }
            .only-print { display: block !important; }
            
            .container { max-width: 100%; width: 100%; }
            
            /* Cabeçalho igual ao modelo enviado */
            .print-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid black; padding-bottom: 10px; }
            .print-header h1 { margin: 0; font-size: 24pt; color: black; text-transform: uppercase; }
            .print-header h2 { margin: 5px 0; font-size: 16pt; color: #333; }

            table#tabela-main { border: 2px solid black !important; margin-top: 0; width: 100%; }
            #tabela-main th { background: #eee !important; color: black !important; border: 1px solid black !important; font-size: 10pt; }
            #tabela-main td { border: 1px solid black !important; font-size: 10pt; }
            .auto-expand { font-size: 10pt !important; padding: 5px 0 !important; color: black !important; }
            
            /* Destaque para eventos especiais na impressão */
            .row-especial { background-color: #f9f9f9 !important; }
            .conflito { text-decoration: none !important; color: black !important; border: 1px solid red !important; }
        }

        /* Estilos de sobreposição e menus (mantidos do original) */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; }
    </style>
</head>
<body>

<div id="saveIndicator"></div>

<div class="container">
    
    <div class="only-print print-header">
        <h1>IASD ESTRELA DALVA</h1>
        <h2 id="printSubtitulo">ESCALA DE ATIVIDADES</h2>
    </div>

    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:8px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button id="btnAcesso" class="btn-modern" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="btn-modern" style="border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="userWelcomeBar" class="no-print" style="display:none; text-align:center; margin-bottom:10px; color:var(--neon)"></div>

    <div id="adminPanel" class="admin-box no-print">
        <button class="btn-modern" onclick="gerarBackupNuvem()">💾 BACKUP NUVEM</button>
        <button class="btn-modern" onclick="abrirPopBackups()">📂 RESTAURAR</button>
        <p style="color:white; font-size:0.8rem">Painel administrativo ativo. Altere os campos abaixo.</p>
    </div>

    <div class="no-print" style="text-align:center; margin-bottom:15px;">
        <input type="text" id="buscaRapida" class="input-dark" placeholder="🔍 Procurar nome..." style="width:100%; max-width:400px; border-color:var(--neon);" oninput="renderTodo()">
    </div>

    <table id="tabela-main">
        <thead>
            <tr class="no-print"><th colspan="9" id="headerTituloSite" style="background:var(--blue); color:white; font-size:1.2rem;">ESCALA</th></tr>
            <tr>
                <th style="width:80px">DIA</th>
                <th style="width:60px">DATA</th>
                <th>SABATINA</th>
                <th>PREGADOR</th>
                <th>MÚSICA</th>
                <th>LOUVOR</th>
                <th>SONOPLASTIA</th>
                <th>RECEPÇÃO</th>
                <th>DIACONATO</th>
            </tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

</div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'">
    <div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()">
        <input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;">
        <input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;">
        <button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    let db = {}; 
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); }
    });

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const busca = document.getElementById('buscaRapida').value.toUpperCase();
        
        // Atualiza títulos
        const tituloTexto = `ESCALA DE ATIVIDADES - ${MESES[mIdx]} 2026`;
        document.getElementById('headerTituloSite').innerText = tituloTexto;
        document.getElementById('printSubtitulo').innerText = tituloTexto;

        const isAdmin = ['admin','ger'].includes(curUser);
        if(isAdmin) document.getElementById('adminPanel').style.display='block';
        if(curUser !== 'visitante') {
            document.getElementById('userWelcomeBar').style.display = 'block';
            document.getElementById('userWelcomeBar').innerText = `Logado como: ${curUser.toUpperCase()}`;
            document.getElementById('btnSair').style.display = 'block';
            document.getElementById('btnAcesso').style.display = 'none';
        }

        const corpo = document.getElementById('corpoEscala'); 
        corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            let idEv = db.eventos_especiais?.[dt.toISOString().split('T')[0]];

            // Filtro de busca
            let textoFila = JSON.stringify(db.escalas?.[dStr] || "").toUpperCase();
            if(busca && !textoFila.includes(busca)) continue;

            if([0,3,6].includes(sem) || idEv) {
                let tr = `<tr class="${idEv ? 'row-especial' : ''}">
                    <td>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</td>
                    <td>${d}/${mIdx+1}</td>`;
                
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let val = db.escalas?.[dStr]?.[col] || '';
                    let canEdit = isAdmin || (curUser === 'musica' && (col==='mu'||col==='lo')) || (curUser === 'diaconato' && col==='di');
                    tr += `<td><textarea ${canEdit?'':'disabled'} class="auto-expand" onchange="atuCel('${dStr}','${col}',this.value)" oninput="autoResize(this)">${val}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        document.querySelectorAll('textarea').forEach(autoResize);
    }

    function atuCel(d, c, v) { 
        if(!db.escalas[d]) db.escalas[d]={}; 
        db.escalas[d][c] = v.toUpperCase(); 
        save(); 
    }

    function save() {
        const indicator = document.getElementById('saveIndicator');
        indicator.innerText = "A guardar..."; indicator.className = "saving"; indicator.style.display = "block";
        dbCloud.collection('dados').doc('estrela_v102').set(db).then(() => {
            indicator.innerText = "✅ Guardado"; indicator.className = "saved";
            setTimeout(() => indicator.style.display="none", 2000);
        });
    }

    function login() {
        const u = document.getElementById('userLogin').value.toLowerCase();
        const p = document.getElementById('passLogin').value;
        if(db.senhas[u] === p) { localStorage.setItem('iasd_curUser', u); location.reload(); }
        else alert("Acesso negado");
    }

    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function autoResize(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; }

    // Setup inicial do seletor de meses
    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
