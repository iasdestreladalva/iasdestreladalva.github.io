<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v560</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; --exit-red: #ef4444; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-top: 85px; }
        
        /* BARRA SUPERIOR */
        .toolbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; background: #111827; display: flex; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 3px solid var(--neon-blue); gap: 10px; justify-content: space-between; }
        .btn-tool { background: #1e293b; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .btn-eventos { border-color: var(--accent-orange); color: var(--accent-orange); }

        /* PAINEL DE GESTÃO (CONFORME FOTO 3) */
        #painelAdmin { display: none; background: #0f172a; border: 2px solid var(--accent-orange); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: 1fr 1.2fr 2fr; gap: 20px; }
        .col-header { color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; }
        .btn-min { width: 100%; padding: 10px; margin-bottom: 6px; background: transparent; border: 1px solid var(--neon-blue); color: white; border-radius: 8px; cursor: pointer; text-align: center; }
        
        .resp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .resp-item label { font-size: 0.65rem; color: #94a3b8; display: block; }
        .resp-input { width: 100%; background: #000; border: 1px solid #334155; color: #fff; padding: 8px; border-radius: 4px; font-size: 0.75rem; }

        .login-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        .login-table td { padding: 5px; border-bottom: 1px solid #1e293b; }
        .login-label { color: #fbbf24; width: 120px; }
        .login-user { color: var(--neon-blue); width: 100px; }
        .login-pass { background: #000; border: 1px solid #334155; color: #fff; width: 100%; padding: 5px; border-radius: 4px; }

        /* MODAL EVENTOS (CONFORME FOTO 1) */
        .modal-eventos { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        .card-eventos { background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid var(--accent-orange); width: 500px; }
        .ev-label { color: var(--neon-blue); font-size: 0.7rem; font-weight: bold; display: block; margin: 10px 0 5px; }
        .ev-input { width: 100%; background: #000; border: 1px solid #334155; color: #fff; padding: 12px; border-radius: 6px; box-sizing: border-box; }
        .btn-criar-periodo { width: 100%; background: #f87171; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; }
        .btn-concluido { width: 100%; background: #ff3b00; color: white; border: none; padding: 15px; border-radius: 8px; margin-top: 15px; font-weight: bold; cursor: pointer; }

        /* ESCALA (CONFORME FOTO 2) */
        #secaoEscala { background: white; border-radius: 8px; padding: 15px; overflow-x: auto; margin-bottom: 30px; border: 2px solid #000; }
        table.escala { width: 100%; border-collapse: collapse; color: black; min-width: 1000px; }
        table.escala th { background: var(--iasd-blue); color: white; padding: 10px; border: 1px solid #000; font-size: 0.75rem; }
        table.escala td { border: 1px solid #000; text-align: center; font-weight: bold; height: 50px; }
        .tag-evento { background: var(--exit-red); color: white; font-size: 0.65rem; padding: 4px; border-radius: 3px; display: block; margin-bottom: 3px; }
        .linha-extra { background-color: #fff1f2 !important; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; font-size: 0.8rem; }

        /* PLANEJAMENTO ANUAL (ABAIXO DA ESCALA - FOTO 2) */
        #secaoAnual { margin-top: 20px; }
        .grid-anual { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .card-mes { background: transparent; border: none; padding: 5px; }
        .card-mes h4 { color: var(--neon-blue); font-size: 0.7rem; margin: 5px 0; text-transform: uppercase; }
        .area-anual { width: 100%; height: 60px; background: transparent; color: #fff; border: none; font-size: 0.75rem; border-bottom: 1px solid #334155; resize: none; }

        @media print { 
            .toolbar, #painelAdmin, .modal-eventos { display: none !important; } 
            body { padding-top: 0; background: white; } 
            body.print-escala #secaoAnual { display: none !important; }
            body.print-anual #secaoEscala { display: none !important; }
        }
        
        tr.pessoal td { background-color: #e0f2fe !important; } tr.mordomia td { background-color: #fef3c7 !important; }
    </style>
</head>
<body id="mainBody">

<div class="toolbar">
    <div style="display: flex; gap: 8px; align-items: center;">
        <span style="font-weight: 900; color: var(--neon-blue); font-size: 0.8rem;">ESTRELA DALVA</span>
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid #444; padding:5px; border-radius:6px;"></select>
        <button class="btn-tool" onclick="imprimir('escala')">🖨️ ESCALA</button>
        <button class="btn-tool" onclick="imprimir('anual')">🗓️ ANUAL</button>
        <button class="btn-tool btn-eventos" onclick="abrirEventos()">🔥 EVENTOS</button>
    </div>
    <button id="btnEntrar" class="btn-login" onclick="abrirLogin()">ENTRAR</button>
    <button id="btnSair" style="display:none; background:red; color:white; padding:10px; border-radius:5px; border:none;" onclick="fazerLogout()">SAIR</button>
</div>

<div id="modalEventos" class="modal-eventos">
    <div class="card-eventos">
        <h2 style="color:#f87171; text-align:center; margin-top:0">CRIAR SEMANA DE ORAÇÃO / EVENTO</h2>
        <label class="ev-label">NOME DO EVENTO</label>
        <input type="text" id="evNome" class="ev-input" placeholder="Opcional">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
            <div><label class="ev-label">DATA INÍCIO</label><input type="date" id="evIni" class="ev-input"></div>
            <div><label class="ev-label">DATA FIM</label><input type="date" id="evFim" class="ev-input"></div>
        </div>
        <button class="btn-criar-periodo" onclick="salvarEvento()">CRIAR EVENTO NO PERÍODO</button>
        <div id="listaEventos" style="margin-top:10px; max-height:80px; overflow-y:auto; font-size:0.7rem"></div>
        <button class="btn-concluido" onclick="fecharEventos()">CONCLUÍDO</button>
    </div>
</div>

<div id="painelAdmin">
    <div class="admin-grid">
        <div class="column">
            <div class="col-header">1. Ministério do Dia</div>
            <div id="contPinceis"></div>
        </div>
        <div class="column">
            <div class="col-header">2. Responsável Mensal</div>
            <div id="gridAnciaos" class="resp-grid"></div>
        </div>
        <div class="column">
            <div class="col-header">3. Controle de Logins e Senhas</div>
            <table class="login-table"><tbody id="corpoLogins"></tbody></table>
        </div>
    </div>
</div>

<div id="secaoEscala">
    <div style="text-align:center; color:#000; margin-bottom:15px">
        <div id="txtAnciao" style="font-size:1.1rem; font-weight:900; color:var(--iasd-blue)">ANCIÃO RESPONSÁVEL: ---</div>
        <div style="font-weight:bold;">ESCALA DE <span id="txtMes">---</span></div>
    </div>
    <table class="escala">
        <thead><tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr></thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="secaoAnual">
    <h3 style="color:var(--accent-orange); border-bottom:1px solid #1e293b; padding-bottom:5px; font-size:0.8rem">🗓️ PLANEJAMENTO ANUAL 2026</h3>
    <div id="gridAnual" class="grid-anual"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v560');

    let db = { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{}, eventos:{} };
    let logado = false;
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
    const mins = [['pessoal','M. Pessoal'],['mordomia','Mordomia'],['saude','Saúde'],['homens','M. Homens'],['familia','M. Família'],['adolescentes','Adolescentes'],['mulher','M. Mulher'],['musica','Música']];

    dbRef.on('value', snap => { db = snap.val() || db; renderTodo(); });

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('txtMes').innerText = meses[m];
        document.getElementById('txtAnciao').innerText = `ANCIÃO RESPONSÁVEL: ${db.anciaos?.[m] || "---"}`;

        // Painel 1: Pincéis
        document.getElementById('contPinceis').innerHTML = mins.map(min => `<button class="btn-min" onclick="selPincel('${min[0]}','${min[1]}')">${min[1]}</button>`).join('') + `<button class="btn-min" style="border-color:red; color:red" onclick="selPincel('','')">LIMPAR</button>`;

        // Painel 2: Responsáveis Mensais
        document.getElementById('gridAnciaos').innerHTML = meses.map((n, i) => `<div class="resp-item"><label>${n}</label><input class="resp-input" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)" ${!logado?'disabled':''}></div>`).join('');

        // Painel 3: Logins
        const cargos = ["Música","Sonoplastia","M. Mulher","Escola Sabatina","M. Pessoal","Mordomia","Saúde","M. Homens"];
        if(!db.logins || db.logins.length < 8) db.logins = cargos.map(c => ({c, u: c.toLowerCase().substring(0,4), s: "123"}));
        document.getElementById('corpoLogins').innerHTML = db.logins.map((l, idx) => `<tr><td class="login-label">${l.c}</td><td class="login-user">${l.u}</td><td><input class="login-pass" value="${l.s}" onchange="atuLog(${idx},'s',this.value)" ${!logado?'disabled':''}></td></tr>`).join('');

        // ESCALA
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            const dt = new Date(2026, m, d);
            const dataISO = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const dStr = `${d}_${m+1}_2026`;
            let evDia = null;
            for(let id in db.eventos) { const ev = db.eventos[id]; if(dataISO >= ev.ini && dataISO <= ev.fim) evDia = ev; }

            if([0,3,6].includes(dt.getDay()) || evDia) {
                const tr = document.createElement('tr');
                if(evDia && ![0,3,6].includes(dt.getDay())) tr.className = "linha-extra";
                let c = db.cores?.[dStr] || {id:''}; if(c.id) tr.classList.add(c.id);
                tr.innerHTML = `<td onclick="${logado?`pintar('${dStr}')`:''}" style="cursor:pointer">${evDia?`<span class="tag-evento">${evDia.nome}</span>`:''}<div>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][dt.getDay()]}</div></td>
                <td>${d}/${m+1}</td>` + ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)" ${!logado?'disabled':''}></td>`).join('');
                corpo.appendChild(tr);
            }
        }

        // ANUAL
        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `<div class="card-mes"><h4>${n}</h4><textarea class="area-anual" onchange="atuAnu(${i},this.value)" ${!logado?'disabled':''}>${db.anual?.[i]||''}</textarea></div>`).join('');
    }

    function imprimir(t) { document.getElementById('mainBody').className = 'print-'+t; setTimeout(() => { window.print(); document.getElementById('mainBody').className = ''; }, 500); }
    function salvarEvento() { const n = document.getElementById('evNome').value.toUpperCase(), i = document.getElementById('evIni').value, f = document.getElementById('evFim').value; if(i && f) { dbRef.child('eventos').child(Date.now()).set({nome: n || "EVENTO", ini: i, fim: f}); renderListaEv(); }}
    function renderListaEv() { const d = document.getElementById('listaEventos'); d.innerHTML = ""; for(let id in db.eventos) { const e = db.eventos[id]; d.innerHTML += `<div style="color:white; display:flex; justify-content:space-between;">${e.nome} <button onclick="deletarEv('${id}')" style="color:red; background:none; border:none; cursor:pointer">X</button></div>`; }}
    function deletarEv(id) { dbRef.child('eventos').child(id).remove(); }
    function abrirEventos() { document.getElementById('modalEventos').style.display = 'flex'; renderListaEv(); }
    function fecharEventos() { document.getElementById('modalEventos').style.display = 'none'; }
    function atuAnc(i,v) { if(logado){ dbRef.child('anciaos').child(i).set(v.toUpperCase()); }}
    function atuLog(idx, c, v) { if(logado){ db.logins[idx][c]=v; dbRef.child('logins').set(db.logins); }}
    function atu(d,c,v) { if(logado){ if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }}
    function atuAnu(i,v) { if(logado){ if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }}
    function abrirLogin() { let u=prompt("User:"), s=prompt("Pass:"); if(u=="admin" && s=="123"){ logado=true; document.getElementById('painelAdmin').style.display='block'; document.getElementById('btnEntrar').style.display='none'; document.getElementById('btnSair').style.display='block'; renderTodo(); }}
    function fazerLogout() { logado=false; localStorage.removeItem('iasd_logado'); location.reload(); }
    let pID = null, pNome = "";
    function selPincel(id, nome) { pID = id; pNome = nome; }
    function pintar(dStr) { if(logado && pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}
    const sM = document.getElementById('selMes'); if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
