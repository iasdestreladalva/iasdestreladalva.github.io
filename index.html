<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - v660 RESTAURAÇÃO TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; }
        body { background: #0b0f19; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; padding-top: 90px; }
        
        /* NAVBAR v560 ORIGINAL */
        .navbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; background: #0b0f19; display: flex; align-items: center; padding: 0 30px; z-index: 1000; border-bottom: 2px solid #1e293b; gap: 12px; }
        .nav-title { font-weight: 900; color: var(--neon-blue); font-size: 1rem; margin-right: 10px; }
        .btn-nav { background: #1e293b; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .btn-ev { border-color: var(--accent-orange); color: var(--accent-orange); }
        .btn-tes { border-color: #22c55e; color: #22c55e; }

        /* PAINEL DE GESTÃO - RECONSTRUÇÃO FIEL ÀS FOTOS */
        #painelAdmin { display: none; background: rgba(30, 41, 59, 0.4); border: 2px solid var(--accent-orange); border-radius: 20px; padding: 25px; margin-bottom: 30px; }
        .admin-grid { display: grid; grid-template-columns: 220px 1.2fr 1.8fr; gap: 25px; }
        .col-title { color: var(--neon-blue); font-size: 0.8rem; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; border-bottom: 1px solid #1e293b; padding-bottom: 5px; }
        
        /* COLUNA 1 - PINCEIS */
        .btn-min { width: 100%; padding: 10px; margin-bottom: 8px; background: transparent; border: 1px solid var(--neon-blue); color: white; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        .btn-limpar { border-color: #ef4444; color: #ef4444; }

        /* COLUNA 2 - RESPONSÁVEIS */
        .resp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .resp-input { width: 90%; background: #000; border: 1px solid #334155; color: #fff; padding: 8px; border-radius: 5px; font-weight: bold; font-size: 0.75rem; }

        /* COLUNA 3 - TABELA DE LOGINS */
        .login-box { background: #000; border-radius: 10px; height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #1e293b; }
        .login-table { width: 100%; border-collapse: collapse; font-size: 0.75rem; color: #fff; }
        .login-table th { text-align: left; color: #94a3b8; padding: 5px; font-size: 0.6rem; }
        .login-table td { padding: 10px 5px; border-bottom: 1px solid #111; }
        .c-cargo { color: #fbbf24; font-weight: bold; }
        .c-user { color: var(--neon-blue); }

        /* ESCALA ESTILO IASD */
        #secaoEscala { background: white; border-radius: 10px; padding: 20px; overflow-x: auto; margin-bottom: 30px; border: 3px solid #000; color: #000; }
        table.escala { width: 100%; border-collapse: collapse; min-width: 1000px; }
        table.escala th { background: var(--iasd-blue); color: white; padding: 12px; border: 1px solid #000; font-size: 0.75rem; }
        table.escala td { border: 1px solid #000; text-align: center; font-weight: 900; height: 45px; font-size: 0.8rem; }
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: 900; background: transparent; text-transform: uppercase; }

        /* MINIATURAS TESOURARIA */
        .grid-tes { display: flex; gap: 15px; margin-top: 15px; flex-wrap: wrap; }
        .thumb-tes { width: 140px; height: 140px; border: 2px solid #22c55e; border-radius: 10px; cursor: pointer; object-fit: cover; }

        /* OVERLAY TELA CHEIA */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        #overlay img { max-width: 90%; max-height: 90%; border-radius: 5px; }

        @media print { .navbar, #painelAdmin, #overlay, #containerTesouraria h3 { display: none !important; } }
        tr.pessoal td { background-color: #e0f2fe !important; } tr.mordomia td { background-color: #fef3c7 !important; }
    </style>
</head>
<body>

<nav class="navbar">
    <span class="nav-title">ESTRELA DALVA</span>
    <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid #444; padding:8px; border-radius:6px; font-weight:bold;"></select>
    <button class="btn-nav" onclick="imprimir('escala')">🖨️ ESCALA</button>
    <button class="btn-nav" onclick="imprimir('anual')">🗓️ ANUAL</button>
    <button id="btnEventos" class="btn-nav btn-ev" style="display:none" onclick="abrirEv()">🔥 EVENTOS</button>
    <button id="btnTesouraria" class="btn-nav btn-tes" style="display:none" onclick="abrirTes()">💰 TESOURARIA</button>
    <div style="flex-grow: 1;"></div>
    <button id="btnEntrar" class="btn-nav" style="background:var(--neon-blue); color:#000" onclick="fazerLogin()">ENTRAR</button>
    <button id="btnSair" style="display:none; background:#ef4444; border:none; padding:10px; border-radius:6px; color:white; font-weight:bold; cursor:pointer" onclick="location.reload()">SAIR</button>
</nav>

<div id="painelAdmin">
    <div class="admin-grid">
        <div class="column">
            <div class="col-title">1. Ministério do Dia</div>
            <div id="contPinceis"></div>
        </div>
        <div class="column">
            <div class="col-title">2. Responsável Mensal</div>
            <div id="gridAnciaos" class="resp-grid"></div>
        </div>
        <div class="column">
            <div class="col-title">3. Logins dos Ministérios</div>
            <div class="login-box">
                <table class="login-table">
                    <thead><tr><th>CARGO</th><th>USUÁRIO</th><th>SENHA</th></tr></thead>
                    <tbody id="corpoLogins"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="secaoEscala">
    <div style="text-align:center; color:#000; margin-bottom:15px">
        <div id="txtAnciao" style="font-size:1.3rem; font-weight:900; color:var(--iasd-blue)">---</div>
        <div style="font-weight:bold;">ESCALA DE <span id="txtMes">---</span></div>
    </div>
    <table class="escala">
        <thead><tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr></thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="secaoAnual">
    <h3 style="color:var(--accent-orange); font-size:0.9rem;">🗓️ PLANEJAMENTO ANUAL 2026</h3>
    <div id="gridAnual" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:12px; margin-top:10px;"></div>
</div>

<div id="containerTesouraria" style="margin-top:30px;">
    <h3 style="color:#22c55e; font-size:0.9rem;">💰 ARQUIVOS TESOURARIA</h3>
    <div id="gridTes" class="grid-tes"></div>
</div>

<div id="overlay" onclick="this.style.display='none'"></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v660');

    let db = { escalas:{}, cores:{}, anciaos:{}, anual:{}, eventos:{}, tesouraria:{} };
    let logado = false;
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];
    const listaLogins = [
        ["Administrador","admin","123"], ["Gerência","gerente","123"], ["Música","musica","mus123"],
        ["Sonoplastia","sono","sono123"], ["M. Mulher","mulher","mul123"], ["Escola Sabatina","sabatina","sab123"],
        ["M. Pessoal","pessoal","mp123"], ["Mordomia","mordomia","mord123"]
    ];

    function fazerLogin() {
        let u = prompt("Usuário:");
        let s = prompt("Senha:"); // O prompt padrão esconde a lógica no código, mas aqui validamos fixo:
        let userValido = listaLogins.find(l => l[1] === u && l[2] === s);
        
        if(userValido) {
            logado = true;
            document.getElementById('btnEntrar').style.display = 'none';
            document.getElementById('btnSair').style.display = 'block';
            document.getElementById('painelAdmin').style.display = 'block';
            document.getElementById('btnEventos').style.display = 'block';
            if(u === 'admin' || u === 'gerente') document.getElementById('btnTesouraria').style.display = 'block';
            renderTodo();
        } else { alert("Login incorreto!"); }
    }

    dbRef.on('value', snap => { db = snap.val() || db; renderTodo(); });

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('txtMes').innerText = meses[m];
        document.getElementById('txtAnciao').innerText = `ANCIÃO RESPONSÁVEL: ${db.anciaos?.[m] || "---"}`;

        // PINCEIS
        const ms = [['pessoal','M. Pessoal'],['mordomia','Mordomia'],['saude','Saúde'],['homens','M. Homens'],['familia','M. Família'],['adolescentes','Adolescentes'],['mulher','M. Mulher'],['musica','Música']];
        document.getElementById('contPinceis').innerHTML = ms.map(x => `<button class="btn-min" onclick="pincel='${x[0]}'">${x[1]}</button>`).join('') + `<button class="btn-min btn-limpar" onclick="pincel=''">LIMPAR COR</button>`;

        // ANCIAOS
        document.getElementById('gridAnciaos').innerHTML = meses.map((n,i) => `<div><label style="font-size:0.6rem;color:#94a3b8">${n}</label><br><input class="resp-input" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)" ${!logado?'disabled':''}></div>`).join('');

        // TABELA LOGINS
        document.getElementById('corpoLogins').innerHTML = listaLogins.map(l => `<tr><td class="c-cargo">${l[0]}</td><td class="c-user">${l[1]}</td><td>${l[2]}</td></tr>`).join('');

        // ESCALA
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, m+1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            const dt = new Date(2026, m, d);
            const dStr = `${d}_${m+1}_2026`;
            const dataISO = `2026-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let ev = null; for(let id in db.eventos) { if(dataISO >= db.eventos[id].ini && dataISO <= db.eventos[id].fim) ev = db.eventos[id]; }
            
            if([0,3,6].includes(dt.getDay()) || ev) {
                const tr = document.createElement('tr');
                if(db.cores?.[dStr]) tr.classList.add(db.cores[dStr]);
                tr.innerHTML = `<td onclick="pintar('${dStr}')" style="cursor:pointer">${ev?`<div style="background:red;color:white;font-size:0.6rem">${ev.nome}</div>`:''} ${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][dt.getDay()]}</td><td>${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(c => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[c]||''}" onchange="atu('${dStr}','${c}',this.value)" ${!logado?'disabled':''}></td>`).join('');
                corpo.appendChild(tr);
            }
        }
        // ANUAL
        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `<div style="background:#111827;padding:10px;border-radius:8px;border-left:3px solid var(--accent-orange)"><h6>${n}</h6><textarea style="width:100%;height:45px;background:transparent;color:white;border:none;font-size:0.7rem" onchange="atuAnu(${i},this.value)" ${!logado?'disabled':''}>${db.anual?.[i]||''}</textarea></div>`).join('');
        // TESOURARIA
        const tri = Math.floor(m/3)+1;
        const gTes = document.getElementById('gridTes'); gTes.innerHTML = "";
        const arqs = db.tesouraria?.[tri] || [];
        arqs.forEach(a => { gTes.innerHTML += `<img src="${a.url}" class="thumb-tes" onclick="verFull('${a.url}')">`; });
    }

    function verFull(url) { const ov = document.getElementById('overlay'); ov.innerHTML = `<img src="${url}">`; ov.style.display = 'flex'; }
    function abrirTes() { 
        let f = document.createElement('input'); f.type = 'file'; f.onchange = (e) => {
            const file = e.target.files[0]; const reader = new FileReader();
            reader.onload = (ev) => {
                const tri = Math.floor(parseInt(document.getElementById('selMes').value)/3)+1;
                const arqs = db.tesouraria?.[tri] || [];
                arqs.push({url: ev.target.result});
                dbRef.child('tesouraria').child(tri).set(arqs);
            }; reader.readAsDataURL(file);
        }; f.click();
    }
    function abrirEv() { 
        let n = prompt("Evento:"), i = prompt("Início (AAAA-MM-DD):"), f = prompt("Fim (AAAA-MM-DD):");
        if(n && i && f) dbRef.child('eventos').child(Date.now()).set({nome:n.toUpperCase(), ini:i, fim:f});
    }
    function imprimir(t) { document.body.className = 'print-'+t; window.print(); document.body.className = ''; }
    function atuAnc(i,v) { dbRef.child('anciaos').child(i).set(v.toUpperCase()); }
    function atu(d,c,v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }
    function atuAnu(i,v) { if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }
    let pincel = ""; function pintar(d) { if(!db.cores) db.cores={}; if(!pincel) delete db.cores[d]; else db.cores[d]=pincel; dbRef.child('cores').set(db.cores); }
    const sM = document.getElementById('selMes'); meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
