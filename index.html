<!DOCTYPE html> <html lang="pt-br"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - MASTER v530</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --iasd-blue: #002b5c; --bg-dark: #0f172a; --neon-blue: #38bdf8; --accent-orange: #f97316; --exit-red: #ef4444; }
        body { background: var(--bg-dark); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-top: 85px; }
        
        .toolbar { position: fixed; top: 0; left: 0; right: 0; height: 75px; background: #111827; display: flex; align-items: center; padding: 0 20px; z-index: 1000; border-bottom: 3px solid var(--neon-blue); gap: 10px; justify-content: space-between; }
        .btn-tool { background: transparent; color: white; border: 1px solid #444; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }
        .btn-eventos { border-color: var(--accent-orange); color: var(--accent-orange); background: rgba(249, 115, 22, 0.1); }
        .btn-login { background: var(--neon-blue); color: #000; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-logout { background: var(--exit-red); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; display: none; }

        .modal-eventos { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; align-items: center; justify-content: center; }
        .card-eventos { background: #1e293b; padding: 25px; border-radius: 15px; border: 2px solid var(--accent-orange); width: 450px; }
        .ev-input { width: 100%; background: #000; border: 1px solid #334155; color: #fff; padding: 10px; border-radius: 6px; margin-bottom: 10px; }
        .btn-criar { width: 100%; background: #f87171; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .lista-ev { margin-top: 15px; max-height: 150px; overflow-y: auto; background: #000; padding: 5px; border-radius: 5px; }
        .ev-item { background: #1e293b; padding: 8px; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; font-size: 0.75rem; border-left: 3px solid var(--accent-orange); }

        #painelAdmin { display: none; background: #0f172a; border: 2px solid var(--accent-orange); border-radius: 15px; padding: 20px; margin-bottom: 25px; }
        .admin-grid { display: grid; grid-template-columns: 220px 250px 1fr; gap: 20px; }

        .tag-evento { background: var(--exit-red); color: white; font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; display: block; margin-bottom: 3px; font-weight: bold; text-align: center; }
        #secaoEscala { background: white; border-radius: 8px; padding: 15px; overflow-x: auto; margin-bottom: 30px; border: 2px solid #000; }
        table.escala { width: 100%; border-collapse: collapse; color: black; min-width: 1000px; }
        table.escala th { background: var(--iasd-blue); color: white; padding: 10px; border: 1px solid #000; font-size: 0.7rem; }
        table.escala td { border: 1px solid #000; text-align: center; font-weight: bold; height: 45px; }
        .linha-especial { background-color: #fff1f2 !important; } /* Cor sutil para dias de evento fora do comum */
        
        .cell-input { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; text-transform: uppercase; font-size: 0.75rem; }

        @media print { .toolbar, #painelAdmin, .modal-eventos { display: none !important; } body { padding-top: 0; } }
        
        tr.pessoal td { background-color: #e0f2fe !important; } tr.mordomia td { background-color: #fef3c7 !important; }
        tr.saude td { background-color: #f1f5f9 !important; } tr.homens td { background-color: #dcfce7 !important; }
    </style>
</head>
<body id="mainBody">

<div class="toolbar">
    <div style="display: flex; gap: 8px; align-items: center;">
        <span style="font-weight: 900; color: var(--neon-blue); font-size: 0.8rem;">ESTRELA DALVA</span>
        <select id="selMes" onchange="renderTodo()" style="background:#000; color:#fff; border:1px solid #444; padding:5px; border-radius:6px; font-size:0.7rem"></select>
        <button class="btn-tool" onclick="window.print()">🖨️ IMPRIMIR</button>
        <button class="btn-tool btn-eventos" onclick="abrirEventos()">🔥 EVENTOS</button>
    </div>
    <div style="display: flex; gap: 8px;">
        <button id="btnEntrar" class="btn-login" onclick="abrirLogin()">ENTRAR</button>
        <button id="btnSair" class="btn-logout" onclick="fazerLogout()">SAIR</button>
    </div>
</div>

<div id="modalEventos" class="modal-eventos">
    <div class="card-eventos">
        <h2 style="color:#f87171; text-align:center; font-size:1.1rem; margin-top:0">CALENDÁRIO DE EVENTOS</h2>
        <input type="text" id="evNome" class="ev-input" placeholder="NOME DO EVENTO">
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px">
            <input type="date" id="evIni" class="ev-input">
            <input type="date" id="evFim" class="ev-input">
        </div>
        <button class="btn-criar" onclick="salvarEvento()">ADICIONAR À ESCALA</button>
        <div class="lista-ev" id="listaEventos"></div>
        <button style="width:100%; margin-top:15px; padding:10px; background:#444; border:none; color:#fff; border-radius:8px; cursor:pointer" onclick="fecharEventos()">FECHAR</button>
    </div>
</div>

<div id="painelAdmin">
    <div class="admin-grid">
        <div class="column">
            <div id="contPinceis"></div>
        </div>
        <div class="column">
            <div id="gridAnciaos" style="display:grid; grid-template-columns:1fr 1fr; gap:4px"></div>
        </div>
        <div class="column">
            <div style="max-height: 250px; overflow-y:auto; border:1px solid #334155; border-radius:8px">
                <table style="width:100%; font-size:0.7rem; color:#fbbf24; border-collapse:collapse;">
                    <thead><tr style="color:var(--accent-orange)"><th>CARGO</th><th>USER</th><th>SENHA</th></tr></thead>
                    <tbody id="corpoLogins"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="secaoEscala">
    <div style="text-align:center; color:#000; margin-bottom:15px">
        <div id="txtAnciao" style="font-size:1.1rem; font-weight:900; color:var(--iasd-blue)">---</div>
        <div style="font-weight:bold; font-size:0.9rem">ESCALA DE <span id="txtMes">---</span></div>
    </div>
    <table class="escala">
        <thead><tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr></thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="secaoAnual">
    <div id="gridAnual" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px"></div>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v530');

    let db = { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{}, eventos:{} };
    let logado = false;
    const meses = ["JANEIRO","FEVEREIRO","MARÇO","ABRIL","MAIO","JUNHO","JULHO","AGOSTO","SETEMBRO","OUTUBRO","NOVEMBRO","DEZEMBRO"];

    window.onload = () => { if(localStorage.getItem('iasd_logado') === 'true') ativarModoAdmin(); };
    dbRef.on('value', snap => { db = snap.val() || { escalas:{}, cores:{}, anciaos:{}, logins:[], anual:{}, eventos:{} }; renderTodo(); });

    function ativarModoAdmin() { logado = true; document.getElementById('painelAdmin').style.display = 'block'; document.getElementById('btnEntrar').style.display = 'none'; document.getElementById('btnSair').style.display = 'block'; }
    function fazerLogout() { localStorage.removeItem('iasd_logado'); location.reload(); }
    function abrirLogin() { let u = prompt("User:"), s = prompt("Pass:"); const f = db.logins.find(l => l.u === u && l.s === s); if(f){ localStorage.setItem('iasd_logado', 'true'); ativarModoAdmin(); renderTodo(); } }

    function abrirEventos() { document.getElementById('modalEventos').style.display = 'flex'; renderListaEventos(); }
    function fecharEventos() { document.getElementById('modalEventos').style.display = 'none'; }

    function salvarEvento() {
        const nome = document.getElementById('evNome').value.toUpperCase(), ini = document.getElementById('evIni').value, fim = document.getElementById('evFim').value;
        if(nome && ini && fim) { dbRef.child('eventos').child(Date.now()).set({nome, ini, fim}); document.getElementById('evNome').value = ""; renderListaEventos(); }
    }
    function deletarEvento(id) { dbRef.child('eventos').child(id).remove(); renderListaEventos(); }

    function renderListaEventos() {
        const lista = document.getElementById('listaEventos'); lista.innerHTML = "";
        for(let id in db.eventos) { const ev = db.eventos[id]; lista.innerHTML += `<div class="ev-item"><span><b>${ev.nome}</b> (${ev.ini} a ${ev.fim})</span><button onclick="deletarEvento('${id}')" style="background:none; border:none; color:red; cursor:pointer">X</button></div>`; }
    }

    function renderTodo() {
        const m = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('txtMes').innerText = meses[m];
        document.getElementById('txtAnciao').innerText = `ANCIÃO RESPONSÁVEL: ${db.anciaos?.[m] || "---"}`;

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasNoMes = new Date(2026, m+1, 0).getDate();

        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, m, d);
            let diaSemana = dt.getDay();
            let dStr = `${d}_${m+1}_2026`;
            let dataAtualLong = new Date(2026, m, d).getTime();
            
            let eventoNome = "";
            let temEvento = false;
            for(let id in db.eventos) {
                let ev = db.eventos[id];
                let dIni = new Date(ev.ini + "T00:00:00").getTime();
                let dFim = new Date(ev.fim + "T23:59:59").getTime();
                if(dataAtualLong >= dIni && dataAtualLong <= dFim) { eventoNome = ev.nome; temEvento = true; }
            }

            // SE for dia de culto (0,3,6) OU se tiver evento nesse dia, MOSTRA na tabela
            if([0,3,6].includes(diaSemana) || temEvento) {
                let c = db.cores?.[dStr] || {id:'', nome:''};
                let tr = document.createElement('tr');
                if(temEvento && ![0,3,6].includes(diaSemana)) tr.className = "linha-especial";
                if(c.id) tr.classList.add(c.id);

                tr.innerHTML = `<td onclick="${logado?`pintar('${dStr}')`:''}" style="cursor:pointer">
                    ${temEvento ? `<span class="tag-evento">${eventoNome}</span>` : ''}
                    <div>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][diaSemana]}</div>
                    <div style="font-size:7px">${c.nome||''}</div>
                </td>
                <td>${d}/${m+1}</td>` + 
                ["sa","pr","mu","lo","so","re","di"].map(col => `<td><input class="cell-input" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atu('${dStr}','${col}',this.value)" ${!logado?'disabled':''}></td>`).join('');
                corpo.appendChild(tr);
            }
        }
        
        // Render Outros (Anciaos, Logins, Anual) - Mantidos
        document.getElementById('gridAnciaos').innerHTML = meses.map((n, i) => `<div><label style="font-size:7px">${n}</label><input style="background:#000; color:#fff; border:1px solid #334155; width:100%; font-size:0.7rem" value="${db.anciaos?.[i]||''}" onchange="atuAnc(${i},this.value)" ${!logado?'disabled':''}></div>`).join('');
        document.getElementById('corpoLogins').innerHTML = db.logins.map((l, idx) => `<tr><td><input class="cell-input" value="${l.c}" onchange="atuLog(${idx},'c',this.value)" ${!logado?'disabled':''}></td><td><input class="cell-input" value="${l.u}" onchange="atuLog(${idx},'u',this.value)" ${!logado?'disabled':''}></td><td><input class="cell-input" value="${l.s}" onchange="atuLog(${idx},'s',this.value)" ${!logado?'disabled':''}></td></tr>`).join('');
        document.getElementById('gridAnual').innerHTML = meses.map((n, i) => `<div style="background:#1e293b; padding:5px; border-radius:5px"><h4 style="margin:0; font-size:0.7rem">${n}</h4><textarea style="width:100%; height:40px; background:transparent; color:#fff; border:none; font-size:0.7rem" onchange="atuAnu(${i},this.value)" ${!logado?'disabled':''}>${db.anual?.[i]||''}</textarea></div>`).join('');
    }

    const mins = [['pessoal','M. Pessoal'],['mordomia','Mordomia'],['saude','Saúde'],['homens','M. Homens'],['familia','M. Família'],['adolescentes','Adol.'],['mulher','M. Mulher'],['musica','Música']];
    document.getElementById('contPinceis').innerHTML = mins.map(m => `<button class="btn-min" onclick="selPincel('${m[0]}','${m[1]}')" style="width:100%; margin-bottom:2px; cursor:pointer; font-size:0.7rem; border-radius:5px; border:1px solid var(--neon-blue); background:none; color:white">${m[1]}</button>`).join('') + `<button class="btn-min" style="color:red; width:100%; border-color:red" onclick="selPincel('','')">LIMPAR</button>`;

    function atuAnc(i,v) { if(logado){ if(!db.anciaos) db.anciaos={}; db.anciaos[i]=v.toUpperCase(); dbRef.child('anciaos').set(db.anciaos); }}
    function atuLog(idx, c, v) { if(logado){ db.logins[idx][c]=v; dbRef.child('logins').set(db.logins); }}
    function atu(d,c,v) { if(logado){ if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.child('escalas').set(db.escalas); }}
    function atuAnu(i,v) { if(logado){ if(!db.anual) db.anual={}; db.anual[i]=v; dbRef.child('anual').set(db.anual); }}
    let pID = null, pNome = "";
    function selPincel(id, nome) { pID = id; pNome = nome; }
    function pintar(dStr) { if(logado && pID!==null){ if(!db.cores) db.cores={}; if(pID==="") delete db.cores[dStr]; else db.cores[dStr]={id:pID, nome:pNome}; dbRef.child('cores').set(db.cores); }}

    const sM = document.getElementById('selMes');
    if(!sM.options.length) meses.forEach((m,i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body> </html>
