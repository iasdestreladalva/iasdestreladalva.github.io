<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - v102.90</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; --pink: #fd79a8; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1450px; margin: auto; }
        
        /* Containers de Miniaturas */
        .grid-arquivos { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 10px; }
        .thumb-card { background: #000; height: 110px; border: 1px solid #334155; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; overflow: hidden; border-radius: 8px; transition: 0.3s; }
        .thumb-card:hover { border-color: var(--neon); transform: scale(1.02); }
        .thumb-card img { width: 100%; height: 70%; object-fit: cover; }
        .thumb-card .icon { font-size: 2rem; margin-bottom: 5px; }
        .thumb-card .label { position: absolute; bottom: 0; background: rgba(0,0,0,0.8); width: 100%; font-size: 0.6rem; text-align: center; padding: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Admin e Modais */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 10px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; text-align: center; }
        
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        #zoomOverlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        #viewerContent { width: 90%; height: 85%; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 20px; }
        #viewerContent img, #viewerContent video { max-width: 90%; max-height: 70%; border: 2px solid #fff; }
        #viewerContent embed { width: 100%; height: 100%; }

        /* Cores das Linhas */
        .row-pessoal { background-color: #e0f2fe !important; color: #000 !important; } .row-mordomia { background-color: #fef3c7 !important; color: #000 !important; }
        .row-saude { background-color: #f0fdf4 !important; color: #000 !important; } .row-homens { background-color: #ecfeff !important; color: #000 !important; }
        .row-familia { background-color: #faf5ff !important; color: #000 !important; } .row-adolescentes { background-color: #f8fafc !important; color: #000 !important; }
        .row-mulher { background-color: #fdf2f8 !important; color: #000 !important; } .row-musica { background-color: #fff1f2 !important; color: #000 !important; }

        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 50px; }

        .section-box { display: none; margin-top: 30px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid #444; }
    </style>
</head>
<body>
    <div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px; flex-wrap: wrap;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px;"></select>
            <button id="btnTesourariaAdmin" class="input-dark" style="width:auto; border-color:var(--green); color:var(--green); display:none;" onclick="abrirPop('popTesouraria')">⚙️ FINANÇAS</button>
            <button id="btnMusicaAdmin" class="input-dark" style="width:auto; border-color:var(--pink); color:var(--pink); display:none;" onclick="abrirPop('popMusica')">🎵 UP MÚSICA</button>
            <button class="input-dark" style="width:auto; border-color:var(--neon); color:var(--neon);" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="width:auto; border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <h4 style="color:var(--orange); margin-top:0;">PAINEL ADMIN: Selecione o ministério e clique no dia (coluna DIA) para definir.</h4>
        <div id="listaMinisterios" style="display:flex; gap:5px; flex-wrap:wrap; margin-bottom:10px;"></div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" id="headerTitulo" style="background:var(--blue); color:white; font-size:1.2rem;">ESCALA</th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div id="displayMusica" class="section-box" style="border-color: var(--pink);">
        <h3 style="margin:0; color:var(--pink);">🎵 MÚSICAS E VÍDEOS - <span class="mesNome"></span></h3>
        <div id="gridMusicas" class="grid-arquivos"></div>
    </div>

    <div id="displayTesouraria" class="section-box" style="border-color: var(--green);">
        <h3 style="margin:0; color:var(--green);">💰 COMPROVANTES FINANCEIROS - <span class="mesNome"></span></h3>
        <div id="gridDocs" class="grid-arquivos"></div>
    </div>
</div>

<div id="zoomOverlay">
    <div id="viewerContent"></div>
    <button class="btn-min" style="width:200px; color:white; border-color:white;" onclick="document.getElementById('zoomOverlay').style.display='none'">❌ FECHAR</button>
</div>

<div id="popTesouraria" class="overlay" onclick="this.style.display='none'">
    <div class="pop-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--green);">UPLOAD FINANCEIRO</h3>
        <input type="file" id="inDoc" accept="image/*,application/pdf" onchange="upload('docs', 'inDoc')">
        <div id="admListDocs" style="margin-top:15px;"></div>
    </div>
</div>

<div id="popMusica" class="overlay" onclick="this.style.display='none'">
    <div class="pop-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--pink);">UPLOAD MÚSICA (MP3/MP4)</h3>
        <input type="file" id="inMus" accept="audio/*,video/*" onchange="upload('musicas', 'inMus')">
        <div id="admListMus" style="margin-top:15px;"></div>
    </div>
</div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'">
    <div style="background:white; padding:20px; border-radius:10px;" onclick="event.stopPropagation()">
        <input type="text" id="uL" placeholder="Usuário" class="input-dark" style="color:#000!important; margin-bottom:5px;">
        <input type="password" id="pL" placeholder="Senha" class="input-dark" style="color:#000!important; margin-bottom:10px;">
        <button class="btn-min" style="background:var(--blue); color:white;" onclick="login()">ENTRAR</button>
    </div>
</div>

<script>
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { pessoal:"M. Pessoal", mordomia:"Mordomia", saude:"Saúde", homens:"M. Homens", familia:"M. Família", adolescentes:"Adolescentes", mulher:"M. Mulher", musica:"Música" };
    let db = JSON.parse(localStorage.getItem('iasd_v110')) || { senhas:{admin:"iasd118", ger:"ger123", musica:"mus123"}, escalas:{}, regras_manuais:{}, docs:{}, musicas:{} };
    let curUser = localStorage.getItem('iasd_user') || 'visitante';
    let selMin = null;

    function save() { localStorage.setItem('iasd_v110', JSON.stringify(db)); }

    function renderTodo() {
        const m = document.getElementById('selMes').value;
        const isAdm = ['admin','ger'].includes(curUser);
        const isMus = isAdm || curUser === 'musica';

        document.querySelectorAll('.mesNome').forEach(el => el.innerText = MESES[m]);
        document.getElementById('adminPanel').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnTesourariaAdmin').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnMusicaAdmin').style.display = isMus ? 'block' : 'none';
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = curUser === 'visitante' ? 'block' : 'none';
        document.getElementById('displayTesouraria').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('displayMusica').style.display = curUser !== 'visitante' ? 'block' : 'none';

        renderEscala(m);
        renderGrid(m, 'docs', 'gridDocs');
        renderGrid(m, 'musicas', 'gridMusicas');
        renderAdminLists(m);
    }

    function renderEscala(m) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, parseInt(m)+1, 0).getDate();
        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, m, d), sem = dt.getDay(), dStr = `${d}/${parseInt(m)+1}/2026`;
            if([0,3,6].includes(sem)) {
                let mID = db.regras_manuais[dStr] || "";
                let tr = `<tr class="row-${mID}">
                    <td onclick="setDia('${dStr}')" style="cursor:pointer;">${["DOM","SEG","TER","QUA","QUI","SEX","SÁB"][sem]}<br><small>${MINS[mID]||'---'}</small></td>
                    <td>${d}/${parseInt(m)+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(c => {
                    let edit = ['admin','ger'].includes(curUser) || (curUser === mID && c === 'pr');
                    tr += `<td><input ${edit?'':'disabled'} value="${db.escalas[dStr]?.[c]||''}" onchange="atu('${dStr}','${c}',this.value)" style="width:100%; border:none; background:transparent; text-align:center;"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function setDia(d) { if(['admin','ger'].includes(curUser)) { if(selMin) db.regras_manuais[d] = selMin; else delete db.regras_manuais[d]; save(); renderTodo(); } }
    function atu(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }

    function upload(pasta, inputId) {
        const file = document.getElementById(inputId).files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const m = document.getElementById('selMes').value;
            if(!db[pasta][m]) db[pasta][m] = [];
            db[pasta][m].push({ nome: file.name, data: e.target.result, tipo: file.type });
            save(); renderTodo();
        };
        reader.readAsDataURL(file);
    }

    function renderGrid(m, pasta, gridId) {
        const grid = document.getElementById(gridId); grid.innerHTML = "";
        if(!db[pasta][m]) return;
        db[pasta][m].forEach(arq => {
            const card = document.createElement('div');
            card.className = 'thumb-card';
            let icon = arq.tipo.includes('image') ? `<img src="${arq.data}">` : `<div class="icon">${arq.tipo.includes('pdf')?'📄':(arq.tipo.includes('video')?'🎬':'🎵')}</div>`;
            card.innerHTML = `${icon}<div class="label">${arq.nome}</div>`;
            card.onclick = () => abrirViewer(arq);
            grid.appendChild(card);
        });
    }

    function abrirViewer(arq) {
        const content = document.getElementById('viewerContent'); content.innerHTML = "";
        if(arq.tipo.includes('image')) content.innerHTML = `<img src="${arq.data}">`;
        else if(arq.tipo.includes('video')) content.innerHTML = `<video controls src="${arq.data}" style="width:80%"></video>`;
        else if(arq.tipo.includes('audio')) content.innerHTML = `<h3 style="color:white">${arq.nome}</h3><audio controls src="${arq.data}"></audio>`;
        else content.innerHTML = `<embed src="${arq.data}">`;

        const btn = document.createElement('a');
        btn.href = arq.data; btn.download = arq.nome;
        btn.className = "btn-min"; btn.style = "width:200px; background:var(--green); color:white; text-decoration:none;";
        btn.innerText = "⬇️ BAIXAR ARQUIVO";
        content.appendChild(btn);
        
        document.getElementById('zoomOverlay').style.display = 'flex';
    }

    function renderAdminLists(m) {
        const dL = document.getElementById('admListDocs'); dL.innerHTML = "";
        const mL = document.getElementById('admListMus'); mL.innerHTML = "";
        if(db.docs[m]) db.docs[m].forEach((item, i) => dL.innerHTML += `<div style="font-size:0.7rem;">${item.nome} <button onclick="db.docs[${m}].splice(${i},1);save();renderTodo();">X</button></div>`);
        if(db.musicas[m]) db.musicas[m].forEach((item, i) => mL.innerHTML += `<div style="font-size:0.7rem;">${item.nome} <button onclick="db.musicas[${m}].splice(${i},1);save();renderTodo();">X</button></div>`);
        
        const listM = document.getElementById('listaMinisterios'); listM.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            listM.innerHTML += `<button class="btn-min ${selMin===k?'active':''}" style="width:auto; padding:5px 10px;" onclick="selMin='${k}'; renderTodo();">${MINS[k]}</button>`;
        });
        listM.innerHTML += `<button class="btn-min" style="width:auto; border-color:red; color:red; padding:5px 10px;" onclick="selMin=null; renderTodo();">LIMPAR</button>`;
    }

    function abrirPop(id) { document.getElementById(id).style.display = 'flex'; }
    function login() { const u = document.getElementById('uL').value.toLowerCase(), p = document.getElementById('pL').value; if(db.senhas[u]===p){ localStorage.setItem('iasd_user', u); location.reload(); } else alert("Erro!"); }
    function sair() { localStorage.removeItem('iasd_user'); location.reload(); }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script>
</body>
</html>
