<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva - v110</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 8px; margin-bottom: 15px; border-bottom: 2px solid var(--blue); gap: 10px; flex-wrap: wrap; }
        
        /* Painel Admin Organizado */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; position: relative; }

        /* Tabela Limpa */
        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; color: #000; }
        th { background: #f1f5f9; padding: 12px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 11px; text-transform: uppercase; }
        td { border: 1px solid #cbd5e1; padding: 0; text-align: center; height: 50px; font-weight: bold; }
        
        /* Cores das Linhas */
        .row-pessoal { background: #e0f2fe !important; }
        .row-mordomia { background: #fef3c7 !important; }
        .row-saude { background: #f0fdf4 !important; }
        .row-musica { background: #fff1f2 !important; }
        .row-jovens { background: #ede9fe !important; }
        .row-infantis { background: #fef2f2 !important; }
        .row-evento-fixo { background: #ffd700 !important; border-left: 10px solid #b8860b !important; }

        input { width: 100%; height: 100%; border: none; background: transparent; text-align: center; font-weight: bold; text-transform: uppercase; }
        .input-dark { background: #1a1a1a !important; color: #fff !important; border: 1px solid #444; padding: 10px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }

        /* Botões */
        .btn { padding: 12px; border-radius: 6px; cursor: pointer; font-weight: bold; border: 1px solid var(--neon); background: none; color: var(--neon); text-transform: uppercase; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: var(--blue); }
        .btn-larga { width: 100%; margin-bottom: 8px; }

        /* Modal / Popups */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; padding: 20px; }
        .pop-content { background: var(--bg); border: 2px solid var(--orange); padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 0 30px rgba(255,127,80,0.3); }

        .chart-container { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; margin-top: 20px; height: 350px; border: 1px solid var(--blue); }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" class="input-dark" style="width:140px; margin:0;" onchange="renderTodo()"></select>
            <button id="btnAdmin" class="btn" style="display:none;" onclick="toggleAdmin()">⚙️ ADMIN</button>
            <button id="btnLogin" class="btn" onclick="abrirPop('modalLogin')">🔓 LOGIN</button>
            <button id="btnSair" class="btn" style="display:none; border-color:red; color:red;" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>1. PINCEL DE DIA</h4>
                <div id="botoesMinisterio"></div>
                <button class="btn btn-larga" style="border-color:red; color:red;" onclick="window.minSelecionado=null; renderTodo();">✖ LIMPAR PINCEL</button>
            </div>
            
            <div class="admin-section">
                <h4>2. EVENTOS ESPECIAIS</h4>
                <p style="font-size:12px; color:#aaa;">Use para Semanas de Oração ou datas comemorativas.</p>
                <button class="btn btn-larga" style="background:var(--orange); color:white; border:none;" onclick="abrirPop('popNovoEvento')">➕ NOVO EVENTO ESPECIAL</button>
                <button class="btn btn-larga" style="border-color:var(--green); color:var(--green);" onclick="abrirPop('popTesouraria')">💰 TESOURARIA</button>
                <button class="btn btn-larga" style="border-color:var(--gold); color:var(--gold);" onclick="abrirPop('popMissionario')">📊 DADOS MISSIONÁRIOS</button>
            </div>

            <div class="admin-section">
                <h4>3. CONFIGURAÇÕES</h4>
                <div id="configAnciaos" style="height:100px; overflow-y:auto; border:1px solid #334; padding:5px; margin-bottom:10px;"></div>
                <table style="width:100%; color:white; font-size:11px;"><tbody id="corpoSenhas"></tbody></table>
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th colspan="9" id="titEscala" style="background:var(--blue); color:white; font-size:22px; text-align:left; padding:15px;">ESCALA</th></tr>
                <tr><th colspan="9" id="anciaoMes" style="background:var(--blue); color:var(--gold); text-align:left; padding:0 15px 15px 15px;">---</th></tr>
                <tr><th width="90">DIA</th><th width="90">DATA</th><th>SABATINA / EVENTO</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div class="chart-container"><canvas id="graficoMissionario"></canvas></div>
</div>

<div id="popNovoEvento" class="overlay" onclick="fecharPops()">
    <div class="pop-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--orange); margin-top:0;">CRIAR EVENTO / SEMANA</h3>
        <label style="font-size:12px;">NOME DO EVENTO:</label>
        <input type="text" id="evNome" class="input-dark" placeholder="Ex: SEMANA DE ORAÇÃO">
        
        <label style="font-size:12px;">MINISTÉRIO ORGANIZADOR:</label>
        <select id="evMin" class="input-dark"></select>
        
        <div style="display:flex; gap:10px;">
            <div><label style="font-size:12px;">DIA INÍCIO:</label><input type="number" id="evIni" class="input-dark" placeholder="1"></div>
            <div><label style="font-size:12px;">DIA FIM:</label><input type="number" id="evFim" class="input-dark" placeholder="7"></div>
        </div>
        
        <button class="btn btn-larga" style="background:var(--green); color:white; border:none; margin-top:10px;" onclick="salvarEventoEspecial()">CRIAR NA ESCALA</button>
        <button class="btn btn-larga" style="border-color:red; color:red;" onclick="fecharPops()">CANCELAR</button>
    </div>
</div>

<div id="popTesouraria" class="overlay" onclick="fecharPops()"><div class="pop-content" style="max-width:600px;" onclick="event.stopPropagation()"><h3 style="color:var(--green)">TESOURARIA</h3><input type="file" id="fileInput" class="input-dark" onchange="uploadFile()"><div id="listaThumbs" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px;"></div></div></div>
<div id="popMissionario" class="overlay" onclick="fecharPops()"><div class="pop-content" onclick="event.stopPropagation()"><h3 style="color:var(--orange)">DADOS MISSIONÁRIOS</h3><div id="inputsMissionarios"></div></div></div>
<div id="modalLogin" class="overlay" onclick="fecharPops()"><div class="pop-content" style="background:white;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="color:#000!important;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="color:#000!important;"><button class="btn btn-larga" style="background:var(--blue); color:white;" onclick="login()">ENTRAR</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { 
        pessoal: { n: "M. Pessoal", c: "pessoal" }, 
        mordomia: { n: "Mordomia", c: "mordomia" }, 
        saude: { n: "Saúde", c: "saude" }, 
        musica: { n: "Música", c: "musica" },
        jovens: { n: "Jovens", c: "jovens" },
        infantis: { n: "Infantis", c: "infantis" }
    };
    
    let db = { anciaos: {}, escalas: {}, regras_manuais: {}, eventos: {}, mis_v3: {}, docs: {}, senhas: { admin: "iasd118" } };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let myChart = null;

    dbCloud.collection('dados').doc('estrela_v110').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); } else { save(); }
    });

    function save() { dbCloud.collection('dados').doc('estrela_v110').set(db); }

    function renderTodo() {
        const m = document.getElementById('selMes').value || new Date().getMonth();
        const isAdm = (curUser === 'admin');
        
        document.getElementById('btnAdmin').style.display = isAdm ? 'block' : 'none';
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnLogin').style.display = curUser === 'visitante' ? 'block' : 'none';
        
        document.getElementById('titEscala').innerText = `ESCALA - ${MESES[m]} 2026`;
        document.getElementById('anciaoMes').innerText = `Ancião Responsável: ${db.anciaos[m] || 'A definir'}`;
        
        renderEscala(m);
        renderAdmin();
        updateChart(m);
    }

    function renderEscala(m) {
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const diasMes = new Date(2026, parseInt(m) + 1, 0).getDate();
        
        for(let d=1; d<=diasMes; d++) {
            let dStr = `${d}/${parseInt(m)+1}`;
            let dt = new Date(2026, m, d);
            let sem = dt.getDay();
            let regraMin = db.regras_manuais[dStr] || "";
            let evento = db.eventos?.[dStr] || null;

            if([0,3,6].includes(sem) || regraMin || evento) {
                let tr = document.createElement('tr');
                tr.className = evento ? `row-${evento.min}` : (regraMin ? `row-${regraMin}` : "");
                tr.onclick = () => { if(curUser==='admin') { db.regras_manuais[dStr] = window.minSelecionado; save(); } };
                
                let celSabatina = evento ? `<div style="color:red; font-size:12px;">${evento.nome}</div><div style="font-size:10px;">${MINS[evento.min].n}</div>` : `<input value="${db.escalas[dStr]?.sa || ''}" onchange="atuCel('${dStr}','sa',this.value)">`;

                let html = `<td>${["DOMINGO","SEG","TER","QUA","QUI","SEX","SÁBADO"][sem]}</td><td>${dStr}</td><td>${celSabatina}</td>`;
                ['pr','mu','lo','so','re','di'].forEach(col => {
                    let pode = (curUser==='admin' || (curUser===regraMin && col==='pr'));
                    html += `<td><input ${pode?'':'disabled'} value="${db.escalas[dStr]?.[col] || ''}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`;
                });
                tr.innerHTML = html; corpo.appendChild(tr);
            }
        }
    }

    function salvarEventoEspecial() {
        const m = document.getElementById('selMes').value;
        const nome = document.getElementById('evNome').value.toUpperCase();
        const min = document.getElementById('evMin').value;
        const ini = parseInt(document.getElementById('evIni').value);
        const fim = parseInt(document.getElementById('evFim').value);

        if(!nome || !ini || !fim) return alert("Preencha todos os campos!");
        if(!db.eventos) db.eventos = {};

        for(let d=ini; d<=fim; d++) {
            db.eventos[`${d}/${parseInt(m)+1}`] = { nome: nome, min: min };
        }
        save(); fecharPops(); alert("Evento Criado!");
    }

    function renderAdmin() {
        const btnDiv = document.getElementById('botoesMinisterio'); btnDiv.innerHTML = "";
        const selMin = document.getElementById('evMin'); selMin.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            btnDiv.innerHTML += `<button class="btn btn-larga ${window.minSelecionado===k?'active':''}" onclick="window.minSelecionado='${k}'; renderTodo();">${MINS[k].n}</button>`;
            selMin.innerHTML += `<option value="${k}">${MINS[k].n}</option>`;
        });
        const ancDiv = document.getElementById('configAnciaos'); ancDiv.innerHTML = "";
        MESES.forEach((mes, i) => {
            ancDiv.innerHTML += `<div style="display:flex; margin-bottom:4px;"><small style="width:70px;">${mes}:</small><input class="input-dark" style="margin:0; height:22px; font-size:10px;" value="${db.anciaos[i] || ''}" onchange="db.anciaos[${i}]=this.value.toUpperCase(); save();"></div>`;
        });
        const senDiv = document.getElementById('corpoSenhas'); senDiv.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            senDiv.innerHTML += `<tr><td>${MINS[k].n}</td><td><input class="input-dark" style="height:22px; margin:0;" value="${db.senhas[k] || ''}" onchange="db.senhas['${k}']=this.value; save();"></td></tr>`;
        });
    }

    function updateChart(m) {
        const ctx = document.getElementById('graficoMissionario').getContext('2d');
        if(myChart) myChart.destroy();
        myChart = new Chart(ctx, { type: 'bar', data: { labels: ['ENC', 'CLA', 'EST', 'MIN', 'DUP'], datasets: [{ data: db.mis_v3?.[m] || [0,0,0,0,0], backgroundColor: ['#00d2ff','#ffd700','#ff7f50','#2ecc71','#ff4757'] }] }, options: { responsive:true, maintainAspectRatio:false } });
    }

    function abrirPop(id) { document.getElementById(id).style.display = 'flex'; }
    function fecharPops() { document.querySelectorAll('.overlay').forEach(p => p.style.display = 'none'); }
    function toggleAdmin() { const a = document.getElementById('adminPanel'); a.style.display = a.style.display==='block'?'none':'block'; }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function login() { const u = document.getElementById('userLogin').value.toLowerCase().trim(), p = document.getElementById('passLogin').value; if(db.senhas[u] === p || (u==='admin' && p==='iasd118')) { localStorage.setItem('iasd_curUser', u); location.reload(); } else alert("Senha Errada!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function uploadFile() { /* ... Lógica anterior de upload ... */ }

    const sM = document.getElementById('selMes'); 
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
