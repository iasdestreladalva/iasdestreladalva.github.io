<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>IASD Estrela Dalva - v102.47</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; --red: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #e6f1ff; font-family: sans-serif; padding: 10px; overflow-x: hidden; }
        .container { width: 100%; max-width: 1400px; margin: auto; }

        /* HEADER */
        .header-top { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .input-dark { background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 8px; font-size: 14px; }

        /* PAINEL ADMIN */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .admin-sec { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 8px; }

        /* TABELA */
        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 10px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; color: black; }
        th { background: var(--blue); color: white; padding: 10px; font-size: 11px; border: 1px solid #ccc; }
        td { border: 1px solid #ddd; height: 45px; text-align: center; font-weight: bold; }
        .input-escala { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; font-size: 13px; }

        /* CORES */
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; } .row-familia { background-color: #faf5ff !important; }
        .row-homens { background-color: #ecfeff !important; } .row-adolescentes { background-color: #f8fafc !important; }
        .row-mulher { background-color: #fdf2f8 !important; }

        /* MURAL TESOURARIA */
        .mural-section { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid var(--green); margin-top: 20px; }
        .grid-mural { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 15px; }
        .thumb-card { position: relative; aspect-ratio: 1/1; background: #000; border-radius: 10px; border: 2px solid #334155; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .thumb-card img { width: 100%; height: 100%; object-fit: cover; }
        
        /* POPUPS */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; padding: 10px; cursor: pointer; }
        .pop-content { background: var(--bg); border: 2px solid var(--orange); padding: 20px; border-radius: 15px; width: 100%; max-width: 450px; cursor: default; }
        .btn-min { padding: 10px; border: 1px solid var(--neon); color: var(--neon); background: transparent; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 5px; }
        .btn-min.active { background: var(--neon); color: var(--blue); }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <h2 style="color:var(--neon)">IASD ESTRELA DALVA</h2>
        <div class="nav-buttons">
            <select id="selMes" onchange="renderTodo();" class="input-dark"></select>
            <button class="input-dark" id="btnMissionario" onclick="abrirPopMissionario()" style="display:none; color:var(--orange)">📊 DADOS</button>
            <button class="input-dark" id="btnUpload" onclick="dispararUpload()" style="display:none; color:var(--green)">➕ TESOURARIA</button>
            <button class="input-dark" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓</button>
            <button class="input-dark" id="btnSair" onclick="sair()" style="display:none; color:red">🚪</button>
        </div>
    </header>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-sec">
                <h4 style="color:var(--gold)">👤 ANCIÃOS DO ANO</h4>
                <div id="listaAnciaos" style="max-height: 150px; overflow-y: auto; margin-top:10px;"></div>
            </div>
            <div class="admin-sec">
                <h4 style="color:var(--neon)">🎨 PINTAR ESCALA</h4>
                <div id="gridCores" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px; margin-top:10px;"></div>
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th colspan="9" id="headerTitulo" style="font-size:18px; padding:10px;">ESCALA</th></tr>
                <tr><th colspan="9" id="headerAnciao" style="color:var(--gold); border-top:none;">Responsável: </th></tr>
                <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div class="mural-section">
        <h3 style="color:var(--green)">💰 COMPROVANTES - <span id="labelMes"></span></h3>
        <div id="gridMural" class="grid-mural"></div>
    </div>
</div>

<div id="popMiss" class="overlay" onclick="this.style.display='none'">
    <div class="pop-content" onclick="event.stopPropagation()">
        <h3 style="color:var(--orange); margin-bottom:15px">DADOS MISSIONÁRIOS</h3>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px" id="camposMiss">
            </div>
        <canvas id="chartMiss" style="margin-top:20px; max-height:200px;"></canvas>
    </div>
</div>

<div id="lightbox" class="overlay" onclick="this.style.display='none'"><div id="lbContent"></div></div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'">
    <div class="pop-content" style="max-width:300px" onclick="event.stopPropagation()">
        <h2 style="color:white; text-align:center; margin-bottom:20px">LOGIN</h2>
        <input type="text" id="u" placeholder="Usuário" class="input-dark" style="width:100%; margin-bottom:10px">
        <input type="password" id="p" placeholder="Senha" class="input-dark" style="width:100%">
        <button class="btn-min" style="background:var(--neon); color:var(--blue); margin-top:20px" onclick="login()">ENTRAR</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com/", projectId: "unidades-de-acao", appId: "SUA_APP_ID" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const ANCIÃOS_AUTO = { 0:"Jesuino", 1:"Wesley", 2:"Ester", 3:"Marcilio", 4:"Albert", 5:"Albert", 6:"Jesuino", 7:"Jesuino", 8:"Ester", 9:"Marcilio", 10:"Wesley", 11:"Albert" };
    const MINS = { pessoal:"Pessoal", mordomia:"Mordomia", saude:"Saúde", familia:"Família", homens:"Homens", adolescentes:"Adol.", mulher:"Mulher" };
    const CAMPOS = { almas:"Batismos", estudos:"Estudos", visitas:"Visitas", duplas:"Duplas" };

    let db = { escalas:{}, anciaos_manual:{}, docs:{}, missionario:{}, regras_manuais:{}, senhas:{admin:"iasd118"} };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let corAtiva = null;

    database.ref('dados_igreja').on('value', (snap) => { if(snap.val()) { db = snap.val(); renderTodo(); } });

    function renderTodo() {
        const m = document.getElementById('selMes').value;
        const u = curUser;

        document.getElementById('btnSair').style.display = u !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = u === 'visitante' ? 'block' : 'none';
        document.getElementById('btnUpload').style.display = (u === 'admin' || u === 'ger') ? 'block' : 'none';
        document.getElementById('btnMissionario').style.display = (u === 'admin' || u === 'pessoal') ? 'block' : 'none';
        document.getElementById('adminPanel').style.display = (u === 'admin') ? 'block' : 'none';

        document.getElementById('headerAnciao').innerText = "Responsável: Ancião " + (db.anciaos_manual?.[m] || ANCIÃOS_AUTO[m]);
        document.getElementById('headerTitulo').innerText = "ESCALA - " + MESES[m] + " 2026";
        document.getElementById('labelMes').innerText = MESES[m];

        renderEscala();
        renderMural();
        if(u === 'admin') renderAdmin();
    }

    function renderEscala() {
        const mIdx = parseInt(document.getElementById('selMes').value);
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, mIdx, d); let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}/${mIdx+1}/2026`;
                let cor = db.regras_manuais?.[dStr] ? "row-"+db.regras_manuais[dStr] : getCorAuto(d, sem);
                let tr = `<tr class="${cor}" onclick="pintarDia('${dStr}')">
                    <td style="font-size:10px">${["DOM","","","QUA","","","SÁB"][sem]}</td>
                    <td>${d}/${mIdx+1}</td>`;
                ["sa","pr","mu","lo","so","re","di"].forEach(c => {
                    let val = db.escalas?.[dStr]?.[c] || "";
                    let edit = (curUser==='admin' || curUser===c);
                    tr += `<td><input class="input-escala" ${!edit?'readonly':''} value="${val}" onchange="atuCel('${dStr}','${c}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function getCorAuto(d, sem) {
        if(sem === 6) { let sab = Math.ceil(d/7); if(sab===1) return "row-pessoal"; if(sab===2) return "row-mordomia"; }
        if(sem === 0) { let dom = Math.ceil(d/7); if(dom===1) return "row-saude"; if(dom===3) return "row-familia"; }
        if(sem === 3) { let qua = Math.ceil(d/7); if(qua===2) return "row-homens"; if(qua===3) return "row-adolescentes"; }
        return "";
    }

    function renderMural() {
        const m = document.getElementById('selMes').value;
        const grid = document.getElementById('gridMural'); grid.innerHTML = "";
        (db.docs?.[m] || []).forEach((f, i) => {
            grid.innerHTML += `<div class="thumb-card" onclick="abrirLB('${f.data}','${f.type}')">
                ${f.type.includes('pdf') ? '<b>PDF</b>' : `<img src="${f.data}">`}
                ${curUser==='admin' ? `<button onclick="removerDoc(${i},event)" style="position:absolute;top:2px;right:2px;background:red;color:white;border:none;border-radius:50%;width:20px;height:20px">×</button>` : ''}
            </div>`;
        });
    }

    function abrirLB(d, t) {
        document.getElementById('lightbox').style.display='flex';
        document.getElementById('lbContent').innerHTML = t.includes('pdf') ? `<iframe src="${d}" style="width:90vw;height:80vh"></iframe>` : `<img src="${d}" style="max-width:95%;max-height:95%">`;
    }

    function dispararUpload() {
        const inp = document.createElement('input'); inp.type='file'; inp.accept='image/*,application/pdf';
        inp.onchange = e => {
            const f = e.target.files[0]; const reader = new FileReader();
            reader.onload = ev => {
                const m = document.getElementById('selMes').value;
                if(!db.docs) db.docs={}; if(!db.docs[m]) db.docs[m]=[];
                db.docs[m].push({data: ev.target.result, type: f.type}); save();
            }; reader.readAsDataURL(f);
        }; inp.click();
    }

    function abrirPopMissionario() {
        document.getElementById('popMiss').style.display='flex';
        const m = document.getElementById('selMes').value;
        const area = document.getElementById('camposMiss'); area.innerHTML = "";
        Object.keys(CAMPOS).forEach(k => {
            let val = db.missionario?.[m]?.[k] || 0;
            area.innerHTML += `<div><label style="font-size:12px">${CAMPOS[k]}</label><input type="number" class="input-dark" style="width:100%" value="${val}" onchange="atuMiss('${k}',this.value)"></div>`;
        });
        renderGrafico();
    }

    function atuMiss(k, v) {
        const m = document.getElementById('selMes').value;
        if(!db.missionario) db.missionario={}; if(!db.missionario[m]) db.missionario[m]={};
        db.missionario[m][k] = parseInt(v); save(); renderGrafico();
    }

    function renderGrafico() {
        const m = document.getElementById('selMes').value;
        const ctx = document.getElementById('chartMiss').getContext('2d');
        if(window.myChart) window.myChart.destroy();
        const dados = Object.keys(CAMPOS).map(k => db.missionario?.[m]?.[k] || 0);
        window.myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: Object.values(CAMPOS), datasets: [{ label: 'Mês Atual', data: dados, backgroundColor: '#00d2ff' }] },
            options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
        });
    }

    function renderAdmin() {
        const aArea = document.getElementById('listaAnciaos'); aArea.innerHTML = "";
        MESES.forEach((mes, i) => {
            aArea.innerHTML += `<div style="display:flex;gap:5px;margin-bottom:5px"><small style="width:60px">${mes}:</small><input class="input-dark" style="flex:1;padding:2px" value="${db.anciaos_manual?.[i]||''}" placeholder="${ANCIÃOS_AUTO[i]}" onchange="atuAnciao(${i},this.value)"></div>`;
        });
        const cArea = document.getElementById('gridCores'); cArea.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            cArea.innerHTML += `<button class="btn-min ${corAtiva===k?'active':''}" onclick="corAtiva='${k}'; renderAdmin()">${MINS[k]}</button>`;
        });
    }

    function pintarDia(d) { if(corAtiva && curUser==='admin') { if(!db.regras_manuais) db.regras_manuais={}; db.regras_manuais[d]=corAtiva; save(); } }
    function atuAnciao(m,v) { if(!db.anciaos_manual) db.anciaos_manual={}; db.anciaos_manual[m]=v; save(); }
    function atuCel(d,c,v) { if(!db.escalas) db.escalas={}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function removerDoc(i,e) { e.stopPropagation(); const m = document.getElementById('selMes').value; db.docs[m].splice(i,1); save(); }
    function save() { database.ref('dados_igreja').set(db); }
    function login() { const user = document.getElementById('u').value, pass = document.getElementById('p').value; if(db.senhas[user] === pass) { localStorage.setItem('iasd_curUser', user); location.reload(); } else alert("Erro!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script>
</body>
</html>
