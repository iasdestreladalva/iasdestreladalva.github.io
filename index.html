<!DOCTYPE html> <html lang="pt-br"> <head>    <meta charset="UTF-8">    <title>IASD Estrela Dalva - GESTÃO TOTAL</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1450px; margin: auto; }
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 220px 1fr 2.5fr; gap: 20px; }
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .admin-section h4 { color: var(--neon); font-size: 0.75rem; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; text-transform: uppercase; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 10px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; border-color: var(--neon) !important; }
        
        .row-pessoal { background-color: #e0f2fe !important; } .row-mordomia { background-color: #fef3c7 !important; }
        .row-saude { background-color: #f0fdf4 !important; } .row-homens { background-color: #ecfeff !important; }
        .row-familia { background-color: #faf5ff !important; } .row-adolescentes { background-color: #f8fafc !important; }
        .row-mulher { background-color: #fdf2f8 !important; } .row-musica { background-color: #fff1f2 !important; }
        .row-especial { background-color: #fff4e6 !important; border-left: 5px solid var(--red) !important; }

        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 55px; }
        .input-cell { width: 100%; height: 100%; border: none; text-align: center; background: transparent; font-weight: bold; }

        .tesouraria-display, .chart-container { margin-top: 20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--orange); }
        .grid-arquivos { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 15px; }
        .thumb-doc { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; cursor: pointer; border: 2px solid #334155; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 85vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }
    </style> </head> <body>

<div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="input-dark" style="width:auto; padding:0 15px; color:var(--neon);" onclick="gerarPDF()">📥 PDF</button>
            <button class="input-dark" style="width:auto; padding:0 15px; color:var(--gold);" onclick="abrirCalendarioAnual()">📅 ANUAL</button>
            <button id="btnTesourariaAdmin" class="input-dark" style="display:none; color:var(--green);" onclick="abrirTesourariaAdmin()">⚙️ TESOURARIA</button>
            <button id="btnDados" class="input-dark" style="display:none; color:var(--orange);" onclick="abrirPop()">📊 MISSIONÁRIO</button>
            <button class="input-dark" style="color:var(--neon);" id="btnAcesso" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" style="color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>1. PINTAR ESCALA</h4>
                <div id="listaMinisterios"></div>
                <button class="btn-min" style="border-color:red; color:red; text-align:center;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR SELEÇÃO</button>
            </div>
            <div class="admin-section"><h4>2. RESPONSÁVEIS</h4><div id="gridMeses" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"></div></div>
            <div class="admin-section">
                <h4>3. GESTÃO DE ACESSOS (SENHAS)</h4>
                <div style="max-height: 250px; overflow-y: auto;">
                    <table style="width:100%; border-collapse:collapse; font-size:0.75rem;">
                        <thead><tr style="color:var(--gold); text-align:left;"><th>LOGIN</th><th>SENHA</th><th>AÇÃO</th></tr></thead>
                        <tbody id="corpoCreds"></tbody>
                    </table>
                </div>
                <button onclick="addNovoUsuario()" style="width:100%; margin-top:10px; background:var(--green); color:black; border:none; padding:8px; border-radius:4px; font-weight:bold; cursor:pointer;">+ NOVO ACESSO</button>
            </div>
        </div>
    </div>

    <div id="area-pdf">
        <table id="tabela-main">
            <thead>
                <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;" id="headerTitulo">ESCALA</th></tr>
                <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1rem; padding:0 12px 12px 12px; text-align:left;" id="headerAnciao">Responsável: </th></tr>
                <tr><th style="width:150px">DIA</th><th style="width:60px">DATA</th><th>ESCOLA SABATINA</th><th>PREGADOR</th><th>MÚSICA ESPECIAL</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div class="chart-container"><h3 style="color:var(--orange);">📊 MISSIONÁRIO</h3><div style="height: 300px;"><canvas id="missionaryChart"></canvas></div></div>
    <div class="tesouraria-display"><h3>💰 COMPROVANTES - <span id="mesTesouraria"></span></h3><div id="gridArquivosPublicos" class="grid-arquivos"></div></div>
</div>

<div id="popOverlay" class="overlay"><div class="pop-content"><h3>DADOS MISSIONÁRIOS</h3><div id="camposMissionarios"></div><button onclick="fecharPop()" class="btn-fechar">SALVAR</button></div></div>
<div id="popCalendario" class="overlay"><div class="pop-content" style="max-width:800px;"><h3>📅 PLANEJAMENTO ANUAL</h3><div id="listaEventosAnuais" style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;"></div><button onclick="document.getElementById('popCalendario').style.display='none'" class="btn-fechar">FECHAR</button></div></div>
<div id="popTesouraria" class="overlay"><div class="pop-content"><h3>TESOURARIA</h3><input type="file" id="fileInput" onchange="uploadArquivo()" style="display:none"><button onclick="document.getElementById('fileInput').click()" class="btn-min" style="text-align:center">UPLOAD</button><div id="listaAdminArquivos"></div><button onclick="document.getElementById('popTesouraria').style.display='none'" class="btn-fechar">FECHAR</button></div></div>
<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;"><button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik",
        authDomain: "unidades-de-acao.firebaseapp.com",
        databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com",
        projectId: "unidades-de-acao",
        storageBucket: "unidades-de-acao.firebasestorage.app",
        messagingSenderId: "1088355029870",
        appId: "1:1088355029870:web:7bb98d3115e7b7767f677f"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS_MAP = { admin: "Admin", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "Mulher", sabatina: "Sabatina", pessoal: "Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "Homens", familia: "Família", adolescentes: "Adolescentes", especial: "Especial" };
    const REGRAS = { pessoal: "1S", mordomia: "2S", saude: "1D", homens: "2Q", familia: "3D", adolescentes: "3Q", mulher: "UQ" };
    
    let db = {};
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let missionChart;
    window.minSelecionado = null;

    database.ref('iasd_v102').on('value', (snapshot) => {
        const val = snapshot.val();
        if (val) { db = val; renderTodo(); }
    });

    function save() { database.ref('iasd_v102').set(db); }

    function renderTodo() {
        const m = document.getElementById('selMes').value || new Date().getMonth();
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = curUser === 'visitante' ? 'block' : 'none';
        document.getElementById('btnTesourariaAdmin').style.display = (curUser === 'admin' || curUser === 'ger') ? 'block' : 'none';
        document.getElementById('btnDados').style.display = (curUser === 'admin' || curUser === 'pessoal') ? 'block' : 'none';
        document.getElementById('adminPanel').style.display = curUser === 'admin' ? 'block' : 'none';
        document.getElementById('headerAnciao').innerText = "Responsável: Ancião " + (db.anciaos[m] || "");
        document.getElementById('headerTitulo').innerText = "ESCALA - " + MESES[m] + " 2026";
        document.getElementById('mesTesouraria').innerText = MESES[m];
        renderEscala();
        renderGrafico();
        renderArquivosPublicos();
        if(curUser === 'admin') renderAdmin();
    }

    function renderEscala() {
        const mIdx = parseInt(document.getElementById('selMes').value);
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, mIdx + 1, 0).getDate();
        let cS=0, cD=0, cQ=0;
        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, mIdx, d); let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                if(sem===6) cS++; if(sem===0) cD++; if(sem===3) cQ++;
                let dStr = `${d}/${mIdx+1}/2026`;
                let cor = db.regras_manuais?.[dStr] ? "row-"+db.regras_manuais[dStr] : "";
                if(!cor) {
                    Object.keys(REGRAS).forEach(k => {
                        let r = REGRAS[k];
                        if((r==="1S" && sem===6 && cS===1) || (r==="2S" && sem===6 && cS===2) ||
                           (r==="1D" && sem===0 && cD===1) || (r==="2Q" && sem===3 && cQ===2) ||
                           (r==="UQ" && sem===3 && d > dias-7)) cor = "row-"+k;
                    });
                }
                let tr = `<tr class="${cor}" onclick="cliqueDia('${dStr}')"><td>${["DOMINGO","","","QUARTA","","","SÁBADO"][sem]}</td><td>${d}/${mIdx+1}</td>`;
                ["sa","pr","mu","lo","so","re","di"].forEach(c => {
                    let val = db.escalas?.[dStr]?.[c] || "";
                    let edit = (curUser==='admin' || curUser===c);
                    tr += `<td><input class="input-cell" ${!edit?'readonly':''} value="${val}" onchange="atuCel('${dStr}','${c}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function cliqueDia(dStr) { if(curUser==='admin' && window.minSelecionado) { if(!db.regras_manuais) db.regras_manuais={}; db.regras_manuais[dStr]=window.minSelecionado; save(); } }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }

    function renderAdmin() {
        // Painel 1: MINISTÉRIOS QUE PINTAM (Filtro aplicado)
        const lm = document.getElementById('listaMinisterios'); lm.innerHTML = "";
        const excluirPintura = ['admin', 'ger', 'diaconato', 'sonoplastia', 'especial', 'musica'];
        Object.keys(MINS_MAP).forEach(k => { 
            if(!excluirPintura.includes(k)) {
                lm.innerHTML += `<button class="btn-min ${window.minSelecionado===k?'active':''}" onclick="window.minSelecionado='${k}'; renderAdmin();">${MINS_MAP[k]}</button>`; 
            }
        });

        // Painel 2: Anciãos
        const mGrid = document.getElementById('gridMeses'); mGrid.innerHTML = "";
        MESES.forEach((m, i) => { mGrid.innerHTML += `<div><small>${m}</small><input class="input-dark" value="${db.anciaos[i] || ''}" onchange="db.anciaos[${i}]=this.value; save();"></div>`; });

        // Painel 3: Gestão de Acessos
        const corpo = document.getElementById('corpoCreds'); corpo.innerHTML = "";
        Object.keys(db.senhas).forEach(user => {
            corpo.innerHTML += `<tr>
                <td><input class="input-dark" style="padding:2px;" value="${user}" onchange="renomearUsuario('${user}', this.value)"></td>
                <td><input class="input-dark" style="padding:2px;" value="${db.senhas[user]}" onchange="db.senhas['${user}']=this.value; save();"></td>
                <td><button onclick="removerUsuario('${user}')" style="background:red; color:white; border:none; padding:4px; border-radius:3px; cursor:pointer;">DEL</button></td>
            </tr>`;
        });
    }

    function addNovoUsuario() { let n = prompt("Nome do login:"); if(n) { db.senhas[n.toLowerCase().trim()] = "123"; save(); } }
    function removerUsuario(u) { if(confirm("Remover "+u+"?")) { delete db.senhas[u]; save(); } }
    function renomearUsuario(v, n) { let newN = n.toLowerCase().trim(); if(newN && newN!==v) { db.senhas[newN]=db.senhas[v]; delete db.senhas[v]; save(); } }

    function gerarPDF() { html2pdf().from(document.getElementById('area-pdf')).set({margin:0.2, filename:'Escala.pdf', jsPDF:{orientation:'landscape'}}).save(); }
    function abrirCalendarioAnual() {
        const container = document.getElementById('listaEventosAnuais'); container.innerHTML = "";
        MESES.forEach((mes, idx) => { container.innerHTML += `<div class="admin-section"><h4>${mes}</h4><textarea class="input-dark" style="height:80px;" onchange="db.eventos_anuais[${idx}]=this.value; save();">${db.eventos_anuais?.[idx]||""}</textarea></div>`; });
        document.getElementById('popCalendario').style.display = 'flex';
    }
    function renderGrafico() {
        const m = document.getElementById('selMes').value; const ctx = document.getElementById('missionaryChart').getContext('2d');
        const d = db.mis_v3?.[m] || {almas:0, estudos:0, visitas:0, duplas:0};
        if(missionChart) missionChart.destroy();
        missionChart = new Chart(ctx, { type: 'bar', data: { labels: ['Batismos','Estudos','Visitas','Duplas'], datasets: [{label:'Total', data:[d.almas, d.estudos, d.visitas, d.duplas], backgroundColor:'#00d2ff'}] }, options: {maintainAspectRatio:false} });
    }
    function abrirPop() {
        const m = document.getElementById('selMes').value; const d = db.mis_v3?.[m] || {almas:0, estudos:0, visitas:0, duplas:0};
        document.getElementById('camposMissionarios').innerHTML = `Batismos: <input type="number" class="input-dark" value="${d.almas}" onchange="atuMis(${m},'almas',this.value)"> Estudos: <input type="number" class="input-dark" value="${d.estudos}" onchange="atuMis(${m},'estudos',this.value)"> Visitas: <input type="number" class="input-dark" value="${d.visitas}" onchange="atuMis(${m},'visitas',this.value)"> Duplas: <input type="number" class="input-dark" value="${d.duplas}" onchange="atuMis(${m},'duplas',this.value)">`;
        document.getElementById('popOverlay').style.display = 'flex';
    }
    function atuMis(m,k,v){ if(!db.mis_v3[m])db.mis_v3[m]={}; db.mis_v3[m][k]=parseInt(v); save(); }
    function fecharPop(){ document.getElementById('popOverlay').style.display='none'; renderTodo(); }
    function abrirTesourariaAdmin(){ renderAdminDocs(); document.getElementById('popTesouraria').style.display='flex'; }
    function renderAdminDocs(){ const m=document.getElementById('selMes').value; const lista=document.getElementById('listaAdminArquivos'); lista.innerHTML=""; (db.docs?.[m]||[]).forEach((doc,i)=>{ lista.innerHTML+=`<div style="display:flex; justify-content:space-between; padding:5px; background:#1e293b; margin:2px; font-size:0.7rem;">${doc.nome} <button onclick="db.docs[${m}].splice(${i},1); save(); renderAdminDocs();" style="color:red; background:none; border:none;">X</button></div>`; }); }
    function uploadArquivo(){ const file=document.getElementById('fileInput').files[0]; if(!file) return; const r=new FileReader(); r.onload=(e)=>{ const m=document.getElementById('selMes').value; if(!db.docs[m])db.docs[m]=[]; db.docs[m].push({nome:file.name, data:e.target.result}); save(); renderAdminDocs(); renderArquivosPublicos(); }; r.readAsDataURL(file); }
    function renderArquivosPublicos(){ const m=document.getElementById('selMes').value; const grid=document.getElementById('gridArquivosPublicos'); grid.innerHTML=""; (db.docs?.[m]||[]).forEach(doc=>{ grid.innerHTML+=`<img src="${doc.data}" class="thumb-doc" onclick="window.open(this.src)">`; }); }
    
    function login(){ 
        const u=document.getElementById('userLogin').value.toLowerCase().trim(), p=document.getElementById('passLogin').value; 
        if(db.senhas[u] === p){ localStorage.setItem('iasd_curUser',u); location.reload(); } else { alert("Erro!"); } 
    }
    function sair(){ localStorage.removeItem('iasd_curUser'); location.reload(); }
    const sM = document.getElementById('selMes'); MESES.forEach((m,i)=>sM.innerHTML+=`<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script> </body> </html>
