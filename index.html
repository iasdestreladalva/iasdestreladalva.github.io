<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>IASD Estrela Dalva - v102.45</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --green: #2ecc71; --red: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #e6f1ff; font-family: sans-serif; padding: 10px; overflow-x: hidden; }
        .container { width: 100%; max-width: 1400px; margin: auto; }

        /* HEADER */
        .header-top { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .nav-buttons { display: flex; flex-wrap: wrap; gap: 5px; }
        .input-dark { background: #000; color: #fff; border: 1px solid #444; padding: 10px; border-radius: 5px; font-size: 14px; }

        /* PAINEL ADMIN */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .admin-sec { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; }
        .btn-min { padding: 10px; border: 1px solid var(--neon); color: var(--neon); background: transparent; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; font-size: 11px; }
        .btn-min.active { background: var(--neon); color: var(--blue); }

        /* TABELA */
        .table-wrapper { width: 100%; overflow-x: auto; background: white; border-radius: 8px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; min-width: 850px; color: black; }
        th { background: var(--blue); color: white; padding: 10px; font-size: 11px; border: 1px solid #ccc; text-transform: uppercase; }
        td { border: 1px solid #ddd; height: 45px; text-align: center; font-weight: bold; cursor: pointer; }
        .input-escala { width: 100%; height: 100%; border: none; text-align: center; font-weight: bold; background: transparent; font-size: 13px; }

        /* CORES MINISTÉRIOS */
        .row-pessoal { background-color: #e0f2fe !important; } /* Azul claro */
        .row-mordomia { background-color: #fef3c7 !important; } /* Amarelo */
        .row-saude { background-color: #f0fdf4 !important; } /* Verde */
        .row-familia { background-color: #faf5ff !important; } /* Roxo */
        .row-homens { background-color: #ecfeff !important; } /* Ciano */
        .row-adolescentes { background-color: #f8fafc !important; } /* Cinza */
        .row-mulher { background-color: #fdf2f8 !important; } /* Rosa */

        /* MURAL TESOURARIA */
        .mural-tesouraria { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid var(--green); }
        .grid-mural { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; margin-top: 10px; }
        .thumb-card { position: relative; aspect-ratio: 1/1; background: #000; border: 1px solid #444; border-radius: 8px; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .thumb-card img { width: 100%; height: 100%; object-fit: cover; }

        /* LIGHTBOX */
        .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; cursor: pointer; }
        .lightbox img, .lightbox iframe { max-width: 90%; max-height: 90%; background: white; border-radius: 5px; }
    </style>
</head>
<body>

<div class="container">
    <header class="header-top">
        <h2 style="color:var(--neon)">IASD ESTRELA DALVA</h2>
        <div class="nav-buttons">
            <select id="selMes" onchange="renderTodo();" class="input-dark"></select>
            <button class="input-dark" id="btnUpload" onclick="dispararUpload()" style="display:none; color:var(--green);">+ COMPROVANTE</button>
            <button class="input-dark" onclick="document.getElementById('modalLogin').style.display='flex'" id="btnAcesso">🔓</button>
            <button class="input-dark" onclick="sair()" id="btnSair" style="display:none; color:red">🚪</button>
        </div>
    </header>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-sec">
                <h4 style="color:var(--gold); margin-bottom:10px;">👤 ANCIÃOS DO ANO</h4>
                <div id="listaAnciaos" style="max-height: 200px; overflow-y: auto;">
                    </div>
            </div>
            <div class="admin-sec">
                <h4 style="color:var(--neon); margin-bottom:10px;">🎨 CORES DA ESCALA</h4>
                <p style="font-size: 10px; margin-bottom: 5px;">Selecione abaixo e clique no dia na tabela:</p>
                <div id="gridMinisterios" style="display:grid; grid-template-columns: 1fr 1fr; gap:5px;"></div>
                <button class="btn-min" style="margin-top:10px; border-color:red; color:red;" onclick="limparRegras()">Limpar Cores Manuais</button>
            </div>
            <div class="admin-sec">
                <h4 style="color:var(--orange); margin-bottom:10px;">🔑 SENHAS</h4>
                <div id="verSenhas" style="font-size: 11px;"></div>
            </div>
        </div>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th colspan="9" id="headerTitulo" style="font-size:16px; padding:15px;">ESCALA</th></tr>
                <tr><th colspan="9" id="headerAnciao" style="color:var(--gold); border-top:none;">Responsável: </th></tr>
                <tr>
                    <th style="width:70px">DIA</th><th style="width:60px">DATA</th>
                    <th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th>
                </tr>
            </thead>
            <tbody id="corpoEscala"></tbody>
        </table>
    </div>

    <div class="mural-tesouraria">
        <h3 style="color:var(--green)">💰 COMPROVANTES - <span id="mesNome"></span></h3>
        <div id="gridMural" class="grid-mural"></div>
    </div>
</div>

<div id="lightbox" class="lightbox" onclick="this.style.display='none'"><div id="mediaBox"></div></div>
<div id="modalLogin" class="lightbox" onclick="this.style.display='none'">
    <div style="background:white; padding:25px; border-radius:10px; width:280px;" onclick="event.stopPropagation()">
        <input type="text" id="u" placeholder="Usuário" class="input-dark" style="color:black!important; width:100%; margin-bottom:10px">
        <input type="password" id="p" placeholder="Senha" class="input-dark" style="color:black!important; width:100%">
        <button class="btn-min" style="background:var(--blue); color:white; margin-top:15px;" onclick="login()">ENTRAR</button>
    </div>
</div>

<script>
    const firebaseConfig = { apiKey: "SUA_API_KEY", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com/", projectId: "unidades-de-acao", appId: "SUA_APP_ID" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const ANCIÃOS_AUTO = { 0:"Jesuino", 1:"Wesley", 2:"Ester", 3:"Marcilio", 4:"Albert", 5:"Albert", 6:"Jesuino", 7:"Jesuino", 8:"Ester", 9:"Marcilio", 10:"Wesley", 11:"Albert" };
    const MINS = { pessoal:"Pessoal", mordomia:"Mordomia", saude:"Saúde", familia:"Família", homens:"Homens", adolescentes:"Adol.", mulher:"Mulher" };

    let db = { escalas: {}, anciaos_manual: {}, docs: {}, regras_manuais: {}, senhas: {admin:"iasd118"} };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';
    let minSel = null;

    database.ref('dados_igreja').on('value', (snap) => { if(snap.val()) { db = snap.val(); renderTodo(); } });

    function renderTodo() {
        const m = document.getElementById('selMes').value;
        const u = curUser;

        document.getElementById('btnSair').style.display = u !== 'visitante' ? 'block' : 'none';
        document.getElementById('btnAcesso').style.display = u === 'visitante' ? 'block' : 'none';
        document.getElementById('adminPanel').style.display = (u === 'admin') ? 'block' : 'none';
        document.getElementById('btnUpload').style.display = (u === 'admin' || u === 'ger') ? 'block' : 'none';

        const anciao = db.anciaos_manual?.[m] || ANCIÃOS_AUTO[m];
        document.getElementById('headerAnciao').innerText = "Responsável: Ancião " + anciao;
        document.getElementById('headerTitulo').innerText = "ESCALA - " + MESES[m] + " 2026";
        document.getElementById('mesNome').innerText = MESES[m];

        renderEscala();
        renderAdmin();
        renderMural();
    }

    function renderAdmin() {
        // Lista de Anciãos para o ano todo
        const lista = document.getElementById('listaAnciaos'); lista.innerHTML = "";
        MESES.forEach((nome, i) => {
            let valor = db.anciaos_manual?.[i] || "";
            let auto = ANCIÃOS_AUTO[i];
            lista.innerHTML += `
                <div style="display:flex; align-items:center; gap:5px; margin-bottom:5px;">
                    <small style="width:70px; font-size:9px;">${nome}:</small>
                    <input class="input-dark" style="padding:4px; font-size:11px; flex:1" 
                        placeholder="${auto}" value="${valor}" 
                        onchange="atuAnciaoAno(${i}, this.value)">
                </div>`;
        });

        // Grid de Ministérios para Cores
        const grid = document.getElementById('gridMinisterios'); grid.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            grid.innerHTML += `<button class="btn-min ${minSel===k?'active':''}" onclick="minSel='${k}'; renderAdmin();">${MINS[k]}</button>`;
        });

        // Senhas
        const sArea = document.getElementById('verSenhas'); sArea.innerHTML = "";
        Object.keys(db.senhas || {}).forEach(k => sArea.innerHTML += `<div>${k.toUpperCase()}: ${db.senhas[k]}</div>`);
    }

    function renderEscala() {
        const mIdx = parseInt(document.getElementById('selMes').value);
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, mIdx + 1, 0).getDate();

        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, mIdx, d); let sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let dStr = `${d}/${mIdx+1}/2026`;
                let corClasse = getCorDia(d, sem, mIdx, dStr);
                
                let tr = `<tr class="${corClasse}" onclick="aplicarCor('${dStr}')">
                    <td style="font-size:10px">${["DOMINGO","","","QUARTA","","","SÁBADO"][sem]}</td>
                    <td>${d}/${mIdx+1}</td>`;
                ["sa","pr","mu","lo","so","re","di"].forEach(c => {
                    let val = db.escalas?.[dStr]?.[c] || "";
                    let edit = (curUser === 'admin' || curUser === c);
                    tr += `<td><input class="input-escala" ${!edit?'readonly':''} value="${val}" onchange="atuCel('${dStr}','${c}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    function getCorDia(d, sem, m, dStr) {
        // Se houver regra manual (clicada pelo admin), ela manda
        if(db.regras_manuais?.[dStr]) return "row-" + db.regras_manuais[dStr];

        // Escala Automática de Cores
        if(sem === 6) { // Sábados
            let sab = Math.ceil(d/7);
            if(sab === 1) return "row-pessoal";
            if(sab === 2) return "row-mordomia";
        }
        if(sem === 0) { // Domingos
            let dom = Math.ceil(d/7);
            if(dom === 1) return "row-saude";
            if(dom === 3) return "row-familia";
        }
        if(sem === 3) { // Quartas
            let qua = Math.ceil(d/7);
            if(qua === 2) return "row-homens";
            if(qua === 3) return "row-adolescentes";
        }
        return "";
    }

    function aplicarCor(dStr) {
        if(minSel && curUser === 'admin') {
            if(!db.regras_manuais) db.regras_manuais = {};
            db.regras_manuais[dStr] = minSel;
            save();
        }
    }

    function renderMural() {
        const m = document.getElementById('selMes').value;
        const grid = document.getElementById('gridMural'); grid.innerHTML = "";
        (db.docs?.[m] || []).forEach((f, i) => {
            grid.innerHTML += `
                <div class="thumb-card" onclick="abrirLightbox('${f.data}', '${f.type}')">
                    ${f.type.includes('pdf') ? '<small>PDF</small>' : `<img src="${f.data}">`}
                    ${curUser==='admin' ? `<button onclick="removerDoc(${i}, event)" style="position:absolute;top:0;right:0;background:red;color:white;border:none;padding:2px 5px">X</button>` : ''}
                </div>`;
        });
    }

    function abrirLightbox(data, type) {
        const lb = document.getElementById('lightbox');
        const box = document.getElementById('mediaBox');
        lb.style.display = 'flex';
        box.innerHTML = type.includes('pdf') ? `<iframe src="${data}"></iframe>` : `<img src="${data}">`;
    }

    function dispararUpload() {
        const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*,application/pdf';
        inp.onchange = e => {
            const f = e.target.files[0]; const r = new FileReader();
            r.onload = ev => {
                const m = document.getElementById('selMes').value;
                if(!db.docs) db.docs = {}; if(!db.docs[m]) db.docs[m] = [];
                db.docs[m].push({data: ev.target.result, type: f.type}); save();
            }; r.readAsDataURL(f);
        }; inp.click();
    }

    function removerDoc(i, e) { e.stopPropagation(); const m = document.getElementById('selMes').value; db.docs[m].splice(i, 1); save(); }
    function atuAnciaoAno(m, v) { if(!db.anciaos_manual) db.anciaos_manual = {}; db.anciaos_manual[m] = v; save(); }
    function atuCel(d, c, v) { if(!db.escalas) db.escalas={}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function limparRegras() { db.regras_manuais = {}; save(); }
    function save() { database.ref('dados_igreja').set(db); }
    function login() { const user = document.getElementById('u').value, pass = document.getElementById('p').value; if(db.senhas[user] === pass) { localStorage.setItem('iasd_curUser', user); location.reload(); } else alert("Erro!"); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
    window.onload = renderTodo;
</script>
</body>
</html>
