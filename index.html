<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* ESTILOS ORIGINAIS PRESERVADOS */
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        #saveIndicator { position: fixed; top: 15px; left: 50%; transform: translateX(-50%); padding: 8px 25px; border-radius: 30px; font-weight: bold; font-size: 0.9rem; z-index: 20000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .saving { background: var(--orange); color: white; border: 2px solid white; }
        .saved { background: var(--green); color: white; border: 2px solid white; }
        .btn-modern { padding: 8px 15px; border-radius: 20px; border: 1px solid var(--neon); background: transparent; color: var(--neon); cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 0.8rem; }
        .btn-modern:hover { background: var(--neon); color: var(--blue); box-shadow: 0 0 10px var(--neon); }
        #userWelcomeBar { display: none; background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon); padding: 12px 20px; border-radius: 8px; margin-bottom: 15px; font-size: 0.95rem; color: #fff; text-align: center; }
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 2fr 1.2fr; gap: 15px; align-items: start; } 
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; height: auto; min-height: 520px; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 6px; box-sizing: border-box; outline: none; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 8px; font-weight: bold; font-size: 0.7rem; transition: 0.2s; }
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; border-radius: 10px 10px 0 0; overflow: hidden; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.9rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; }
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 1.1rem; display: block; padding: 8px 0; outline: none; }
        
        /* ESTILO DO CRONOGRAMA */
        .cron-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 20000; align-items: center; justify-content: center; padding: 20px; }
        .cron-container { background: white; color: black; padding: 25px; border-radius: 15px; width: 100%; max-width: 800px; max-height: 90vh; overflow-y: auto; }
        .bloco-cron { border: 1px solid #ddd; margin-bottom: 10px; border-radius: 8px; overflow: hidden; }

        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 90vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }
    </style>
</head>
<body>

<div id="saveIndicator"></div>

<div class="container">
    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:8px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button id="btnAcesso" class="btn-modern" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="btn-modern" style="border-color:red; color:red; display:none;" id="btnSair" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="userWelcomeBar"></div>

    <div style="display:flex; gap:10px; margin-bottom:15px; justify-content:center; flex-wrap: wrap;">
        <button class="btn-modern" style="border-color:var(--gold); color:var(--gold);" onclick="document.getElementById('modalCronograma').style.display='flex'">📝 ORDEM DO CULTO</button>
        <button id="btnLinks" class="btn-modern" style="display:none;" onclick="abrirPopLinks()">🔗 LINKS</button>
        <button id="btnEventos" class="btn-modern" style="border-color:var(--red); color:var(--red); display:none;" onclick="abrirPopEventos()">🔥 EVENTOS</button>
        <button id="btnTesourariaAdmin" class="btn-modern" style="border-color:var(--green); color:var(--green); display:none;" onclick="abrirPopTesouraria()">⚙️ DOCS</button>
        <button id="btnDados" class="btn-modern" style="border-color:var(--orange); color:var(--orange); display:none;" onclick="abrirPopTermometro()">📊 TERMÔMETRO</button>
    </div>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-section"><h4>1. MINISTÉRIO DO DIA</h4><div id="listaMinisterios"></div></div>
            <div class="admin-section"><h4>2. ANCIÃO DO MÊS</h4><div id="gridAnciaos"></div></div>
            <div class="admin-section"><h4>3. LOGINS & SENHAS</h4><div id="corpoCreds"></div></div>
            <div class="admin-section"><h4>4. APOIO / NUVEM</h4><button class="btn-min" onclick="gerarBackupNuvem()">💾 BACKUP NUVEM</button><button class="btn-min" onclick="abrirPopBackups()">📂 RESTAURAR</button></div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" id="headerEscalaTitulo" style="background:var(--blue); color:white; font-size:1.5rem;">ESCALA</th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONOPLASTIA</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div id="secPlan" style="margin-top:20px; background:rgba(255,255,255,0.02); padding:15px; border-radius:10px;">
        <h3 style="color:var(--gold)">🗓️ PLANEJAMENTO ANUAL</h3>
        <div id="corpoPlan"></div>
    </div>
</div>

<div id="modalCronograma" class="cron-overlay" onclick="this.style.display='none'">
    <div class="cron-container" onclick="event.stopPropagation()">
        <h2 style="text-align:center; color:var(--blue)">ORDEM DO CULTO</h2>
        <div id="cronograma-lista"></div>
        <div id="adminCronControles" style="display:none; justify-content:center; gap:10px; margin-top:10px;">
            <button class="btn-modern" onclick="addBlocoCron()">+ NOVA SEÇÃO</button>
        </div>
        <div style="display:flex; gap:10px; margin-top:20px;">
            <button id="btnSalvarCron" class="btn-modern" style="background:var(--green); color:white; flex:1; display:none;" onclick="salvarCronograma()">💾 SALVAR</button>
            <button class="btn-fechar" style="margin-top:0; flex:1;" onclick="document.getElementById('modalCronograma').style.display='none'">FECHAR</button>
        </div>
    </div>
</div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;"><button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button></div></div>
<div id="popOverlay" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()"><h3 id="popTit" style="color:var(--neon)"></h3><div id="popCorpo"></div><button class="btn-fechar" onclick="this.closest('.overlay').style.display='none'">FECHAR</button></div></div>

<script>
    // CONFIGURAÇÃO FIREBASE ORIGINAL
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MINS = { admin: "Administrador", ger: "Gerência", musica: "Música", diaconato: "Diaconato", sonoplastia: "Sonoplastia", sabatina: "Escola Sabatina" };
    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    let db = {}; let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { 
            db = doc.data(); 
            renderTodo(); 
            if(db.cronograma) carregarCronograma(db.cronograma);
        }
    });

    function save() { dbCloud.collection('dados').doc('estrela_v102').set(db); }

    function renderTodo() {
        const mIdx = document.getElementById('selMes').value || new Date().getMonth();
        const isAdmin = ['admin','ger'].includes(curUser);
        
        // Exibição de botões por login
        document.getElementById('btnAcesso').style.display = curUser === 'visitante' ? 'block' : 'none';
        document.getElementById('btnSair').style.display = curUser !== 'visitante' ? 'block' : 'none';
        if(curUser !== 'visitante') {
            document.getElementById('userWelcomeBar').style.display = 'block';
            document.getElementById('userWelcomeBar').innerHTML = `Logado como: <b>${MINS[curUser] || curUser}</b>`;
            document.getElementById('btnSalvarCron').style.display = 'block';
            ['btnLinks','btnEventos','btnTesourariaAdmin','btnDados'].forEach(id => document.getElementById(id).style.display='block');
        }
        if(isAdmin) {
            document.getElementById('adminPanel').style.display='block';
            document.getElementById('adminCronControles').style.display='flex';
            renderAdminPanel();
        }

        // Tabela Escala (Lógica original preservada)
        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, parseInt(mIdx)+1, 0).getDate();
        for(let d=1; d<=dias; d++){
            let dt = new Date(2026, mIdx, d), sem = dt.getDay(), dStr = `${d}/${parseInt(mIdx)+1}/2026`;
            if([0,3,6].includes(sem)){
                let tr = `<tr><td>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</td><td>${d}/${parseInt(mIdx)+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    let val = db.escalas?.[dStr]?.[col] || '';
                    let edit = isAdmin || (curUser==='musica' && (col==='mu'||col==='lo')) || (curUser==='diaconato' && col==='di');
                    tr += `<td><textarea ${edit?'':'disabled'} class="auto-expand" onchange="atuCel('${dStr}','${col}',this.value)">${val}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
    }

    // --- LÓGICA DO CRONOGRAMA ---
    function carregarCronograma(lista) {
        const container = document.getElementById('cronograma-lista');
        container.innerHTML = "";
        lista.forEach((bloco, idx) => {
            const isAdmin = ['admin','ger'].includes(curUser);
            const userCargo = MINS[curUser] || "";
            // Permissão: se o título do bloco contém o nome do ministério do usuário
            const podeEditarConteudo = isAdmin || (userCargo !== "" && bloco.titulo.toUpperCase().includes(userCargo.toUpperCase()));

            const div = document.createElement('div');
            div.className = 'bloco-cron';
            div.innerHTML = `
                <div style="background:#eee; padding:8px; display:flex; gap:5px; align-items:center;">
                    <input style="width:60px" class="c-h input-dark" value="${bloco.horario}" ${isAdmin?'':'disabled'}>
                    <input style="flex:1" class="c-t input-dark" value="${bloco.titulo}" ${isAdmin?'':'disabled'}>
                    ${isAdmin ? `
                        <button onclick="moverBloco(${idx},-1)" class="btn-modern">↑</button>
                        <button onclick="moverBloco(${idx},1)" class="btn-modern">↓</button>
                        <button onclick="removerBloco(${idx})" style="color:red" class="btn-modern">X</button>
                    ` : ''}
                    ${podeEditarConteudo ? `<button onclick="addLinhaCron(this)" class="btn-modern" style="color:green">+ Item</button>` : ''}
                </div>
                <table style="width:100%"><tbody class="c-itens"></tbody></table>
            `;
            container.appendChild(div);
            if(bloco.itens) bloco.itens.forEach(it => addLinhaCron(div.querySelector('table'), it, podeEditarConteudo));
        });
    }

    function addLinhaCron(target, data={n:'', t:''}, podeEditar=true) {
        const tbody = target.tagName === 'TABLE' ? target.querySelector('tbody') : target.closest('.bloco-cron').querySelector('tbody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input class="i-n" style="width:95%; border:none" value="${data.n}" ${podeEditar?'':'disabled'}></td>
            <td width="60"><input class="i-t" style="width:100%; border:none" value="${data.t}" ${podeEditar?'':'disabled'}></td>
            ${podeEditar ? `<td width="30"><button onclick="this.closest('tr').remove()" style="color:red; background:none; border:none">x</button></td>` : ''}
        `;
        tbody.appendChild(tr);
    }

    function moverBloco(idx, dir) {
        let novo = idx + dir;
        if(novo >= 0 && novo < db.cronograma.length) {
            let temp = db.cronograma[idx];
            db.cronograma[idx] = db.cronograma[novo];
            db.cronograma[novo] = temp;
            save();
        }
    }

    function removerBloco(idx) { if(confirm("Remover seção?")) { db.cronograma.splice(idx,1); save(); } }

    function salvarCronograma() {
        db.cronograma = Array.from(document.querySelectorAll('.bloco-cron')).map(b => ({
            horario: b.querySelector('.c-h').value,
            titulo: b.querySelector('.c-t').value,
            itens: Array.from(b.querySelectorAll('.c-itens tr')).map(tr => ({
                n: tr.querySelector('.i-n').value,
                t: tr.querySelector('.i-t').value
            }))
        }));
        save();
        alert("Salvo!");
    }

    // FUNÇÕES ORIGINAIS AUXILIARES
    function login() { 
        const u = document.getElementById('userLogin').value.toLowerCase(), p = document.getElementById('passLogin').value;
        if(db.senhas?.[u] === p || (u==='admin' && p==='123456')) { localStorage.setItem('iasd_curUser', u); location.reload(); }
        else alert("Senha incorreta");
    }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function renderAdminPanel() { /* Lógica de preenchimento do painel admin original */ }

    // Init meses
    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
