<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IASD Estrela Dalva - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1450px; margin: auto; }
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 220px 1fr 1fr; gap: 20px; }
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; }
        .admin-section h4 { color: var(--neon); font-size: 0.75rem; border-bottom: 1px solid #334155; padding-bottom: 8px; margin-bottom: 12px; text-transform: uppercase; }
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 10px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; height: 55px; }
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; }
        .media-item { background: rgba(255,255,255,0.05); padding: 12px; margin-bottom: 8px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; border-left: 3px solid var(--neon); }
        .btn-download { color: var(--neon); text-decoration: none; border: 1px solid var(--neon); padding: 5px 10px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .btn-download:hover { background: var(--neon); color: var(--blue); }
    </style>
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:10px;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:140px; border-color:var(--neon);"></select>
            <button id="btnMusica" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon); display:none; cursor:pointer;" onclick="abrirPopMusica()">🎶 UPLOAD MÚSICA</button>
            <button id="btnAcesso" class="input-dark" style="width:auto; padding:0 15px; border-color:var(--neon); color:var(--neon);" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button id="btnSair" class="input-dark" style="width:auto; padding:0 15px; border-color:red; color:red; display:none;" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>1. MINISTÉRIO DO DIA</h4>
                <div id="listaMinisterios"></div>
            </div>
            <div class="admin-section">
                <h4>2. RESPONSÁVEL</h4>
                <div id="gridMeses"></div>
            </div>
            <div class="admin-section">
                <h4>3. LOGINS E SENHAS</h4>
                <div style="max-height: 200px; overflow-y: auto;"><table style="width:100%"><tbody id="corpoCreds"></tbody></table></div>
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;" id="headerTitulo">CARREGANDO...</th></tr>
            <tr><th style="width:150px">DIA</th><th style="width:60px">DATA</th><th>SABATINA</th><th>PREGADOR</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>

    <div id="areaMusicas" style="margin-top:20px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; border: 1px solid var(--neon); display:none;">
        <h3 style="color:var(--neon); margin-top:0;">🎵 MÚSICAS E PLAYBACKS DA SEMANA</h3>
        <div id="listaMusicasPublica"></div>
    </div>
</div>

<div id="popMusica" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()">
    <h3 style="color:var(--neon);">ENVIAR NOVO ARQUIVO</h3>
    <input type="file" id="fileMusica" accept="audio/*,video/*" class="input-dark" onchange="uploadMusica()">
    <p style="font-size:0.7rem; color:#aaa;">O arquivo será visível para todos os membros logados.</p>
    <button onclick="document.getElementById('popMusica').style.display='none'" class="btn-min" style="border-color:red; color:red;">FECHAR</button>
</div></div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()"><input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;"><input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;"><button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", databaseURL: "https://unidades-de-acao-default-rtdb.firebaseio.com", projectId: "unidades-de-acao" };
    firebase.initializeApp(firebaseConfig);
    const dbRef = firebase.database().ref('iasd_estrela_v102_49');

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Admin", ger: "Gerência", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", mulher: "M. Mulher", sabatina: "Escola Sabatina", pessoal: "M. Pessoal", mordomia: "Mordomia", saude: "Saúde", homens: "M. Homens", familia: "M. Família", adolescentes: "Adolescentes" };
    
    let db = { senhas: { admin: "admin123" }, anciaos: {}, escalas: {}, musicas_semanais: [] };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    dbRef.on('value', snap => {
        if(snap.exists()) db = snap.val();
        renderTodo();
    });

    function login() {
        const u = document.getElementById('userLogin').value.toLowerCase().trim();
        const p = document.getElementById('passLogin').value;
        if((u === "admin" && p === "admin123") || (db.senhas && db.senhas[u] === p)) {
            localStorage.setItem('iasd_curUser', u);
            location.reload();
        } else { alert("Erro!"); }
    }

    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        document.getElementById('headerTitulo').innerText = `ESCALA ${MESES[mIdx]}`;
        
        if(curUser !== 'visitante') {
            document.getElementById('btnSair').style.display='block';
            document.getElementById('btnAcesso').style.display='none';
            document.getElementById('areaMusicas').style.display='block'; // Mostra área de músicas
            if(['admin','ger','musica','sonoplastia'].includes(curUser)) document.getElementById('btnMusica').style.display='block';
            if(['admin','ger'].includes(curUser)) {
                document.getElementById('adminPanel').style.display='block';
                renderAdmin();
            }
        }

        const corpo = document.getElementById('corpoEscala');
        corpo.innerHTML = "";
        const diasNoMes = new Date(2026, mIdx + 1, 0).getDate();
        for(let d=1; d<=diasNoMes; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            if([0,3,6].includes(sem)) {
                let tr = `<tr><td><b>${["DOM","SEG","TER","QUA","QUI","SEX","SÁB"][sem]}</b></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(col => {
                    tr += `<td><input ${curUser!=='visitante'?'':'disabled'} style="width:100%; border:none; background:transparent; text-align:center;" value="${db.escalas?.[dStr]?.[col]||''}" onchange="atuCel('${dStr}','${col}',this.value)"></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        renderListaMusica(); // Atualiza a lista de músicas na tela
    }

    function abrirPopMusica() { document.getElementById('popMusica').style.display='flex'; }

    function uploadMusica() {
        const file = document.getElementById('fileMusica').files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            if(!db.musicas_semanais) db.musicas_semanais = [];
            db.musicas_semanais.push({ nome: file.name, data: e.target.result });
            dbRef.set(db);
            alert("Música enviada com sucesso!");
            document.getElementById('popMusica').style.display='none';
        };
        reader.readAsDataURL(file);
    }

    function renderListaMusica() {
        const lista = document.getElementById('listaMusicasPublica');
        lista.innerHTML = "";
        if(db.musicas_semanais && db.musicas_semanais.length > 0) {
            db.musicas_semanais.forEach((m, i) => {
                lista.innerHTML += `
                    <div class="media-item">
                        <span>${m.nome}</span>
                        <div style="display:flex; gap:10px;">
                            <a href="${m.data}" download="${m.nome}" class="btn-download">BAIXAR / ABRIR</a>
                            ${['admin','ger','musica'].includes(curUser) ? `<button onclick="removerMusica(${i})" style="background:red; color:white; border:none; border-radius:4px; cursor:pointer;">X</button>` : ''}
                        </div>
                    </div>`;
            });
        } else {
            lista.innerHTML = "<p style='color:#666;'>Nenhuma música enviada para esta semana.</p>";
        }
    }

    function removerMusica(i) {
        if(confirm("Remover esta música?")) {
            db.musicas_semanais.splice(i, 1);
            dbRef.set(db);
        }
    }

    function renderAdmin() {
        const tC = document.getElementById('corpoCreds'); tC.innerHTML = "";
        Object.keys(MINS).forEach(k => {
            tC.innerHTML += `<tr><td style="color:var(--gold); font-size:0.7rem;">${k}</td><td><input class="input-dark" value="${db.senhas?.[k] || '123'}" onchange="if(!db.senhas) db.senhas={}; db.senhas['${k}']=this.value; dbRef.set(db);"></td></tr>`;
        });
        const gM = document.getElementById('gridMeses'); gM.innerHTML = "";
        MESES.forEach((m, i) => {
            gM.innerHTML += `<div style="margin-bottom:5px;"><small>${m}</small><input class="input-dark" value="${db.anciaos?.[i] || ''}" onchange="if(!db.anciaos) db.anciaos={}; db.anciaos[${i}]=this.value; dbRef.set(db);"></div>`;
        });
    }

    function atuCel(d, c, v) { if(!db.escalas) db.escalas = {}; if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); dbRef.set(db); }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
