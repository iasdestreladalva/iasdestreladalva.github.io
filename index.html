<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IASD Estrela Dalva</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --blue: #1a365d; --bg: #0d1b2a; --neon: #00d2ff; --gold: #ffd700; --orange: #ff7f50; --dark: #16213e; --green: #2ecc71; --red: #ff4757; }
        body { background: var(--bg); color: #e6f1ff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; }
        .container { max-width: 1580px; margin: auto; }
        
        /* Painel Admin */
        .admin-box { display: none; background: #0f172a; border: 2px solid var(--orange); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .admin-grid { display: grid; grid-template-columns: 200px 1.2fr 2fr 1.2fr; gap: 15px; align-items: start; } 
        .admin-section { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 10px; border: 1px solid #334155; min-height: 520px; }
        
        .input-dark { width: 100%; background: #000 !important; color: #fff !important; border: 1px solid #444; font-size: 0.8rem; padding: 8px; border-radius: 4px; box-sizing: border-box; }
        .btn-min { display: block; width: 100%; padding: 8px; margin-bottom: 6px; background: none; border: 1px solid var(--neon); color: var(--neon); cursor: pointer; border-radius: 6px; font-weight: bold; font-size: 0.7rem; }
        .btn-min.active { background: var(--neon) !important; color: var(--blue) !important; }

        /* Tabela */
        table#tabela-main { width: 100%; border-collapse: collapse; background: white; color: black; margin-top: 10px; }
        #tabela-main th { background: #f1f5f9; padding: 10px; border: 1px solid #cbd5e1; color: var(--blue); font-size: 0.8rem; }
        #tabela-main td { border: 1px solid #cbd5e1; padding: 4px; text-align: center; font-weight: bold; }
        
        .dia-destaque { background: #0f172a !important; color: var(--neon) !important; cursor: pointer; }
        .auto-expand { width: 100%; background: transparent !important; border: none !important; resize: none; overflow: hidden; text-align: center; font-family: inherit; font-weight: bold; font-size: 0.85rem; display: block; padding: 5px 0; outline: none; }
        
        /* Modais */
        .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; }
        .pop-content { background:var(--bg); border:3px solid var(--orange); padding:25px; border-radius:15px; width:95%; max-width:600px; max-height: 90vh; overflow-y: auto; }
        .btn-fechar { width:100%; padding:15px; background:red; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top:15px; }

        @media print { .no-print { display: none !important; } body { background: white; color: black; } table#tabela-main { border: 1px solid #000; } }
    </style>
</head>
<body>

<div class="container">
    <div id="userWelcomeBar" class="no-print" style="display:none; background: rgba(0, 210, 255, 0.1); border: 1px solid var(--neon); padding: 12px; border-radius: 8px; margin-bottom: 15px; text-align: center;"></div>

    <div id="headerTopo" style="display:flex; justify-content: space-between; align-items:center; margin-bottom:20px;" class="no-print">
        <h2 style="color:var(--neon); margin:0;">IASD ESTRELA DALVA</h2>
        <div style="display:flex; gap:8px; flex-wrap: wrap;">
            <select id="selMes" onchange="renderTodo();" class="input-dark" style="width:130px; border-color:var(--neon);"></select>
            <button class="input-dark" style="border-color:var(--gold); color:var(--gold); width:auto;" onclick="window.print()">🖨️ IMPRIMIR</button>
            <button id="btnTesourariaAdmin" class="input-dark" style="border-color:var(--green); color:var(--green); width:auto; display:none;" onclick="abrirTesourariaAdmin()">⚙️ DOCUMENTOS</button>
            <button id="btnDados" class="input-dark" style="border-color:var(--orange); color:var(--orange); width:auto; display:none;" onclick="abrirPopTermometro()">📊 TERMÔMETRO</button>
            <button class="input-dark" id="btnAcesso" style="width:auto;" onclick="document.getElementById('modalLogin').style.display='flex'">🔓 ACESSAR</button>
            <button class="input-dark" id="btnSair" style="border-color:red; color:red; width:auto; display:none;" onclick="sair()">🚪 SAIR</button>
        </div>
    </div>

    <div id="adminPanel" class="admin-box no-print">
        <div class="admin-grid">
            <div class="admin-section">
                <h4>1. MINISTÉRIO DO DIA</h4>
                <div id="listaMinisterios"></div>
                <button class="btn-min" style="border-color:red; color:red; margin-top:10px;" onclick="window.minSelecionado=null; renderAdmin();">LIMPAR</button>
            </div>
            <div class="admin-section">
                <h4>2. ANCIÃO DO MÊS</h4>
                <div id="gridMeses"></div>
            </div>
            <div class="admin-section">
                <h4>3. SENHAS</h4>
                <table style="width:100%; font-size:0.75rem; color:white;"><tbody id="corpoCreds"></tbody></table>
            </div>
            <div class="admin-section">
                <h4>4. SISTEMA & BACKUP</h4>
                <button class="btn-min" onclick="gerarBackupNuvem()" style="border:2px solid var(--gold); color:var(--gold)">💾 GERAR BACKUP NUVEM</button>
                <button class="btn-min" onclick="abrirModalBackups()" style="border-color:var(--green); color:var(--green)">☁️ GERENCIAR NUVEM</button>
                <hr style="border:0; border-top:1px solid #334155; margin:10px 0;">
                <button class="btn-min" onclick="abrirPopEventos()" style="border-color:var(--red); color:var(--red)">🔥 EVENTOS ESPECIAIS</button>
            </div>
        </div>
    </div>

    <table id="tabela-main">
        <thead>
            <tr><th colspan="9" style="background:var(--blue); color:white; font-size:1.4rem; padding:12px; text-align:left;" id="headerTitulo">ESCALA</th></tr>
            <tr><th colspan="9" style="background:var(--blue); color:var(--gold); font-size:1rem; padding:0 12px 12px 12px; text-align:left;" id="headerAnciao">Responsável: </th></tr>
            <tr><th>DIA</th><th>DATA</th><th>SABATINA</th><th>PREGADOR(A)</th><th>MÚSICA</th><th>LOUVOR</th><th>SONO</th><th>RECEPÇÃO</th><th>DIACONATO</th></tr>
        </thead>
        <tbody id="corpoEscala"></tbody>
    </table>
</div>

<div id="popBackups" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()">
    <h3 style="color:var(--gold); text-align:center;">BACKUPS NA NUVEM</h3>
    <div id="listaBackupsNuvem"></div>
    <button onclick="document.getElementById('popBackups').style.display='none'" class="btn-fechar">FECHAR</button>
</div></div>

<div id="popTermometro" class="overlay" onclick="this.style.display='none'"><div class="pop-content" onclick="event.stopPropagation()">
    <h3 style="color:var(--orange); text-align:center;">DADOS MISSIONÁRIOS</h3>
    <div id="camposMissionarios"></div>
    <button onclick="document.getElementById('popTermometro').style.display='none'" class="btn-fechar">FECHAR</button>
</div></div>

<div id="modalLogin" class="overlay" onclick="this.style.display='none'"><div style="background:white; padding:30px; border-radius:15px; width:260px;" onclick="event.stopPropagation()">
    <input type="text" id="userLogin" placeholder="Usuário" class="input-dark" style="background:#eee!important; color:#000!important; margin-bottom:10px;">
    <input type="password" id="passLogin" placeholder="Senha" class="input-dark" style="background:#eee!important; color:#000!important;">
    <button class="input-dark" style="background:var(--blue); color:white; width:100%; margin-top:15px;" onclick="login()">ENTRAR</button>
</div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyD1GdgX6BfEmmX4P_tP2g72UdTh-4U89ik", authDomain: "unidades-de-acao.firebaseapp.com", projectId: "unidades-de-acao", appId: "1:1088355029870:web:7bb98d3115e7b7767f677f" };
    firebase.initializeApp(firebaseConfig);
    const dbCloud = firebase.firestore();

    const MESES = ["JANEIRO", "FEVEREIRO", "MARÇO", "ABRIL", "MAIO", "JUNHO", "JULHO", "AGOSTO", "SETEMBRO", "OUTUBRO", "NOVEMBRO", "DEZEMBRO"];
    const MINS = { admin: "Administrador", ger: "Gerência", pastor: "Pastor", diaconato: "Diaconato", musica: "Música", sonoplastia: "Sonoplastia", sabatina: "Escola Sabatina" };
    
    let db = {}; let dbBackups = { lista: [] };
    let curUser = localStorage.getItem('iasd_curUser') || 'visitante';

    // Sincronização Principal
    dbCloud.collection('dados').doc('estrela_v102').onSnapshot(doc => {
        if(doc.exists) { db = doc.data(); renderTodo(); } 
        else { db = { senhas:{admin:'123456'}, anciaos:{}, escalas:{}, regras_manuais:{}, mis_v3:{} }; save(); }
    });

    dbCloud.collection('dados').doc('backups_estrela').onSnapshot(doc => {
        if(doc.exists) dbBackups = doc.data();
    });

    function save() { dbCloud.collection('dados').doc('estrela_v102').set(db); }

    // --- BACKUP ---
    function gerarBackupNuvem() {
        const nome = prompt("Nome do Backup:");
        if(!nome) return;
        const novo = { id: Date.now(), nome: nome.toUpperCase(), data: new Date().toLocaleString(), conteudo: JSON.parse(JSON.stringify(db)) };
        if(!dbBackups.lista) dbBackups.lista = [];
        dbBackups.lista.unshift(novo);
        if(dbBackups.lista.length > 10) dbBackups.lista.pop();
        dbCloud.collection('dados').doc('backups_estrela').set(dbBackups).then(() => alert("✅ Salvo!"));
    }

    function abrirModalBackups() {
        document.getElementById('popBackups').style.display='flex';
        const div = document.getElementById('listaBackupsNuvem'); div.innerHTML = "";
        (dbBackups.lista || []).forEach((b, i) => {
            div.innerHTML += `<div style="padding:10px; border:1px solid #444; margin-bottom:5px; display:flex; justify-content:space-between;">
                <span>${b.nome}<br><small>${b.data}</small></span>
                <button onclick="restaurarBkp(${i})" style="background:var(--green); color:white; border:none; padding:5px;">USAR</button>
            </div>`;
        });
    }
    function restaurarBkp(i) { if(confirm("Restaurar?")) { db = dbBackups.lista[i].conteudo; save(); location.reload(); } }

    // --- RENDER ---
    function renderTodo() {
        const mIdx = parseInt(document.getElementById('selMes').value || new Date().getMonth());
        const isAdmin = ['admin','ger'].includes(curUser);
        
        document.getElementById('headerAnciao').innerText = `Ancião Responsável: ${db.anciaos?.[mIdx] || ''}`;
        document.getElementById('headerTitulo').innerText = `ESCALA - ${MESES[mIdx]} 2026`;
        
        document.getElementById('btnAcesso').style.display = curUser==='visitante'?'block':'none';
        document.getElementById('btnSair').style.display = curUser==='visitante'?'none':'block';
        document.getElementById('btnDados').style.display = curUser==='visitante'?'none':'block';

        if(curUser !== 'visitante') {
            const w = document.getElementById('userWelcomeBar');
            w.style.display = 'block'; w.innerHTML = `Olá, <b>${MINS[curUser]}</b>`;
        }

        const corpo = document.getElementById('corpoEscala'); corpo.innerHTML = "";
        const dias = new Date(2026, mIdx + 1, 0).getDate();
        
        for(let d=1; d<=dias; d++) {
            let dt = new Date(2026, mIdx, d), dStr = `${d}/${mIdx+1}/2026`, sem = dt.getDay();
            let minDia = db.regras_manuais?.[dStr];
            if([0,3,6].includes(sem)) {
                let tr = `<tr><td onclick="cliqueDia('${dStr}')" class="${minDia?'dia-destaque':''}"><b>${["DOM","SEG","TER","QUA","QUI","SEX","SAB"][sem]}</b><br><small>${MINS[minDia]||''}</small></td><td>${d}/${mIdx+1}</td>`;
                ['sa','pr','mu','lo','so','re','di'].forEach(c => {
                    tr += `<td><textarea ${curUser!=='visitante'?'':'disabled'} class="auto-expand" onchange="atuCel('${dStr}','${c}',this.value)" oninput="autoResize(this)">${db.escalas?.[dStr]?.[c]||''}</textarea></td>`;
                });
                corpo.innerHTML += tr + "</tr>";
            }
        }
        if(isAdmin) { document.getElementById('adminPanel').style.display='block'; renderAdmin(); }
        setTimeout(() => document.querySelectorAll('textarea').forEach(t => autoResize(t)), 200);
    }

    function renderAdmin() {
        const l = document.getElementById('listaMinisterios'); l.innerHTML = "";
        Object.keys(MINS).filter(m => !['admin','ger'].includes(m)).forEach(m => {
            l.innerHTML += `<button class="btn-min ${window.minSelecionado===m?'active':''}" onclick="window.minSelecionado='${m}'; renderAdmin();">${MINS[m]}</button>`;
        });
        const gM = document.getElementById('gridMeses'); gM.innerHTML = "";
        MESES.forEach((m, i) => { gM.innerHTML += `<div style="margin-bottom:3px;"><small>${m}</small><input class="input-dark" value="${db.anciaos?.[i]||''}" onchange="if(!db.anciaos)db.anciaos={}; db.anciaos[${i}]=this.value; save();"></div>`; });
        const tC = document.getElementById('corpoCreds'); tC.innerHTML = "";
        Object.keys(MINS).forEach(k => { tC.innerHTML += `<tr><td>${MINS[k]}</td><td><input class="input-dark" value="${db.senhas?.[k]||''}" onchange="if(!db.senhas)db.senhas={}; db.senhas['${k}']=this.value;save();"></td></tr>`; });
    }

    function login() {
        const u = document.getElementById('userLogin').value.toLowerCase().trim(), p = document.getElementById('passLogin').value;
        if(db.senhas?.[u] === p || (u==='admin' && p==='123456')) { localStorage.setItem('iasd_curUser', u); location.reload(); } else alert("Erro!");
    }
    function sair() { localStorage.removeItem('iasd_curUser'); location.reload(); }
    function autoResize(t) { t.style.height='auto'; t.style.height=t.scrollHeight+'px'; }
    function atuCel(d, c, v) { if(!db.escalas[d]) db.escalas[d]={}; db.escalas[d][c]=v.toUpperCase(); save(); }
    function cliqueDia(d) { if(['admin','ger'].includes(curUser)) { if(!db.regras_manuais) db.regras_manuais={}; window.minSelecionado ? db.regras_manuais[d]=window.minSelecionado : delete db.regras_manuais[d]; save(); } }
    
    function abrirPopTermometro() {
        const m = document.getElementById('selMes').value, c = document.getElementById('camposMissionarios'); c.innerHTML = "";
        ["Batismos", "Estudos", "Duplas"].forEach((l, i) => {
            c.innerHTML += `<div><label>${l}</label><input type="number" class="input-dark" value="${db.mis_v3?.[m]?.[i]||0}" onchange="if(!db.mis_v3[${m}])db.mis_v3[${m}]=[0,0,0]; db.mis_v3[${m}][i]=this.value; save();"></div>`;
        });
        document.getElementById('popTermometro').style.display='flex';
    }

    const sM = document.getElementById('selMes');
    MESES.forEach((m, i) => sM.innerHTML += `<option value="${i}" ${i==new Date().getMonth()?'selected':''}>${m}</option>`);
</script>
</body>
</html>
